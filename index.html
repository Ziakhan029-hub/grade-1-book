<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>موسى أكاديمي</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #1F1F1F; --amber-light: #3A3A3A; --amber-dark: #141414;
      --bg-top: #FFFFFF; --bg-bot: #F2F2F2; --card-bg: #FFFFFF;
    }

    html, body {
      width: 100%; min-height: 100vh; min-height: 100svh;
      overflow-x: hidden;
    }
    body {
      background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bot) 100%);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Tajawal', sans-serif;
    }

    /* dot-grid texture — identical to splash */
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none;
      background-image: radial-gradient(circle, rgba(0,0,0,.07) 1px, transparent 1px);
      background-size: 28px 28px;
    }

    /* floating stars — identical to splash */
    .star-bg { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 1; }
    .star-bg span { position: absolute; font-size: 20px; opacity: .18; animation: floatStar 6s ease-in-out infinite; }
    .star-bg span:nth-child(1){ top:7%;  left:5%;  animation-delay:0s }
    .star-bg span:nth-child(2){ top:14%; right:7%; animation-delay:1s;  font-size:15px }
    .star-bg span:nth-child(3){ top:38%; left:3%;  animation-delay:2s;  font-size:13px }
    .star-bg span:nth-child(4){ top:63%; right:5%; animation-delay:.5s }
    .star-bg span:nth-child(5){ top:78%; left:9%;  animation-delay:1.5s;font-size:12px }
    .star-bg span:nth-child(6){ top:22%; left:48%; animation-delay:3s;  font-size:17px }
    @keyframes floatStar { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-12px) rotate(15deg)} }

    /* ── Shell — matches splash .phone exactly ── */
    #shell {
      position: relative; z-index: 2;
      width: 100%; max-width: 480px; margin: 0 auto;
      height: 100vh; height: 100svh;
      background: var(--card-bg);
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(0,0,0,.12), 0 24px 64px rgba(0,0,0,.12);
    }

    /* ── iframe ── */
    #frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
      min-height: 0;
    }

    /* ── Loading overlay ── */
    #loader {
      position: absolute;
      inset: 0;
      background: #FFFFFF;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    #loader.show { opacity: 1; pointer-events: all; }
    .spinner {
      width: 36px; height: 36px;
      border: 4px solid rgba(0,0,0,0.3);
      border-top-color: #1F1F1F;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- floating stars — same as splash -->
<div class="star-bg" aria-hidden="true">
  <span>⭐</span><span>✨</span><span>🌟</span>
  <span>⭐</span><span>✨</span><span>🌟</span>
</div>

<div id="shell">

  <!-- Main content frame -->
  <iframe id="frame"
    src="Interactive book for elementary school chapter 1/moosa-splash.html"
    allowfullscreen
    allow="autoplay; microphone"
  ></iframe>

  <!-- Loading spinner -->
  <div id="loader"><div class="spinner"></div></div>

</div>

<script>
(function(){
  // ── Config ──────────────────────────────────────────────────────────
  var ROOT1 = 'Interactive book for elementary school chapter 1/';

  var ROOT2 = 'Interactive book for elementary school chapter 2/';

  var ROOT3 = 'Interactive book for elementary school chapter 3/';

  var ROOT4 = 'Interactive book for elementary school chapter 4/';

  var CHAPTERS = {
    ch1: {
      root: ROOT1,
      lessons: [
        'moosa-lesson-classify 1.html',
        'moosa-lesson-classify 2.html',
        'moosa-lesson-classify 3.html',
        'moosa-lesson-classify 4.html',
        'moosa-lesson-classify 5.html'
      ],
      lessonsPage: ROOT1 + 'moosa-lessons.html',
      dataId: '1'
    },
    ch2: {
      root: ROOT2,
      lessons: [
        'moosa-chp 2-lesson 1.html',
        'moosa-chp 2-lesson 2.html',
        'moosa-chp 2-lesson 3.html',
        'moosa-chp 2-lesson 4.html',
        'moosa-chp 2-lesson 5.html',
        'moosa-chp 2-lesson 6.html'
      ],
      lessonsPage: ROOT1 + 'moosa-lessons.html',
      dataId: '2'
    },
    ch3: {
      root: ROOT3,
      lessons: [
        'moosa-chp 3-lesson 1.html',
        'moosa-chp 3-lesson 2.html',
        'moosa-chp 3-lesson 3.html',
        'moosa-chp 3-lesson 4.html',
        'moosa-chp 3-lesson 5.html',
        'moosa-chp 3-lesson 6.html'
      ],
      lessonsPage: ROOT1 + 'moosa-lessons.html',
      dataId: '3'
    },
    ch4: {
      root: ROOT4,
      lessons: [
        'moosa-chp 4-lesson 1.html',
        'moosa-chp 4-lesson 2.html',
        'moosa-chp 4-lesson 3.html'
      ],
      lessonsPage: ROOT1 + 'moosa-lessons.html',
      dataId: '4'
    }
  };

  // ── State ────────────────────────────────────────────────────────────
  var currentChapter = null;
  var currentIdx     = 0;
  var winObserver    = null;

  // ── DOM refs ─────────────────────────────────────────────────────────
  var frame    = document.getElementById('frame');
  var loader   = document.getElementById('loader');

  // ── Storage helpers ──────────────────────────────────────────────────
  function getProgress(ch) {
    try { return JSON.parse(localStorage.getItem('moosa_' + ch) || '[]'); }
    catch(e) { return []; }
  }
  function saveLessonDone(ch, idx) {
    var p = getProgress(ch);
    if (p.indexOf(idx) === -1) p.push(idx);
    localStorage.setItem('moosa_' + ch, JSON.stringify(p));
  }
  function isChapterComplete(ch) {
    var p = getProgress(ch);
    var total = CHAPTERS[ch].lessons.length;
    return p.length >= total;
  }

  // ── Navigation ───────────────────────────────────────────────────────
  function loadUrl(url) {
    loader.classList.add('show');
    frame.src = url;
  }

  function startChapter(chKey) {
    currentChapter = chKey;
    currentIdx = 0;
    loadUrl(CHAPTERS[chKey].root + CHAPTERS[chKey].lessons[0]);
  }

  function goForward() {
    if (!currentChapter) return;
    var ch = CHAPTERS[currentChapter];
    if (currentIdx < ch.lessons.length - 1) {
      currentIdx++;
      loadUrl(ch.root + ch.lessons[currentIdx]);
    } else {
      // Completed last lesson — mark chapter done and return
      saveLessonDone(currentChapter, currentIdx);
      exitChapter();
    }
  }

  function exitChapter() {
    var ch = currentChapter;
    currentChapter = null;
    loadUrl(CHAPTERS[ch].lessonsPage);
  }

  // ── Iframe load handler ──────────────────────────────────────────────
  frame.addEventListener('load', function() {
    loader.classList.remove('show');

    var fname = '';
    try { fname = decodeURIComponent(frame.contentWindow.location.href.split('/').pop().split('?')[0]); }
    catch(e) { return; }

    // Disconnect previous win observer
    if (winObserver) { try { winObserver.disconnect(); } catch(e){} winObserver = null; }

    if (fname === 'moosa-lessons.html') {
      injectLessonsPage();
    } else if (fname.match(/moosa-lesson-classify|moosa-chp 2-lesson|moosa-chp 3-lesson|moosa-chp 4-lesson/)) {
      watchForWin();
    }
  });

  // ── Inject into lessons page ─────────────────────────────────────────
  function injectLessonsPage() {
    try {
      var doc = frame.contentDocument;

      // Wire up lesson buttons to navigate
      var lessonMap = { '1': 'ch1', '2': 'ch2', '3': 'ch3', '4': 'ch4' };
      doc.querySelectorAll('.lesson').forEach(function(btn) {
        btn.addEventListener('click', function() {
          var chKey = lessonMap[btn.dataset.id];
          if (chKey) setTimeout(function() { startChapter(chKey); }, 180);
        });
      });

      // Completion badges + next-chapter selection
      var nextUnlockedId = null;
      Object.keys(CHAPTERS).forEach(function(chKey) {
        var ch = CHAPTERS[chKey];
        var btn = doc.querySelector('.lesson[data-id="' + ch.dataId + '"]');
        if (!btn) return;
        if (isChapterComplete(chKey)) {
          // Add green tick badge to completed lesson
          if (!btn.querySelector('.ch-done-badge')) {
            var badge = doc.createElement('span');
            badge.className = 'ch-done-badge';
            badge.textContent = '✓';
            badge.style.cssText = [
              'position:absolute','top:8px','left:8px',
              'width:26px','height:26px','background:#22C55E',
              'color:#fff','border-radius:50%','display:inline-flex',
              'align-items:center','justify-content:center',
              'font-size:14px','font-weight:800',
              'box-shadow:0 2px 6px rgba(0,0,0,.2)','z-index:9'
            ].join(';');
            btn.style.position = 'relative';
            btn.appendChild(badge);
          }
          btn.classList.remove('selected');
          btn.setAttribute('aria-selected', 'false');
        } else if (!nextUnlockedId) {
          // first incomplete chapter = the one to highlight next
          nextUnlockedId = ch.dataId;
        }
      });

      // Select the next unlocked lesson
      if (nextUnlockedId) {
        var nextBtn = doc.querySelector('.lesson[data-id="' + nextUnlockedId + '"]');
        if (nextBtn) {
          // Deselect all first
          doc.querySelectorAll('.lesson').forEach(function(l) {
            l.classList.remove('selected');
            l.setAttribute('aria-selected', 'false');
          });
          nextBtn.classList.add('selected');
          nextBtn.setAttribute('aria-selected', 'true');
          // Sync the page's selectedId variable
          try { frame.contentWindow.selectedId = nextUnlockedId; } catch(e) {}
        }
      }

    } catch(e) { console.warn('inject error', e); }
  }

  // ── Watch for win overlay inside lesson ──────────────────────────────
  function watchForWin() {
    if (!currentChapter) return;
    try {
      var doc = frame.contentDocument;
      var chKey = currentChapter;
      var idx   = currentIdx;

      winObserver = new MutationObserver(function() {
        var win = doc.querySelector('.win-overlay.show');
        if (win) {
          saveLessonDone(chKey, idx);
          winObserver.disconnect();
          winObserver = null;
        }
      });
      winObserver.observe(doc.body, {
        subtree: true,
        attributes: true,
        attributeFilter: ['class']
      });
    } catch(e) {}
  }

  // ── postMessage from inner pages ────────────────────────────────────
  window.addEventListener('message', function(e) {
    var d = e.data;
    if (!d || typeof d !== 'object') return;

    if (d.action === 'openLesson') {
      var idMap = { '1': 'ch1', '2': 'ch2', '3': 'ch3', '4': 'ch4' };
      var chKey = idMap[String(d.id)];
      if (chKey) startChapter(chKey);
    } else if (d.action === 'nextLesson') {
      goForward();
    } else if (d.action === 'navigateLesson') {
      // Jump to a specific lesson file within the current chapter
      if (currentChapter && d.file) {
        var idx = CHAPTERS[currentChapter].lessons.indexOf(d.file);
        if (idx !== -1) { currentIdx = idx; loadUrl(CHAPTERS[currentChapter].root + d.file); }
      }
    } else if (d.action === 'goBack') {
      // Back from lessons page → go to splash
      loadUrl(ROOT1 + 'moosa-splash.html');
    }
  });

  // ── Initial load ─────────────────────────────────────────────────────
  loader.classList.add('show');

})();
</script>

</body>
</html>
