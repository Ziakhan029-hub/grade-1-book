<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>التحدي الأخير — اجمع واكتب الناتج</title>
<meta name="description" content="اجمع المعادلة ثم تتبّع الناتج بإصبعك!" />
<script src="confetti.browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: "Baloo 2", "Tajawal", "Comic Sans MS", system-ui, sans-serif; overflow: hidden; user-select: none;
    background: linear-gradient(180deg, #a6e6dd 0%, #bfe8c6 55%, #d8edae 100%);
    display: flex; align-items: center; justify-content: center; }
  #stage { position: relative; aspect-ratio: 1536 / 2750; height: 100svh; max-width: 100vw;
    background: url("Background.png") center / contain no-repeat; container-type: size; overflow: hidden; }

  .fs-btn { position: absolute; z-index: 20; width: 11cqw; height: 11cqw; max-width: 52px; max-height: 52px;
    border-radius: 50%; border: 0.8cqw solid #fff; color: #fff; cursor: pointer; font-size: 5cqw;
    display: flex; align-items: center; justify-content: center; box-shadow: 0 1.2cqw 3cqw rgba(0,0,0,0.25); transition: transform .12s ease; }
  .fs-btn:active { transform: scale(.9); }
  .fs-home { top: 2.5%; left: 3.5%; background: linear-gradient(180deg, #f59e0b, #d97706); }
  .fs-say  { top: 2.5%; right: 3.5%; background: linear-gradient(180deg, #1cb0f6, #0a84c2); }

  .fs-question { position: absolute; top: 11%; left: 50%; transform: translateX(-50%); z-index: 8;
    text-align: center; direction: rtl; max-width: 74%;
    padding: 2.6cqw 6cqw; border: 1cqw solid #fff; border-radius: 6cqw;
    background: linear-gradient(180deg, #16a34a, #065f46);
    font-family: "Baloo 2", "Tajawal", "Comic Sans MS", system-ui, sans-serif; font-weight: 900;
    font-size: 5cqw; line-height: 1.18; color: #fff;
    text-shadow: 0 0.5cqw 0 rgba(0,0,0,0.3); box-shadow: 0 2cqw 5cqw rgba(0,0,0,0.3); }

  .fs-equation { position: absolute; left: 20%; top: 29.2%; width: 60%; height: 21.2%; z-index: 8;
    display: flex; align-items: center; justify-content: center; gap: 2.6cqw; direction: ltr;
    font-weight: 900; font-size: 9.5cqw; color: #fdfdfd; text-shadow: 0 0.6cqw 0 rgba(0,0,0,0.3); }
  .fs-equation .op { color: #ffd60a; }
  .fs-equation #ans { color: #ffd60a; min-width: 1.1em; display: inline-block; text-align: center; transition: color .3s; }
  .fs-equation #ans.done { color: #86efac; }

  .fs-panel { position: absolute; left: 7%; right: 7%; top: 53.5%; bottom: 3.5%; z-index: 6;
    background: rgba(255,255,255,0.93); border: 1cqw solid #fff; border-radius: 6cqw;
    box-shadow: 0 2.4cqw 5cqw rgba(0,0,0,0.28); display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2.6cqw; gap: 1.8cqw; }
  .fs-dots { display: flex; align-items: center; justify-content: center; gap: 1.5cqw; flex-wrap: nowrap; }
  .fs-dots .dot { width: 3cqw; height: 3cqw; max-width: 15px; max-height: 15px; border-radius: 50%; box-sizing: border-box;
    background: rgba(0,0,0,0.12); border: 0.5cqw solid rgba(120,140,120,0.5); transition: transform .2s, background .2s, box-shadow .2s; }
  .fs-dots .dot.on { background: #22c55e; border-color: #16a34a; box-shadow: 0 0 1.5cqw rgba(34,197,94,.7); transform: scale(1.18); }
  .trace-wrap { position: relative; height: 58%; aspect-ratio: 1; flex-shrink: 0;
    background: #ffffff; border-radius: 4cqw; box-shadow: inset 0 0 0 0.5cqw rgba(120,120,120,.2); overflow: visible; }
  .dot-path { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; }
  .trace-canvas { position: absolute; inset: 0; width: 100%; height: 100%; z-index: 3; touch-action: none; cursor: crosshair; border-radius: 4cqw; }
  .guide-hand { position: absolute; z-index: 4; font-size: 8cqw; pointer-events: none; transform: translate(-50%,-108%);
    filter: drop-shadow(0 2px 4px rgba(0,0,0,.3)); animation: handBob 1s ease-in-out infinite; }
  .guide-hand.hide { display: none; }
  @keyframes handBob { 0%,100% { transform: translate(-50%,-108%);} 50% { transform: translate(-50%,-130%);} }
  /* auto-advance countdown bar (ch1/2/3 style) */
  .countdown-bar { position: absolute; left: 5%; right: 5%; bottom: 2.6cqw; height: 10cqw; max-height: 50px; z-index: 9;
    border-radius: 3cqw; overflow: hidden; background: rgba(0,0,0,0.08); display: none; align-items: center; justify-content: center; }
  .countdown-bar.show { display: flex; }
  .countdown-fill { position: absolute; inset: 0; background: linear-gradient(135deg,#22C55E,#4ADE80); border-radius: 3cqw; transform-origin: right center; }
  .countdown-fill.run { animation: cdShrink 3s linear forwards; }
  @keyframes cdShrink { 0% { transform: scaleX(1);} 100% { transform: scaleX(0);} }
  .countdown-txt { position: relative; z-index: 1; font-size: 4.6cqw; font-weight: 900; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.3); direction: rtl; }
  @keyframes ml-startPulse { 0%,100% { transform: scale(1); opacity: .85;} 50% { transform: scale(1.5); opacity: .35;} }

  .fs-progress { width: 78%; height: 3.2cqw; max-height: 16px; background: rgba(0,0,0,0.10); border-radius: 999px; overflow: hidden; }
  .fs-progress .fill { height: 100%; width: 0%; background: linear-gradient(90deg, #4ade80, #16a34a); border-radius: 999px; transition: width .12s ease; }
  .fs-controls { display: flex; gap: 4cqw; }
  .fs-ctrl { width: 10.5cqw; height: 10.5cqw; max-width: 48px; max-height: 48px; border-radius: 50%; border: 0.7cqw solid #fff;
    cursor: pointer; font-size: 4.4cqw; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1cqw 2.4cqw rgba(0,0,0,0.2); color: #fff; transition: transform .12s ease; }
  .fs-ctrl:active { transform: scale(.9); }
  .fs-hint { background: linear-gradient(180deg, #a78bfa, #7c3aed); }
  .fs-hint.off { filter: grayscale(.6) brightness(.9); }
  .fs-clear { background: linear-gradient(180deg, #fb7185, #e11d48); }

  .fs-win { position: absolute; inset: 0; z-index: 40; display: none; align-items: center; justify-content: center; }
  .fs-win.show { display: flex; animation: fadeIn .3s ease; }
  .fs-win-card { background: rgba(255,255,255,0.96); border: 1cqw solid #fff; border-radius: 6cqw; padding: 6cqw 7cqw; text-align: center;
    box-shadow: 0 3cqw 7cqw rgba(0,0,0,0.3); animation: pop .5s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes pop { 0%{transform:scale(.5);opacity:0;} 70%{transform:scale(1.06);} 100%{transform:scale(1);opacity:1;} }
  @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
  .fs-win-title { font-size: 8cqw; font-weight: 900; color: #16a34a; }
  .fs-win-sub { font-size: 5cqw; font-weight: 900; color: #444; margin: 1.5cqw 0 4cqw; direction: rtl; }
  .fs-win-btns { display: flex; gap: 3cqw; justify-content: center; flex-wrap: wrap; }
  .fs-win-btn { border: 0.8cqw solid #fff; border-radius: 4cqw; padding: 3cqw 5cqw; font-family: inherit; font-size: 4.6cqw; font-weight: 900;
    color: #fff; cursor: pointer; box-shadow: 0 1.4cqw 0 rgba(0,0,0,.2); direction: rtl; }
  .fs-win-btn.next { background: linear-gradient(180deg,#4ade80,#16a34a); }
  .fs-win-btn.menu { background: linear-gradient(180deg,#1cb0f6,#0a84c2); }
  .fs-win-btn:active { transform: translateY(0.6cqw); }
</style>
</head>
<body>
<div id="stage">
  <button class="fs-btn fs-home" id="homeBtn" aria-label="العودة للقائمة">🏠</button>
  <button class="fs-btn fs-say" id="sayBtn" aria-label="استمع للسؤال">🔊</button>

  <div class="fs-question" id="question">اجمعْ واكتبِ الناتج</div>

  <div class="fs-equation" id="equation">
    <span id="eqA">٢</span><span class="op">+</span><span id="eqB">١</span><span class="op">=</span><span id="ans">؟</span>
  </div>

  <div class="fs-panel">
    <div class="fs-dots" id="qdots"></div>
    <div class="trace-wrap" id="traceWrap">
      <svg class="dot-path" id="dotSvg" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet"></svg>
      <canvas class="trace-canvas" id="canvas" width="300" height="300"></canvas>
      <div class="guide-hand hide" id="hand">👇</div>
    </div>
    <div class="fs-progress"><div class="fill" id="progressFill"></div></div>
    <div class="fs-controls">
      <button class="fs-ctrl fs-clear" id="clearBtn" aria-label="مسح">🧽</button>
      <button class="fs-ctrl fs-hint" id="hintBtn" aria-label="إظهار المسار">👁️</button>
    </div>
    <div class="countdown-bar" id="cdBar"><div class="countdown-fill" id="cdFill"></div><span class="countdown-txt" id="cdTxt">٣</span></div>
  </div>

  <div class="fs-win" id="winOverlay">
    <div class="fs-win-card">
      <div class="fs-win-title">أحسنت! 🎉</div>
      <div class="fs-win-sub">أكملتَ التحدّي!</div>
      <div class="fs-win-btns">
        <button class="fs-win-btn next" id="replayBtn">العب مجدداً 🔄</button>
        <button class="fs-win-btn menu" id="menuBtn">القائمة 📋</button>
      </div>
    </div>
  </div>
</div>

  8: {label:'٨',name:'ثمانية',strokePath:'M 192,211 L 192,195 L 185,182 L 180,171 L 173,155 L 167,138 L 162,125 L 156,109 L 151,95 L 151,79 L 143,111 L 138,126 L 133,141 L 128,155 L 121,170 L 115,182 L 106,197 L 101,212',guideDots:[[192, 211], [192, 195], [185, 182], [180, 171], [173, 155], [167, 138], [162, 125], [156, 109], [151, 95], [151, 79], [143, 111], [138, 126], [133, 141], [128, 155], [121, 170], [115, 182], [106, 197], [101, 212]],arrows:[[173, 155, -19.4], [143, 111, -161.6]],startDot:[192, 211],startLabel:'ابدأ'},
  9: {label:'٩',name:'تسعة',strokePath:'M 185,215 L 184,201 L 179,188 L 174,176 L 170,162 L 166,147 L 163,133 L 160,120 L 159,105 L 154,91 L 142,85 L 129,90 L 121,100 L 117,113 L 120,126 L 131,132 L 146,129 L 159,124',guideDots:[[185, 215], [184, 201], [179, 188], [174, 176], [170, 162], [166, 147], [163, 133], [160, 120], [159, 105], [154, 91], [142, 85], [129, 90], [121, 100], [117, 113], [120, 126], [131, 132], [146, 129], [159, 124]],arrows:[[170, 162, -14.9], [142, 85, -111.0]],startDot:[185, 215],startLabel:'ابدأ'}
};


var QTOTAL=10,qIndex=0,solved=0,eqA=2,eqB=1,answer=3,STEPS=[3],stepIdx=0;
var canvas,ctx2d,isDrawing=false,coveredDots=[],passed=false,nextDot=0,hintVisible=true,idleT=null,cdT=null;
var LOOKAHEAD=3,COVER_R=28,PASS_THRESH=1.0,currentColour='#1F1F1F',strokeW=14,_mask=null;
function curNum(){return NUMBERS[STEPS[stepIdx]];}

function drawGuide(){
  var nd=curNum(),svg=g('dotSvg');svg.innerHTML='';var ns='http://www.w3.org/2000/svg';
  if(hintVisible){
    var p=document.createElementNS(ns,'path');p.setAttribute('d',nd.strokePath);p.setAttribute('stroke','rgba(61,38,16,.15)');p.setAttribute('stroke-width','24');p.setAttribute('stroke-linecap','round');p.setAttribute('stroke-linejoin','round');p.setAttribute('fill','none');svg.appendChild(p);
    var dh=document.createElementNS(ns,'path');dh.setAttribute('d',nd.strokePath);dh.setAttribute('stroke','rgba(61,38,16,.30)');dh.setAttribute('stroke-width','3');dh.setAttribute('stroke-linecap','round');dh.setAttribute('stroke-dasharray','2 12');dh.setAttribute('fill','none');svg.appendChild(dh);
    nd.arrows.forEach(function(a){var gr=document.createElementNS(ns,'g');gr.setAttribute('transform','translate('+a[0]+','+a[1]+') rotate('+a[2]+')');var po=document.createElementNS(ns,'polygon');po.setAttribute('points','0,-10 7,5 -7,5');po.setAttribute('fill','rgba(232,160,32,.85)');gr.appendChild(po);svg.appendChild(gr);});
    var tg=nd.guideDots[Math.min(nextDot,nd.guideDots.length-1)];
    var sc=document.createElementNS(ns,'circle');sc.setAttribute('cx',tg[0]);sc.setAttribute('cy',tg[1]);sc.setAttribute('r','9');sc.setAttribute('fill','rgba(90,176,48,.85)');sc.style.animation='ml-startPulse 1.4s ease-in-out infinite';svg.appendChild(sc);
    if(nextDot===0){var st=document.createElementNS(ns,'text');st.setAttribute('x',nd.startDot[0]);st.setAttribute('y',nd.startDot[1]-16);st.setAttribute('text-anchor','middle');st.setAttribute('font-size','13');st.setAttribute('font-family','Tajawal,sans-serif');st.setAttribute('fill','rgba(42,88,8,.95)');st.setAttribute('font-weight','700');st.textContent=nd.startLabel;svg.appendChild(st);}
  }
  nd.guideDots.forEach(function(pt,i){var c=document.createElementNS(ns,'circle');c.setAttribute('cx',pt[0]);c.setAttribute('cy',pt[1]);c.setAttribute('r',coveredDots[i]?'6':'4.5');c.setAttribute('fill',coveredDots[i]?'rgba(90,176,48,.85)':'rgba(61,38,16,.22)');svg.appendChild(c);});
}
function updateCoverage(x,y){if(passed)return;var nd=curNum(),changed=false,lim=Math.min(nextDot+LOOKAHEAD,nd.guideDots.length-1),hit=-1;for(var i=nextDot;i<=lim;i++){var dx=nd.guideDots[i][0]-x,dy=nd.guideDots[i][1]-y;if(dx*dx+dy*dy<COVER_R*COVER_R)hit=i;}if(hit>=0){for(var k=nextDot;k<=hit;k++){if(!coveredDots[k]){coveredDots[k]=true;changed=true;}}nextDot=hit+1;}if(changed){redrawInk();if(Math.random()<0.2)AC.stroke();var n=coveredDots.filter(Boolean).length,pct=n/nd.guideDots.length;g('progressFill').style.width=Math.round(pct*100)+'%';drawGuide();if(pct>=PASS_THRESH&&!passed){passed=true;setTimeout(onStepPassed,250);}}}
function buildMask(){if(!_mask){_mask=document.createElement('canvas');_mask.width=300;_mask.height=300;}var mc=_mask.getContext('2d');mc.clearRect(0,0,300,300);mc.lineWidth=28;mc.lineCap='round';mc.lineJoin='round';mc.strokeStyle='#000';mc.stroke(new Path2D(curNum().strokePath));}
function applyMask(){if(!_mask)return;ctx2d.globalCompositeOperation='destination-in';ctx2d.drawImage(_mask,0,0);ctx2d.globalCompositeOperation='source-over';}
function redrawInk(){ctx2d.clearRect(0,0,300,300);var pts=curNum().guideDots.slice(0,nextDot);if(!pts.length)return;if(pts.length===1){ctx2d.beginPath();ctx2d.arc(pts[0][0],pts[0][1],strokeW/2,0,Math.PI*2);ctx2d.fillStyle=currentColour+'ee';ctx2d.fill();applyMask();return;}ctx2d.beginPath();ctx2d.moveTo(pts[0][0],pts[0][1]);for(var i=1;i<pts.length-1;i++){var xc=(pts[i][0]+pts[i+1][0])/2,yc=(pts[i][1]+pts[i+1][1])/2;ctx2d.quadraticCurveTo(pts[i][0],pts[i][1],xc,yc);}ctx2d.quadraticCurveTo(pts[pts.length-1][0],pts[pts.length-1][1],pts[pts.length-1][0],pts[pts.length-1][1]);ctx2d.strokeStyle=currentColour+'ee';ctx2d.lineWidth=strokeW;ctx2d.lineCap='round';ctx2d.lineJoin='round';ctx2d.stroke();applyMask();}
function getPos(e){var r=canvas.getBoundingClientRect(),sx=300/r.width,sy=300/r.height,s=e.touches?e.touches[0]:e;return{x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy};}
function startDraw(e){e.preventDefault();isDrawing=true;hideHand();resetIdle();var p=getPos(e);updateCoverage(p.x,p.y);}
function moveDraw(e){e.preventDefault();if(!isDrawing)return;resetIdle();var p=getPos(e);updateCoverage(p.x,p.y);}
function endDraw(e){if(e&&e.preventDefault)e.preventDefault();isDrawing=false;}

function showHand(){var nd=curNum(),h=g('hand');h.style.left=(nd.startDot[0]/3)+'%';h.style.top=(nd.startDot[1]/3)+'%';h.classList.remove('hide');}
function hideHand(){g('hand').classList.add('hide');}
function resetIdle(){clearTimeout(idleT);idleT=setTimeout(function(){if(!passed)showHand();},2600);}

function loadStep(){var nd=curNum();coveredDots=new Array(nd.guideDots.length).fill(false);passed=false;nextDot=0;ctx2d.clearRect(0,0,300,300);g('progressFill').style.width='0%';buildMask();drawGuide();showHand();resetIdle();}
function buildQuestion(){answer=rand(2,9);eqA=rand(1,answer-1);eqB=answer-eqA;STEPS=[answer];stepIdx=0;g('eqA').textContent=toAr(eqA);g('eqB').textContent=toAr(eqB);g('ans').textContent='؟';g('ans').classList.remove('done');renderDots();loadStep();}
function onStepPassed(){AC.complete();if(stepIdx<STEPS.length-1){stepIdx++;setTimeout(loadStep,650);}else{questionComplete();}}
function questionComplete(){clearTimeout(idleT);hideHand();g('ans').textContent=toAr(answer);g('ans').classList.add('done');solved++;renderDots();narrate(NARR.ok[answer]);fireConfetti();startCountdown();}
function startCountdown(){var s=3,bar=g('cdBar'),fill=g('cdFill'),txt=g('cdTxt');bar.classList.add('show');fill.classList.remove('run');void fill.offsetWidth;fill.classList.add('run');txt.textContent=toAr(s);clearInterval(cdT);cdT=setInterval(function(){s--;if(s<=0){clearInterval(cdT);bar.classList.remove('show');fill.classList.remove('run');nextQuestion();}else{txt.textContent=toAr(s);}},1000);}
function nextQuestion(){qIndex++;if(qIndex>=QTOTAL){showWin();}else{buildQuestion();}}
function showWin(){g('winOverlay').classList.add('show');fireConfetti();narrate(NARR.done);}
function replay(){g('winOverlay').classList.remove('show');qIndex=0;solved=0;buildQuestion();}
function clearStep(){loadStep();}
function toggleHint(){hintVisible=!hintVisible;g('hintBtn').classList.toggle('off',!hintVisible);drawGuide();}
function fireConfetti(){try{confetti({particleCount:170,spread:115,origin:{y:0.5},colors:['#f97316','#22c55e','#1cb0f6','#a3e635','#facc15','#ef4444'],scalar:1.3});}catch(e){}}

function renderDots(){var cc=g('qdots');if(cc.children.length!==QTOTAL){cc.innerHTML='';for(var i=0;i<QTOTAL;i++){var d=document.createElement('i');d.className='dot';cc.appendChild(d);}}for(var j=0;j<QTOTAL;j++){cc.children[j].classList.toggle('on',j<solved);}}
canvas=g('canvas');ctx2d=canvas.getContext('2d');
canvas.addEventListener('mousedown',startDraw);canvas.addEventListener('mousemove',moveDraw);document.addEventListener('mouseup',endDraw);
canvas.addEventListener('touchstart',startDraw,{passive:false});canvas.addEventListener('touchmove',moveDraw,{passive:false});canvas.addEventListener('touchend',endDraw,{passive:false});
g('clearBtn').addEventListener('click',clearStep);
g('hintBtn').addEventListener('click',toggleHint);
g('sayBtn').addEventListener('click',askQuestion);
g('replayBtn').addEventListener('click',replay);
function goMenu(){window.location.href='../../Interactive book for elementary school chapter 1/moosa-lessons.html';}
g('homeBtn').addEventListener('click',goMenu);g('menuBtn').addEventListener('click',goMenu);
buildQuestion();
var _fg=false;document.addEventListener('pointerdown',function(){if(!_fg){_fg=true;askQuestion();}},{passive:true});
</script>
