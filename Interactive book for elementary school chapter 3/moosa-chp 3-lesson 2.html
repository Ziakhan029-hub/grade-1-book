<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى التعليمي — الموقع والنمط — الدرس ٢</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;margin:0;padding:0;overflow:hidden;background:linear-gradient(160deg,#FEF3C7 0%,#FDE68A 100%);}
.ml-widget{
  --amber:#F59E0B;--amber-dark:#D97706;
  --cream:#FFFEF9;--ink:#1C1917;--ink-soft:#78716C;
  --green:#22C55E;--green-dark:#16A34A;--green-text:#14532D;
  --ok:#22C55E;--bad:#EF4444;
  --font-d:'Baloo Bhaijaan 2','Tajawal',sans-serif;
  --font-b:'Tajawal',sans-serif;
  --ease-b:cubic-bezier(.34,1.56,.64,1);
  width:100%;height:100vh;height:100svh;
  max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;
  background:var(--cream);font-family:var(--font-b);
  overflow:hidden;position:relative;
}
.ml-widget *,.ml-widget *::before,.ml-widget *::after{box-sizing:border-box;margin:0;padding:0;}

/* ── TOP BAR ── */
.top-bar{
  background:linear-gradient(135deg,#FCD34D 0%,#F59E0B 60%,#D97706 100%);
  padding:8px 12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  flex-shrink:0;box-shadow:0 2px 8px rgba(180,100,0,.18);
}
.lsn-btn{
  min-width:32px;height:32px;border-radius:8px;
  background:rgba(255,255,255,.38);
  font-family:var(--font-d);font-size:15px;font-weight:700;
  color:rgba(61,38,16,.75);cursor:pointer;
  border:2px solid transparent;
  display:inline-flex;align-items:center;justify-content:center;padding:0 7px;
  transition:transform .15s,background .15s;-webkit-tap-highlight-color:transparent;
}
.lsn-btn.active{background:rgba(180,83,9,.22);color:#fff;border-color:rgba(120,53,5,.55);transform:scale(1.08);}
.lsn-btn.done{background:rgba(22,163,74,.28);color:#fff;}
.lsn-btn:hover{transform:scale(1.12);background:rgba(255,255,255,.55);}

/* ── PROGRESS DOTS (hidden — nav bar replaces them) ── */
.progress-dots{display:none!important;}

/* ── SCREEN ── */
.screen{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}

/* ── Q-BANNER ── */
.q-banner{
  flex-shrink:0;text-align:center;
  font-family:var(--font-d);font-size:18px;font-weight:800;
  color:var(--ink);line-height:1.35;padding:8px 12px 4px;
}

/* ── SUB-STARS ── */
.sub-stars{
  flex-shrink:0;display:flex;justify-content:center;gap:10px;
  padding:2px 12px 6px;
}
.sub-star{font-size:26px;transition:transform .25s var(--ease-b);}
.sub-star.filled{transform:scale(1.2);}

/* ── ZONE CARDS ── */
.zones-wrap{
  flex:1;display:flex;flex-direction:column;
  gap:10px;padding:6px 14px 10px;min-height:0;overflow:hidden;
}
.zone-card{
  flex:1;border-radius:20px;border:4px solid rgba(196,172,126,.3);
  background:#FFFDF6;
  display:flex;flex-direction:row;align-items:center;
  padding:0 18px;gap:14px;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .18s,background .18s,transform .12s;
  position:relative;overflow:hidden;
  min-height:0;
}
.zone-card:active{transform:scale(.97);}

/* Zone colour accents */
.zone-card[data-zone="top"]{border-color:#86EFAC;background:rgba(134,239,172,.06);}
.zone-card[data-zone="middle"]{border-color:#FCD34D;background:rgba(252,211,77,.06);}
.zone-card[data-zone="bottom"]{border-color:#93C5FD;background:rgba(147,197,253,.06);}

/* Correct state */
.zone-card.correct{border-color:var(--ok)!important;background:#F0FDF4!important;}

/* Wrong shake */
.zone-card.shake{animation:ml-shake .38s;}

.zone-emoji{font-size:52px;line-height:1;flex-shrink:0;pointer-events:none;}
.zone-lbl{
  font-family:var(--font-d);font-size:20px;font-weight:800;
  color:var(--ink);flex:1;text-align:center;pointer-events:none;
}
/* Colour the label per zone */
.zone-card[data-zone="top"]    .zone-lbl{color:#15803D;}
.zone-card[data-zone="middle"] .zone-lbl{color:#92400E;}
.zone-card[data-zone="bottom"] .zone-lbl{color:#1D4ED8;}

/* ── FLASH ── */
.flash{position:absolute;inset:0;z-index:50;pointer-events:none;opacity:0;}
.flash.ok{background:radial-gradient(circle,rgba(34,197,94,.25),transparent 70%);}
.flash.bad{background:radial-gradient(circle,rgba(239,68,68,.25),transparent 70%);}
.flash.show{animation:ml-flash .55s ease-out forwards;}

/* ════════════════════════════════
   COUNTDOWN
════════════════════════════════ */
.next-countdown{padding:0 14px 10px;flex-shrink:0;display:none;}
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#22C55E,#4ADE80);border-radius:14px;transform-origin:left center;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d);font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}

/* ════════════════════════════════
   WIN
════════════════════════════════ */
.win-overlay{position:absolute;inset:0;z-index:100;background:rgba(15,8,0,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px;}
.win-overlay.show{display:flex;animation:ml-fadeIn .35s ease;}
.win-card{text-align:center;display:flex;flex-direction:column;align-items:center;animation:ml-winPop .5s var(--ease-b) both;background:rgba(255,255,255,.10);border:2px solid rgba(255,255,255,.22);border-radius:28px;padding:24px 32px 28px;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.win-rays{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-bottom:-155px;}
.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
.win-mascot{width:150px;height:150px;object-fit:contain;display:block;margin:0 auto 4px;animation:ml-bob 1.8s ease-in-out infinite;filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));position:relative;z-index:2;}
.win-title{font-family:var(--font-d);font-size:30px;font-weight:800;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.3);margin:8px 0 4px;}
.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px;}
.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b) both;opacity:0;}
.win-stars span:nth-child(1){animation-delay:.3s;}
.win-stars span:nth-child(2){animation-delay:.48s;}
.win-stars span:nth-child(3){animation-delay:.66s;}
.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d);}
.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.win-btns{display:flex;gap:10px;width:100%;}
.btn-win{
  flex:1;padding:14px 0;border:3px solid rgba(255,255,255,.9);border-radius:20px;
  font-family:var(--font-d);font-size:17px;font-weight:800;
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2);cursor:pointer;
  background:linear-gradient(135deg,#4ADE80 0%,#22C55E 55%,#16A34A 100%);
  box-shadow:0 6px 0 #15803D,0 8px 20px rgba(22,163,74,.28);
  transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;
}
.btn-win:active{transform:translateY(4px);box-shadow:0 1px 0 #15803D,0 3px 8px rgba(22,163,74,.2);}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%);box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28);}
.btn-win-next:active{box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2);}

.ml-confetti{position:fixed;pointer-events:none;z-index:9998;}

/* ── KEYFRAMES ── */
@keyframes ml-pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes ml-flash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
@keyframes ml-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}50%{transform:translateX(8px)}80%{transform:translateX(-5px)}}
@keyframes ml-pulseOk{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes ml-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ml-spin{to{transform:rotate(360deg)}}
@keyframes ml-fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ml-winPop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes ml-starPop{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes ml-confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.guide-hand{position:absolute;z-index:300;pointer-events:none;font-size:32px;opacity:0;line-height:1;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
@keyframes ml-guideTap{
  0%{opacity:0;transform:translate(0,-16px) scale(1)}14%{opacity:1;transform:translate(0,0) scale(1)}
  30%{opacity:1;transform:translate(0,4px) scale(.85)}46%{opacity:1;transform:translate(0,-4px) scale(1)}
  62%{opacity:1;transform:translate(0,-16px) scale(1)}80%{opacity:0;transform:translate(0,-22px) scale(1)}100%{opacity:0}
}
</style>

<script>window.__NARR_AUDIO__={"اضغط على القطعة في الأعلى":"../audio/3bd6396a.mp3","اضغط على القطعة في الوسط":"../audio/54703b43.mp3","اضغط على القطعة في الأسفل":"../audio/cea35a94.mp3","اضغط على الصندوق في الأعلى":"../audio/852596a3.mp3","اضغط على الصندوق في الوسط":"../audio/fc1a350f.mp3","اضغط على الصندوق في الأسفل":"../audio/34e69599.mp3","اضغط على الزهرة في الأعلى":"../audio/a702654e.mp3","اضغط على الزهرة في الوسط":"../audio/53fcffbb.mp3","اضغط على الزهرة في الأسفل":"../audio/66f2453f.mp3","اضغط على القبعة في الأعلى":"../audio/86e9713e.mp3","اضغط على القبعة في الوسط":"../audio/a5ff972b.mp3","اضغط على القبعة في الأسفل":"../audio/edacc10e.mp3","اضغط على الوسادة في الأعلى":"../audio/f0c37809.mp3","اضغط على الوسادة في الوسط":"../audio/67db70dc.mp3","اضغط على الوسادة في الأسفل":"../audio/e4c936d5.mp3","اضغط على العلبة في الأعلى":"../audio/a946d53e.mp3","اضغط على العلبة في الوسط":"../audio/f4c70fad.mp3","اضغط على العلبة في الأسفل":"../audio/72ab680d.mp3"};</script>
<script>
(function(){
  var _lTxt='',_au=null,debT=null,retryT=null,_spk=false;
  var SELS=['.q-banner','.tray-lbl'];
  function _strip(t){return t.replace(/[^\u0600-\u06FF\u0020-\u007E]/g,'').replace(/\s+/g,' ').trim();}
  function speak(raw){
    var txt=_strip(raw);
    if(!txt||txt===_lTxt)return;
    _lTxt=txt;_spk=true;clearInterval(retryT);
    if(_au){_au.pause();_au=null;}
    var src=(window.__NARR_AUDIO__||{})[txt];
    if(src){_au=new Audio(src);_au.play().catch(function(){});}
    else{var u=new SpeechSynthesisUtterance(txt);u.lang='ar-AE';u.pitch=1.2;u.rate=0.9;speechSynthesis.cancel();speechSynthesis.speak(u);}
  }
  function readQ(){
    if(document.querySelector('.win-overlay.show'))return;
    for(var i=0;i<SELS.length;i++){var el=document.querySelector(SELS[i]);if(el&&el.textContent.trim().length>2){speak(el.textContent.trim());return;}}
  }
  window.addEventListener('load',function(){
    var btn=document.createElement('button');btn.textContent='\uD83D\uDD0A';
    btn.setAttribute('aria-label','\u0627\u0633\u062A\u0645\u0639 \u0645\u062C\u062F\u062F\u0627\u064B');
    btn.style.cssText='position:fixed;bottom:20px;right:16px;z-index:9999;background:linear-gradient(135deg,#FCD34D,#F59E0B);border:none;border-radius:50%;width:48px;height:48px;font-size:24px;cursor:pointer;box-shadow:0 4px 0 #B45309,0 6px 16px rgba(180,100,0,.28);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;';
    btn.addEventListener('click',function(){_lTxt='';_spk=false;readQ();});
    document.body.appendChild(btn);
    setTimeout(readQ,300);setTimeout(readQ,900);setTimeout(readQ,2200);
    retryT=setInterval(function(){if(_spk){clearInterval(retryT);return;}_lTxt='';readQ();},650);
    setTimeout(function(){clearInterval(retryT);},9000);
  });
  var root=document.querySelector('.ml-widget')||document.body,_lp='';
  try{new MutationObserver(function(){clearTimeout(debT);debT=setTimeout(function(){var el=document.querySelector(SELS.join(','));var nt=el?el.textContent.trim():'';if(nt&&nt!==_lp){_lp=nt;speak(nt);}},420);}).observe(root,{childList:true,subtree:true,characterData:true});}catch(e){}
})();
</script>

<script>
/* ── HELPERS ── */
const toAr = n => String(n).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[+d]);
const mlEl  = id => document.getElementById(id);

/* ── SOUND ── */
const mlSnd = (()=>{
  let ctx = null;
  const init = () => { if(!ctx) ctx = new(window.AudioContext||window.webkitAudioContext)(); };
  const tone = (f,t,d,v=.28) => {
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(v,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
    o.start(); o.stop(ctx.currentTime+d);
  };
  return {
    correct(){ init(); tone(523,'triangle',.16,.3); setTimeout(()=>tone(659,'triangle',.2,.26),110); },
    wrong()  { init(); tone(220,'sawtooth',.14,.2); setTimeout(()=>tone(160,'sawtooth',.1,.15),65); },
    win()    { init(); [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.22,.26),i*85)); }
  };
})();

/* ── GAME DATA ── */
const ML_STEPS = [
  {noun:'القطعة',  emoji:'🧩'},
  {noun:'الصندوق', emoji:'📦'},
  {noun:'الزهرة',  emoji:'🌸'},
  {noun:'القبعة',  emoji:'🎩'},
  {noun:'الوسادة', emoji:'🛏️'},
  {noun:'العلبة',  emoji:'🥫'},
];
const ZONES = [
  {ans:'top',    lbl:'الأعلى'},
  {ans:'middle', lbl:'الوسط'},
  {ans:'bottom', lbl:'الأسفل'},
];
const ML_TOTAL = ML_STEPS.length;

/* ── STATE ── */
let mlStepIdx = 0;
let mlSubIdx  = 0;
let mlLocked  = false;
let mlScore   = 0;
let _cdTimer  = null;

/* ── LESSON NAV BUTTONS ── */
(function(){
  const lessons = [
    'moosa-chp 3-lesson 1.html',
    'moosa-chp 3-lesson 2.html',
    'moosa-chp 3-lesson 3.html',
    'moosa-chp 3-lesson 4.html',
    'moosa-chp 3-lesson 5.html',
    'moosa-chp 3-lesson 6.html',
  ];
  const cur = decodeURIComponent(window.location.pathname.split('/').pop());
  const curIdx = lessons.indexOf(cur);
  let done = [];
  try { done = JSON.parse(localStorage.getItem('moosa_ch3') || '[]'); } catch(e){}
  const bar = mlEl('topBar');
  for(let i=0; i<lessons.length; i++){
    (function(lf, li){
      const b = document.createElement('button');
      const isDone = done.indexOf(li) !== -1;
      b.className = 'lsn-btn' + (li===curIdx?' active':isDone?' done':'');
      b.textContent = li + 1;
      b.addEventListener('click', function(){
        if(window.parent && window.parent !== window){
          window.parent.postMessage({action:'navigateLesson', file:lf}, '*');
        } else {
          window.location.href = lf;
        }
      });
      bar.appendChild(b);
    })(lessons[i], i);
  }
})();

/* ── PROGRESS DOTS ── */
function mlRenderDots(){
  const w = mlEl('mlDots'); w.innerHTML = '';
  ML_STEPS.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'ml-dot' + (i===mlStepIdx?' active':i<mlStepIdx?' done':'');
    w.appendChild(d);
  });
}

/* ── FLASH ── */
function mlFlash(type, id){
  const f = mlEl(id);
  f.className = 'flash ' + type;
  f.offsetWidth;
  f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'), 620);
}

/* ── SCORE ── */
function mlAddScore(n){ mlScore += n; }

/* ── COUNTDOWN ── */
function mlRunCountdown(onDone){
  clearInterval(_cdTimer); _cdTimer = null;
  const wrap = mlEl('nextCountdown');
  const fill = mlEl('countdownFill');
  const txt  = mlEl('countdownTxt');
  if(!wrap) return;
  let secs = 5;
  wrap.style.display = 'block';
  fill.style.animation = 'none'; void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 5s linear forwards';
  txt.textContent = toAr(secs);
  _cdTimer = setInterval(function(){
    secs--;
    if(txt) txt.textContent = toAr(Math.max(0, secs));
    if(secs <= 0){
      clearInterval(_cdTimer); _cdTimer = null;
      wrap.style.display = 'none';
      onDone();
    }
  }, 1000);
}

/* ── WIN ── */
function mlShowWin(){
  mlSnd.win();
  mlEl('winScoreVal').textContent = toAr(mlScore);
  mlEl('winOverlay').classList.add('show');
  mlSpawnConfetti();
}
function mlHandleWinNext(){
  clearInterval(_cdTimer); _cdTimer = null;
  if(window.parent && window.parent !== window){
    window.parent.postMessage({action:'nextLesson'}, '*');
  }
}
function mlHandleWinRestart(){
  clearInterval(_cdTimer); _cdTimer = null;
  mlEl('winOverlay').classList.remove('show');
  mlEl('confettiCont').innerHTML = '';
  mlScore = 0; mlStepIdx = 0; mlSubIdx = 0; mlLocked = false;
  mlRenderStep();
}
function mlSpawnConfetti(){
  const c = mlEl('confettiCont'); c.innerHTML = '';
  const cols = ['#FCD34D','#86EFAC','#FCA5A5','#93C5FD','#F9A8D4','#6EE7B7','#fff'];
  for(let i=0; i<55; i++){
    const el = document.createElement('div'); el.className = 'ml-confetti';
    const sz = 6+Math.random()*7;
    const col = cols[Math.floor(Math.random()*cols.length)];
    el.style.cssText = [
      'width:'+sz+'px','height:'+sz+'px','background:'+col,
      'border-radius:'+(Math.random()>.5?'50%':'2px'),
      'position:fixed','left:'+(Math.random()*100)+'vw','top:-20px',
      'animation:ml-confettiFall '+(1.4+Math.random()*2)+'s ease-in '+(Math.random()*1.2)+'s forwards'
    ].join(';');
    c.appendChild(el);
  }
}

/* ════════════════════════════════
   ZONE-TAP GAME
════════════════════════════════ */

function updatePrompt(){
  const step = ML_STEPS[mlStepIdx];
  const zone = ZONES[mlSubIdx];
  mlEl('mlQBanner').textContent = 'اضغط على ' + step.noun + ' في ' + zone.lbl;
}

function updateSubStars(){
  const stars = mlEl('mlSubStars').querySelectorAll('.sub-star');
  stars.forEach(function(s, i){
    if(i < mlSubIdx){
      s.textContent = '⭐';
      s.classList.add('filled');
    } else {
      s.textContent = '☆';
      s.classList.remove('filled');
    }
  });
}

function onZoneTap(zoneEl, zoneName){
  mlHideGuide();
  if(mlLocked) return;
  const correctAns = ZONES[mlSubIdx].ans;
  if(zoneName === correctAns){
    mlLocked = true;
    mlSnd.correct();
    mlFlash('ok', 'flashMain');
    mlAddScore(10);

    zoneEl.classList.add('correct');

    const stars = mlEl('mlSubStars').querySelectorAll('.sub-star');
    if(stars[mlSubIdx]){
      stars[mlSubIdx].textContent = '⭐';
      stars[mlSubIdx].classList.add('filled');
    }

    setTimeout(function(){
      zoneEl.classList.remove('correct');
      mlSubIdx++;
      if(mlSubIdx >= ZONES.length){
        mlRunCountdown(mlNextStep);
      } else {
        mlLocked = false;
        updatePrompt();
        updateSubStars();
        setTimeout(function(){
          var correctZone = ZONES[mlSubIdx].ans;
          var card = document.querySelector('.zone-card[data-zone="'+correctZone+'"]');
          mlShowGuide(card);
        }, 500);
      }
    }, 1100);
  } else {
    mlSnd.wrong();
    mlFlash('bad', 'flashMain');
    zoneEl.classList.add('shake');
    setTimeout(function(){ zoneEl.classList.remove('shake'); }, 420);
  }
}

function mlNextStep(){
  mlStepIdx++;
  if(mlStepIdx >= ML_TOTAL){ mlShowWin(); return; }
  mlSubIdx = 0;
  mlLocked = false;
  mlRenderStep();
}

function mlRenderStep(){
  mlRenderDots();
  clearInterval(_cdTimer); _cdTimer = null;
  mlEl('nextCountdown').style.display = 'none';

  const step = ML_STEPS[mlStepIdx];
  const screen = mlEl('mlScreen');
  screen.innerHTML = '';

  /* Q-banner */
  const banner = document.createElement('div');
  banner.className = 'q-banner';
  banner.id = 'mlQBanner';
  screen.appendChild(banner);

  /* Sub-stars row */
  const starsRow = document.createElement('div');
  starsRow.className = 'sub-stars';
  starsRow.id = 'mlSubStars';
  for(let i=0; i<3; i++){
    const s = document.createElement('span');
    s.className = 'sub-star';
    s.textContent = '☆';
    starsRow.appendChild(s);
  }
  screen.appendChild(starsRow);

  /* Zones wrapper */
  const zonesWrap = document.createElement('div');
  zonesWrap.className = 'zones-wrap';

  ZONES.forEach(function(zone){
    const card = document.createElement('div');
    card.className = 'zone-card';
    card.dataset.zone = zone.ans;
    card.setAttribute('role', 'button');

    /* label (right side in RTL) */
    const lbl = document.createElement('div');
    lbl.className = 'zone-lbl';
    lbl.textContent = zone.lbl;

    /* emoji (left side / end in RTL) */
    const em = document.createElement('div');
    em.className = 'zone-emoji';
    em.textContent = step.emoji;

    card.appendChild(lbl);
    card.appendChild(em);

    card.addEventListener('click', function(){ onZoneTap(card, zone.ans); });
    zonesWrap.appendChild(card);
  });

  screen.appendChild(zonesWrap);

  updatePrompt();
  updateSubStars();
  setTimeout(function(){
    var correctZone = ZONES[mlSubIdx].ans;
    var card = document.querySelector('.zone-card[data-zone="'+correctZone+'"]');
    mlShowGuide(card);
  }, 500);
}

function mlShowGuide(target){
  var g=mlEl('guideMain'), wrap=mlEl('mlWidget');
  if(!g||!target||!wrap) return;
  var tr=target.getBoundingClientRect(), wr=wrap.getBoundingClientRect();
  g.style.left=(tr.left-wr.left+tr.width/2-20)+'px';
  g.style.top=(tr.top-wr.top+tr.height/2-20)+'px';
  g.style.animation='none'; g.style.opacity='0'; g.offsetWidth;
  g.style.animation='ml-guideTap 2s ease-in-out infinite';
}
function mlHideGuide(){
  var g=mlEl('guideMain'); if(!g) return;
  g.style.animation='none'; g.style.opacity='0';
}

/* ── START ── */
mlRenderStep();
</script>
