<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى التعليمي — الفصل الثالث — الدرس ٣</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;margin:0;padding:0;overflow:hidden;background:linear-gradient(160deg,#FEF3C7 0%,#FDE68A 100%);}
.ml-widget{
  --amber:#F59E0B;--amber-dark:#D97706;--cream:#FFFEF9;
  --ink:#1C1917;--ink-soft:#78716C;
  --green:#22C55E;--green-dark:#16A34A;--green-text:#14532D;
  --font-d:'Baloo Bhaijaan 2','Tajawal',sans-serif;
  --font-b:'Tajawal',sans-serif;
  --ease-b:cubic-bezier(.34,1.56,.64,1);
  width:100%;height:100vh;height:100svh;
  max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;
  background:var(--cream);font-family:var(--font-b);
  overflow:hidden;position:relative;
}
.ml-widget *,.ml-widget *::before,.ml-widget *::after{box-sizing:border-box;margin:0;padding:0;}

/* ── Top bar ── */
.top-bar{
  background:linear-gradient(135deg,#F59E0B,#D97706);
  padding:8px 12px;
  display:flex;align-items:center;justify-content:center;
  gap:8px;flex-shrink:0;
  box-shadow:0 2px 8px rgba(120,60,0,.18);
}
.score-pill{
  display:flex;align-items:center;gap:4px;
  background:rgba(255,255,255,.18);border-radius:999px;
  padding:2px 10px;margin-inline-start:auto;
}
.score-lbl{font-family:var(--font-d);font-size:12px;font-weight:700;color:rgba(255,255,255,.8);}
.score-val{font-family:var(--font-d);font-size:18px;font-weight:800;color:#fff;line-height:1;}

/* ── Lesson nav buttons (injected into top-bar) ── */
.lsn-btn{
  width:auto;min-width:28px;height:28px;
  border-radius:7px;
  background:rgba(61,38,16,.12);
  font-family:var(--font-d);font-size:13px;font-weight:700;
  color:rgba(255,255,255,.7);
  cursor:pointer;
  border:2px solid transparent;
  display:inline-flex;align-items:center;justify-content:center;
  padding:0 5px;
  transition:background .15s,color .15s;
  -webkit-tap-highlight-color:transparent;
}
.lsn-btn.active{
  background:rgba(255,255,255,.28);
  border-color:rgba(255,255,255,.5);
  color:#fff;
}
.lsn-btn:hover{background:rgba(255,255,255,.2);color:#fff;}

/* ── Empty content area ── */
.play{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;gap:16px;min-height:0;
}
.coming-soon{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  background:#FFFDF6;border-radius:24px;
  border:3px dashed rgba(245,158,11,.3);
  padding:40px 32px;width:100%;
}
.coming-soon .icon{font-size:52px;line-height:1;}
.coming-soon .text{
  font-family:var(--font-d);font-size:20px;font-weight:800;
  color:var(--ink-soft);text-align:center;
}
.coming-soon .sub{
  font-family:var(--font-b);font-size:14px;font-weight:500;
  color:rgba(120,113,108,.6);text-align:center;
}

/* ── Win overlay ── */
.win-overlay{
  position:absolute;inset:0;z-index:100;
  background:rgba(120,70,10,.72);
  display:none;align-items:center;justify-content:center;padding:24px;
}
.win-overlay.show{display:flex;animation:ml-fadeIn .35s ease;}
.win-card{
  text-align:center;display:flex;flex-direction:column;align-items:center;
  animation:ml-winPop .5s var(--ease-b) both;
}
.win-title{font-family:var(--font-d);font-size:28px;font-weight:800;color:#fff;margin-bottom:4px;}
.win-stars{display:flex;gap:8px;margin:8px 0 16px;}
.win-stars span{font-size:32px;animation:ml-starPop .45s var(--ease-b) both;}
.win-stars span:nth-child(1){animation-delay:.3s}
.win-stars span:nth-child(2){animation-delay:.48s}
.win-stars span:nth-child(3){animation-delay:.66s}
.btn-win{
  padding:14px 40px;border-radius:14px;border:none;
  font-family:var(--font-d);font-size:18px;font-weight:800;
  color:var(--green-text);background:var(--green);cursor:pointer;
  box-shadow:0 5px 0 var(--green-dark);
  transition:transform .1s;-webkit-tap-highlight-color:transparent;
}
.btn-win:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green-dark);}

/* ── Countdown bar ── */
.next-wrap{padding:0 12px 12px;flex-shrink:0;display:none;}
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#22C55E,#4ADE80);border-radius:14px;transform-origin:left center;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d);font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}

@keyframes ml-fadeIn{0%{opacity:0}100%{opacity:1}}
@keyframes ml-winPop{0%{transform:scale(.7);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes ml-starPop{0%{transform:scale(0) rotate(-30deg);opacity:0}100%{transform:scale(1) rotate(0deg);opacity:1}}
</style>
</head>
<body>
<div class="ml-widget">

  <!-- Top bar (lesson nav buttons injected by JS) -->
  <div class="top-bar" id="topBar">
    <div class="score-pill">
      <span class="score-lbl">النقاط</span>
      <span class="score-val" id="scoreVal">٠</span>
    </div>
  </div>

  <!-- Empty content area — game goes here -->
  <div class="play">
    <div class="coming-soon">
      <span class="icon">🚧</span>
      <span class="text">الدرس ٣</span>
      <span class="sub">سيتم إضافة المحتوى قريباً</span>
    </div>
  </div>

  <!-- Countdown to next lesson -->
  <div class="next-wrap" id="nextWrap">
    <div class="countdown-bar">
      <div class="countdown-fill" id="countdownFill"></div>
      <span class="countdown-txt" id="countdownTxt">٥</span>
    </div>
  </div>

  <!-- Win overlay -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <div class="win-title">أحسنت! 🎉</div>
      <div class="win-stars"><span>⭐</span><span>⭐</span><span>⭐</span></div>
      <button class="btn-win" onclick="mlHandleWinNext()">التالي ›</button>
    </div>
  </div>

</div>

<script>
window.__NARR_AUDIO__ = {};

// ── Arabic numerals helper ──
var AR = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
function toAr(n){return String(n).split('').map(function(c){return AR[+c]||c;}).join('');}

// ── Lesson nav ──
(function(){
  var _l = ["moosa-chp 3-lesson 1.html", "moosa-chp 3-lesson 2.html", "moosa-chp 3-lesson 3.html", "moosa-chp 3-lesson 4.html", "moosa-chp 3-lesson 5.html", "moosa-chp 3-lesson 6.html"];
  var _cur = decodeURIComponent(window.location.pathname.split('/').pop());
  var _ci = _l.indexOf(_cur);
  var bar = document.getElementById('topBar');
  for(var _i = 0; _i < _l.length; _i++){
    (function(lf, i){
      var b = document.createElement('button');
      b.className = 'lsn-btn' + (i === _ci ? ' active' : '');
      b.textContent = toAr(i + 1);
      b.addEventListener('click', function(){
        if(window.parent && window.parent !== window){
          window.parent.postMessage({action:'navigateLesson', file:lf}, '*');
        } else {
          window.location.href = lf;
        }
      });
      bar.insertBefore(b, bar.querySelector('.score-pill'));
    })(_l[_i], _i);
  }
})();

// ── Win / next ──
function mlHandleWinNext(){
  if(window.parent && window.parent !== window){
    window.parent.postMessage({action:'nextLesson'}, '*');
  }
}

// ── Countdown helper (available for future game use) ──
var _cdTimer = null;
function mlStartCountdown(){
  var wrap = document.getElementById('nextWrap');
  var fill = document.getElementById('countdownFill');
  var txt  = document.getElementById('countdownTxt');
  if(!wrap) return;
  var secs = 5;
  wrap.style.display = 'block';
  fill.style.animation = 'none';
  void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 5s linear forwards';
  txt.textContent = toAr(secs);
  _cdTimer = setInterval(function(){
    secs--;
    if(txt) txt.textContent = toAr(Math.max(0, secs));
    if(secs <= 0){
      clearInterval(_cdTimer);
      if(wrap) wrap.style.display = 'none';
      mlHandleWinNext();
    }
  }, 1000);
}
</script>
</body>
</html>
