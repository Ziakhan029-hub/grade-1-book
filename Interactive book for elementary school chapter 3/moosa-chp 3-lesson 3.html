<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى التعليمي — قبل / بعد — الدرس ٣</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;margin:0;padding:0;overflow:hidden;background:linear-gradient(160deg,#FFFFFF 0%,#F2F2F2 100%);}
.ml-widget{
  --amber:#1F1F1F;--amber-dark:#141414;
  --cream:#FFFFFF;--ink:#1C1917;--ink-soft:#78716C;
  --green:#22C55E;--green-dark:#16A34A;--green-text:#14532D;
  --ok:#22C55E;--bad:#EF4444;
  --font-d:'Baloo Bhaijaan 2','Tajawal',sans-serif;
  --font-b:'Tajawal',sans-serif;
  --ease-b:cubic-bezier(.34,1.56,.64,1);
  width:100%;height:100vh;height:100svh;
  max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;
  background:var(--cream);font-family:var(--font-b);
  overflow:hidden;position:relative;
}
.ml-widget *,.ml-widget *::before,.ml-widget *::after{box-sizing:border-box;margin:0;padding:0;}

/* TOP BAR */
.top-bar{
  background:linear-gradient(135deg,#3A3A3A 0%,#1F1F1F 60%,#141414 100%);
  padding:8px 12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.lsn-btn{
  min-width:44px;height:44px;border-radius:10px;
  background:rgba(255,255,255,.38);
  font-family:var(--font-d);font-size:15px;font-weight:700;
  color:rgba(61,38,16,.75);cursor:pointer;
  border:2px solid transparent;
  display:inline-flex;align-items:center;justify-content:center;padding:0 7px;
  transition:transform .15s,background .15s;-webkit-tap-highlight-color:transparent;
}
.lsn-btn.active{background:rgba(0,0,0,.22);color:#fff;border-color:rgba(0,0,0,.55);transform:scale(1.08);}
.lsn-btn.done{background:#16A34A;color:#fff;}
.lsn-btn:hover{transform:scale(1.12);background:rgba(255,255,255,.55);}

/* PROGRESS DOTS hidden */
.progress-dots{display:none!important;}

/* SCREENS */
.screen{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.screen.hidden{display:none;}

/* Q-BANNER */
.q-banner{
  flex-shrink:0;text-align:center;
  font-family:var(--font-d);font-size:18px;font-weight:800;
  color:var(--ink);line-height:1.35;padding:10px 14px 4px;
}

/* SUB-STARS */
.sub-stars{
  display:flex;gap:8px;justify-content:center;
  flex-shrink:0;padding:2px 0 6px;
}
.sub-star{font-size:28px;line-height:1;display:inline-block;transition:filter .25s;}
.sub-star.filled{filter:drop-shadow(0 0 5px rgba(0,0,0,.7));}

/* FLASH */
.flash{position:absolute;inset:0;z-index:50;pointer-events:none;opacity:0;}
.flash.ok{background:radial-gradient(circle,rgba(34,197,94,.25),transparent 70%);}
.flash.bad{background:radial-gradient(circle,rgba(239,68,68,.25),transparent 70%);}
.flash.show{animation:ml-flash .55s ease-out forwards;}

/* BEFORE/AFTER PLAY AREA */
.ba-play{
  flex:1;display:flex;flex-direction:column;
  padding:6px 10px 8px;gap:8px;min-height:0;
}

/* Three-card row — RTL so DOM [a,b,c] = visual right,middle,left */
.ba-cards{
  flex:1;display:flex;flex-direction:row;gap:8px;
  align-items:stretch;min-height:0;
}
.ba-card{
  flex:1;border-radius:22px;border:4px solid rgba(196,172,126,.35);
  background:#FFFDF6;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;position:relative;cursor:pointer;gap:4px;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .15s,background .15s,transform .12s;
  padding:10px 6px 12px;
  animation:ml-pop .38s var(--ease-b) both;
}
.ba-card:active{transform:scale(.96);}
.ba-card.ref{
  border-color:#1F1F1F;
  background:rgba(253,230,138,.22);
  cursor:default;
}
.ba-card.ref:active{transform:none;}
.ref-chip{
  font-family:var(--font-d);font-size:11px;font-weight:800;
  background:#1F1F1F;color:#fff;
  border-radius:999px;padding:2px 9px;
  flex-shrink:0;letter-spacing:.3px;
  box-shadow:0 1px 4px rgba(0,0,0,.22);
}
.ba-card .bc-emoji{
  font-size:88px;line-height:1.05;pointer-events:none;
  animation:ml-animalBounce 2.4s ease-in-out infinite;
}
.ba-card .bc-lbl{
  font-family:var(--font-d);font-size:17px;font-weight:800;
  color:var(--ink);text-align:center;flex-shrink:0;pointer-events:none;
  line-height:1.2;
}
.ba-card .result-badge{
  position:absolute;top:8px;left:8px;width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;font-weight:900;opacity:0;transition:opacity .22s;pointer-events:none;z-index:10;
}
.ba-card.correct .result-badge{opacity:1;background:var(--ok);color:#fff;}
.ba-card.wrong   .result-badge{opacity:1;background:var(--bad);color:#fff;}
.ba-card.correct{border-color:var(--ok);background:#F0FDF4;}
.ba-card.wrong  {border-color:var(--bad);background:#FEF2F2;}
.ba-card.shake  {animation:ml-shake .38s;}

.circle-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:8;overflow:visible;}
.circle-ring{fill:none;stroke:#16A34A;stroke-width:5;stroke-dasharray:620;stroke-dashoffset:620;stroke-linecap:round;}
.circle-ring.draw{animation:ml-circleDraw .5s ease-out forwards;}

/* COUNTDOWN */
.next-countdown{padding:0 14px 10px;flex-shrink:0;display:none;}
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#22C55E,#4ADE80);border-radius:14px;transform-origin:left center;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d);font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}

/* WIN */
.win-overlay{position:absolute;inset:0;z-index:100;background:rgba(15,8,0,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px;}
.win-overlay.show{display:flex;animation:ml-fadeIn .35s ease;}
.win-card{text-align:center;display:flex;flex-direction:column;align-items:center;animation:ml-winPop .5s var(--ease-b) both;background:rgba(255,255,255,.10);border:2px solid rgba(255,255,255,.22);border-radius:28px;padding:24px 32px 28px;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.win-rays{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-bottom:-155px;}
.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
.win-mascot{width:150px;height:150px;object-fit:contain;display:block;margin:0 auto 4px;animation:ml-bob 1.8s ease-in-out infinite;filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));position:relative;z-index:2;}
.win-title{font-family:var(--font-d);font-size:30px;font-weight:800;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.3);margin:8px 0 4px;}
.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px;}
.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b) both;opacity:0;}
.win-stars span:nth-child(1){animation-delay:.3s;}
.win-stars span:nth-child(2){animation-delay:.48s;}
.win-stars span:nth-child(3){animation-delay:.66s;}
.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d);}
.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.win-btns{display:flex;gap:10px;width:100%;}
.btn-win{
  flex:1;padding:14px 0;border:3px solid rgba(255,255,255,.9);border-radius:20px;
  font-family:var(--font-d);font-size:17px;font-weight:800;
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2);cursor:pointer;
  background:linear-gradient(135deg,#4ADE80 0%,#22C55E 55%,#16A34A 100%);
  box-shadow:0 6px 0 #15803D,0 8px 20px rgba(22,163,74,.28);
  transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;
}
.btn-win:active{transform:translateY(4px);box-shadow:0 1px 0 #15803D,0 3px 8px rgba(22,163,74,.2);}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%);box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28);}
.btn-win-next:active{box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2);}

.ml-confetti{position:fixed;pointer-events:none;z-index:9998;}

/* KEYFRAMES */
@keyframes ml-pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes ml-flash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
@keyframes ml-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}50%{transform:translateX(8px)}80%{transform:translateX(-5px)}}
@keyframes ml-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ml-spin{to{transform:rotate(360deg)}}
@keyframes ml-fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ml-winPop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes ml-starPop{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes ml-confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes ml-circleDraw{0%{stroke-dashoffset:620}100%{stroke-dashoffset:0}}
@keyframes ml-animalBounce{0%,100%{transform:translateY(0) rotate(0deg)}25%{transform:translateY(-5px) rotate(-3deg)}75%{transform:translateY(-3px) rotate(3deg)}}
.guide-hand{position:absolute;z-index:300;pointer-events:none;font-size:32px;opacity:0;line-height:1;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}
@keyframes ml-guideTap{
  0%{opacity:0;transform:translate(0,-16px) scale(1)}14%{opacity:1;transform:translate(0,0) scale(1)}
  30%{opacity:1;transform:translate(0,4px) scale(.85)}46%{opacity:1;transform:translate(0,-4px) scale(1)}
  62%{opacity:1;transform:translate(0,-16px) scale(1)}80%{opacity:0;transform:translate(0,-22px) scale(1)}100%{opacity:0}
}
</style>
<style id="ch-parity-flashfix">
/* top-bar load-flash fix (parity with ch1): reserve final height (no jump),
   never paint loose pre-reorg lesson buttons, hold transient hidden until the
   bar is reorganised (2s CSS safety-reveal). */
.top-bar{ min-height:107px; }
.top-bar > .lsn-btn{ display:none !important; }
.top-bar:not(:has(.tb-top)) > *{ visibility:hidden; animation:mlTbReveal 0s linear 2s forwards; }
@keyframes mlTbReveal{ to{ visibility:visible; } }
</style>

<script>
(function(){
  var _lTxt='',_au=null,debT=null,retryT=null,_spk=false;
  var SELS=['.q-banner','.tray-lbl'];
  function _strip(t){return t.replace(/[^\u0600-\u06FF\u0020-\u007E]/g,'').replace(/\s+/g,' ').trim();}
  function speak(raw){
    var txt=_strip(raw);
    if(!txt||txt===_lTxt)return;
    _lTxt=txt;_spk=true;clearInterval(retryT);
    if(_au){_au.pause();_au=null;}
    var src=(window.__NARR_AUDIO__||{})[txt];
    if(src){_au=new Audio(src);_au.play().catch(function(){});}
    else{var u=new SpeechSynthesisUtterance(txt);u.lang='ar-AE';u.pitch=1.2;u.rate=0.9;speechSynthesis.cancel();speechSynthesis.speak(u);}
  }
  function readQ(){
    if(document.querySelector('.win-overlay.show'))return;
    for(var i=0;i<SELS.length;i++){var el=document.querySelector(SELS[i]);if(el&&el.textContent.trim().length>2){speak(el.textContent.trim());return;}}
  }
  window.addEventListener('load',function(){
    var btn=document.createElement('button');btn.textContent='\uD83D\uDD0A';
    btn.setAttribute('aria-label','\u0627\u0633\u062A\u0645\u0639 \u0645\u062C\u062F\u062F\u0627\u064B');
    btn.style.cssText='position:fixed;bottom:20px;right:16px;z-index:9999;background:linear-gradient(135deg,#a78bfa,#7c3aed);border:none;border-radius:50%;width:48px;height:48px;font-size:24px;cursor:pointer;box-shadow:0 4px 0 #0A0A0A,0 6px 16px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;';
    btn.addEventListener('click',function(){_lTxt='';_spk=false;readQ();});
    document.body.appendChild(btn);
    setTimeout(readQ,300);setTimeout(readQ,900);setTimeout(readQ,2200);
    retryT=setInterval(function(){if(_spk){clearInterval(retryT);return;}_lTxt='';readQ();},650);
    setTimeout(function(){clearInterval(retryT);},9000);
  });
  var root=document.querySelector('.ml-widget')||document.body,_lp='';
  try{new MutationObserver(function(){clearTimeout(debT);debT=setTimeout(function(){var el=document.querySelector(SELS.join(','));var nt=el?el.textContent.trim():'';if(nt&&nt!==_lp){_lp=nt;speak(nt);}},420);}).observe(root,{childList:true,subtree:true,characterData:true});}catch(e){}
})();
</script>

<script>
/* HELPERS */
const toAr = n => String(n).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[+d]);
const mlEl  = id => document.getElementById(id);

/* SOUND SYNTH */
const mlSnd = (()=>{
  let ctx = null;
  const init = () => { if(!ctx) ctx = new(window.AudioContext||window.webkitAudioContext)(); };
  const tone = (f,t,d,v=.28) => {
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(v,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
    o.start(); o.stop(ctx.currentTime+d);
  };
  return {
    correct(){ init(); tone(523,'triangle',.16,.3); setTimeout(()=>tone(659,'triangle',.2,.26),110); },
    wrong()  { init(); tone(220,'sawtooth',.14,.2); setTimeout(()=>tone(160,'sawtooth',.1,.15),65); },
    win()    { init(); [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.22,.26),i*85)); }
  };
})();

/* STATE */
let mlScore   = 0;
let mlStepIdx = 0;
let mlSubIdx  = 0;
let mlLocked  = false;
let _cdTimer  = null;

/* GAME DATA
   RTL visual order: id='a'=rightmost, id='b'=middle(reference), id='c'=leftmost
   DOM order [a,b,c] with dir=rtl renders as: a on right, b in middle, c on left */
const ML_STEPS = [
  { animals:[{id:'a',emoji:'\u{1F413}',lbl:'الديك'},{id:'b',emoji:'\u{1F423}',lbl:'الكتكوت',ref:true},{id:'c',emoji:'\u{1F426}',lbl:'الطائر'}],
    qs:[{word:'قبل',prompt:'اضغط على الديك الذي يسير',ref:'الكتكوت',correct:'a'},{word:'بعد',prompt:'اضغط على الطائر الذي يسير',ref:'الكتكوت',correct:'c'}]},
  { animals:[{id:'a',emoji:'\u{1F9A2}',lbl:'الأوزة'},{id:'b',emoji:'\u{1F438}',lbl:'الضفدع',ref:true},{id:'c',emoji:'\u{1F986}',lbl:'البطة'}],
    qs:[{word:'قبل',prompt:'اضغط على الطير الذي يسير',ref:'الضفدع',correct:'a'},{word:'بعد',prompt:'اضغط على الحيوان الذي يسير',ref:'الضفدع',correct:'c'}]},
  { animals:[{id:'a',emoji:'\u{1F404}',lbl:'البقرة'},{id:'b',emoji:'\u{1F410}',lbl:'الماعز',ref:true},{id:'c',emoji:'\u{1F404}',lbl:'البقرة'}],
    qs:[{word:'قبل',prompt:'اضغط على الحيوان الذي يسير',ref:'الماعز',correct:'a'},{word:'بعد',prompt:'اضغط على الحيوان الذي يسير',ref:'الماعز',correct:'c'}]},
  { animals:[{id:'a',emoji:'\u{1F411}',lbl:'الخروف'},{id:'b',emoji:'\u{1F40F}',lbl:'الخروف الأسود',ref:true},{id:'c',emoji:'\u{1F411}',lbl:'الخروف'}],
    qs:[{word:'قبل',prompt:'اضغط على الخروف الذي يسير',ref:'الخروف الأسود',correct:'a'},{word:'بعد',prompt:'اضغط على الخروف الذي يسير',ref:'الخروف الأسود',correct:'c'}]},
  { animals:[{id:'a',emoji:'\u{1F54A}️',lbl:'الطائر'},{id:'b',emoji:'\u{1F426}',lbl:'الطائر الأزرق',ref:true},{id:'c',emoji:'\u{1F54A}️',lbl:'الطائر'}],
    qs:[{word:'قبل',prompt:'اضغط على الطائر الذي يطير',ref:'الطائر الأزرق',correct:'a'},{word:'بعد',prompt:'اضغط على الطائر الذي يطير',ref:'الطائر الأزرق',correct:'c'}]},
  { animals:[{id:'a',emoji:'\u{1F40E}',lbl:'الحصان'},{id:'b',emoji:'\u{1F434}',lbl:'الأحصنة الأخرى',ref:true},{id:'c',emoji:'\u{1F40E}',lbl:'الحصان'}],
    qs:[{word:'قبل',prompt:'اضغط على الحصان الذي يجري',ref:'الأحصنة الأخرى',correct:'a'},{word:'بعد',prompt:'اضغط على الحصان الذي يجري',ref:'الأحصنة الأخرى',correct:'c'}]},
];
const ML_TOTAL = ML_STEPS.length; // 6

/* LESSON NAV */
(function(){
  var lessons = [
    'moosa-chp 3-lesson 1.html',
    'moosa-chp 3-lesson 2.html',
    'moosa-chp 3-lesson 3.html',
    'moosa-chp 3-lesson 4.html',
    'moosa-chp 3-lesson 5.html',
    'moosa-chp 3-lesson 6.html',
  ];
  var cur = decodeURIComponent(window.location.pathname.split('/').pop());
  var curIdx = lessons.indexOf(cur);
  var done = [];
  try { done = JSON.parse(localStorage.getItem('moosa_ch3') || '[]'); } catch(e){}
  var bar = mlEl('topBar');
  for(var i=0; i<lessons.length; i++){
    (function(lf, li){
      var b = document.createElement('button');
      var isDone = done.indexOf(li) !== -1;
      b.className = 'lsn-btn' + (li===curIdx?' active':li<curIdx?' done':'');
      b.textContent = '٠١٢٣٤٥٦٧٨٩'[li + 1];
      b.addEventListener('click', function(){
        if(window.parent && window.parent !== window){
          window.parent.postMessage({action:'navigateLesson', file:lf}, '*');
        } else {
          window.location.href = lf;
        }
      });
      bar.appendChild(b);
    })(lessons[i], i);
  }
})();

/* PROGRESS DOTS */
function mlRenderDots(){
  var w = mlEl('mlDots'); if(!w) return;
  w.innerHTML = '';
  ML_STEPS.forEach(function(_,i){
    var d = document.createElement('div');
    d.className = 'ml-dot' + (i===mlStepIdx?' active':i<mlStepIdx?' done':'');
    w.appendChild(d);
  });
}

/* FLASH */
function mlFlash(type, id){
  var f = mlEl(id); if(!f) return;
  f.className = 'flash ' + type;
  f.offsetWidth;
  f.classList.add('show');
  setTimeout(function(){ f.classList.remove('show'); }, 620);
}

/* SCORE */
function mlAddScore(n){ mlScore += n; }

/* COUNTDOWN */
function mlRunCountdown(onDone){
  clearInterval(_cdTimer); _cdTimer = null;
  var wrap = mlEl('nextCountdown');
  var fill = mlEl('countdownFill');
  var txt  = mlEl('countdownTxt');
  if(!wrap) return;
  var secs = 5;
  wrap.style.display = 'block';
  fill.style.animation = 'none'; void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 5s linear forwards';
  txt.textContent = toAr(secs);
  _cdTimer = setInterval(function(){
    secs--;
    if(txt) txt.textContent = toAr(Math.max(0, secs));
    if(secs <= 0){
      clearInterval(_cdTimer); _cdTimer = null;
      wrap.style.display = 'none';
      onDone();
    }
  }, 1000);
}

/* WIN */
function mlShowWin(){
  mlSnd.win();
  mlEl('winScoreVal').textContent = toAr(mlScore);
  mlEl('winOverlay').classList.add('show');
  mlSpawnConfetti();
}
function mlHandleWinNext(){
  clearInterval(_cdTimer); _cdTimer = null;
  if(window.parent && window.parent !== window){
    window.parent.postMessage({action:'nextLesson'}, '*');
  }
}
function mlHandleWinRestart(){
  clearInterval(_cdTimer); _cdTimer = null;
  mlEl('winOverlay').classList.remove('show');
  mlEl('confettiCont').innerHTML = '';
  mlScore = 0; mlStepIdx = 0; mlSubIdx = 0; mlLocked = false;
  mlRenderStep();
}
function mlSpawnConfetti(){
  var c = mlEl('confettiCont'); c.innerHTML = '';
  var cols = ['#3A3A3A','#86EFAC','#FCA5A5','#93C5FD','#F9A8D4','#6EE7B7','#fff'];
  for(var i=0; i<55; i++){
    var el = document.createElement('div'); el.className = 'ml-confetti';
    var sz = 6+Math.random()*7;
    var col = cols[Math.floor(Math.random()*cols.length)];
    el.style.cssText = [
      'width:'+sz+'px','height:'+sz+'px','background:'+col,
      'border-radius:'+(Math.random()>.5?'50%':'2px'),
      'position:fixed','left:'+(Math.random()*100)+'vw','top:-20px',
      'animation:ml-confettiFall '+(1.4+Math.random()*2)+'s ease-in '+(Math.random()*1.2)+'s forwards'
    ].join(';');
    c.appendChild(el);
  }
}

/* SUB-STARS */
function mlUpdateStars(){
  ['star0','star1'].forEach(function(sid, i){
    var el = mlEl(sid); if(!el) return;
    if(i < mlSubIdx){
      el.textContent = '⭐';
      el.classList.add('filled');
    } else {
      el.textContent = '☆';
      el.classList.remove('filled');
    }
  });
}

/* RENDER CARDS */
function mlRenderCards(){
  var step = ML_STEPS[mlStepIdx];
  var container = mlEl('baCards');
  container.innerHTML = '';

  step.animals.forEach(function(animal, idx){
    var card = document.createElement('div');
    card.className = 'ba-card' + (animal.ref ? ' ref' : '');
    card.style.animationDelay = (idx * 0.06) + 's';
    card.dataset.id = animal.id;

    if(animal.ref){
      var chip = document.createElement('div');
      chip.className = 'ref-chip';
      chip.textContent = 'المرجع'; // المرجع
      card.appendChild(chip);
    }

    var em = document.createElement('div');
    em.className = 'bc-emoji';
    em.textContent = animal.emoji;
    card.appendChild(em);

    var lbl = document.createElement('div');
    lbl.className = 'bc-lbl';
    lbl.textContent = animal.lbl;
    card.appendChild(lbl);

    var badge = document.createElement('div');
    badge.className = 'result-badge';
    card.appendChild(badge);

    var NS = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(NS, 'svg');
    svg.setAttribute('class','circle-svg');
    svg.setAttribute('viewBox','0 0 100 100');
    svg.setAttribute('preserveAspectRatio','none');
    var ell = document.createElementNS(NS, 'ellipse');
    ell.setAttribute('class','circle-ring');
    ell.setAttribute('cx','50'); ell.setAttribute('cy','50');
    ell.setAttribute('rx','43'); ell.setAttribute('ry','44');
    svg.appendChild(ell);
    card.appendChild(svg);

    if(!animal.ref){
      (function(c, aid, b, e){ c.addEventListener('click', function(){ mlTapCard(c, aid, b, e); }); })(card, animal.id, badge, ell);
    }

    container.appendChild(card);
  });
}

/* UPDATE QUESTION BANNER */
function mlUpdateBanner(){
  var step = ML_STEPS[mlStepIdx];
  var q    = step.qs[mlSubIdx];
  mlEl('baQ').textContent = q.prompt + ' ' + q.word + ' ' + q.ref + '؟';
}

/* TAP HANDLER */
function mlTapCard(card, cardId, badge, ell){
  mlHideGuide();
  if(mlLocked) return;
  var step    = ML_STEPS[mlStepIdx];
  var q       = step.qs[mlSubIdx];
  var correct = (cardId === q.correct);

  if(correct){
    mlLocked = true;
    card.classList.add('correct');
    badge.textContent = '✓';
    ell.classList.add('draw');
    mlSnd.correct();
    mlFlash('ok','flashMain');
    mlAddScore(10);

    mlSubIdx++;
    mlUpdateStars();

    if(mlSubIdx >= 2){
      setTimeout(function(){ mlRunCountdown(mlNextStep); }, 1100);
    } else {
      setTimeout(function(){
        card.classList.remove('correct');
        badge.textContent = '';
        ell.classList.remove('draw');
        mlLocked = false;
        mlUpdateBanner();
      }, 1100);
      setTimeout(function(){
        var step=ML_STEPS[mlStepIdx];
        if(mlSubIdx < step.qs.length){
          var correctId=step.qs[mlSubIdx].correct;
          var card=document.querySelector('.ba-card[data-id="'+correctId+'"]');
          mlShowGuide(card);
        }
      }, 1200);
    }

  } else {
    card.classList.add('wrong');
    badge.textContent = '✕';
    mlSnd.wrong();
    mlFlash('bad','flashMain');
    setTimeout(function(){
      card.classList.remove('wrong');
      badge.textContent = '';
    }, 420);
    void card.offsetWidth;
    card.classList.add('shake');
    setTimeout(function(){ card.classList.remove('shake'); }, 420);
  }
}

/* ADVANCE STEP */
function mlNextStep(){
  mlStepIdx++;
  if(mlStepIdx >= ML_TOTAL){ mlShowWin(); return; }
  mlSubIdx = 0;
  mlLocked = false;
  mlRenderStep();
}

/* RENDER CURRENT STEP */
function mlRenderStep(){
  mlRenderDots();
  mlSubIdx  = 0;
  mlLocked  = false;
  mlEl('nextCountdown').style.display = 'none';
  mlUpdateStars();
  mlRenderCards();
  mlUpdateBanner();
  setTimeout(function(){
    var step=ML_STEPS[mlStepIdx];
    var correctId=step.qs[mlSubIdx].correct;
    var card=document.querySelector('.ba-card[data-id="'+correctId+'"]');
    mlShowGuide(card);
  }, 500);
}

function mlShowGuide(target){
  var g=mlEl('guideMain'), wrap=mlEl('mlWidget');
  if(!g||!target||!wrap) return;
  var tr=target.getBoundingClientRect(), wr=wrap.getBoundingClientRect();
  g.style.left=(tr.left-wr.left+tr.width/2-20)+'px';
  g.style.top=(tr.top-wr.top+tr.height/2-20)+'px';
  g.style.animation='none'; g.style.opacity='0'; g.offsetWidth;
  g.style.animation='ml-guideTap 2s ease-in-out infinite';
}
function mlHideGuide(){
  var g=mlEl('guideMain'); if(!g) return;
  g.style.animation='none'; g.style.opacity='0';
}

/* START */
mlRenderStep();
</script>

(function(){
  var fn=decodeURIComponent((location.pathname.split('/').pop()||'').split('?')[0]);
  var ch=null,idx=0,total=0,nextFile=null,m;
  var LP_HERE='moosa-lessons.html';
  var LP_OTHER='../Interactive book for elementary school chapter 1/moosa-lessons.html';
  var LP=LP_HERE;
  if((m=fn.match(/^moosa-lesson-classify (\d+)\.html$/))){ch='ch1';idx=+m[1]-1;total=5;nextFile='moosa-lesson-classify '+(+m[1]+1)+'.html';}
  else if((m=fn.match(/^moosa-chp 2-lesson (\d+)\.html$/))){ch='ch2';idx=+m[1]-1;total=6;nextFile='moosa-chp 2-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 3-lesson (\d+)\.html$/))){ch='ch3';idx=+m[1]-1;total=6;nextFile='moosa-chp 3-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 4-lesson (\d+)\.html$/))){ch='ch4';idx=+m[1]-1;total=3;nextFile='moosa-chp 4-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  if(!ch)return;
  var isLast=idx>=total-1;
  function saveDone(){try{var k='moosa_'+ch,p=JSON.parse(localStorage.getItem(k)||'[]');if(p.indexOf(idx)===-1){p.push(idx);localStorage.setItem(k,JSON.stringify(p));}}catch(e){}}
  var ov=document.querySelector('.win-overlay');
  if(ov){
    try{new MutationObserver(function(){if(ov.classList.contains('show'))saveDone();}).observe(ov,{attributes:true,attributeFilter:['class']});}catch(e){}
    if(ov.classList.contains('show'))saveDone();
  }
  window.mlHandleWinNext=function(){
    saveDone();
    if(window.parent&&window.parent!==window){window.parent.postMessage({action:'nextLesson'},'*');return;}
    location.href=isLast?LP:nextFile;
  };
})();

/* ===== 2-row nav header (parity with ch1): lesson numbers on top, score+dots below ===== */
.top-bar{ flex-direction:column !important; align-items:stretch !important; justify-content:center !important; gap:9px !important; padding:13px 16px 11px !important; }
.top-bar .tb-top{ display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; }
.top-bar .tb-bot{ position:relative; display:flex; align-items:center; justify-content:center; min-height:30px; padding:0 4px; }
.top-bar .tb-score{ position:absolute; left:6px; top:50%; transform:translateY(-50%); display:flex; align-items:center; gap:6px; background:linear-gradient(180deg,#facc15,#f97316); border:3px solid #fff; border-radius:999px; padding:4px 13px 5px; box-shadow:0 4px 10px rgba(0,0,0,.22); }
.top-bar .tb-score::before{ content:'⭐'; font-size:16px; line-height:1; }
.top-bar .tb-score .score-label{ display:none !important; }
.top-bar .tb-score .score-val{ display:inline-block !important; color:#fff !important; font-weight:900; font-size:20px; line-height:1; text-shadow:0 2px 0 rgba(0,0,0,.22); }
.top-bar .tb-bot .progress-dots, .top-bar .tb-bot #ml-dots, .top-bar .tb-bot #mlDots{ justify-content:center !important; padding:0 !important; gap:10px !important; }
.top-bar .qdot, .top-bar .ml-qdot, .top-bar .ml-dot, .top-bar .dot{ width:11px !important; height:11px !important; border-radius:50% !important; margin:0 !important; flex:0 0 auto !important; background:rgba(255,255,255,.55) !important; box-shadow:none !important; transition:transform .25s, background .25s !important; }
.top-bar .qdot.active, .top-bar .ml-qdot.active, .top-bar .ml-dot.active, .top-bar .dot.active{ background:#fff !important; transform:scale(1.4) !important; box-shadow:0 0 0 3px rgba(255,255,255,.28) !important; }
.top-bar .qdot.done, .top-bar .ml-qdot.done, .top-bar .ml-dot.done, .top-bar .dot.done{ background:#facc15 !important; transform:none !important; }
.top-bar .lsn-btn{ min-width:40px; height:40px; border-radius:10px; background:rgba(255,255,255,.32); color:#fff; font-size:15px; font-weight:800; border:2px solid transparent; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; padding:0 7px; transition:transform .15s, background .15s; -webkit-tap-highlight-color:transparent; }
.top-bar .lsn-btn.active{ background:rgba(0,0,0,.22) !important; border-color:rgba(255,255,255,.85) !important; transform:scale(1.08); }
.top-bar .lsn-btn.done{ background:rgba(255,255,255,.92) !important; color:#7c3aed !important; }
</style>
<script id="ch-parity-reorg">
(function(){
  function toAr(n){return String(n).replace(/[0-9]/g,function(d){return'٠١٢٣٤٥٦٧٨٩'[+d];});}
  function getScore(){try{if(typeof score!=='undefined'&&score!=null)return score;}catch(e){}try{if(typeof mlScore!=='undefined'&&mlScore!=null)return mlScore;}catch(e){}return null;}
  function reorg(){
    var bar=document.querySelector('.ml-widget .top-bar')||document.querySelector('.app .top-bar')||document.querySelector('.top-bar');
    if(!bar||bar._reorg)return false;
    var navs=[].slice.call(bar.querySelectorAll('.lsn-btn'));
    var dots=document.getElementById('ml-dots')||document.getElementById('mlDots')||document.getElementById('roundRow');
    if(!navs.length||!dots)return false;
    var sl=bar.querySelector('.score-label'), sv=bar.querySelector('.score-val');
    if(!sv){ sv=document.createElement('span'); sv.className='score-val'; sv.id='mlScoreVal'; var s0=getScore(); sv.textContent=toAr(s0==null?0:s0); }
    bar._reorg=true;
    var top=document.createElement('div'); top.className='tb-top';
    navs.forEach(function(b){ top.appendChild(b); });
    var bot=document.createElement('div'); bot.className='tb-bot';
    var sc=document.createElement('div'); sc.className='tb-score';
    if(sl) sc.appendChild(sl); sc.appendChild(sv);
    bot.appendChild(sc); bot.appendChild(dots);
    bar.innerHTML=''; bar.appendChild(top); bar.appendChild(bot);
    setInterval(function(){var s=getScore(); if(s!=null) sv.textContent=toAr(s);},300);
    return true;
  }
  var n=0, iv=setInterval(function(){ n++; if(reorg()||n>60){clearInterval(iv);} },80);
})();
</script>

<style id="tb-back-btn">
/* Back-to-lessons button (bottom row of the top bar, mirrors the score pill) */
.top-bar{ position:relative; }
.tb-back{ position:absolute; right:6px; top:50%; transform:translateY(-50%); width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,.30); border:2px solid rgba(255,255,255,.65); display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0; box-shadow:0 3px 8px rgba(0,0,0,.22); -webkit-tap-highlight-color:transparent; transition:transform .12s, background .15s; z-index:40; }
.tb-back:hover{ background:rgba(255,255,255,.46); }
.tb-back:active{ transform:translateY(-50%) scale(.88); }
.tb-back svg{ width:21px; height:21px; display:block; }
</style>
<script id="tb-back-js">
(function(){
  var inCh1=/moosa-lesson-classify/.test(decodeURIComponent(location.pathname||''));
  var LP=inCh1?'moosa-lessons.html':'../Interactive book for elementary school chapter 1/moosa-lessons.html';
  function go(){ try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({action:'exitToLessons'},'*'); return; } }catch(e){} location.href=LP; }
  function make(){
    var host=document.querySelector('.tb-bot')||document.querySelector('.ml-widget .top-bar')||document.querySelector('.app .top-bar')||document.querySelector('.top-bar');
    if(!host) return false;
    if(host.querySelector('.tb-back')) return true;
    var b=document.createElement('button'); b.className='tb-back'; b.type='button';
    b.setAttribute('aria-label','العودة إلى قائمة الألعاب');
    b.title='الألعاب';
    b.innerHTML='<svg viewBox="0 0 24 24" fill="#fff" aria-hidden="true"><rect x="3" y="3" width="8" height="8" rx="2.2"/><rect x="13" y="3" width="8" height="8" rx="2.2"/><rect x="3" y="13" width="8" height="8" rx="2.2"/><rect x="13" y="13" width="8" height="8" rx="2.2"/></svg>';
    b.addEventListener('click',function(e){ e.stopPropagation(); e.preventDefault(); go(); });
    host.appendChild(b);
    return true;
  }
  var n=0, iv=setInterval(function(){ n++; if(make()||n>80){ clearInterval(iv); } },80);
})();
</script>
