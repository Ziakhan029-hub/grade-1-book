<script>
/* Single narration channel: starting any spoken clip stops the previous one (prevents audio overlap). Tap/win blips use WebAudio and are unaffected. */
(function(){
  if(window.__mlAudioBus__)return; window.__mlAudioBus__=1;
  var cur=null;
  try{
    var P=window.HTMLAudioElement&&HTMLAudioElement.prototype;
    if(P&&P.play){
      var op=P.play;
      P.play=function(){
        if(cur&&cur!==this){try{cur.pause();}catch(e){}try{cur.currentTime=0;}catch(e){}}
        cur=this;
        try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
        return op.apply(this,arguments);
      };
    }
  }catch(e){}
  try{
    var ss=window.speechSynthesis;
    if(ss&&ss.speak){
      var osp=ss.speak;
      ss.speak=function(u){if(cur){try{cur.pause();}catch(e){}}try{return osp.call(ss,u);}catch(e){}};
    }
  }catch(e){}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى التعليمي — الموقع والنمط — الدرس ١</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;margin:0;padding:0;overflow:hidden;background:linear-gradient(160deg,#FFFFFF 0%,#F2F2F2 100%);}
.ml-widget{
  --amber:#1F1F1F;--amber-dark:#141414;
  --cream:#FFFFFF;--ink:#1C1917;--ink-soft:#78716C;
  --green:#22C55E;--green-dark:#16A34A;--green-text:#14532D;
  --ok:#22C55E;--bad:#EF4444;
  --font-d:'Baloo Bhaijaan 2','Tajawal',sans-serif;
  --font-b:'Tajawal',sans-serif;
  --ease-b:cubic-bezier(.34,1.56,.64,1);
  width:100%;height:100vh;height:100svh;
  max-width:560px;margin:0 auto;
  display:flex;flex-direction:column;
  background:var(--cream);font-family:var(--font-b);
  overflow:hidden;position:relative;
}
.ml-widget *,.ml-widget *::before,.ml-widget *::after{box-sizing:border-box;margin:0;padding:0;}

/* ── TOP BAR ── */
.top-bar{
  background:linear-gradient(135deg,#3A3A3A 0%,#1F1F1F 60%,#141414 100%);
  padding:8px 12px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.lsn-btn{
  min-width:44px;height:44px;border-radius:10px;
  background:rgba(255,255,255,.38);
  font-family:var(--font-d);font-size:15px;font-weight:700;
  color:rgba(61,38,16,.75);cursor:pointer;
  border:2px solid transparent;
  display:inline-flex;align-items:center;justify-content:center;padding:0 7px;
  transition:transform .15s,background .15s;-webkit-tap-highlight-color:transparent;
}
.lsn-btn.active{background:rgba(0,0,0,.22);color:#fff;border-color:rgba(0,0,0,.55);transform:scale(1.08);}
.lsn-btn.done{background:#16A34A;color:#fff;}
.lsn-btn:hover{transform:scale(1.12);background:rgba(255,255,255,.55);}

/* ── PROGRESS DOTS (hidden — nav bar replaces them) ── */
.progress-dots{display:none!important;}

/* ── SCREENS ── */
.screen{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative;}
.screen.hidden{display:none;}

/* ── Q-BANNER ── */
.q-banner{
  flex-shrink:0;text-align:center;
  font-family:var(--font-d);font-size:18px;font-weight:800;
  color:var(--ink);line-height:1.35;padding:8px 12px 4px;
}


/* ── FLASH ── */
.flash{position:absolute;inset:0;z-index:50;pointer-events:none;opacity:0;}
.flash.ok{background:radial-gradient(circle,rgba(34,197,94,.25),transparent 70%);}
.flash.bad{background:radial-gradient(circle,rgba(239,68,68,.25),transparent 70%);}
.flash.show{animation:ml-flash .55s ease-out forwards;}

/* ════════════════════════════════
   DRAG-DROP  (Monkey Sort)
════════════════════════════════ */
.drag-play{flex:1;display:flex;flex-direction:column;padding:6px 12px 4px;gap:6px;min-height:0;}
.boxes{display:flex;gap:10px;flex-shrink:0;height:186px;}
.box{
  flex:1;border-radius:18px;border:3px dashed rgba(196,172,126,.5);
  display:flex;flex-direction:column;
  transition:border-color .15s,background .15s,transform .12s;overflow:hidden;
}
.box[data-tone="green"]{border-color:#86EFAC;background:rgba(134,239,172,.08);}
.box[data-tone="orange"]{border-color:#3A3A3A;background:rgba(252,211,77,.08);}
.box.over{transform:scale(1.03);}
.box[data-tone="green"].over{border-color:var(--ok);background:rgba(34,197,94,.15);}
.box[data-tone="orange"].over{border-color:var(--amber);background:rgba(0,0,0,.15);}
.box.shake{animation:ml-shake .38s;}
.box.pulse-ok{animation:ml-pulseOk .45s var(--ease-b);}
.box-title{
  font-family:var(--font-d);font-size:14px;font-weight:800;
  text-align:center;padding:6px 4px 3px;
  display:flex;align-items:center;justify-content:center;gap:5px;flex-shrink:0;
}
.box[data-tone="green"] .box-title{color:#15803D;}
.box[data-tone="orange"] .box-title{color:#0A0A0A;}
.box-divider{height:1px;background:rgba(0,0,0,.08);margin:0 8px;flex-shrink:0;}
.box-items{
  flex:1;display:flex;flex-wrap:wrap;gap:4px;
  align-content:center;justify-content:center;align-items:center;
  padding:4px 5px;position:relative;overflow:hidden;
}
.placeholder{position:absolute;inset:6px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.18;pointer-events:none;transition:opacity .25s;}
.box-items.has-item .placeholder{opacity:0;}
.item-placed{
  width:64px;height:74px;border-radius:16px;
  background:#FFFDF6;border:2px solid rgba(255,255,255,.8);
  display:flex;align-items:center;justify-content:center;
  animation:ml-pop .35s var(--ease-b) both;overflow:hidden;flex-shrink:0;
  font-size:30px;flex-direction:column;gap:0;
}
.tray-section{flex:1;display:flex;flex-direction:column;min-height:0;}
.tray-lbl{text-align:center;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;flex-shrink:0;}
.tray{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:center;flex:1;align-content:center;padding:0 2px;}

.item{
  width:92px;height:98px;border-radius:20px;
  background:#FFFDF6;border:3px solid rgba(255,255,255,.85);
  box-shadow:0 4px 12px rgba(31,31,31,.22);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:grab;touch-action:none;
  animation:ml-pop .38s var(--ease-b) both;
  flex-shrink:0;user-select:none;position:relative;
}
.item:active{cursor:grabbing;}
.item.dragging{opacity:.2;}
.item.glow{animation:ml-itemGlow 1.4s ease-in-out infinite;}
.item-emoji-top{font-size:40px;line-height:1.1;pointer-events:none;}
.item-emoji-bot{font-size:40px;line-height:1.1;pointer-events:none;}
.item-placed .item-emoji-top,.item-placed .item-emoji-bot{font-size:30px;}

.ml-ghost{
  position:fixed;z-index:9999;width:92px;height:98px;border-radius:20px;
  background:#FFFDF6;border:3px solid rgba(255,255,255,.85);
  pointer-events:none;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;
  box-shadow:0 8px 22px rgba(80,50,10,.32);
  transform:translate(-50%,-50%) scale(1.1) rotate(-3deg);
}
.ml-ghost .item-emoji-top{font-size:40px;line-height:1.1;pointer-events:none;}
.ml-ghost .item-emoji-bot{font-size:40px;line-height:1.1;pointer-events:none;}

/* guide hand */
.guide-hand{position:absolute;z-index:300;pointer-events:none;font-size:32px;opacity:0;line-height:1;width:40px;height:40px;display:flex;align-items:center;justify-content:center;}

/* ════════════════════════════════
   FISH SCENE + TAP
════════════════════════════════ */
.fish-play{flex:1;display:flex;flex-direction:column;padding:6px 12px 4px;gap:8px;min-height:0;}
.fish-scene{
  flex-shrink:0;border-radius:18px;overflow:hidden;position:relative;
  height:38%;min-height:140px;
  background:linear-gradient(180deg,#BAE6FD 0%,#0EA5E9 42%,#0369A1 100%);
}
.scene-chip{
  position:absolute;top:8px;right:10px;
  font-family:var(--font-d);font-size:12px;font-weight:800;
  background:rgba(255,255,255,.92);border-radius:999px;padding:3px 11px;
  white-space:nowrap;pointer-events:none;color:var(--green-text);
  border:2px solid rgba(21,128,61,.3);
}
.scene-inner{position:relative;width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.fish-pos{position:absolute;font-size:38px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));}
.fish-pos.above{top:10%;}
.fish-pos.below{bottom:10%;}
.seaweed{font-size:44px;line-height:1;}

.fish-cards{flex:1;display:flex;gap:12px;min-height:0;}
.fish-card{
  flex:1;border-radius:22px;border:4px solid rgba(196,172,126,.35);
  background:#FFFDF6;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  overflow:hidden;position:relative;cursor:pointer;gap:8px;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .15s,background .15s;padding:12px 8px;
}
.fish-card:active{transform:scale(.96);}
.fish-card .fc-emoji{font-size:50px;line-height:1;animation:ml-fishWiggle 2.6s ease-in-out infinite;}
.fish-card .fc-lbl{font-family:var(--font-d);font-size:15px;font-weight:800;color:var(--ink);flex-shrink:0;text-align:center;}
.fish-card.correct{border-color:var(--ok);background:#F0FDF4;}
.fish-card.wrong{border-color:var(--bad);background:#FEF2F2;}
.fish-card .result-badge{
  position:absolute;top:8px;left:8px;width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;opacity:0;transition:opacity .22s;pointer-events:none;z-index:10;
}
.fish-card.correct .result-badge{opacity:1;background:var(--ok);color:#fff;}
.fish-card.wrong .result-badge{opacity:1;background:var(--bad);color:#fff;}
.circle-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:8;overflow:visible;}
.circle-ring{fill:none;stroke:#16A34A;stroke-width:5;stroke-dasharray:620;stroke-dashoffset:620;stroke-linecap:round;}
.circle-ring.draw{animation:ml-circleDraw .5s ease-out forwards;}

/* ════════════════════════════════
   COUNTDOWN
════════════════════════════════ */
.next-countdown{padding:0 14px 10px;flex-shrink:0;display:none;}
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#a78bfa,#7c3aed);border-radius:14px;transform-origin:right center;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d);font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}

/* ════════════════════════════════
   WIN
════════════════════════════════ */
.win-overlay{position:absolute;inset:0;z-index:100;background:rgba(15,8,0,.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:24px;}
.win-overlay.show{display:flex;animation:ml-fadeIn .35s ease;}
.win-card{text-align:center;display:flex;flex-direction:column;align-items:center;animation:ml-winPop .5s var(--ease-b) both;background:rgba(255,255,255,.10);border:2px solid rgba(255,255,255,.22);border-radius:28px;padding:24px 32px 28px;box-shadow:0 8px 32px rgba(0,0,0,.3);}
.win-rays{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-bottom:-155px;}
.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
.win-mascot{width:150px;height:150px;object-fit:contain;display:block;margin:0 auto 4px;animation:ml-bob 1.8s ease-in-out infinite;filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));position:relative;z-index:2;}
.win-title{font-family:var(--font-d);font-size:30px;font-weight:800;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.3);margin:8px 0 4px;}
.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px;}
.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b) both;opacity:0;}
.win-stars span:nth-child(1){animation-delay:.3s;}
.win-stars span:nth-child(2){animation-delay:.48s;}
.win-stars span:nth-child(3){animation-delay:.66s;}
.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d);}
.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.win-btns{display:flex;gap:10px;width:100%;}
.btn-win{
  flex:1;padding:14px 0;border:3px solid rgba(255,255,255,.9);border-radius:20px;
  font-family:var(--font-d);font-size:17px;font-weight:800;
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2);cursor:pointer;
  background:linear-gradient(135deg,#c4b5fd 0%,#a78bfa 55%,#7c3aed 100%);
  box-shadow:0 6px 0 #6d28d9,0 8px 20px rgba(124,58,237,.28);
  transition:transform .15s,box-shadow .15s;-webkit-tap-highlight-color:transparent;
}
.btn-win:active{transform:translateY(4px);box-shadow:0 1px 0 #6d28d9,0 3px 8px rgba(124,58,237,.2);}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%);box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28);}
.btn-win-next:active{box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2);}

.ml-confetti{position:absolute;pointer-events:none;z-index:9998;}
#confettiCont{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:9998;}

/* ── KEYFRAMES ── */
@keyframes ml-pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}
@keyframes ml-flash{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
@keyframes ml-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}50%{transform:translateX(8px)}80%{transform:translateX(-5px)}}
@keyframes ml-pulseOk{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes ml-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ml-spin{to{transform:rotate(360deg)}}
@keyframes ml-fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ml-winPop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.06)}100%{transform:scale(1);opacity:1}}
@keyframes ml-starPop{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.3)}100%{transform:scale(1);opacity:1}}
@keyframes ml-confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(900px) rotate(720deg);opacity:0}}
@keyframes ml-circleDraw{0%{stroke-dashoffset:620}100%{stroke-dashoffset:0}}
@keyframes ml-fishWiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-4deg)}75%{transform:rotate(4deg)}}
@keyframes ml-guideTap{
  0%{opacity:0;transform:translate(0,-16px) scale(1)}14%{opacity:1;transform:translate(0,0) scale(1)}
  30%{opacity:1;transform:translate(0,4px) scale(.85)}46%{opacity:1;transform:translate(0,-4px) scale(1)}
  62%{opacity:1;transform:translate(0,-16px) scale(1)}80%{opacity:0;transform:translate(0,-22px) scale(1)}100%{opacity:0}
}
@keyframes ml-guideDrag{
  0%{opacity:0;transform:translate(0,0) scale(1)}8%{opacity:1;transform:translate(0,5px) scale(.85)}
  22%{opacity:1;transform:translate(0,0) scale(.85)}55%{opacity:1;transform:translate(var(--gdx),var(--gdy)) scale(.85)}
  65%{opacity:1;transform:translate(var(--gdx),var(--gdy)) scale(1)}73%{opacity:0;transform:translate(var(--gdx),var(--gdy)) scale(1)}
  74%{opacity:0;transform:translate(0,0) scale(1)}100%{opacity:0;transform:translate(0,0) scale(1)}
}
@keyframes ml-itemGlow{
  0%,100%{box-shadow:0 0 0 0 rgba(0,0,0,0)}
  50%{box-shadow:0 0 0 5px rgba(0,0,0,.5),0 0 20px rgba(0,0,0,.35)}
}
</style>
<style id="ch-parity-flashfix">
/* top-bar load-flash fix (parity with ch1): reserve final height (no jump),
   never paint loose pre-reorg lesson buttons, hold transient hidden until the
   bar is reorganised (2s CSS safety-reveal). */
.top-bar{ min-height:107px; }
.top-bar > .lsn-btn{ display:none !important; }
.top-bar:not(:has(.tb-top)) > *{ visibility:hidden; animation:mlTbReveal 0s linear 2s forwards; }
@keyframes mlTbReveal{ to{ visibility:visible; } }
</style>
</head>

<script>window.__NARR_AUDIO__={"أين الموز؟ ضع كلّ قرد في صندوقه":"../audio/a9344987.mp3","اسحب كلّ قرد إلى الصندوق الصحيح":"../audio/38a0ceae.mp3","أيّ سمكة فوق النبتة؟":"../audio/298aacf4.mp3","أيّ سمكة تحت النبتة؟":"../audio/a659bb63.mp3","اُنظر إلى الصورة":"../audio/1d33b1e4.mp3"};</script>
<script>
(function(){
  var _lTxt='',_au=null,debT=null,retryT=null,_spk=false;
  var SELS=['.q-banner','.tray-lbl'];
  function _strip(t){return t.replace(/[^\u0600-\u06FF\u0020-\u007E]/g,'').replace(/\s+/g,' ').trim();}
  function speak(raw){
    var txt=_strip(raw);
    if(!txt||txt===_lTxt)return;
    _lTxt=txt;_spk=true;clearInterval(retryT);
    if(_au){_au.pause();_au=null;}
    var src=(window.__NARR_AUDIO__||{})[txt];
    if(src){_au=new Audio(src);_au.play().catch(function(){});}
    else{var u=new SpeechSynthesisUtterance(txt);u.lang='ar-AE';u.pitch=1.2;u.rate=0.9;speechSynthesis.cancel();speechSynthesis.speak(u);}
  }
  function readQ(){
    if(document.querySelector('.win-overlay.show'))return;
    for(var i=0;i<SELS.length;i++){var el=document.querySelector(SELS[i]);if(el&&el.textContent.trim().length>2){speak(el.textContent.trim());return;}}
  }
  window.addEventListener('load',function(){
    var btn=document.createElement('button');btn.textContent='\uD83D\uDD0A';
    btn.setAttribute('aria-label','\u0627\u0633\u062A\u0645\u0639 \u0645\u062C\u062F\u062F\u0627\u064B');
    btn.style.cssText='position:absolute;bottom:20px;right:16px;z-index:9999;background:linear-gradient(135deg,#a78bfa,#7c3aed);border:none;border-radius:50%;width:48px;height:48px;font-size:24px;cursor:pointer;box-shadow:0 4px 0 #0A0A0A,0 6px 16px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;';
    btn.addEventListener('click',function(){_lTxt='';_spk=false;readQ();});
    (document.querySelector('.ml-widget')||document.body).appendChild(btn);
    setTimeout(readQ,300);setTimeout(readQ,900);setTimeout(readQ,2200);
    retryT=setInterval(function(){if(_spk){clearInterval(retryT);return;}_lTxt='';readQ();},650);
    setTimeout(function(){clearInterval(retryT);},9000);
  });
  var root=document.querySelector('.ml-widget')||document.body,_lp='';
  try{new MutationObserver(function(){clearTimeout(debT);debT=setTimeout(function(){var el=document.querySelector(SELS.join(','));var nt=el?el.textContent.trim():'';if(nt&&nt!==_lp){_lp=nt;speak(nt);}},420);}).observe(root,{childList:true,subtree:true,characterData:true});}catch(e){}
})();
</script>
<div class="ml-widget" id="mlWidget">

  <!-- TOP BAR -->
  <div class="top-bar" id="topBar"></div>

  <div class="progress-dots" id="mlDots"></div>

  <!-- SCREEN 1: MONKEY SORT (drag-drop) -->
  <div class="screen hidden" id="scr-drag">
    <div class="drag-play">
      <div class="q-banner" id="dragQ"></div>
      <div class="boxes">
        <div class="box" id="boxAbove" data-box="above" data-tone="green">
          <div class="box-title"><span>⬆️</span><span id="titleAbove"></span></div>
          <div class="box-divider"></div>
          <div class="box-items" id="itemsAbove"><div class="placeholder">⬆︎</div></div>
        </div>
        <div class="box" id="boxBelow" data-box="below" data-tone="orange">
          <div class="box-title"><span>⬇️</span><span id="titleBelow"></span></div>
          <div class="box-divider"></div>
          <div class="box-items" id="itemsBelow"><div class="placeholder">⬇︎</div></div>
        </div>
      </div>
      <div class="tray-section">
        <div class="tray-lbl">اسحب كلّ قرد إلى الصندوق الصحيح ☝️</div>
        <div class="tray" id="mlTray"></div>
      </div>
    </div>
    <div class="flash" id="flashDrag"></div>
    <div class="guide-hand" id="guideDrag">☝️</div>
  </div>

  <!-- SCREEN 2 & 3: FISH SCENE + TAP -->
  <div class="screen hidden" id="scr-fish">
    <div class="fish-play">
      <div class="q-banner" id="fishQ"></div>
      <div class="fish-scene">
        <div class="scene-inner">
          <!-- Orange fish 🐠 is above the seaweed, yellow 🐟 is below — fixed for both questions -->
          <span class="fish-pos above">🐠</span>
          <span class="seaweed">🌿</span>
          <span class="fish-pos below">🐟</span>
        </div>
        <span class="scene-chip" id="fishChip"></span>
      </div>
      <div class="fish-cards" id="fishCards"></div>
    </div>
    <div class="flash" id="flashFish"></div>
    <div class="guide-hand" id="guideFish">👆</div>
  </div>

  <!-- COUNTDOWN (shown inside win overlay area) -->
  <div class="next-countdown" id="nextCountdown">
    <div class="countdown-bar">
      <div class="countdown-fill" id="countdownFill"></div>

    </div>

  <!-- WIN OVERLAY -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <div class="win-rays"><svg class="rays" viewBox="0 0 200 200" fill="none"><g transform="translate(100,100)"><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(30)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(60)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(90)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(120)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(150)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(180)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(210)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(240)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(270)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(300)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(330)"/></g></svg></div>
      <img class="win-unified-mascot" src="../mascot.png" alt="موسى">
      <div class="win-title">أحسنت! 🎉</div>
      <div class="win-stars"><span>⭐</span><span>⭐</span><span>⭐</span></div>
      <div class="win-score-row"><span class="win-score-label">النقاط</span><span class="win-score-val" id="winScoreVal">٠</span></div>
      <div class="win-btns">
        <button class="btn-win btn-win-next" onclick="mlHandleWinNext()">التالي ›</button>
        <button class="btn-win btn-win-repeat" onclick="mlHandleWinRestart()">إعادة 🔄</button>
      </div>
    </div>
  </div>

  <div class="flash" id="flashMain"></div>
  <div id="confettiCont"></div>
</div>

<script>
/* ── HELPERS ── */
const toAr = n => String(n).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[+d]);
const mlEl  = id => document.getElementById(id);

/* ── SOUND ── */
const mlSnd = (()=>{
  let ctx = null;
  const init = () => { if(!ctx) ctx = new(window.AudioContext||window.webkitAudioContext)(); };
  const tone = (f,t,d,v=.28) => {
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(v,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d);
    o.start(); o.stop(ctx.currentTime+d);
  };
  return {
    correct(){ init(); tone(523,'triangle',.16,.3); setTimeout(()=>tone(659,'triangle',.2,.26),110); },
    wrong()  { init(); tone(220,'sawtooth',.14,.2); setTimeout(()=>tone(160,'sawtooth',.1,.15),65); },
    win()    { init(); [523,659,784,1047].forEach((f,i)=>setTimeout(()=>tone(f,'triangle',.22,.26),i*85)); }
  };
})();

/* ── STATE ── */
let mlScore = 0, mlStepIdx = 0;
let mlDragPlaced = {}, mlDragTotal = 0;
let mlFishAnswered = false;
let mlGhost = null, mlDragEl = null;
let _cdTimer = null;

/* ── GAME DATA ── */
const ML_STEPS = [
  {
    type: 'drag',
    q: {
      question: 'أين الموز؟ ضع كلّ قرد في صندوقه 🐒🍌',
      titleAbove: 'الموز فوق',
      titleBelow: 'الموز تحت',
      items: [
        {top:'🍌', bot:'🐒', ans:'above'},
        {top:'🍌', bot:'🐒', ans:'above'},
        {top:'🍌', bot:'🐒', ans:'above'},
        {top:'🐒', bot:'🍌', ans:'below'},
        {top:'🐒', bot:'🍌', ans:'below'},
        {top:'🐒', bot:'🍌', ans:'below'},
      ]
    }
  },
  {
    type: 'fish',
    q: {
      question: 'أيّ سمكة فوق النبتة؟ ⬆️🌿',
      chip: 'اُنظر إلى الصورة',
      cards: [
        {emoji:'🐠', lbl:'السمكة البرتقالية', correct:true},
        {emoji:'🐟', lbl:'السمكة الصفراء',    correct:false},
      ]
    }
  },
  {
    type: 'fish',
    q: {
      question: 'أيّ سمكة تحت النبتة؟ ⬇️🌿',
      chip: 'اُنظر إلى الصورة',
      cards: [
        {emoji:'🐠', lbl:'السمكة البرتقالية', correct:false},
        {emoji:'🐟', lbl:'السمكة الصفراء',    correct:true},
      ]
    }
  },
];
const ML_TOTAL = ML_STEPS.length;

/* ── LESSON NAV BUTTONS ── */
(function(){
  const lessons = [
    'moosa-chp 3-lesson 1.html',
    'moosa-chp 3-lesson 2.html',
    'moosa-chp 3-lesson 3.html',
    'moosa-chp 3-lesson 4.html',
    'moosa-chp 3-lesson 5.html',
    'moosa-chp 3-lesson 6.html',
  ];
  const cur = decodeURIComponent(window.location.pathname.split('/').pop());
  const curIdx = lessons.indexOf(cur);
  const bar = mlEl('topBar');
  for(let i=0; i<lessons.length; i++){
    (function(lf, li){
      const b = document.createElement('button');
      b.className = 'lsn-btn' + (li===curIdx?' active':li<curIdx?' done':'');
      b.textContent = '٠١٢٣٤٥٦٧٨٩'[li + 1];
      b.addEventListener('click', function(){
        if(window.parent && window.parent !== window){
          window.parent.postMessage({action:'navigateLesson', file:lf}, '*');
        } else {
          window.location.href = lf;
        }
      });
      bar.appendChild(b);
    })(lessons[i], i);
  }
})();

/* ── PROGRESS DOTS ── */
function mlRenderDots(){
  const w = mlEl('mlDots'); w.innerHTML = '';
  ML_STEPS.forEach((_,i)=>{
    const d = document.createElement('div');
    d.className = 'ml-dot' + (i===mlStepIdx?' active':i<mlStepIdx?' done':'');
    w.appendChild(d);
  });
}

/* ── FLASH ── */
function mlFlash(type, id){
  const f = mlEl(id);
  f.className = 'flash ' + type;
  f.offsetWidth;
  f.classList.add('show');
  setTimeout(()=>f.classList.remove('show'), 620);
}

/* ── SCORE ── */
function mlAddScore(n){ mlScore += n; }

/* ── SCREEN SWITCH ── */
function mlGoScreen(id){
  ['scr-drag','scr-fish'].forEach(s=>mlEl(s).classList.toggle('hidden', s!==id));
  clearInterval(_cdTimer); _cdTimer = null;
  mlEl('nextCountdown').style.display = 'none';
}

/* ── GUIDE HAND ── */
function mlPlaceGuide(gid, target, wrapId, anim){
  const g=mlEl(gid), wrap=mlEl(wrapId);
  if(!g||!target||!wrap) return;
  const tr=target.getBoundingClientRect(), wr=wrap.getBoundingClientRect();
  g.style.left = (tr.left-wr.left+tr.width/2-20)+'px';
  g.style.top  = (tr.top-wr.top+tr.height/2-20)+'px';
  g.style.animation = 'none'; g.style.opacity = '0'; g.offsetWidth;
  g.style.animation = anim;
}
function mlDismissGuide(id){ const g=mlEl(id); if(g){g.style.animation='none';g.style.opacity='0';} }

/* ── STEP FLOW ── */
function mlNextStep(){
  mlStepIdx++;
  if(mlStepIdx >= ML_TOTAL){ mlShowWin(); return; }
  mlRenderStep();
}
function mlRenderStep(){
  mlRenderDots();
  const s = ML_STEPS[mlStepIdx];
  if(s.type === 'drag') mlRenderDrag(s.q);
  else                  mlRenderFish(s.q);
}

/* ════════════════
   DRAG-DROP
════════════════ */
function mlRenderDrag(q){
  mlDragPlaced = {}; mlDragTotal = q.items.length;
  mlGoScreen('scr-drag');
  mlEl('dragQ').textContent = q.question;
  mlEl('titleAbove').textContent = q.titleAbove;
  mlEl('titleBelow').textContent = q.titleBelow;

  ['itemsAbove','itemsBelow'].forEach((id,i)=>{
    const bi = mlEl(id);
    bi.innerHTML = '<div class="placeholder">'+(i===0?'⬆︎':'⬇︎')+'</div>';
    bi.className = 'box-items';
  });

  const tray = mlEl('mlTray'); tray.innerHTML = '';
  q.items
    .map((it,i) => ({...it, _uid:i}))
    .sort(()=>Math.random()-.5)
    .forEach((item,i)=>{
      const div = document.createElement('div');
      div.className = 'item' + (i===0?' glow':'');
      div.dataset.id  = 'it_' + item._uid;
      div.dataset.ans = item.ans;
      div.style.animationDelay = (0.07+i*0.05)+'s';

      const top = document.createElement('span');
      top.className = 'item-emoji-top'; top.textContent = item.top;
      const bot = document.createElement('span');
      bot.className = 'item-emoji-bot'; bot.textContent = item.bot;
      div.appendChild(top); div.appendChild(bot);

      div.addEventListener('pointerdown', mlStartDrag, {passive:false});
      tray.appendChild(div);
    });

  setTimeout(()=>{
    const g = mlEl('guideDrag');
    const firstItem = tray.querySelector('.item');
    if(!g || !firstItem) return;
    const wrap = mlEl('scr-drag');
    const wrapR = wrap.getBoundingClientRect();
    const itemR = firstItem.getBoundingClientRect();
    g.style.left = (itemR.left - wrapR.left + itemR.width/2 - 20)+'px';
    g.style.top  = (itemR.top  - wrapR.top  + itemR.height/2 - 20)+'px';
    const targetBox = mlEl(firstItem.dataset.ans === 'above' ? 'boxAbove' : 'boxBelow');
    const boxR = targetBox.getBoundingClientRect();
    const dx = (boxR.left + boxR.width/2) - (itemR.left + itemR.width/2);
    const dy = (boxR.top  + boxR.height/2) - (itemR.top  + itemR.height/2);
    g.style.setProperty('--gdx', dx+'px');
    g.style.setProperty('--gdy', dy+'px');
    g.style.animation = 'none'; g.style.opacity = '0'; g.offsetWidth;
    g.style.animation = 'ml-guideDrag 3.2s ease-in-out infinite';
  }, 400);
}

function mlStartDrag(e){
  e.preventDefault();
  mlDismissGuide('guideDrag');
  mlDragEl = e.currentTarget;
  mlDragEl.classList.add('dragging'); mlDragEl.classList.remove('glow');
  mlDragEl.setPointerCapture(e.pointerId);

  mlGhost = document.createElement('div'); mlGhost.className = 'ml-ghost';
  mlDragEl.querySelectorAll('span').forEach(s=>{ const c=s.cloneNode(true); mlGhost.appendChild(c); });
  document.body.appendChild(mlGhost);
  mlMoveGhost(e.clientX, e.clientY);

  mlDragEl.addEventListener('pointermove', mlOnMove);
  mlDragEl.addEventListener('pointerup',   mlOnUp);
  mlDragEl.addEventListener('pointercancel', mlOnUp);
}
function mlMoveGhost(x,y){ if(mlGhost){ mlGhost.style.left=x+'px'; mlGhost.style.top=y+'px'; } }
function mlOnMove(e){
  e.preventDefault(); mlMoveGhost(e.clientX, e.clientY);
  ['boxAbove','boxBelow'].forEach(id=>{ mlEl(id).classList.toggle('over', mlIsOver(e, mlEl(id))); });
}
function mlOnUp(e){
  if(!mlDragEl) return;
  ['boxAbove','boxBelow'].forEach(id=>mlEl(id).classList.remove('over'));
  let zone = null;
  if(mlIsOver(e, mlEl('boxAbove'))) zone = 'above';
  else if(mlIsOver(e, mlEl('boxBelow'))) zone = 'below';
  if(zone) mlHandleDrop(mlDragEl, zone);
  else { /* released off-target: gentle nudge instead of silent disappear */
    var _m=mlDragEl; _m.classList.remove('shake'); void _m.offsetWidth; _m.classList.add('shake');
    setTimeout(function(){ if(_m) _m.classList.remove('shake'); }, 420);
  }
  mlDragEl.classList.remove('dragging');
  mlDragEl.removeEventListener('pointermove', mlOnMove);
  mlDragEl.removeEventListener('pointerup',   mlOnUp);
  mlDragEl.removeEventListener('pointercancel', mlOnUp);
  mlDragEl = null;
  if(mlGhost){ mlGhost.remove(); mlGhost = null; }
}
function mlIsOver(e, box){
  const r = box.getBoundingClientRect();
  return e.clientX>r.left && e.clientX<r.right && e.clientY>r.top && e.clientY<r.bottom;
}
function mlHandleDrop(item, zone){
  const id = item.dataset.id;
  if(mlDragPlaced[id] !== undefined) return;
  const correct = item.dataset.ans === zone;
  if(correct){
    mlDragPlaced[id] = true;
    mlSnd.correct(); mlFlash('ok','flashDrag');
    const box   = mlEl(zone==='above'?'boxAbove':'boxBelow');
    const items = mlEl(zone==='above'?'itemsAbove':'itemsBelow');
    box.classList.add('pulse-ok'); setTimeout(()=>box.classList.remove('pulse-ok'), 450);
    const placed = document.createElement('div'); placed.className = 'item-placed';
    item.querySelectorAll('span').forEach(s=>{ const c=s.cloneNode(true); placed.appendChild(c); });
    items.appendChild(placed); items.classList.add('has-item');
    item.remove(); mlAddScore(10);
    if(Object.keys(mlDragPlaced).length >= mlDragTotal) mlRunCountdown(mlNextStep);
  } else {
    mlSnd.wrong(); mlFlash('bad','flashDrag');
    const box = mlEl(zone==='above'?'boxAbove':'boxBelow');
    box.classList.add('shake'); setTimeout(()=>box.classList.remove('shake'), 420);
  }
}

/* ════════════════
   FISH TAP
════════════════ */
function mlRenderFish(q){
  mlFishAnswered = false;
  mlGoScreen('scr-fish');
  mlEl('fishQ').textContent = q.question;
  mlEl('fishChip').textContent = q.chip || '';

  const cards = mlEl('fishCards'); cards.innerHTML = '';
  q.cards.forEach((c,i)=>{
    const div = document.createElement('div');
    div.className = 'fish-card';
    div.style.animationDelay = (i*0.08)+'s';

    const em = document.createElement('div'); em.className = 'fc-emoji';
    em.textContent = c.emoji; em.style.animationDelay = (i*0.4)+'s';
    div.appendChild(em);

    const lbl = document.createElement('div'); lbl.className = 'fc-lbl';
    lbl.textContent = c.lbl; div.appendChild(lbl);

    const badge = document.createElement('div'); badge.className = 'result-badge';
    div.appendChild(badge);

    const NS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(NS,'svg');
    svg.setAttribute('class','circle-svg'); svg.setAttribute('viewBox','0 0 100 100');
    svg.setAttribute('preserveAspectRatio','none');
    const ell = document.createElementNS(NS,'ellipse');
    ell.setAttribute('class','circle-ring');
    ell.setAttribute('cx','50'); ell.setAttribute('cy','50');
    ell.setAttribute('rx','43'); ell.setAttribute('ry','44');
    svg.appendChild(ell); div.appendChild(svg);

    div.onclick = ()=>mlTapFish(div, c, badge, ell);
    cards.appendChild(div);
  });

  setTimeout(()=>{
    const correctCard = Array.from(mlEl('fishCards').querySelectorAll('.fish-card'))
      .find(function(el,i){ return q.cards[i] && q.cards[i].correct; });
    if(correctCard) mlPlaceGuide('guideFish', correctCard, 'scr-fish',
      'ml-guideTap 2s ease-in-out infinite');
  }, 340);
}

function mlTapFish(div, card, badge, ell){
  if(mlFishAnswered) return;
  mlDismissGuide('guideFish');
  if(card.correct){
    mlFishAnswered = true;
    div.classList.add('correct'); badge.textContent = '✓';
    ell.classList.add('draw');
    mlSnd.correct(); mlFlash('ok','flashFish'); mlAddScore(10);
    setTimeout(()=>mlRunCountdown(mlNextStep), 750);
  } else {
    div.classList.add('wrong'); badge.textContent = '✕';
    mlSnd.wrong(); mlFlash('bad','flashFish');
    setTimeout(()=>{ div.classList.remove('wrong'); badge.textContent = ''; }, 600);
  }
}

/* ════════════════
   COUNTDOWN (shared for step transitions)
════════════════ */
function mlRunCountdown(onDone){
  clearInterval(_cdTimer); _cdTimer = null;
  const wrap = mlEl('nextCountdown');
  const fill = mlEl('countdownFill');
  const txt  = mlEl('countdownTxt');
  if(!wrap) return;
  let secs = 3;
  wrap.style.display = 'block';
  fill.style.animation = 'none'; void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 3s linear forwards';
  txt.textContent = toAr(secs);
  _cdTimer = setInterval(function(){
    secs--;
    if(txt) txt.textContent = toAr(Math.max(0, secs));
    if(secs <= 0){
      clearInterval(_cdTimer); _cdTimer = null;
      wrap.style.display = 'none';
      onDone();
    }
  }, 1000);
}

/* ════════════════
   WIN
════════════════ */
function mlShowWin(){
  mlSnd.win();
  mlEl('winScoreVal').textContent = toAr(mlScore);
  mlEl('winOverlay').classList.add('show');
  mlSpawnConfetti();
}
function mlHandleWinNext(){
  clearInterval(_cdTimer); _cdTimer = null;
  if(window.parent && window.parent !== window){
    window.parent.postMessage({action:'nextLesson'}, '*');
  }
}
function mlHandleWinRestart(){
  clearInterval(_cdTimer); _cdTimer = null;
  mlEl('winOverlay').classList.remove('show');
  mlEl('confettiCont').innerHTML = '';
  mlScore = 0; mlStepIdx = 0;
  mlRenderStep();
}
function mlSpawnConfetti(){
  const c = mlEl('confettiCont'); c.innerHTML = '';
  const cols = ['#3A3A3A','#86EFAC','#FCA5A5','#93C5FD','#F9A8D4','#6EE7B7','#fff'];
  for(let i=0; i<55; i++){
    const el = document.createElement('div'); el.className = 'ml-confetti';
    const sz = 6+Math.random()*7;
    const col = cols[Math.floor(Math.random()*cols.length)];
    el.style.cssText = [
      'width:'+sz+'px','height:'+sz+'px','background:'+col,
      'border-radius:'+(Math.random()>.5?'50%':'2px'),
      'position:absolute','left:'+(Math.random()*100)+'%','top:-20px',
      'animation:ml-confettiFall '+(1.4+Math.random()*2)+'s ease-in '+(Math.random()*1.2)+'s forwards'
    ].join(';');
    c.appendChild(el);
  }
}

/* ── START ── */
mlRenderStep();
</script>
<style>
/* ── question progress dots ── */
.ml-widget .progress-dots,#ml-dots,#mlDots,.round-row{display:flex!important;flex-shrink:0;justify-content:center;align-items:center;gap:7px;padding:6px 0 2px;}
.ml-widget .qdot{display:inline-block;width:9px;height:9px;border-radius:50%;background:rgba(61,38,16,.18);transition:all .3s;pointer-events:none;flex-shrink:0;}
.ml-widget .qdot.active{background:var(--amber,#1F1F1F);transform:scale(1.4);}
.ml-widget .qdot.done{background:var(--green,#22C55E);}
</style>
<script>
(function(){
  var c=document.getElementById('ml-dots')||document.getElementById('mlDots')||document.getElementById('roundRow');
  if(!c){
    var tb=document.querySelector('.ml-widget .top-bar');
    if(!tb)return;
    c=document.createElement('div');c.className='progress-dots';c.id='mlDots';
    tb.insertAdjacentElement('afterend',c);
  }
  function getIdx(){try{if(typeof qIndex!=='undefined')return qIndex;}catch(e){}try{if(typeof stepIndex!=='undefined')return stepIndex;}catch(e){}try{if(typeof stepIdx!=='undefined')return stepIdx;}catch(e){}try{if(typeof mlStepIdx!=='undefined')return mlStepIdx;}catch(e){}return 0;}
  function getTotal(){try{if(typeof QUESTIONS!=='undefined'&&QUESTIONS.length)return QUESTIONS.length;}catch(e){}try{if(typeof STEPS!=='undefined'&&STEPS.length)return STEPS.length;}catch(e){}try{if(typeof ML_STEPS!=='undefined'&&ML_STEPS.length)return ML_STEPS.length;}catch(e){}try{if(typeof ML_TOTAL==='number')return ML_TOTAL;}catch(e){}return 0;}
  var _busy=false;
  var obs=new MutationObserver(function(){if(!_busy)render();});
  function render(){
    if(_busy)return;
    var total=getTotal();if(!total)return;
    var idx=getIdx(),key=idx+'/'+total;
    if(c._qk===key)return;
    c._qk=key;_busy=true;obs.disconnect();
    c.innerHTML='';
    for(var i=0;i<total;i++){var d=document.createElement('span');d.className='qdot'+(i===idx?' active':i<idx?' done':'');c.appendChild(d);}
    _busy=false;obs.observe(c,{childList:true});
  }
  if(typeof renderDots!=='undefined'){
    window.renderDots=function(){
      var sv=document.getElementById('ml-scoreVal')||document.getElementById('mlScoreVal');
      if(sv){try{var sc=typeof score!=='undefined'?score:typeof mlScore!=='undefined'?mlScore:null;if(sc!==null)sv.textContent=String(sc).replace(/[0-9]/g,function(d){return'٠١٢٣٤٥٦٧٨٩'[+d];});}catch(e){}}
      render();
    };
  }
  obs.observe(c,{childList:true});
  setInterval(render,500);render();
})();
</script>

<style>
/* == canonical win screen == */
.win-overlay{position:absolute;inset:0;z-index:100;display:none;align-items:center;justify-content:center;padding:24px;background:rgba(15,8,0,.82)!important;backdrop-filter:blur(8px)!important;-webkit-backdrop-filter:blur(8px)!important;}
.win-overlay.show{display:flex!important;animation:ml-fadeIn .35s ease;}

<script>
/* == lesson progress nav == */
(function(){
  var fn=decodeURIComponent((location.pathname.split('/').pop()||'').split('?')[0]);
  var ch=null,idx=0,total=0,nextFile=null,m;
  var LP_HERE='moosa-lessons.html';
  var LP_OTHER='../Interactive book for elementary school chapter 1/moosa-lessons.html';
  var LP=LP_HERE;
  if((m=fn.match(/^moosa-lesson-classify (\d+)\.html$/))){ch='ch1';idx=+m[1]-1;total=5;nextFile='moosa-lesson-classify '+(+m[1]+1)+'.html';}
  else if((m=fn.match(/^moosa-chp 2-lesson (\d+)\.html$/))){ch='ch2';idx=+m[1]-1;total=6;nextFile='moosa-chp 2-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 3-lesson (\d+)\.html$/))){ch='ch3';idx=+m[1]-1;total=6;nextFile='moosa-chp 3-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 4-lesson (\d+)\.html$/))){ch='ch4';idx=+m[1]-1;total=3;nextFile='moosa-chp 4-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  if(!ch)return;
  var isLast=idx>=total-1;
  function saveDone(){try{var k='moosa_'+ch,p=JSON.parse(localStorage.getItem(k)||'[]');if(p.indexOf(idx)===-1){p.push(idx);localStorage.setItem(k,JSON.stringify(p));}}catch(e){}}
  var ov=document.querySelector('.win-overlay');
  if(ov){
    try{new MutationObserver(function(){if(ov.classList.contains('show'))saveDone();}).observe(ov,{attributes:true,attributeFilter:['class']});}catch(e){}
    if(ov.classList.contains('show'))saveDone();
  }
  window.mlHandleWinNext=function(){
    saveDone();
    if(window.parent&&window.parent!==window){window.parent.postMessage({action:'nextLesson'},'*');return;}
    location.href=isLast?LP:nextFile;
  };
})();
</script>

<script id="ch-parity-reorg">
(function(){
  function toAr(n){return String(n).replace(/[0-9]/g,function(d){return'٠١٢٣٤٥٦٧٨٩'[+d];});}
  function getScore(){try{if(typeof score!=='undefined'&&score!=null)return score;}catch(e){}try{if(typeof mlScore!=='undefined'&&mlScore!=null)return mlScore;}catch(e){}return null;}
  function reorg(){
    var bar=document.querySelector('.ml-widget .top-bar')||document.querySelector('.app .top-bar')||document.querySelector('.top-bar');
    if(!bar||bar._reorg)return false;
    var navs=[].slice.call(bar.querySelectorAll('.lsn-btn'));
    var dots=document.getElementById('ml-dots')||document.getElementById('mlDots')||document.getElementById('roundRow');
    if(!navs.length||!dots)return false;
    var sl=bar.querySelector('.score-label'), sv=bar.querySelector('.score-val');
    if(!sv){ sv=document.createElement('span'); sv.className='score-val'; sv.id='mlScoreVal'; var s0=getScore(); sv.textContent=toAr(s0==null?0:s0); }
    bar._reorg=true;
    var top=document.createElement('div'); top.className='tb-top';
    navs.forEach(function(b){ top.appendChild(b); });
    var bot=document.createElement('div'); bot.className='tb-bot';
    var sc=document.createElement('div'); sc.className='tb-score';
    if(sl) sc.appendChild(sl); sc.appendChild(sv);
    bot.appendChild(sc); bot.appendChild(dots);
    bar.innerHTML=''; bar.appendChild(top); bar.appendChild(bot);
    setInterval(function(){var s=getScore(); if(s!=null) sv.textContent=toAr(s);},300);
    return true;
  }
  var n=0, iv=setInterval(function(){ n++; if(reorg()||n>60){clearInterval(iv);} },80);
})();
</script>

<style>@keyframes mlHintPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}</style>
<script>
/* Kid-UX: tap-to-continue + tap-to-hear + gentle wrong tone */
(function(){
  if(window.__mlKidUX__) return; window.__mlKidUX__=1;

  /* shared soft audio context */
  var _ac=null;
  function ac(){ try{ if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)(); if(_ac.state==='suspended')_ac.resume(); }catch(e){} return _ac; }

  /* ---- #6 gentle "try again" tone (replaces the harsh buzzer) ---- */
  function gentleWrong(){
    try{ var c=ac(); if(!c)return; var t=c.currentTime;
      [[392,0,.16],[294,.12,.22]].forEach(function(a){
        var o=c.createOscillator(), g=c.createGain();
        o.type='sine'; o.frequency.value=a[0];
        g.gain.setValueAtTime(0,t+a[1]);
        g.gain.linearRampToValueAtTime(.11,t+a[1]+.02);
        g.gain.exponentialRampToValueAtTime(.0001,t+a[1]+a[2]);
        o.connect(g); g.connect(c.destination);
        o.start(t+a[1]); o.stop(t+a[1]+a[2]+.03);
      });
    }catch(e){}
  }
  function applyGentleWrong(){
    try{ if(typeof mlAudio!=='undefined'&&mlAudio&&mlAudio.wrong) mlAudio.wrong=gentleWrong; }catch(e){}
    try{ if(typeof mlSnd!=='undefined'&&mlSnd&&mlSnd.wrong) mlSnd.wrong=gentleWrong; }catch(e){}
    try{ if(typeof AC!=='undefined'&&AC&&AC.buzz) AC.buzz=gentleWrong; }catch(e){}
  }
  for(var d=0; d<=2000; d+=300) setTimeout(applyGentleWrong, d);

  /* ---- #2 tap-to-continue (replaces forced 3s auto-advance) ---- */
  function canAdvance(){
    try{ if(typeof mlNextStep==='function')return 1; }catch(e){}
    try{ if(typeof mlNextQuestion==='function')return 1; }catch(e){}
    try{ if(typeof mlNext==='function')return 1; }catch(e){}
    try{ if(typeof mlNextQ==='function')return 1; }catch(e){}
    try{ if(typeof goNext==='function')return 1; }catch(e){}
    try{ if(typeof window.advance==='function')return 1; }catch(e){}
    return 0;
  }
  function advance(){
    try{ if(typeof mlNextStep==='function'){mlNextStep();return;} }catch(e){}
    try{ if(typeof mlNextQuestion==='function'){mlNextQuestion();return;} }catch(e){}
    try{ if(typeof mlNext==='function'){mlNext();return;} }catch(e){}
    try{ if(typeof mlNextQ==='function'){mlNextQ();return;} }catch(e){}
    try{ if(typeof goNext==='function'){goNext();return;} }catch(e){}
    try{ if(typeof window.advance==='function'){window.advance();return;} }catch(e){}
  }
  function clearLessonTimers(){
    try{ clearInterval(mlCountdownTimer); }catch(e){}
    try{ clearInterval(mlCdTimer); }catch(e){}
    try{ clearInterval(_cdTimer); }catch(e){}
  }
  var HOLD=5000, lastReRun=0;
  document.addEventListener('animationstart', function(e){
    if(!e || e.animationName!=='mlCountdownShrink') return;
    if(Date.now()-lastReRun < 250) return;     /* swallow only our own re-run; every real round is processed */
    var fill=e.target; if(!fill) return;
    var bar=(fill.closest&&fill.closest('.countdown-bar'))||fill.parentElement;
    if(!bar) return;
    if(!canAdvance()) return;                   /* safety: never take over if we can't advance */
    clearLessonTimers();                         /* stop the lesson's quick auto-advance */
    lastReRun=Date.now();
    try{ fill.style.animation='none'; void fill.offsetWidth; fill.style.animation='mlCountdownShrink '+(HOLD/1000)+'s linear forwards'; }catch(e){}
    var txt=bar.querySelector('.countdown-txt');
    if(txt){ txt.textContent='التالي ›'; txt.style.fontSize='20px'; txt.style.fontWeight='800'; }
    bar.style.cursor='pointer';
    try{ bar.setAttribute('role','button'); bar.setAttribute('aria-label','التالي'); }catch(e){}
    var gone=false, ft=null;
    function go(){ if(gone)return; gone=true; try{ if(ft)clearTimeout(ft); }catch(e){} if(bar.__goH){ bar.removeEventListener('click', bar.__goH); bar.__goH=null; } advance(); }
    if(bar.__goH) bar.removeEventListener('click', bar.__goH);
    bar.__goH=go; bar.addEventListener('click', go);
    ft=setTimeout(go, HOLD);                     /* gentle fallback — slower than the old 3s, never a dead-end */
  }, true);

  /* ---- #3 "tap to hear" hint if the prompt audio did not autoplay ---- */
  window.addEventListener('load', function(){
    var heard=false, hint=null;
    function rm(){ if(hint&&hint.parentNode){ hint.parentNode.removeChild(hint); hint=null; } }
    document.addEventListener('play', function(){ heard=true; rm(); }, true);
    document.addEventListener('pointerdown', function(){ heard=true; rm(); }, {once:true,passive:true});
    setTimeout(function(){
      if(heard||hint) return;
      hint=document.createElement('div');
      hint.textContent='اسمع 🔊';
      hint.style.cssText='position:absolute;bottom:74px;right:14px;z-index:10000;background:#1F1F1F;color:#fff;font-family:"Baloo Bhaijaan 2","Tajawal",sans-serif;font-weight:800;font-size:14px;padding:7px 13px;border-radius:999px;box-shadow:0 4px 12px rgba(0,0,0,.3);animation:mlHintPulse 1s ease-in-out infinite;pointer-events:none;';
      (document.querySelector('.ml-widget')||document.body).appendChild(hint);
    }, 2200);
    setTimeout(rm, 9000);
  });
})();
</script>

<!-- Tap-to-place (monkey-sort: reuses mlHandleDrop) -->
<style>
.item.tap-selected{outline:4px solid #f59e0b;outline-offset:3px;box-shadow:0 0 0 6px rgba(245,158,11,.28),0 6px 16px rgba(0,0,0,.3)!important;transform:scale(1.06)!important;z-index:5;}
#boxAbove.tap-armed,#boxBelow.tap-armed{animation:mlArmPulse 1.1s ease-in-out infinite;}
@keyframes mlArmPulse{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}50%{box-shadow:0 0 0 6px rgba(34,197,94,.32)}}
</style>
<script>
(function(){
  if(window.__mlTapCh3L1__)return; window.__mlTapCh3L1__=1;
  var SLOP=16, sel=null, sx=0, sy=0, downItem=null, downOnItem=false, moved=0;
  function boxes(){ return [].slice.call(document.querySelectorAll('#boxAbove,#boxBelow')); }
  function clearSel(){ if(sel) sel.classList.remove('tap-selected'); sel=null; boxes().forEach(function(b){ b.classList.remove('tap-armed'); }); }
  function pick(it){ clearSel(); sel=it; it.classList.add('tap-selected'); boxes().forEach(function(b){ b.classList.add('tap-armed'); }); }
  function itemAt(t){ var it=t&&t.closest?t.closest('.item'):null; return (it&&it.dataset&&it.dataset.ans)?it:null; }
  function boxAt(x,y){ var n=document.elementFromPoint(x,y); return n&&n.closest?n.closest('#boxAbove,#boxBelow'):null; }
  function place(item, box){ try{ if(typeof mlHandleDrop==='function') mlHandleDrop(item, box.dataset.box); }catch(e){} }
  document.addEventListener('pointerdown', function(e){
    var it=itemAt(e.target); downItem=it; downOnItem=!!it; sx=e.clientX; sy=e.clientY; moved=0;
  }, true);
  document.addEventListener('pointermove', function(e){
    moved=Math.max(moved, Math.hypot(e.clientX-sx, e.clientY-sy));
    if(downOnItem && moved>=SLOP && sel) clearSel();
  }, true);
  document.addEventListener('pointerup', function(e){
    var it=downItem, wasItem=downOnItem; downItem=null; downOnItem=false;
    var overBox=boxAt(e.clientX,e.clientY);
    if(wasItem && it && document.contains(it)){
      if(moved<SLOP && !overBox){ var t=it; setTimeout(function(){ if(!document.contains(t))return; if(sel===t) clearSel(); else pick(t); },0); }
      return;
    }
    if(overBox && sel && document.contains(sel)){ var item=sel; clearSel(); place(item, overBox); }
  }, true);
  document.addEventListener('click', function(e){
    if(sel && !document.contains(sel)) clearSel();
    var box=e.target&&e.target.closest?e.target.closest('#boxAbove,#boxBelow'):null;
    if(!box || !sel) return;
    var item=sel; clearSel(); place(item, box);
  });
})();
</script>
