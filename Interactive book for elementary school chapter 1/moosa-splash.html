<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>
/* Single narration channel: starting any spoken clip stops the previous one (prevents audio overlap). Tap/win blips use WebAudio and are unaffected. */
(function(){
  if(window.__mlAudioBus__)return; window.__mlAudioBus__=1;
  var cur=null;
  try{
    var P=window.HTMLAudioElement&&HTMLAudioElement.prototype;
    if(P&&P.play){
      var op=P.play;
      P.play=function(){
        if(cur&&cur!==this){try{cur.pause();}catch(e){}try{cur.currentTime=0;}catch(e){}}
        cur=this;
        try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
        return op.apply(this,arguments);
      };
    }
  }catch(e){}
  try{
    var ss=window.speechSynthesis;
    if(ss&&ss.speak){
      var osp=ss.speak;
      ss.speak=function(u){if(cur){try{cur.pause();}catch(e){}}try{return osp.call(ss,u);}catch(e){}};
    }
  }catch(e){}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى التعليمي — شاشة البداية</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --green:        #22C55E;
  --green-dark:   #16A34A;
  --green-shadow: #15803D;
  --amber:        #1F1F1F;
  --font-d: 'Baloo Bhaijaan 2','Tajawal',sans-serif;
  --font-b: 'Tajawal',sans-serif;
  --ease-b: cubic-bezier(.34,1.56,.64,1);
  --ease-s: cubic-bezier(.25,.46,.45,.94);
  --radius: 20px;
}

html,body{width:100%;height:100%;overflow:hidden}
body{
  background:#BFE6FF;
  font-family:var(--font-b);
  display:flex;align-items:center;justify-content:center;
}

/* phone shell */
.phone{
  position:relative;z-index:2;
  width:100%;max-width:560px;margin:0 auto;
  height:100vh;height:100dvh;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding-bottom:max(96px,calc(env(safe-area-inset-bottom,24px) + 72px));
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,0,0,.12),0 24px 64px rgba(0,0,0,.12);
}

/* full-screen background image */
.bg-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;object-position:center top;z-index:0;
  pointer-events:none;user-select:none;
}

/* button group */
.btns{
  position:relative;z-index:3;width:calc(100% - 48px);
  display:flex;flex-direction:column;
  animation:slideUp .55s var(--ease-b) .2s both;
}

/* shared button base */
.btn{
  width:100%;padding:18px 24px;
  border:4px solid rgba(255,255,255,.95);
  border-radius:var(--radius);
  font-family:var(--font-d);font-size:32px;font-weight:800;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  position:relative;letter-spacing:.3px;
  -webkit-tap-highlight-color:transparent;user-select:none;
  transition:transform 150ms var(--ease-b),box-shadow 150ms var(--ease-s),filter 150ms;
  overflow:hidden;
  outline:none;
  min-height:64px;
}
.btn::before{
  content:'';position:absolute;top:5px;inset-inline:16px;height:7px;
  border-radius:8px;background:rgba(255,255,255,.38);pointer-events:none;
}
.btn:active{transform:scale(.97) translateY(3px);filter:brightness(.97);}
.btn:focus-visible{outline:3px solid var(--amber);outline-offset:2px;}

/* primary — white */
.btn-primary{
  background:linear-gradient(135deg,#FFFFFF 0%,#FFFFFF 50%,#F1F1F1 100%);
  color:var(--green-dark);text-shadow:none;
  border-color:var(--green);
  box-shadow:0 4px 14px rgba(0,0,0,.15);
}
.btn-primary:hover{filter:brightness(1.02);}
.btn-primary:active{box-shadow:0 2px 8px rgba(0,0,0,.12);}

.btn .btn-icon{flex-shrink:0;font-size:1.15em;line-height:1;}

/* confetti */
.confetti-bit{position:absolute;border-radius:2px;pointer-events:none;z-index:1;animation:confettiFall linear infinite;}
@keyframes confettiFall{0%{transform:translateY(-30px) rotate(0deg);opacity:.75}100%{transform:translateY(900px) rotate(750deg);opacity:0}}

@keyframes slideUp{0%{transform:translateY(44px);opacity:0}100%{transform:translateY(0);opacity:1}}

@media(max-height:700px){
  .btn{padding:13px 20px;font-size:20px;min-height:52px;}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

</style>
</head>
<body>
<div class="phone" id="phone">
  <img class="bg-img" src="../splash screen background.png" alt="الرياضيات — الصف الأول الابتدائي">
  <div class="btns">
    <button class="btn btn-primary" onclick="handleStart()">
      ابدأ اللعبة
    </button>
  </div>
</div>
<script>
(function(){
  const phone=document.getElementById('phone');
  const colors=['#F5C518','#FF6B6B','#5CB85C','#7C3AED','#E879C7','#41ABFD','#FF8C42'];
  for(let i=0;i<22;i++){
    const el=document.createElement('div');
    el.className='confetti-bit';
    const sz=5+Math.random()*7;
    const isCircle=Math.random()>.45;
    el.style.cssText=[
      'left:'+Math.random()*100+'%',
      'width:'+sz+'px',
      'height:'+(isCircle?sz:sz*1.6)+'px',
      'border-radius:'+(isCircle?'50%':'3px'),
      'background:'+colors[i%colors.length],
      'opacity:.7',
      'animation-duration:'+(3.5+Math.random()*3.5)+'s',
      'animation-delay:'+(Math.random()*1.2).toFixed(2)+'s',
    ].join(';');
    phone.appendChild(el);
  }
})();
var SPL_AUDIO='../audio/2b8e004e.mp3', _spa=null, _SAC=null;
function splSay(){ try{ if(_spa)_spa.pause(); _spa=new Audio(SPL_AUDIO); _spa.play().catch(function(){}); }catch(e){} }
function splPop(){ try{ _SAC=_SAC||new(window.AudioContext||window.webkitAudioContext)(); var a=_SAC,o=a.createOscillator(),g=a.createGain(); o.type='triangle'; o.frequency.setValueAtTime(523,a.currentTime); o.frequency.exponentialRampToValueAtTime(1047,a.currentTime+.14); g.gain.setValueAtTime(.2,a.currentTime); g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.2); o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.22);}catch(e){} }
document.addEventListener('pointerdown', splSay, {once:true, passive:true});
function handleStart(){ splPop(); setTimeout(function(){ window.location.href='moosa-lessons.html'; }, 160); }
</script>
</body>
</html>
