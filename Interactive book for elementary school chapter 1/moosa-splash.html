<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى التعليمي — شاشة البداية</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  --amber:        #F59E0B;
  --amber-light:  #FCD34D;
  --amber-dark:   #D97706;
  --amber-shadow: #B45309;
  --green:        #22C55E;
  --green-dark:   #16A34A;
  --green-shadow: #15803D;
  --bg-top:       #FEF3C7;
  --bg-bot:       #FDE68A;
  --card-bg:      #FFFEF9;
  --ink-dark:     #1C1917;
  --ink-soft:     #78716C;
  --font-d: 'Baloo Bhaijaan 2','Tajawal',sans-serif;
  --font-b: 'Tajawal',sans-serif;
  --ease-b: cubic-bezier(.34,1.56,.64,1);
  --ease-s: cubic-bezier(.25,.46,.45,.94);
  --radius: 20px;
}

html,body{width:100%;height:100%;overflow:hidden}
body{
  background:linear-gradient(160deg,var(--bg-top) 0%,var(--bg-bot) 100%);
  font-family:var(--font-b);
  display:flex;align-items:center;justify-content:center;
}

/* dot-grid texture */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,rgba(180,120,0,.07) 1px,transparent 1px);
  background-size:28px 28px;
}

/* floating sparkle bg */
.star-bg{position:absolute;inset:0;pointer-events:none;overflow:hidden;z-index:1;}
.star-bg span{position:absolute;font-size:20px;opacity:.32;animation:floatStar 6s ease-in-out infinite;}
.star-bg span:nth-child(1){top:7%;left:5%;animation-delay:0s}
.star-bg span:nth-child(2){top:14%;right:7%;animation-delay:1s;font-size:15px}
.star-bg span:nth-child(3){top:38%;left:3%;animation-delay:2s;font-size:13px}
.star-bg span:nth-child(4){top:63%;right:5%;animation-delay:.5s}
.star-bg span:nth-child(5){top:78%;left:9%;animation-delay:1.5s;font-size:12px}
.star-bg span:nth-child(6){top:22%;left:48%;animation-delay:3s;font-size:17px}
@keyframes floatStar{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(15deg)}}

/* phone shell */
.phone{
  position:relative;z-index:2;
  width:100%;max-width:480px;margin:0 auto;
  height:100vh;height:100dvh;
  background:var(--card-bg);
  display:flex;flex-direction:column;align-items:center;
  padding-bottom:max(24px,env(safe-area-inset-bottom,16px));
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(200,160,60,.12),0 24px 64px rgba(120,80,0,.12);
}

/* arch header */
.arch{
  position:absolute;top:0;left:0;width:100%;height:200px;
  background:linear-gradient(135deg,var(--amber-light) 0%,var(--amber) 50%,var(--amber-dark) 100%);
  border-radius:0 0 52% 52% / 0 0 40px 40px;
  z-index:0;
}
.arch::after{
  content:'';position:absolute;inset:0;
  border-radius:0 0 52% 52% / 0 0 40px 40px;
  background:linear-gradient(180deg,rgba(255,255,255,.18) 0%,transparent 60%);
}

/* top star row */
.top-stars{position:relative;z-index:3;width:100%;display:flex;justify-content:space-between;padding:20px 28px 0;}
.top-star{font-size:26px;animation:spinStar 5s linear infinite;display:inline-block;filter:drop-shadow(0 2px 4px rgba(0,0,0,.2));opacity:.85;}
.top-star:nth-child(2){animation-direction:reverse;font-size:19px;margin-top:8px;}
.top-star:nth-child(3){animation-delay:-2s;}
@keyframes spinStar{0%{transform:rotate(0deg) scale(1)}50%{transform:rotate(180deg) scale(1.12)}100%{transform:rotate(360deg) scale(1)}}

/* logo */
.logo-wrap{
  position:relative;z-index:3;margin-top:14px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  animation:slideDown .6s var(--ease-b) both;
}
.logo-img{
  width:160px;max-height:68px;height:auto;object-fit:contain;
  filter:brightness(0) invert(1) drop-shadow(0 2px 8px rgba(0,0,0,.15));
}
.logo-sub{
  font-family:var(--font-d);font-size:13px;font-weight:600;
  color:rgba(255,255,255,.85);text-align:center;
  text-shadow:0 1px 3px rgba(0,0,0,.2);
  letter-spacing:.3px;
}

/* mascot */
.mascots{position:relative;z-index:4;margin-top:6px;width:100%;display:flex;justify-content:center;align-items:flex-end;flex:1 1 0;min-height:0;overflow:hidden;}
.mascot-img{width:auto;max-width:300px;height:100%;max-height:320px;object-fit:contain;object-position:bottom center;
  animation:mascotFloat 3.6s ease-in-out infinite;
  filter:drop-shadow(0 12px 20px rgba(80,40,0,.3));}
@keyframes mascotFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

/* button group */
.btns{
  position:relative;z-index:3;width:calc(100% - 32px);
  display:flex;flex-direction:column;margin-top:16px;
  animation:slideUp .55s var(--ease-b) .2s both;
  background:rgba(255,255,255,.65);
  border:3px solid rgba(255,255,255,.9);
  border-radius:28px;padding:20px 18px 24px;
  box-shadow:inset 0 2px 0 rgba(255,255,255,.8),0 8px 24px rgba(180,130,40,.08);
  -webkit-backdrop-filter:blur(8px);
  backdrop-filter:blur(8px);
}

/* shared button base */
.btn{
  width:100%;padding:18px 24px;
  border:4px solid rgba(255,255,255,.9);
  border-radius:var(--radius);
  font-family:var(--font-d);font-size:24px;font-weight:800;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  position:relative;letter-spacing:.3px;
  -webkit-tap-highlight-color:transparent;user-select:none;
  transition:transform 150ms var(--ease-b),box-shadow 150ms var(--ease-s),filter 150ms;
  overflow:hidden;
  outline:none;
  min-height:64px;
}
.btn::before{
  content:'';position:absolute;top:5px;inset-inline:16px;height:7px;
  border-radius:8px;background:rgba(255,255,255,.38);pointer-events:none;
}
.btn:active{transform:scale(.97) translateY(3px);filter:brightness(.97);}
.btn:focus-visible{outline:3px solid var(--amber);outline-offset:2px;}

/* primary — green */
.btn-primary{
  background:linear-gradient(135deg,#4ADE80 0%,var(--green) 50%,var(--green-dark) 100%);
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2);
  box-shadow:0 7px 0 var(--green-shadow),0 9px 20px rgba(22,163,74,.25);
}
.btn-primary:hover{filter:brightness(1.06);}
.btn-primary:active{box-shadow:0 2px 0 var(--green-shadow),0 4px 10px rgba(22,163,74,.2);}



.btn+.btn{margin-top:14px;}
.btn .btn-icon{flex-shrink:0;font-size:1.15em;line-height:1;}

/* version label */
.version{position:relative;z-index:3;margin-top:20px;font-size:12px;font-weight:500;color:rgba(100,60,20,.65);font-family:var(--font-b);}

/* confetti */
.confetti-bit{position:absolute;border-radius:2px;pointer-events:none;z-index:1;animation:confettiFall linear infinite;}
@keyframes confettiFall{0%{transform:translateY(-30px) rotate(0deg);opacity:.75}100%{transform:translateY(900px) rotate(750deg);opacity:0}}

@keyframes slideDown{0%{transform:translateY(-44px);opacity:0}100%{transform:translateY(0);opacity:1}}
@keyframes slideUp{0%{transform:translateY(44px);opacity:0}100%{transform:translateY(0);opacity:1}}

@media(min-height:800px){
  .mascot-img{max-width:320px;max-height:340px;}
}
@media(max-height:700px){
  .arch{height:160px;}
  .logo-wrap{margin-top:8px;}
  .logo-img{width:130px;}
  .top-stars{padding:12px 28px 0;}
  .btn{padding:13px 20px;font-size:20px;min-height:52px;}
  .btns{padding:14px 16px 16px;}
  .version{margin-top:10px;font-size:11px;}
}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

</style>
</head>
<body>
<div class="phone" id="phone">
  <div class="star-bg">
    <span>⭐</span><span>✨</span><span>⭐</span>
    <span>✨</span><span>⭐</span><span>✨</span>
  </div>
  <div class="arch"></div>
  <div class="top-stars">
    <span class="top-star">⭐</span>
    <span class="top-star">✨</span>
    <span class="top-star">⭐</span>
  </div>
  <div class="logo-wrap">
    <img class="logo-img" src="../logo.png" alt="موسى التعليمي">
    <div class="logo-sub">رياضيات ممتعة للأطفال</div>
  </div>
  <div class="mascots">
    <img class="mascot-img" src="mascot-splash.png" alt="شخصيتا موسى">
  </div>
  <div class="btns">
    <button class="btn btn-primary" onclick="handleStart()">
      <span class="btn-icon">🚀</span>
      ابدأ اللعبة
    </button>
  </div>
  <div class="version">الإصدار ١.٠ · موسى التعليمي</div>
</div>
<script>
(function(){
  const phone=document.getElementById('phone');
  const colors=['#F5C518','#FF6B6B','#5CB85C','#7C3AED','#E879C7','#41ABFD','#FF8C42'];
  for(let i=0;i<22;i++){
    const el=document.createElement('div');
    el.className='confetti-bit';
    const sz=5+Math.random()*7;
    const isCircle=Math.random()>.45;
    el.style.cssText=[
      'left:'+Math.random()*100+'%',
      'width:'+sz+'px',
      'height:'+(isCircle?sz:sz*1.6)+'px',
      'border-radius:'+(isCircle?'50%':'3px'),
      'background:'+colors[i%colors.length],
      'opacity:.7',
      'animation-duration:'+(3.5+Math.random()*3.5)+'s',
      'animation-delay:'+(Math.random()*1.2).toFixed(2)+'s',
    ].join(';');
    phone.appendChild(el);
  }
})();
function handleStart(){window.location.href='moosa-lessons.html';}
</script>
</body>
</html>
