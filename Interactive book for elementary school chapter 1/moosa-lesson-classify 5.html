<script>
/* Single narration channel: starting any spoken clip stops the previous one (prevents audio overlap). Tap/win blips use WebAudio and are unaffected. */
(function(){
  if(window.__mlAudioBus__)return; window.__mlAudioBus__=1;
  var cur=null;
  try{
    var P=window.HTMLAudioElement&&HTMLAudioElement.prototype;
    if(P&&P.play){
      var op=P.play;
      P.play=function(){
        if(cur&&cur!==this){try{cur.pause();}catch(e){}try{cur.currentTime=0;}catch(e){}}
        cur=this;
        try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
        return op.apply(this,arguments);
      };
    }
  }catch(e){}
  try{
    var ss=window.speechSynthesis;
    if(ss&&ss.speak){
      var osp=ss.speak;
      ss.speak=function(u){if(cur){try{cur.pause();}catch(e){}}try{return osp.call(ss,u);}catch(e){}};
    }
  }catch(e){}
})();
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>أكثر من، أقل من — موسى للتعلم</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html, body { height:100%; margin:0; padding:0; overflow:hidden; background:linear-gradient(160deg,#FFFFFF 0%,#F2F2F2 100%); }
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }

/* ═══════════════════════════════════════════════════
   MOOSA DESIGN SYSTEM v1.1 — Widget Root
   ═══════════════════════════════════════════════════ */
.ml-widget {
  --amber:      #1F1F1F;
  --amber-dark: #141414;
  --cream:      #FFFFFF;
  --cream2:     #EDE0C0;
  --cborder:    #E2D4B0;
  --ink:        #1C1917;
  --ink-soft:   #78716C;
  --green:      #22C55E;
  --green-dark: #16A34A;
  --green-text: #14532D;
  --ok:         #22C55E;
  --bad:        #EF4444;
  --tile:       #E8E0D0;
  --font-d: 'Baloo Bhaijaan 2', 'Tajawal', sans-serif;
  --font-b: 'Tajawal', sans-serif;
  --ease-b: cubic-bezier(.34, 1.56, .64, 1);

  width:100%; height:100vh; height:100svh;
  max-width:480px; margin:0 auto;
  display:flex; flex-direction:column;
  background:var(--cream);
  font-family:var(--font-b);
  overflow:hidden; position:relative;
}
.ml-widget *, .ml-widget *::before, .ml-widget *::after {
  box-sizing:border-box; margin:0; padding:0;
}

/* ── Top bar ──────────────────────────────────────── */
.ml-widget .top-bar {
  background:var(--amber);
  padding:10px 20px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  flex-shrink:0;
}
.ml-widget .score-label {
  font-family:var(--font-d); font-size:14px; font-weight:700;
  color:rgba(255,255,255,.75); letter-spacing:.5px;
}
.ml-widget .score-val {
  font-family:var(--font-d); font-size:24px; font-weight:800;
  color:#fff; line-height:1;
}

/* ── Progress dots ────────────────────────────────── */
.ml-widget .progress-dots {
  display:flex; gap:6px; align-items:center; justify-content:center;
  padding:6px 0 2px; flex-shrink:0;
}
.ml-widget .dot {
  width:8px; height:8px; border-radius:50%;
  background:rgba(61,38,16,.18);
  transition:background .3s, transform .3s;
}
.ml-widget .dot.active { background:var(--amber); transform:scale(1.35); }
.ml-widget .dot.done   { background:var(--green); }

/* ── Play area ────────────────────────────────────── */
.ml-widget .play {
  flex:1; display:flex; flex-direction:column;
  padding:10px 14px 8px; gap:8px;
  min-height:0; overflow:hidden;
}

/* ── Question prompt ──────────────────────────────── */
.ml-widget .q-prompt {
  text-align:center;
  font-family:var(--font-d); font-size:18px; font-weight:800;
  color:var(--ink); flex-shrink:0;
}

/* ── Task word (flat, no card) ────────────────────── */
.ml-widget .task-word {
  display:inline-block;
  font-family:var(--font-d); font-size:20px; font-weight:800;
  padding:5px 22px; border-radius:999px; color:#fff;
  box-shadow:0 3px 0 rgba(0,0,0,.18);
  align-self:center;
}
.ml-widget .task-word.more { background:linear-gradient(180deg,#EE7B2E,#C85510); }
.ml-widget .task-word.less { background:linear-gradient(180deg,#3A9BDC,#1A6B9A); }
.ml-widget .task-hint {
  font-family:var(--font-b); font-size:12px; color:var(--ink-soft);
  text-align:center; flex-shrink:0;
}

/* ── Compare area ─────────────────────────────────── */
.ml-widget .compare {
  display:flex; gap:10px; flex:1; min-height:0;
}

/* ── Group tile ───────────────────────────────────── */
.ml-widget .group {
  flex:1; border-radius:16px;
  background:transparent;
  border:none;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:6px 4px; gap:5px;
  cursor:pointer; position:relative;
  transition:transform .15s var(--ease-b), background .2s;
  min-height:0; overflow:hidden;
}
.ml-widget .group:active { transform:scale(.96); }
.ml-widget .group .items-row {
  display:flex; flex-wrap:wrap;
  justify-content:center; gap:4px; width:100%;
}
.ml-widget .group img {
  object-fit:contain;
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.16));
  pointer-events:none; display:block;
}
.ml-widget .group .count-lbl {
  font-family:var(--font-d); font-size:26px; font-weight:800;
  color:var(--ink); line-height:1; margin-top:2px; flex-shrink:0;
}

/* VS badge */
.ml-widget .vs-badge {
  flex-shrink:0; width:36px; height:36px; border-radius:50%;
  background:radial-gradient(circle at 40% 35%,#FFE08A,#F5B81E);
  border:3px solid #fff;
  display:flex; align-items:center; justify-content:center;
  font-family:var(--font-d); font-weight:800; font-size:12px; color:#8A5A0A;
  box-shadow:0 3px 8px rgba(140,90,0,.30);
  align-self:center;
}

/* Group states */
.ml-widget .group.correct {
  background:rgba(75,176,64,.18);
  animation:ml-correctPop .45s var(--ease-b);
}
.ml-widget .group.wrong {
  background:rgba(239,68,68,.14);
  animation:ml-shake .35s;
}
.ml-widget .group.dim { opacity:.42; pointer-events:none; }

/* ── Result message ───────────────────────────────── */
.ml-widget .result-msg {
  text-align:center;
  font-family:var(--font-d); font-size:17px; font-weight:800;
  height:0; overflow:hidden; opacity:0;
  transition:opacity .3s; flex-shrink:0;
}
.ml-widget .result-msg.show { opacity:1; height:auto; }
.ml-widget .result-msg.ok  { color:var(--ok); }
.ml-widget .result-msg.bad { color:var(--bad); }

/* ── Next button ──────────────────────────────────── */
.ml-widget .next-wrap { padding:0 12px 12px; flex-shrink:0; }
.ml-widget .btn-next {
  width:100%; padding:13px;
  border-radius:14px; border:none;
  font-family:var(--font-d); font-size:19px; font-weight:800;
  color:var(--green-text); background:var(--green);
  cursor:pointer;
  box-shadow:0 5px 0 var(--green-dark);
  transition:transform .1s, opacity .2s;
  -webkit-tap-highlight-color:transparent;
}
.ml-widget .btn-next:active   { transform:translateY(4px); box-shadow:0 1px 0 var(--green-dark); }
.ml-widget .btn-next:disabled { opacity:.35; cursor:not-allowed; }

/* ── Feedback flash ───────────────────────────────── */
.ml-widget .flash {
  position:absolute; inset:0; z-index:50;
  pointer-events:none; opacity:0;
}
.ml-widget .flash.ok  { background:radial-gradient(circle,rgba(75,176,64,.25),transparent 70%); }
.ml-widget .flash.bad { background:radial-gradient(circle,rgba(208,80,48,.25),transparent 70%); }
.ml-widget .flash.show { animation:ml-flashAnim .6s ease-out forwards; }

/* ── Win overlay ──────────────────────────────────── */
.ml-widget .win-overlay {
  position:absolute; inset:0; z-index:100;
  background:rgba(0,0,0,.75);
  display:none; align-items:center; justify-content:center; padding:20px;
}
.ml-widget .win-overlay.show { display:flex; animation:ml-fadeIn .35s ease; }
.ml-widget .win-card {
  text-align:center; display:flex; flex-direction:column; align-items:center;
  animation:ml-winPop .5s var(--ease-b) both;
}
.ml-widget .win-rays {
  position:relative; width:220px; height:220px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:-16px;
}
.ml-widget .win-rays svg.rays {
  position:absolute; inset:0; width:100%; height:100%;
  animation:ml-spin 8s linear infinite;
}
.ml-widget .mascot {
  position:relative; z-index:2;
  width:200px; height:200px;
  display:flex; align-items:center; justify-content:center;
  animation:ml-bob 1.8s ease-in-out infinite;
}
.ml-widget .mascot .mascot-svg {
  width:200px; height:200px;
  background:transparent; display:block;
}
.ml-widget .win-title {
  font-family:var(--font-d); font-size:30px; font-weight:800;
  color:#fff; margin-bottom:4px;
}
.ml-widget .win-stars { display:flex; gap:8px; margin:8px 0; }
.ml-widget .win-stars span {
  font-size:32px; animation:ml-starPop .45s var(--ease-b) both;
}
.ml-widget .win-stars span:nth-child(1){animation-delay:.30s}
.ml-widget .win-stars span:nth-child(2){animation-delay:.48s}
.ml-widget .win-stars span:nth-child(3){animation-delay:.66s}
.ml-widget .win-score-row {
  display:flex; align-items:baseline; gap:8px;
  margin:8px 0 18px; font-family:var(--font-d);
}
.ml-widget .win-score-label { font-size:13px; font-weight:600; color:rgba(255,255,255,.75); }
.ml-widget .win-score-val   { font-size:28px; font-weight:800; color:#fff; }
.ml-widget .btn-win {
  padding:12px 44px; border-radius:14px; border:none;
  font-family:var(--font-d); font-size:19px; font-weight:800;
  color:var(--green-text); background:var(--green);
  cursor:pointer; box-shadow:0 5px 0 var(--green-dark);
  transition:transform .1s; -webkit-tap-highlight-color:transparent;
}
.ml-widget .btn-win:active { transform:translateY(3px); box-shadow:0 1px 0 var(--green-dark); }

/* Confetti */
.ml-confetti { position:absolute; pointer-events:none; z-index:9998; }
#ml-confettiContainer { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:9998; }

/* ── Animations ───────────────────────────────────── */
@keyframes ml-fadeIn    { from{opacity:0} to{opacity:1} }
@keyframes ml-winPop    { 0%{transform:scale(.55);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }
@keyframes ml-starPop   { 0%{transform:scale(0) rotate(-20deg);opacity:0} 70%{transform:scale(1.25)} 100%{transform:scale(1);opacity:1} }
@keyframes ml-bob       { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes ml-spin      { to{transform:rotate(360deg)} }
@keyframes ml-shake     { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-7px)} 75%{transform:translateX(7px)} }
@keyframes ml-correctPop{ 0%,100%{transform:scale(1)} 50%{transform:scale(1.05)} }
@keyframes ml-flashAnim { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }
@keyframes ml-confettiFall { 0%{transform:translateY(-20px) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

/* ═══════════════════════════════════════
   UNIFIED DESIGN SYSTEM — win screen

/* top-bar consistent height/padding */

/* win overlay — modern frosted dark */

/* win-rays — keep spinning above mascot */

.ml-widget .win-stars span:nth-child(1),.win-stars span:nth-child(1){animation-delay:.3s}

/* win score */
.ml-widget .win-score-row,.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;}

.ml-widget .win-score,.win-score{font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin:4px 0 10px;}
/* play-again button — all variants */
.ml-widget .btn-win,.btn-win,
.ml-widget .win-btn,.win-btn,
.btn-win-again{

  padding:14px 48px !important;

  font-size:20px !important;font-weight:800 !important;
  color:#fff !important;text-shadow:0 1px 2px rgba(0,0,0,.2) !important;

.ml-widget .win-btn:active,.win-btn:active,
.btn-win-again:active{

  box-shadow:0 1px 0 #c2410c,0 3px 8px rgba(234,88,12,.2) !important;
}

/* ── countdown bar ── */
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#fb923c,#ea580c);border-radius:14px;transform-origin:right center;animation:mlCountdownShrink 3s linear forwards;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}

/* ── win two-button row ── */
.win-btns{display:flex;gap:10px;margin-top:14px !important;width:100%;}
.win-btns .btn-win{margin-top:0 !important;padding:14px 0 !important;font-size:17px !important;flex:1;min-width:0;}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%) !important;box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28) !important;}
.btn-win-next:active{transform:translateY(4px) !important;box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2) !important;}


/* ═══════════════════════════════
   MOOSA NARRATOR GUIDE — FEMALE
   ═══════════════════════════════ */
</style>
<style>
/* Fix: eliminate top-bar load flash — reserve the final bar height (so the
   play area never jumps), never paint the loose pre-reorg lesson-number

.ml-widget .top-bar > .lsn-btn{ display:none !important; }

<div class="ml-widget" dir="rtl" id="ml-root">

  <!-- §3 Top bar -->
  <div class="top-bar">
    <span class="score-label">النقاط</span>
    <span class="score-val" id="ml-scoreVal">٠</span>
  </div>

  <!-- §4 Progress dots -->
  <div class="progress-dots" id="ml-dots"></div>

  <!-- Play -->

  </div>

<script>

// ── ARABIC DIGITS ────────────────────────────────────────────
function toAr(n){
  return String(n).replace(/[0-9]/g,function(d){return '٠١٢٣٤٥٦٧٨٩'[+d];});
}

// ── SOUND ENGINE ─────────────────────────────────────────────
var mlAudio=(function(){
  var ctx=null;
  function gc(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
  function correct(){
    try{var c=gc(),t=c.currentTime;
      [{f:523.25,s:0},{f:659.25,s:.12}].forEach(function(x){
        var o=c.createOscillator(),g=c.createGain();
        o.type='triangle';o.frequency.setValueAtTime(x.f,t+x.s);
        g.gain.setValueAtTime(.35,t+x.s);g.gain.exponentialRampToValueAtTime(.001,t+x.s+.28);
        o.connect(g);g.connect(c.destination);o.start(t+x.s);o.stop(t+x.s+.30);
      });
    }catch(e){}
  }
  function wrong(){
    try{var c=gc(),t=c.currentTime;
      var o=c.createOscillator(),g=c.createGain();
      o.type='sawtooth';o.frequency.setValueAtTime(260,t);
      o.frequency.exponentialRampToValueAtTime(120,t+.22);
      g.gain.setValueAtTime(.25,t);g.gain.exponentialRampToValueAtTime(.001,t+.24);
      o.connect(g);g.connect(c.destination);o.start(t);o.stop(t+.25);
    }catch(e){}
  }
  return{correct:correct,wrong:wrong};
})();

// ── STATE ────────────────────────────────────────────────────
var qi=0, score=0, answered=false;

// ── HELPERS ──────────────────────────────────────────────────
function elById(id){return document.getElementById('ml-'+id);}

function flashFn(type){
  var f=elById('flash');
  f.className='flash '+type+' show';
  setTimeout(function(){f.className='flash';},650);
}

function calcImgSize(count){
  if(count<=2) return 76;
  if(count<=3) return 66;
  if(count<=4) return 58;
  if(count<=5) return 50;
  return 42;
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  var q=QS[qi];
  answered=false;

  var play=elById('play');
  play.innerHTML='';

  // Progress dots
  var dotsEl=elById('dots');
  dotsEl.innerHTML='';
  QS.forEach(function(_,i){
    var d=document.createElement('div');
    d.className='dot'+(i===qi?' active':i<qi?' done':'');
    dotsEl.appendChild(d);
  });

  // Prompt
  var pr=document.createElement('div');
  pr.className='q-prompt';
  pr.textContent=q.task==='more'?'اضغط على المجموعة الأكبر عدداً':'اضغط على المجموعة الأقل عدداً';
  play.appendChild(pr);

  // Task word — flat pill, no card
  var tw=document.createElement('div');
  tw.className='task-word '+(q.task==='more'?'more':'less');
  tw.textContent=q.taskAr;
  tw.style.cssText='display:block;text-align:center;';
  play.appendChild(tw);

  var hint=document.createElement('div');
  hint.className='task-hint';
  hint.textContent=q.task==='more'?'أيّ المجموعتين فيها عددٌ أكثر؟':'أيّ المجموعتين فيها عددٌ أقل؟';
  play.appendChild(hint);

  // Compare area
  var cmp=document.createElement('div');
  cmp.className='compare';

  var grpA=makeGroup('A',q.A,q);
  var vs=document.createElement('div');
  vs.className='vs-badge'; vs.textContent='VS';
  var grpB=makeGroup('B',q.B,q);

  cmp.appendChild(grpA);
  cmp.appendChild(vs);
  cmp.appendChild(grpB);
  play.appendChild(cmp);

  // Result message
  var msg=document.createElement('div');
  msg.className='result-msg'; msg.id='ml-rmsg';
  play.appendChild(msg);

  // Reset countdown on new question
  if (mlCountdownTimer) { clearInterval(mlCountdownTimer); mlCountdownTimer = null; }
  if (document.getElementById('ml-nextWrap')) document.getElementById('ml-nextWrap').style.display = 'none';
}

function makeGroup(side,cfg,q){
  var g=document.createElement('div');
  g.className='group'; g.id='ml-grp'+side;

  var sz=calcImgSize(cfg.count);
  var row=document.createElement('div');
  row.className='items-row';
  for(var i=0;i<cfg.count;i++){
    var im=document.createElement('img');
    im.src=IMGS[cfg.img]||'';
    im.style.width=sz+'px'; im.style.height=sz+'px';
    row.appendChild(im);
  }
  g.appendChild(row);

  var lbl=document.createElement('div');
  lbl.className='count-lbl';
  lbl.textContent=toAr(cfg.count);
  g.appendChild(lbl);

  g.addEventListener('pointerdown',function(e){
    e.preventDefault();
    onChoice(side,q);
  });
  return g;
}

// ── CHOICE HANDLER ───────────────────────────────────────────
function onChoice(side,q){
  if(answered) return;
  answered=true;

  var correct=(side===q.answer);
  var msg=document.getElementById('ml-rmsg');
  var grpA=document.getElementById('ml-grpA');
  var grpB=document.getElementById('ml-grpB');
  var grpSel=side==='A'?grpA:grpB;
  var grpOther=side==='A'?grpB:grpA;
  var grpCorrect=q.answer==='A'?grpA:grpB;
  var grpWrong=q.answer==='A'?grpB:grpA;

  if(correct){
    mlAudio.correct();
    flashFn('ok');
    grpSel.classList.add('correct');
    grpOther.classList.add('dim');
    score+=10;
    elById('scoreVal').textContent=toAr(score);
    msg.className='result-msg ok show';
    msg.textContent=q.msgOk;
  } else {
    mlAudio.wrong();
    flashFn('bad');
    grpSel.classList.add('wrong');
    msg.className='result-msg bad show';
    msg.textContent=q.msgBad;
    setTimeout(function(){
      grpSel.classList.remove('wrong');
      grpCorrect.classList.add('correct');
      grpWrong.classList.add('dim');
    },420);
  }

  setTimeout(function(){ mlStartCountdown(); },500);
}

// ── NEXT ─────────────────────────────────────────────────────
function mlNextQ(){
  qi++;
  if(qi>=QS.length){ showWin(); } else { render(); }
}

function showWin(){

var mlCountdownTimer = null;
function mlStartCountdown() {
  var secs = 3;
  var wrap = document.getElementById('ml-nextWrap');
  var fill = document.getElementById('ml-countdownFill');
  var txt  = document.getElementById('ml-countdownTxt');
  if (!wrap) return;
  wrap.style.display = 'block';
  fill.style.animation = 'none';
  void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 3s linear forwards';
  txt.textContent = toAr(secs);
  mlCountdownTimer = setInterval(function() {
    secs--;
    if (txt) txt.textContent = toAr(Math.max(0, secs));
    if (secs <= 0) {
      clearInterval(mlCountdownTimer);
      mlCountdownTimer = null;
      if (wrap) wrap.style.display = 'none';
      mlNextQ();
    }
  }, 1000);
}

function mlHandleWinNext() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ action: 'nextLesson' }, '*');
  } else { window.location.href = 'moosa-lesson-classify 1.html'; }
}

function mlWinContinue(){
  if (mlCountdownTimer) { clearInterval(mlCountdownTimer); mlCountdownTimer = null; }
  elById('winOverlay').classList.remove('show');
  document.getElementById('ml-confettiContainer').innerHTML='';
  qi=0; score=0;

}

<script>
(function(){
  var hand=null,idleT=null,animT=null,IDLE=2000;
  function init(){
    hand=document.createElement('div');hand.id='mlGuideHand';hand.textContent='👇';
    var _hw=document.querySelector('.ml-widget');(_hw||document.body).appendChild(hand);
    schedule(2000);
    document.addEventListener('pointerdown',onAction,{passive:true});
    var qEl=document.getElementById('ml-qPrompt');
    if(qEl)new MutationObserver(function(){onAction();schedule(2000);}).observe(qEl,{childList:true,characterData:true,subtree:true});
  }
  function onAction(){clearTimeout(idleT);clearTimeout(animT);hide();schedule(IDLE);}
  function schedule(ms){clearTimeout(idleT);idleT=setTimeout(run,ms);}
  function hide(){if(!hand)return;hand.style.transition='opacity .25s';hand.style.opacity='0';hand.classList.remove('appear');}
  function run(){
    if(!hand)return;
    if(typeof QS==='undefined'||typeof qi==='undefined')return;

    hand.style.transition='none';

      hand.style.top=(iR.top-wR.top+iR.height/2-19)+'px';
      hand.style.transform='scale(.9) rotate(0deg)';
      hand.style.opacity='1';
      animT=setTimeout(function(){hide();animT=setTimeout(run,1800);},900);
    },700);
  }
  if(document.readyState==='loading'){window.addEventListener('load',init);}else{init();}
})();

  if((m=fn.match(/^moosa-lesson-classify (\d+)\.html$/))){ch='ch1';idx=+m[1]-1;total=5;nextFile='moosa-lesson-classify '+(+m[1]+1)+'.html';}
  else if((m=fn.match(/^moosa-chp 2-lesson (\d+)\.html$/))){ch='ch2';idx=+m[1]-1;total=6;nextFile='moosa-chp 2-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 3-lesson (\d+)\.html$/))){ch='ch3';idx=+m[1]-1;total=6;nextFile='moosa-chp 3-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 4-lesson (\d+)\.html$/))){ch='ch4';idx=+m[1]-1;total=3;nextFile='moosa-chp 4-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  if(!ch)return;
  var isLast=idx>=total-1;
  function saveDone(){try{var k='moosa_'+ch,p=JSON.parse(localStorage.getItem(k)||'[]');if(p.indexOf(idx)===-1){p.push(idx);localStorage.setItem(k,JSON.stringify(p));}}catch(e){}}
  var ov=document.querySelector('.win-overlay');
  if(ov){
    try{new MutationObserver(function(){if(ov.classList.contains('show'))saveDone();}).observe(ov,{attributes:true,attributeFilter:['class']});}catch(e){}
    if(ov.classList.contains('show'))saveDone();
  }
  window.mlHandleWinNext=function(){
    saveDone();
    if(window.parent&&window.parent!==window){window.parent.postMessage({action:'nextLesson'},'*');return;}
    location.href=isLast?LP:nextFile;
  };
})();
</script>

<script>
(function(){
  function reorg(){
    var bar=document.querySelector('.ml-widget .top-bar'); if(!bar||bar._reorg)return;
    var navs=[].slice.call(bar.querySelectorAll('.lsn-btn'));
    var dots=document.getElementById('ml-dots')||document.getElementById('mlDots');
    var sl=bar.querySelector('.score-label'), sv=bar.querySelector('.score-val');
    if(!navs.length || !dots || !sv) return;
    bar._reorg=true;
    var top=document.createElement('div'); top.className='tb-top';
    navs.forEach(function(b){ top.appendChild(b); });
    var bot=document.createElement('div'); bot.className='tb-bot';
    var sc=document.createElement('div'); sc.className='tb-score';
    if(sl) sc.appendChild(sl); if(sv) sc.appendChild(sv);
    bot.appendChild(sc); bot.appendChild(dots);
    bar.innerHTML=''; bar.appendChild(top); bar.appendChild(bot);
  }
  var n=0, iv=setInterval(function(){
    n++;
    var bar=document.querySelector('.ml-widget .top-bar');
    var navs=bar?bar.querySelectorAll('.lsn-btn').length:0;
    var dots=document.getElementById('ml-dots')||document.getElementById('mlDots');
    if((navs && dots) || n>50){ clearInterval(iv); reorg(); }
  },80);
})();
</script>

<script id="tb-back-js">
