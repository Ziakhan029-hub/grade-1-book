<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى تعلّم — التصنيف وفق اللون</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html, body { height:100%; margin:0; padding:0; overflow:hidden; background:linear-gradient(160deg,#FFFFFF 0%,#F2F2F2 100%); }
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }

.ml-widget {
  --amber:      #1F1F1F;
  --amber-dark: #141414;
  --cream:      #FFFFFF;
  --ink:        #1C1917;
  --ink-soft:   #78716C;
  --green:      #22C55E;
  --green-dark: #16A34A;
  --green-text: #14532D;
  --ok:         #22C55E;
  --bad:        #EF4444;
  --tile:       #E8E0D0;
  --font-d: 'Baloo Bhaijaan 2', 'Tajawal', sans-serif;
  --font-b: 'Tajawal', sans-serif;
  --ease-b: cubic-bezier(.34, 1.56, .64, 1);

  width:100%; height:100vh; height:100svh;
  max-width:480px; margin:0 auto;
  display:flex; flex-direction:column;
  background:var(--cream);
  font-family:var(--font-b);
  overflow:hidden; position:relative;
}
.ml-widget *, .ml-widget *::before, .ml-widget *::after { box-sizing:border-box; margin:0; padding:0; }

.ml-widget .top-bar {
  background:var(--amber);
  padding:10px 20px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  flex-shrink:0;
}
.ml-widget .score-label { font-family:var(--font-d); font-size:14px; font-weight:700; color:rgba(255,255,255,.75); letter-spacing:.5px; }
.ml-widget .score-val   { font-family:var(--font-d); font-size:24px; font-weight:800; color:#fff; line-height:1; }

.ml-widget .progress-dots {
  display:flex; gap:6px; align-items:center; justify-content:center;
  padding:6px 0 0; flex-shrink:0;
}
.ml-widget .dot { width:8px; height:8px; border-radius:50%; background:rgba(61,38,16,.18); transition:background .3s, transform .3s; }
.ml-widget .dot.active { background:var(--amber); transform:scale(1.35); }
.ml-widget .dot.done   { background:var(--green); }

.ml-widget .play { flex:1; display:flex; flex-direction:column; padding:12px 12px 6px; gap:8px; min-height:0; overflow:hidden; }

.ml-widget .q-prompt { text-align:center; font-family:var(--font-d); font-size:19px; font-weight:800; color:var(--ink); flex-shrink:0; }

.ml-widget .rule-row { display:flex; align-items:center; justify-content:center; gap:8px; flex-wrap:wrap; flex-shrink:0; }
.ml-widget .rule-label { font-family:var(--font-d); font-size:12px; font-weight:700; color:var(--ink-soft); background:rgba(0,0,0,.07); padding:2px 10px; border-radius:999px; white-space:nowrap; }
.ml-widget .rule-icons { display:flex; gap:6px; align-items:center; }
.ml-widget .rule-icon { width:36px; height:36px; display:flex; align-items:center; justify-content:center; border-radius:10px; background:rgba(0,0,0,.06); }
.ml-widget .rule-icon img { width:28px; height:28px; object-fit:contain; display:block; }

.ml-widget .boxes { display:flex; gap:10px; flex-shrink:0; height:160px; }
.ml-widget .box { flex:1; border-radius:16px; border:3px dashed var(--tile); display:flex; flex-direction:column; transition:border-color .15s, background .15s, transform .12s; overflow:hidden; }
.ml-widget .box[data-tone="green"]   { border-color:#7DC050; }
.ml-widget .box[data-tone="orange"]  { border-color:#D09030; }
.ml-widget .box[data-tone="neutral"] { border-color:var(--tile); }
.ml-widget .box.over { transform:scale(1.03); }
.ml-widget .box[data-tone="green"].over   { border-color:var(--ok);  background:rgba(91,190,91,.12); }
.ml-widget .box[data-tone="orange"].over  { border-color:#D09030;    background:rgba(210,144,48,.12); }
.ml-widget .box[data-tone="neutral"].over { border-color:#A09070;    background:rgba(160,144,112,.12); }

.ml-widget .box-title { font-family:var(--font-d); font-size:14px; font-weight:800; text-align:center; padding:6px 6px 3px; display:flex; align-items:center; justify-content:center; gap:5px; flex-shrink:0; }
.ml-widget .box[data-tone="green"]   .box-title { color:#2A7010; }
.ml-widget .box[data-tone="orange"]  .box-title { color:#8A4A08; }
.ml-widget .box[data-tone="neutral"] .box-title { color:var(--ink-soft); }
.ml-widget .box-title img { width:26px; height:26px; object-fit:contain; border-radius:4px; }
.ml-widget .box-divider { height:1px; background:rgba(0,0,0,.08); margin:0 8px; flex-shrink:0; }
.ml-widget .box-items { flex:1; display:flex; flex-wrap:wrap; gap:4px; align-content:center; justify-content:center; align-items:center; padding:4px 5px; position:relative; overflow:hidden; }
.ml-widget .placeholder { position:absolute; inset:6px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:22px; opacity:.2; pointer-events:none; transition:opacity .25s; }
.ml-widget .box-items.has-item .placeholder { opacity:0; }

.ml-widget .tray-section { flex:1; display:flex; flex-direction:column; min-height:0; }
.ml-widget .tray-label { text-align:center; font-size:12px; font-weight:600; color:var(--ink-soft); margin-bottom:6px; flex-shrink:0; }
.ml-widget .tray { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center; flex:1; align-content:center; }

.ml-widget .item { width:88px; height:88px; border-radius:20px; background:#FFFDF6; border:3px solid rgba(255,255,255,.8); box-shadow:0 4px 12px rgba(31,31,31,.22); display:flex; align-items:center; justify-content:center; cursor:grab; touch-action:none; transition:transform .1s; animation:ml-pop .38s var(--ease-b) both; overflow:hidden; flex-shrink:0; user-select:none; }
.ml-widget .item img { width:72px; height:72px; object-fit:contain; pointer-events:none; display:block; }
.ml-widget .item:active { cursor:grabbing; }
.ml-widget .item.dragging { opacity:.2; }
.ml-widget .item.placed { cursor:default; animation:none; width:52px; height:52px; border-radius:12px; }
.ml-widget .item.placed img { width:36px; height:36px; }

@keyframes ml-pop { 0%{transform:scale(0);opacity:0} 70%{transform:scale(1.1)} 100%{transform:scale(1);opacity:1} }

.ml-ghost { position:fixed; z-index:9999; width:88px; height:88px; border-radius:20px; background:#FFFDF6; border:3px solid rgba(255,255,255,.8); pointer-events:none; overflow:hidden; display:flex; align-items:center; justify-content:center; box-shadow:0 8px 20px rgba(80,50,10,.3); transform:translate(-50%,-50%) scale(1.1) rotate(-3deg); }
.ml-ghost img { width:72px; height:72px; object-fit:contain; display:block; }

.ml-widget .next-wrap { padding:0 12px 12px; flex-shrink:0; }
.ml-widget .btn-next { width:100%; padding:13px; border-radius:14px; border:none; font-family:var(--font-d); font-size:19px; font-weight:800; color:var(--green-text); background:var(--green); cursor:pointer; box-shadow:0 5px 0 var(--green-dark); transition:transform .1s, opacity .2s; -webkit-tap-highlight-color:transparent; }
.ml-widget .btn-next:active   { transform:translateY(4px); box-shadow:0 1px 0 var(--green-dark); }
.ml-widget .btn-next:disabled { opacity:.35; cursor:not-allowed; }

.ml-widget .flash { position:absolute; inset:0; z-index:50; pointer-events:none; opacity:0; }
.ml-widget .flash.ok  { background:radial-gradient(circle, rgba(75,176,64,.25), transparent 70%); }
.ml-widget .flash.bad { background:radial-gradient(circle, rgba(208,80,48,.25), transparent 70%); }
.ml-widget .flash.show { animation:ml-flashAnim .55s ease-out; }
@keyframes ml-flashAnim { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }

.ml-widget .shake    { animation:ml-shake .38s; }
.ml-widget .pulse-ok { animation:ml-pulseOk .45s var(--ease-b); }
@keyframes ml-shake   { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
@keyframes ml-pulseOk { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

.ml-widget .win-overlay { position:absolute; inset:0; z-index:100; background:rgba(0,0,0,.72); display:none; align-items:center; justify-content:center; padding:24px; }
.ml-widget .win-overlay.show { display:flex; animation:ml-fadeIn .35s ease; }
@keyframes ml-fadeIn { from{opacity:0} to{opacity:1} }

.ml-widget .win-card { text-align:center; display:flex; flex-direction:column; align-items:center; animation:ml-winPop .5s var(--ease-b) both; }
@keyframes ml-winPop { 0%{transform:scale(.55);opacity:0} 70%{transform:scale(1.04)} 100%{transform:scale(1);opacity:1} }

.ml-widget .win-rays { position:relative; width:220px; height:220px; display:flex; align-items:center; justify-content:center; margin-bottom:-16px; }
.ml-widget .win-rays svg.rays { position:absolute; inset:0; width:100%; height:100%; animation:ml-spin 8s linear infinite; }
@keyframes ml-spin { to{transform:rotate(360deg)} }

.ml-widget .mascot { position:relative; z-index:2; width:200px; height:200px; display:flex; align-items:center; justify-content:center; animation:ml-bob 1.8s ease-in-out infinite; }
.ml-widget .mascot .mascot-svg { width:200px; height:200px; background:transparent; display:block; }
@keyframes ml-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

.ml-widget .win-title { font-family:var(--font-d); font-size:30px; font-weight:800; color:#fff; margin-bottom:4px; }
.ml-widget .win-stars { display:flex; gap:8px; margin:8px 0; }
.ml-widget .win-stars span { font-size:32px; animation:ml-starPop .45s var(--ease-b) both; }
.ml-widget .win-stars span:nth-child(1) { animation-delay:.3s }
.ml-widget .win-stars span:nth-child(2) { animation-delay:.48s }
.ml-widget .win-stars span:nth-child(3) { animation-delay:.66s }
@keyframes ml-starPop { 0%{transform:scale(0) rotate(-20deg);opacity:0} 70%{transform:scale(1.25)} 100%{transform:scale(1);opacity:1} }

.ml-widget .win-score-row { display:flex; align-items:baseline; gap:8px; margin:8px 0 18px; font-family:var(--font-d); }
.ml-widget .win-score-label { font-size:13px; font-weight:600; color:rgba(255,255,255,.75); }
.ml-widget .win-score-val   { font-size:28px; font-weight:800; color:#fff; }

.ml-widget .btn-win { padding:12px 44px; border-radius:14px; border:none; font-family:var(--font-d); font-size:19px; font-weight:800; color:var(--green-text); background:var(--green); cursor:pointer; box-shadow:0 5px 0 var(--green-dark); transition:transform .1s; -webkit-tap-highlight-color:transparent; }
.ml-widget .btn-win:active { transform:translateY(3px); box-shadow:0 1px 0 var(--green-dark); }

.ml-confetti { position:absolute; pointer-events:none; z-index:9998; opacity:0; }
#ml-confettiContainer { position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:9998; }
@keyframes ml-confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

/* ═══════════════════════════════════════
   UNIFIED DESIGN SYSTEM — win screen
   ═══════════════════════════════════════ */

/* top-bar consistent height/padding */
.top-bar{flex-shrink:0;background:linear-gradient(135deg,#3A3A3A 0%,#1F1F1F 60%,#141414 100%) !important;padding:12px 20px !important;box-shadow:0 2px 8px rgba(0,0,0,.18);}

/* win overlay — modern frosted dark */
.ml-widget .win-overlay,.win-overlay{
  background:rgba(15,8,0,.82) !important;
  backdrop-filter:blur(8px) !important;
  -webkit-backdrop-filter:blur(8px) !important;
}
/* win card — glass card */
.ml-widget .win-card,.win-card{
  display:flex !important;flex-direction:column !important;align-items:center !important;
  background:rgba(255,255,255,.10) !important;
  border:2px solid rgba(255,255,255,.22) !important;
  border-radius:28px !important;
  padding:24px 32px 28px !important;
  box-shadow:0 8px 32px rgba(0,0,0,.3) !important;
  gap:0 !important;
}
/* hide ALL old mascot variants */
.ml-widget .mascot,.mascot,
.win-mascot,.ml-widget .win-mascot,
.mascot-img,.ml-widget .mascot-img,
.win-scene{display:none !important;}
/* unified mascot */
.win-unified-mascot{
  width:150px;height:150px;object-fit:contain;
  display:block;margin:0 auto 4px;
  animation:ml-bob 1.8s ease-in-out infinite;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));
}
/* win-rays — keep spinning above mascot */
.ml-widget .win-rays,.win-rays{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-bottom:-155px;}
.ml-widget .win-rays svg,.win-rays svg.rays,.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
/* win title */
.ml-widget .win-title,.win-title{
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;
  font-size:30px !important;font-weight:800 !important;
  color:#fff !important;
  text-shadow:0 2px 6px rgba(0,0,0,.3) !important;
  margin:8px 0 4px !important;
}
/* win stars */
.ml-widget .win-stars,.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px;}
.ml-widget .win-stars span,.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b,cubic-bezier(.34,1.56,.64,1)) both;opacity:0;}
.ml-widget .win-stars span:nth-child(1),.win-stars span:nth-child(1){animation-delay:.3s}
.ml-widget .win-stars span:nth-child(2),.win-stars span:nth-child(2){animation-delay:.48s}
.ml-widget .win-stars span:nth-child(3),.win-stars span:nth-child(3){animation-delay:.66s}
@keyframes ml-starPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
/* win score */
.ml-widget .win-score-row,.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;}
.ml-widget .win-score-label,.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.ml-widget .win-score-val,.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.ml-widget .win-score,.win-score{font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin:4px 0 10px;}
/* play-again button — all variants */
.ml-widget .btn-win,.btn-win,
.ml-widget .win-btn,.win-btn,
.btn-win-again{
  margin-top:14px !important;
  padding:14px 48px !important;
  border:3px solid rgba(255,255,255,.9) !important;
  border-radius:20px !important;
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif !important;
  font-size:20px !important;font-weight:800 !important;
  color:#fff !important;text-shadow:0 1px 2px rgba(0,0,0,.2) !important;
  background:linear-gradient(135deg,#4ADE80 0%,#22C55E 55%,#16A34A 100%) !important;
  box-shadow:0 6px 0 #15803D,0 8px 20px rgba(22,163,74,.28) !important;
  cursor:pointer;
  transition:transform 150ms cubic-bezier(.34,1.56,.64,1),box-shadow 150ms ease;
  -webkit-tap-highlight-color:transparent;
}
.ml-widget .btn-win:active,.btn-win:active,
.ml-widget .win-btn:active,.win-btn:active,
.btn-win-again:active{
  transform:translateY(4px) !important;
  box-shadow:0 1px 0 #15803D,0 3px 8px rgba(22,163,74,.2) !important;
}

/* ── countdown bar ── */
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#22C55E,#4ADE80);border-radius:14px;transform-origin:right center;animation:mlCountdownShrink 5s linear forwards;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}

/* ── win two-button row ── */
.win-btns{display:flex;gap:10px;margin-top:14px !important;width:100%;}
.win-btns .btn-win{margin-top:0 !important;padding:14px 0 !important;font-size:17px !important;flex:1;min-width:0;}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%) !important;box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28) !important;}
.btn-win-next:active{transform:translateY(4px) !important;box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2) !important;}


/* ═══════════════════════════════
   MOOSA NARRATOR GUIDE — FEMALE
   ═══════════════════════════════ */
</style>
</head>
<body>

<div class="ml-widget" dir="rtl" id="mlRoot">

  <div class="top-bar">
    <span class="score-label">النقاط</span>
    <span class="score-val" id="ml-scoreVal">٠</span>
  </div>

  <div class="progress-dots" id="ml-dots"></div>

  <div class="play">
    <div class="q-prompt" id="ml-qPrompt"></div>

    <div class="rule-row">
      <span class="rule-label" id="ml-refRule"></span>
      <div class="rule-icons" id="ml-refItems"></div>
    </div>

    <div class="boxes">
      <div class="box" id="ml-boxA" data-box="A" data-tone="neutral">
        <div class="box-title" id="ml-titleA"></div>
        <div class="box-divider"></div>
        <div class="box-items" id="ml-itemsA"><div class="placeholder">⬇︎</div></div>
      </div>
      <div class="box" id="ml-boxB" data-box="B" data-tone="neutral">
        <div class="box-title" id="ml-titleB"></div>
        <div class="box-divider"></div>
        <div class="box-items" id="ml-itemsB"><div class="placeholder">⬇︎</div></div>
      </div>
    </div>

    <div class="tray-section">
      <div class="tray-label">اسحب إلى الصندوق المناسب</div>
      <div class="tray" id="ml-tray"></div>
    </div>
  </div>

  <!-- §10 Auto-advance countdown -->
  <div class="next-wrap" id="ml-nextWrap" style="display:none">
    <div class="countdown-bar">
      <div class="countdown-fill" id="ml-countdownFill"></div>
      <span class="countdown-txt" id="ml-countdownTxt">٥</span>
    </div>
  </div>

  <div class="win-overlay" id="ml-winOverlay">
    <div class="win-card">
      <div class="win-rays"><svg class="rays" viewBox="0 0 200 200" fill="none"><g transform="translate(100,100)"><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(30)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(60)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(90)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(120)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(150)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(180)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(210)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(240)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(270)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(300)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(330)"/></g></svg></div>
      <img class="win-unified-mascot" src="../mascot.png" alt="موسى">
      <div class="win-title">أحسنت! 🎉</div>
      <div class="win-stars"><span>⭐</span><span>⭐</span><span>⭐</span></div>
      <div class="win-score-row"><span class="win-score-label">النقاط</span><span class="win-score-val" id="ml-winScoreVal">٠</span></div>
      <div class="win-btns">
        <button class="btn-win btn-win-next" onclick="mlHandleWinNext()">التالي ›</button>
        <button class="btn-win btn-win-repeat" onclick="mlHandleWinContinue()">إعادة 🔄</button>
      </div>
    </div>
  </div>

  <div class="flash" id="ml-flash"></div>
  <div id="ml-confettiContainer"></div>
</div>

<script>
// ══════════════════════════════════════════════════
// ITEM_IMGS

const mlAudio = (function() {
  let ctx;
  function resume() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
  }
  function correct() {
    resume(); const now = ctx.currentTime;
    [[523.25,0],[659.25,.14]].forEach(function([freq,delay]) {
      const o=ctx.createOscillator(), g=ctx.createGain(), o2=ctx.createOscillator();
      o.type='triangle'; o2.type='sine'; o.frequency.value=freq; o2.frequency.value=freq*2;
      g.gain.setValueAtTime(.28,now+delay); g.gain.exponentialRampToValueAtTime(.001,now+delay+.38);
      o.connect(g); o2.connect(g); g.connect(ctx.destination);
      o.start(now+delay); o.stop(now+delay+.38); o2.start(now+delay); o2.stop(now+delay+.38);
    });
  }
  function wrong() {
    resume(); const now = ctx.currentTime;
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(260,now); o.frequency.exponentialRampToValueAtTime(120,now+.24);
    g.gain.setValueAtTime(.22,now); g.gain.exponentialRampToValueAtTime(.001,now+.24);
    o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now+.24);
    const o2=ctx.createOscillator(), g2=ctx.createGain();
    o2.type='sine'; o2.frequency.setValueAtTime(90,now); o2.frequency.exponentialRampToValueAtTime(45,now+.24);
    g2.gain.setValueAtTime(.18,now); g2.gain.exponentialRampToValueAtTime(.001,now+.24);
    o2.connect(g2); g2.connect(ctx.destination); o2.start(now); o2.stop(now+.24);
  }
  return { correct, wrong };
})();

function el(id) { return document.getElementById('ml-'+id); }
function toAr(n) { return String(n).replace(/[0-9]/g,function(d){return '٠١٢٣٤٥٦٧٨٩'[d];}); }

// ══════════════════════════════════════════════════

// ══════════════════════════════════════════════════
function renderQuestion() {
  const q = QUESTIONS[qIndex];

  // Progress dots
  const dotsEl = el('dots'); dotsEl.innerHTML='';
  QUESTIONS.forEach(function(_,i){
    const d=document.createElement('div');
    d.className='dot'+(i===qIndex?' active':i<qIndex?' done':'');
    dotsEl.appendChild(d);
  });

  el('qPrompt').textContent = q.prompt;
  el('refRule').textContent  = q.rule;

  // Rule icons
  const riEl = el('refItems'); riEl.innerHTML='';
  q.ruleIcons.forEach(function(ref) {
    const d=document.createElement('div'); d.className='rule-icon';
    const img=document.createElement('img');
    img.src=ITEM_IMGS[ref.slice(4)]; // strip 'img:'
    img.style.cssText='width:28px;height:28px;object-fit:contain;display:block';
    d.appendChild(img); riEl.appendChild(d);
  });

  // Box config
  function renderTitle(elId, cfg) {
    const t=el(elId); t.innerHTML='';
    if (cfg.titleImg) t.appendChild(mkImg(cfg.titleImg,26));
    const s=document.createElement('span'); s.textContent=cfg.label; t.appendChild(s);
  }
  el('boxA').dataset.tone=q.boxA.tone; renderTitle('titleA',q.boxA);
  el('boxB').dataset.tone=q.boxB.tone; renderTitle('titleB',q.boxB);

  ['itemsA','itemsB'].forEach(function(id){
    const e=el(id); e.innerHTML='<div class="placeholder">⬇︎</div>'; e.classList.remove('has-item');
  });

  // Shuffle and render tray
  const shuffled = q.items.slice().sort(function(){return Math.random()-.5;});
  const trayEl = el('tray'); trayEl.innerHTML='';
  shuffled.forEach(function(item,i){
    const div=document.createElement('div');
    div.className='item';

    div.dataset.key=item.key;
    div.style.animationDelay=(0.07+i*0.06)+'s';
    div.appendChild(mkImg(item.key,72));
    attachDrag(div);
    trayEl.appendChild(div);
  });

  placedCount=0;
  if (mlCountdownTimer) { clearInterval(mlCountdownTimer); mlCountdownTimer = null; }
  if (document.getElementById('ml-nextWrap')) document.getElementById('ml-nextWrap').style.display = 'none';

}

// ══════════════════════════════════════════════════
// DRAG & DROP (pointer events)
// ══════════════════════════════════════════════════
let ghost=null, dragEl=null;

function attachDrag(itemEl) {
  itemEl.addEventListener('pointerdown', onPointerDown);
}

function onPointerDown(e) {
  e.preventDefault();
  if (dragEl) return;
  dragEl = e.currentTarget;

  ghost = document.createElement('div'); ghost.className='ml-ghost';
  const gi=document.createElement('img');
  gi.src=ITEM_IMGS[dragEl.dataset.key];
  gi.style.cssText='width:72px;height:72px;object-fit:contain;display:block';
  ghost.appendChild(gi); document.body.appendChild(ghost);
  dragEl.classList.add('dragging');
  moveGhost(e.clientX, e.clientY);
  document.addEventListener('pointermove', onPointerMove);
  document.addEventListener('pointerup',   onPointerUp);
  document.addEventListener('pointercancel', onPointerUp);
}

function moveGhost(x,y) { ghost.style.left=x+'px'; ghost.style.top=y+'px'; }

function onPointerMove(e) {
  moveGhost(e.clientX, e.clientY);
  document.querySelectorAll('#mlRoot .box').forEach(function(box){
    const r=box.getBoundingClientRect();
    box.classList.toggle('over', e.clientX>=r.left && e.clientX<=r.right && e.clientY>=r.top && e.clientY<=r.bottom);
  });
}

function onPointerUp(e) {
  document.removeEventListener('pointermove', onPointerMove);
  document.removeEventListener('pointerup',   onPointerUp);
  document.removeEventListener('pointercancel', onPointerUp);
  if (!dragEl || !ghost) return;

  ghost.style.display='none';
  const below=document.elementFromPoint(e.clientX, e.clientY);
  ghost.style.display='';
  const targetBox=below?below.closest('.box'):null;
  document.querySelectorAll('#mlRoot .box').forEach(function(b){b.classList.remove('over');});

  if (targetBox) {
    const correct = dragEl.dataset.answer === targetBox.dataset.box;
    if (correct) {
      mlAudio.correct(); flash('ok');
      targetBox.classList.add('pulse-ok');
      setTimeout(function(){targetBox.classList.remove('pulse-ok');},450);
      dragEl.classList.remove('dragging'); dragEl.classList.add('placed');
      const imgEl=dragEl.querySelector('img');
      if (imgEl) { imgEl.style.width='36px'; imgEl.style.height='36px'; }
      const area=targetBox.querySelector('.box-items');
      area.classList.add('has-item'); area.appendChild(dragEl);
      score+=10; el('scoreVal').textContent=toAr(score);
      placedCount++;
      if (placedCount >= QUESTIONS[qIndex].items.length) mlStartCountdown();
    } else {
      mlAudio.wrong(); flash('bad');
      targetBox.classList.add('shake');
      setTimeout(function(){targetBox.classList.remove('shake');},380);
      dragEl.classList.add('shake');
      setTimeout(function(){dragEl.classList.remove('shake');},380);
      dragEl.classList.remove('dragging'); el('tray').appendChild(dragEl);
    }
  } else {
    dragEl.classList.remove('dragging'); el('tray').appendChild(dragEl);
  }
  ghost.remove(); ghost=null; dragEl=null;
}

// ══════════════════════════════════════════════════
// FLASH
// ══════════════════════════════════════════════════
function flash(type) {
  const f=el('flash'); f.className='flash '+type;
  void f.offsetWidth; f.classList.add('show');
  setTimeout(function(){f.classList.remove('show');},560);
}

// ══════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════
function mlNextQuestion() {
  qIndex++;
  if (qIndex>=QUESTIONS.length) { showWin(); } else { renderQuestion(); }
}
function showWin() {
  el('winScoreVal').textContent=toAr(score);
  el('winOverlay').classList.add('show');
  launchConfetti();
}
var mlCountdownTimer = null;
function mlStartCountdown() {
  var secs = 5;
  var wrap = document.getElementById('ml-nextWrap');
  var fill = document.getElementById('ml-countdownFill');
  var txt  = document.getElementById('ml-countdownTxt');
  if (!wrap) return;
  wrap.style.display = 'block';
  fill.style.animation = 'none';
  void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 5s linear forwards';
  txt.textContent = toAr(secs);
  mlCountdownTimer = setInterval(function() {
    secs--;
    if (txt) txt.textContent = toAr(Math.max(0, secs));
    if (secs <= 0) {
      clearInterval(mlCountdownTimer);
      mlCountdownTimer = null;
      if (wrap) wrap.style.display = 'none';
      mlNextQuestion();
    }
  }, 1000);
}

function mlHandleWinNext() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ action: 'nextLesson' }, '*');
  } else { window.location.href = 'moosa-lesson-classify 4.html'; }
}

function mlHandleWinContinue() {
  if (mlCountdownTimer) { clearInterval(mlCountdownTimer); mlCountdownTimer = null; }
  document.getElementById('ml-confettiContainer').innerHTML='';
  el('winOverlay').classList.remove('show');
  qIndex=0; score=0;
  el('scoreVal').textContent=toAr(0);
  renderQuestion();
}

// ══════════════════════════════════════════════════
// CONFETTI
// ══════════════════════════════════════════════════
function launchConfetti() {
  const colors=['#F5C518','#8dd04d','#FF9F45','#E0654A','#5BBE5B','#C8923A','#fff','#a8e06a'];
  const container=document.getElementById('ml-confettiContainer'); container.innerHTML='';
  for(let i=0;i<55;i++){
    const p=document.createElement('div');
    const size=7+Math.random()*7, isCircle=Math.random()>.5;
    const color=colors[Math.floor(Math.random()*colors.length)];
    const duration=1.4+Math.random()*2, delay=Math.random()*1.2, left=Math.random()*100;
    p.className='ml-confetti';
    p.style.cssText=['left:'+left+'%','top:0','width:'+size+'px','height:'+size+'px',
      'background:'+color,'border-radius:'+(isCircle?'50%':'2px'),
      'animation:ml-confettiFall '+duration+'s ease-in '+delay+'s both'].join(';');
    container.appendChild(p);
  }
}

// INIT
// ══════════════════════════════════════════════════
renderQuestion();

    var _hw=document.querySelector('.ml-widget');var wR=_hw?_hw.getBoundingClientRect():{left:0,top:0};
    hand.style.transition='none';
    hand.style.left=(iR.left-wR.left+iR.width/2-19)+'px';
    hand.style.top=(iR.top-wR.top-14)+'px';
    hand.style.opacity='0';
    hand.classList.add('appear');
    animT=setTimeout(function(){
      hand.style.transition='left .75s cubic-bezier(.4,0,.2,1),top .75s cubic-bezier(.4,0,.2,1),transform .75s,opacity .3s';
      hand.style.left=(bR.left-wR.left+bR.width/2-19)+'px';
      hand.style.top=(bR.top-wR.top+bR.height/2-19)+'px';
      hand.style.transform='scale(.9) rotate(0deg)';
      hand.style.opacity='1';
      animT=setTimeout(function(){hide();animT=setTimeout(run,1800);},900);
    },700);
  }
  if(document.readyState==='loading'){window.addEventListener('load',init);}else{init();}
})();
</script>

<script>
(function(){
  var c=document.getElementById('ml-dots')||document.getElementById('mlDots')||document.getElementById('roundRow');
  if(!c){
    var tb=document.querySelector('.ml-widget .top-bar');
    if(!tb)return;
    c=document.createElement('div');c.className='progress-dots';c.id='mlDots';
    tb.insertAdjacentElement('afterend',c);
  }
  function getIdx(){try{if(typeof qIndex!=='undefined')return qIndex;}catch(e){}try{if(typeof stepIndex!=='undefined')return stepIndex;}catch(e){}try{if(typeof stepIdx!=='undefined')return stepIdx;}catch(e){}try{if(typeof mlStepIdx!=='undefined')return mlStepIdx;}catch(e){}return 0;}
  function getTotal(){try{if(typeof QUESTIONS!=='undefined'&&QUESTIONS.length)return QUESTIONS.length;}catch(e){}try{if(typeof STEPS!=='undefined'&&STEPS.length)return STEPS.length;}catch(e){}try{if(typeof ML_STEPS!=='undefined'&&ML_STEPS.length)return ML_STEPS.length;}catch(e){}try{if(typeof ML_TOTAL==='number')return ML_TOTAL;}catch(e){}return 0;}
  var _busy=false;
  var obs=new MutationObserver(function(){if(!_busy)render();});
  function render(){
    if(_busy)return;
    var total=getTotal();if(!total)return;
    var idx=getIdx(),key=idx+'/'+total;
    if(c._qk===key)return;
    c._qk=key;_busy=true;obs.disconnect();
    c.innerHTML='';
    for(var i=0;i<total;i++){var d=document.createElement('span');d.className='qdot'+(i===idx?' active':i<idx?' done':'');c.appendChild(d);}
    _busy=false;obs.observe(c,{childList:true});
  }
  if(typeof renderDots!=='undefined'){
    window.renderDots=function(){
      var sv=document.getElementById('ml-scoreVal')||document.getElementById('mlScoreVal');
      if(sv){try{var sc=typeof score!=='undefined'?score:typeof mlScore!=='undefined'?mlScore:null;if(sc!==null)sv.textContent=String(sc).replace(/[0-9]/g,function(d){return'٠١٢٣٤٥٦٧٨٩'[+d];});}catch(e){}}
      render();
    };
  }
  obs.observe(c,{childList:true});
  setInterval(render,500);render();
})();
</script>

<script>
/* == lesson progress nav == */
(function(){
  var fn=decodeURIComponent((location.pathname.split('/').pop()||'').split('?')[0]);
  var ch=null,idx=0,total=0,nextFile=null,m;
  var LP_HERE='moosa-lessons.html';
  var LP_OTHER='../Interactive book for elementary school chapter 1/moosa-lessons.html';
  var LP=LP_HERE;
  if((m=fn.match(/^moosa-lesson-classify (\d+)\.html$/))){ch='ch1';idx=+m[1]-1;total=5;nextFile='moosa-lesson-classify '+(+m[1]+1)+'.html';}
  else if((m=fn.match(/^moosa-chp 2-lesson (\d+)\.html$/))){ch='ch2';idx=+m[1]-1;total=6;nextFile='moosa-chp 2-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 3-lesson (\d+)\.html$/))){ch='ch3';idx=+m[1]-1;total=6;nextFile='moosa-chp 3-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 4-lesson (\d+)\.html$/))){ch='ch4';idx=+m[1]-1;total=3;nextFile='moosa-chp 4-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  if(!ch)return;
  var isLast=idx>=total-1;
  function saveDone(){try{var k='moosa_'+ch,p=JSON.parse(localStorage.getItem(k)||'[]');if(p.indexOf(idx)===-1){p.push(idx);localStorage.setItem(k,JSON.stringify(p));}}catch(e){}}
  var ov=document.querySelector('.win-overlay');
  if(ov){
    try{new MutationObserver(function(){if(ov.classList.contains('show'))saveDone();}).observe(ov,{attributes:true,attributeFilter:['class']});}catch(e){}
    if(ov.classList.contains('show'))saveDone();
  }
  window.mlHandleWinNext=function(){
    saveDone();
    if(window.parent&&window.parent!==window){window.parent.postMessage({action:'nextLesson'},'*');return;}
    location.href=isLast?LP:nextFile;
  };
})();
</script>
