<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى يتعلم — يُسَاوي</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html, body {
  height: 100%; margin: 0; padding: 0;
  overflow: hidden;
  background: linear-gradient(160deg,#FFFFFF 0%,#F2F2F2 100%); /* amber body per design system */
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ═══════════════════════════════════════════
   MOOSA DESIGN SYSTEM v1.1 — Widget Root
   ═══════════════════════════════════════════ */
.ml-widget {
  --amber:      #1F1F1F;
  --amber-dark: #141414;
  --cream:      #FFFFFF;
  --ink:        #1C1917;
  --ink-soft:   #78716C;
  --green:      #22C55E;
  --green-dark: #16A34A;
  --green-text: #14532D;
  --ok:         #22C55E;
  --bad:        #EF4444;
  --tile:       #E8E0D0;
  --font-d: 'Baloo Bhaijaan 2', 'Tajawal', sans-serif;
  --font-b: 'Tajawal', sans-serif;
  --ease-b: cubic-bezier(.34, 1.56, .64, 1);

  width: 100%; height: 100vh; height: 100svh;
  max-width: 480px; margin: 0 auto;
  display: flex; flex-direction: column;
  background: var(--cream);
  font-family: var(--font-b);
  overflow: hidden; position: relative;
}
.ml-widget *, .ml-widget *::before, .ml-widget *::after {
  box-sizing: border-box; margin: 0; padding: 0;
}

/* ── Top bar ──────────────────────────────── */
.ml-widget .top-bar {
  background: var(--amber);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  flex-shrink: 0;
}
.ml-widget .score-label {
  font-family: var(--font-d); font-size: 14px; font-weight: 700;
  color: rgba(255,255,255,.75); letter-spacing: .5px;
}
.ml-widget .score-val {
  font-family: var(--font-d); font-size: 24px; font-weight: 800;
  color: #fff; line-height: 1;
}

/* ── Progress dots ────────────────────────── */
.ml-widget .progress-dots {
  display: flex; gap: 6px; align-items: center; justify-content: center;
  padding: 6px 0 2px; flex-shrink: 0;
}
.ml-widget .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(61,38,16,.18);
  transition: background .3s, transform .3s;
}
.ml-widget .dot.active { background: var(--amber); transform: scale(1.35); }
.ml-widget .dot.done   { background: var(--green); }

/* ── Question prompt ──────────────────────── */
.ml-widget .q-prompt {
  text-align: center;
  font-family: var(--font-d); font-size: 17px; font-weight: 800;
  color: var(--ink); flex-shrink: 0;
  padding: 6px 16px 2px;
}

/* ── Play area ────────────────────────────── */
.ml-widget .play {
  flex: 1; display: flex; flex-direction: column;
  min-height: 0; overflow: hidden; position: relative;
}

/* ── Matching arena ───────────────────────── */
/* Full-height canvas div; items are absolutely positioned */
.ml-widget .arena-wrap {
  flex: 1; position: relative; min-height: 0;
}
.ml-widget .arena-canvas {
  position: absolute; inset: 0;
  pointer-events: none;
}
.ml-widget .arena-cols {
  position: absolute; inset: 0;
  display: flex; align-items: stretch;
}

/* Dashed centre divider */
.ml-widget .divider {
  flex-shrink: 0;
  width: 2px;
  margin: 0 auto;
  background: repeating-linear-gradient(
    to bottom,
    rgba(61,38,16,.22) 0px,
    rgba(61,38,16,.22) 8px,
    transparent 8px,
    transparent 16px
  );
  align-self: stretch;
}

/* Left / right columns */
.ml-widget .col {
  flex: 1;
  display: flex; flex-direction: column;
  align-items: center;
  justify-content: space-around;
  padding: 12px 10px;
  gap: 10px;
}

/* ── Item tile ────────────────────────────── */
.ml-widget .m-tile {
  position: relative;
  width: 110px; height: 110px;
  border-radius: 22px;
  background: #fff;
  /* 3D look: border + bottom shadow */
  border: 4px solid #D8CFC0;
  box-shadow:
    0 6px 0 #C0B49A,        /* bottom 3D edge */
    0 8px 14px rgba(80,50,10,.15); /* ambient */
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition:
    border-color .18s,
    background   .18s,
    box-shadow   .18s,
    transform    .12s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  animation: ml-pop .38s var(--ease-b) both;
  flex-shrink: 0;
}
.ml-widget .m-tile img {
  width: 78px; height: 78px;
  object-fit: contain; display: block;
  pointer-events: none;
}

/* Selected state → amber highlight */
.ml-widget .m-tile.selected {
  border-color: var(--amber);
  background: #FFFAE8;
  box-shadow:
    0 6px 0 var(--amber-dark),
    0 8px 18px rgba(232,160,32,.30),
    0 0 0 3px rgba(232,160,32,.20);
  transform: scale(1.05);
}

/* Connected state → green tile like screenshot */
.ml-widget .m-tile.connected {
  border-color: var(--green);
  background: #F0FAE8;
  box-shadow:
    0 6px 0 var(--green-dark),
    0 8px 14px rgba(58,128,16,.18);
  cursor: default;
}

/* Wrong shake */
.ml-widget .m-tile.shake { animation: ml-shake .38s; }
@keyframes ml-shake {
  0%,100% { transform: translateX(0) }
  25%     { transform: translateX(-7px) }
  75%     { transform: translateX(7px) }
}

/* Number badge — amber circle top-left */
.ml-widget .badge {
  position: absolute;
  top: -8px; right: -8px;   /* RTL: right = visual left */
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--amber);
  border: 3px solid #fff;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-d); font-size: 13px; font-weight: 800;
  color: #fff;
  box-shadow: 0 2px 6px rgba(80,40,0,.25);
  pointer-events: none;
  z-index: 5;
}

/* Connection endpoint dot — sits on the inner connecting edge */
.ml-widget .col-left  .m-tile .conn-dot { left:  -2px; }
.ml-widget .col-right .m-tile .conn-dot { right: -2px; }
.ml-widget .m-tile .conn-dot {
  position: absolute;
  top: 50%; transform: translateY(-50%);
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  border: 3px solid #D8CFC0;
  pointer-events: none;
  z-index: 4;
  transition: border-color .18s;
  display: none; /* shown only when selected or connected */
}
.ml-widget .m-tile.selected .conn-dot,
.ml-widget .m-tile.connected .conn-dot {
  display: block;
}
.ml-widget .m-tile.selected .conn-dot { border-color: var(--amber); }

/* ── Next button ──────────────────────────── */
.ml-widget .next-wrap { padding: 0 12px 12px; flex-shrink: 0; }
.ml-widget .btn-next {
  width: 100%; padding: 13px;
  border-radius: 14px; border: none;
  font-family: var(--font-d); font-size: 19px; font-weight: 800;
  color: var(--green-text); background: var(--green);
  cursor: pointer;
  box-shadow: 0 5px 0 var(--green-dark);
  transition: transform .1s, opacity .2s;
  -webkit-tap-highlight-color: transparent;
}
.ml-widget .btn-next:active   { transform: translateY(4px); box-shadow: 0 1px 0 var(--green-dark); }
.ml-widget .btn-next:disabled { opacity: .35; cursor: not-allowed; }

/* ── Feedback flash ───────────────────────── */
.ml-widget .flash {
  position: absolute; inset: 0; z-index: 50;
  pointer-events: none; opacity: 0;
}
.ml-widget .flash.ok  { background: radial-gradient(circle, rgba(75,176,64,.22), transparent 70%); }
.ml-widget .flash.bad { background: radial-gradient(circle, rgba(208,80,48,.22), transparent 70%); }
.ml-widget .flash.show { animation: ml-flashAnim .55s ease-out; }
@keyframes ml-flashAnim { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }

/* ── Win overlay ──────────────────────────── */
.ml-widget .win-overlay {
  position: absolute; inset: 0; z-index: 100;
  background: rgba(0,0,0,.72);
  display: none; align-items: center; justify-content: center; padding: 24px;
}
.ml-widget .win-overlay.show { display: flex; animation: ml-fadeIn .35s ease; }
@keyframes ml-fadeIn { from{opacity:0} to{opacity:1} }
.ml-widget .win-card {
  text-align: center; display: flex; flex-direction: column; align-items: center;
  animation: ml-winPop .5s var(--ease-b) both;
}
@keyframes ml-winPop {
  0%  { transform: scale(.55); opacity: 0 }
  70% { transform: scale(1.04) }
  100%{ transform: scale(1);   opacity: 1 }
}
.ml-widget .win-rays {
  position: relative; width: 220px; height: 220px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: -16px;
}
.ml-widget .win-rays svg.rays {
  position: absolute; inset: 0; width: 100%; height: 100%;
  animation: ml-spin 8s linear infinite;
}
@keyframes ml-spin { to { transform: rotate(360deg) } }
.ml-widget .mascot {
  position: relative; z-index: 2;
  width: 200px; height: 200px;
  display: flex; align-items: center; justify-content: center;
  animation: ml-bob 1.8s ease-in-out infinite;
}
.ml-widget .mascot .mascot-svg {
  width: 200px; height: 200px;
  background: transparent; display: block;
}
@keyframes ml-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
.ml-widget .win-title {
  font-family: var(--font-d); font-size: 30px; font-weight: 800;
  color: #fff; margin-bottom: 4px;
}
.ml-widget .win-stars { display: flex; gap: 8px; margin: 8px 0; }
.ml-widget .win-stars span {
  font-size: 32px; animation: ml-starPop .45s var(--ease-b) both;
}
.ml-widget .win-stars span:nth-child(1) { animation-delay: .30s }
.ml-widget .win-stars span:nth-child(2) { animation-delay: .48s }
.ml-widget .win-stars span:nth-child(3) { animation-delay: .66s }
@keyframes ml-starPop {
  0%  { transform: scale(0) rotate(-20deg); opacity: 0 }
  70% { transform: scale(1.25) }
  100%{ transform: scale(1);   opacity: 1 }
}
.ml-widget .win-score-row {
  display: flex; align-items: baseline; gap: 8px;
  margin: 8px 0 18px; font-family: var(--font-d);
}
.ml-widget .win-score-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.75); }
.ml-widget .win-score-val   { font-size: 28px; font-weight: 800; color: #fff; }
.ml-widget .btn-win {
  padding: 12px 44px; border-radius: 14px; border: none;
  font-family: var(--font-d); font-size: 19px; font-weight: 800;
  color: var(--green-text); background: var(--green);
  cursor: pointer; box-shadow: 0 5px 0 var(--green-dark);
  transition: transform .1s; -webkit-tap-highlight-color: transparent;
}
.ml-widget .btn-win:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--green-dark); }

/* Confetti */
.ml-confetti { position: absolute; pointer-events: none; z-index: 9998; }
#ml-confettiContainer { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 9998; }
@keyframes ml-confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1 }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0 }
}
@keyframes ml-pop {
  0%   { transform: scale(0); opacity: 0 }
  70%  { transform: scale(1.08) }
  100% { transform: scale(1);  opacity: 1 }
}
/* Line draw-on animation */
@keyframes ml-lineDraw {
  from { stroke-dashoffset: var(--len, 600); }
  to   { stroke-dashoffset: 0; }
}

/* ═══════════════════════════════════════
   UNIFIED DESIGN SYSTEM — win screen
   ═══════════════════════════════════════ */

/* top-bar consistent height/padding */
.top-bar{flex-shrink:0;background:linear-gradient(135deg,#3A3A3A 0%,#1F1F1F 60%,#141414 100%) !important;padding:12px 20px !important;box-shadow:0 2px 8px rgba(0,0,0,.18);}

/* win overlay — modern frosted dark */
.ml-widget .win-overlay,.win-overlay{
  background:rgba(15,8,0,.82) !important;
  backdrop-filter:blur(8px) !important;
  -webkit-backdrop-filter:blur(8px) !important;
}
/* win card — glass card */
.ml-widget .win-card,.win-card{
  display:flex !important;flex-direction:column !important;align-items:center !important;
  background:rgba(255,255,255,.10) !important;
  border:2px solid rgba(255,255,255,.22) !important;
  border-radius:28px !important;
  padding:24px 32px 28px !important;
  box-shadow:0 8px 32px rgba(0,0,0,.3) !important;
  gap:0 !important;
}
/* hide ALL old mascot variants */
.ml-widget .mascot,.mascot,
.win-mascot,.ml-widget .win-mascot,
.mascot-img,.ml-widget .mascot-img,
.win-scene{display:none !important;}
/* unified mascot */
.win-unified-mascot{
  width:150px;height:150px;object-fit:contain;
  display:block;margin:0 auto 4px;
  animation:ml-bob 1.8s ease-in-out infinite;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));
}
/* win-rays — keep spinning above mascot */
.ml-widget .win-rays,.win-rays{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-bottom:-155px;}
.ml-widget .win-rays svg,.win-rays svg.rays,.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
/* win title */
.ml-widget .win-title,.win-title{
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;
  font-size:30px !important;font-weight:800 !important;
  color:#fff !important;
  text-shadow:0 2px 6px rgba(0,0,0,.3) !important;
  margin:8px 0 4px !important;
}
/* win stars */
.ml-widget .win-stars,.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px;}
.ml-widget .win-stars span,.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b,cubic-bezier(.34,1.56,.64,1)) both;opacity:0;}
.ml-widget .win-stars span:nth-child(1),.win-stars span:nth-child(1){animation-delay:.3s}
.ml-widget .win-stars span:nth-child(2),.win-stars span:nth-child(2){animation-delay:.48s}
.ml-widget .win-stars span:nth-child(3),.win-stars span:nth-child(3){animation-delay:.66s}
@keyframes ml-starPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
/* win score */
.ml-widget .win-score-row,.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;}
.ml-widget .win-score-label,.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.ml-widget .win-score-val,.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.ml-widget .win-score,.win-score{font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin:4px 0 10px;}
/* play-again button — all variants */
.ml-widget .btn-win,.btn-win,
.ml-widget .win-btn,.win-btn,
.btn-win-again{
  margin-top:14px !important;
  padding:14px 48px !important;
  border:3px solid rgba(255,255,255,.9) !important;
  border-radius:20px !important;
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif !important;
  font-size:20px !important;font-weight:800 !important;
  color:#fff !important;text-shadow:0 1px 2px rgba(0,0,0,.2) !important;
  background:linear-gradient(135deg,#4ADE80 0%,#22C55E 55%,#16A34A 100%) !important;
  box-shadow:0 6px 0 #15803D,0 8px 20px rgba(22,163,74,.28) !important;
  cursor:pointer;
  transition:transform 150ms cubic-bezier(.34,1.56,.64,1),box-shadow 150ms ease;
  -webkit-tap-highlight-color:transparent;
}
.ml-widget .btn-win:active,.btn-win:active,
.ml-widget .win-btn:active,.win-btn:active,
.btn-win-again:active{
  transform:translateY(4px) !important;
  box-shadow:0 1px 0 #15803D,0 3px 8px rgba(22,163,74,.2) !important;
}

/* ── countdown bar ── */
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#22C55E,#4ADE80);border-radius:14px;transform-origin:right center;animation:mlCountdownShrink 5s linear forwards;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}

/* ── win two-button row ── */
.win-btns{display:flex;gap:10px;margin-top:14px !important;width:100%;}
.win-btns .btn-win{margin-top:0 !important;padding:14px 0 !important;font-size:17px !important;flex:1;min-width:0;}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%) !important;box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28) !important;}
.btn-win-next:active{transform:translateY(4px) !important;box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2) !important;}


/* ═══════════════════════════════
   MOOSA NARRATOR GUIDE — FEMALE
   ═══════════════════════════════ */
</style>
</head>
<body>

<div class="ml-widget" dir="rtl" id="ml-root">

  <!-- Top bar -->
  <div class="top-bar">
    <span class="score-label">النقاط</span>
    <span class="score-val" id="ml-scoreVal">٠</span>
  </div>

  <!-- Progress dots -->
  <div class="progress-dots" id="ml-dots"></div>

  <!-- Play -->
  <div class="play">
    <div class="q-prompt" id="ml-qPrompt"></div>

    <div class="arena-wrap" id="ml-arenaWrap">
      <!-- SVG lines rendered here -->
      <svg class="arena-canvas" id="ml-svg"
           xmlns="http://www.w3.org/2000/svg"
           style="overflow:visible"></svg>

      <div class="arena-cols">
        <!-- RTL: right col = right side visually -->
        <div class="col col-right" id="ml-colRight"></div>
        <div class="divider"></div>
        <div class="col col-left"  id="ml-colLeft"></div>
      </div>
    </div>
  </div>

  <!-- §10 Auto-advance countdown -->
  <div class="next-wrap" id="ml-nextWrap" style="display:none">
    <div class="countdown-bar">
      <div class="countdown-fill" id="ml-countdownFill"></div>
      <span class="countdown-txt" id="ml-countdownTxt">٥</span>
    </div>
  </div>

  <!-- Win overlay -->
  <div class="win-overlay" id="ml-winOverlay">
    <div class="win-card">
      <div class="win-rays"><svg class="rays" viewBox="0 0 200 200" fill="none"><g transform="translate(100,100)"><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(30)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(60)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(90)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(120)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(150)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(180)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(210)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(240)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(270)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(300)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(330)"/></g></svg></div>
      <img class="win-unified-mascot" src="../mascot.png" alt="موسى">
      <div class="win-title">أحسنت! 🎉</div>
      <div class="win-stars"><span>⭐</span><span>⭐</span><span>⭐</span></div>
      <div class="win-score-row"><span class="win-score-label">النقاط</span><span class="win-score-val" id="ml-winScoreVal">٠</span></div>
      <div class="win-btns">
        <button class="btn-win btn-win-next" onclick="mlHandleWinNext()">التالي ›</button>
        <button class="btn-win btn-win-repeat" onclick="mlHandleWinContinue()">إعادة 🔄</button>
      </div>
    </div>
  </div>

  <div class="flash" id="ml-flash"></div>
  <div id="ml-confettiContainer"></div>
</div>

<script>

// ── ARABIC DIGITS ────────────────────────────────────────────
function toAr(n) {
  return String(n).replace(/[0-9]/g, function(d){ return '٠١٢٣٤٥٦٧٨٩'[+d]; });
}

// ── LINE COLOURS (one per pair) ──────────────────────────────
var LINE_COLORS = ['#E8960A','#3A9BDC','#22C55E','#C04080','#8040C0','#DC6020'];

// ── QUESTIONS ────────────────────────────────────────────────
// Each question has left[] and right[] arrays — same item key = correct pair.
// badge = the count number shown on the tile (from the textbook).
// Items are shuffled before display; matching is by key identity.
var QUESTIONS = [
  {
    prompt: 'صِل كلّ عنصر بما يُسَاويه',
    // Q1: pencils vs erasers (4 each)
    pairs: [
      { key:'pencil',   badge:4 },
      { key:'eraser',   badge:4 },
      { key:'ruler',    badge:3 },
      { key:'crayon',   badge:5 }
    ]
  },
  {
    prompt: 'صِل كلّ عنصر بما يُسَاويه',
    // Q2: paintbrushes vs palettes, crayon boxes vs storybooks
    pairs: [
      { key:'paintbrush',   badge:3 },
      { key:'paint_palette',badge:3 },
      { key:'crayon_box',   badge:4 },
      { key:'storybook',    badge:3 }
    ]
  },
  {
    prompt: 'صِل كلّ عنصر بما يُسَاويه',
    // Q3: bags & notebooks
    pairs: [
      { key:'lunchbox',        badge:5 },
      { key:'book_orange',     badge:4 },
      { key:'notepad',         badge:3 },
      { key:'notebook_orange', badge:2 }
    ]

];

// ── SOUND ENGINE ─────────────────────────────────────────────
var mlAudio = (function(){
  var ctx = null;
  function gc(){ if(!ctx) ctx=new(window.AudioContext||window.webkitAudioContext)(); return ctx; }
  function correct(){
    try{
      var c=gc(), t=c.currentTime;
      [{f:523.25,s:0},{f:659.25,s:.12}].forEach(function(x){
        var o=c.createOscillator(), g=c.createGain();
        o.type='triangle'; o.frequency.setValueAtTime(x.f,t+x.s);
        g.gain.setValueAtTime(.35,t+x.s); g.gain.exponentialRampToValueAtTime(.001,t+x.s+.28);
        o.connect(g); g.connect(c.destination); o.start(t+x.s); o.stop(t+x.s+.30);
      });
    }catch(e){}
  }
  function wrong(){
    try{
      var c=gc(), t=c.currentTime;
      var o=c.createOscillator(), g=c.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime(260,t);
      o.frequency.exponentialRampToValueAtTime(120,t+.22);
      g.gain.setValueAtTime(.25,t); g.gain.exponentialRampToValueAtTime(.001,t+.24);
      o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+.25);
    }catch(e){}
  }
  return {correct:correct, wrong:wrong};
})();

// ── STATE ────────────────────────────────────────────────────
var qIndex    = 0;
var score     = 0;
var selected  = null;   // { side, key, colorIdx, el }
var connectedKeys = {}; // key -> colorIdx when matched
var pairCount = 0;

// ── HELPERS ──────────────────────────────────────────────────
function elById(id){ return document.getElementById('ml-'+id); }

function mkImg(key, size){
  var img = document.createElement('img');
  img.src = ITEM_IMGS[key];
  img.alt = key;
  img.style.cssText = 'width:'+size+'px;height:'+size+'px;object-fit:contain;display:block';
  return img;
}

function flash(type){
  var f = elById('flash');
  f.className = 'flash '+type;
  void f.offsetWidth;
  f.classList.add('show');
  setTimeout(function(){ f.className='flash'; }, 600);
}

function shuffle(arr){
  var a = arr.slice();
  for(var i=a.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var tmp=a[i]; a[i]=a[j]; a[j]=tmp;
  }
  return a;
}

// ── RENDER ───────────────────────────────────────────────────
function renderQuestion(){
  var q = QUESTIONS[qIndex];
  connectedKeys = {};
  pairCount     = 0;
  selected      = null;

  // Progress dots
  var dotsEl = elById('dots');
  dotsEl.innerHTML = '';
  QUESTIONS.forEach(function(_,i){
    var d = document.createElement('div');
    d.className = 'dot'+(i===qIndex?' active':i<qIndex?' done':'');
    dotsEl.appendChild(d);
  });

  // Prompt
  elById('qPrompt').textContent = q.prompt;

  // Reset countdown on new question
  if (mlCountdownTimer) { clearInterval(mlCountdownTimer); mlCountdownTimer = null; }
  if (document.getElementById('ml-nextWrap')) document.getElementById('ml-nextWrap').style.display = 'none';

  // Shuffle left and right independently
  var leftItems  = shuffle(q.pairs);
  var rightItems = shuffle(q.pairs);

  // Build columns
  var colL = elById('colLeft');
  var colR = elById('colRight');
  colL.innerHTML = '';
  colR.innerHTML = '';

  // Clear SVG
  var svg = elById('svg');
  svg.innerHTML = '';

  leftItems.forEach(function(item, i){
    colL.appendChild(buildTile(item, 'left', i));
  });
  rightItems.forEach(function(item, i){
    colR.appendChild(buildTile(item, 'right', i));
  });
}

function buildTile(item, side, posIdx){
  var wrap = document.createElement('div');
  wrap.className = 'm-tile';
  wrap.dataset.side = side;
  wrap.dataset.key  = item.key;
  wrap.style.animationDelay = (0.06 + posIdx * 0.07) + 's';

  // Item image
  wrap.appendChild(mkImg(item.key, 78));

  // Number badge
  var badge = document.createElement('div');
  badge.className = 'badge';
  badge.textContent = toAr(item.badge);
  wrap.appendChild(badge);

  // Connection endpoint dot (hidden until selected/connected)
  var dot = document.createElement('div');
  dot.className = 'conn-dot';
  wrap.appendChild(dot);

  wrap.addEventListener('pointerup', function(e){
    e.preventDefault();
    onTileClick(wrap);
  });

  return wrap;
}

// ── CLICK LOGIC ──────────────────────────────────────────────
function onTileClick(tile){
  var side = tile.dataset.side;
  var key  = tile.dataset.key;

  if(tile.classList.contains('connected')) return;

  // Nothing selected yet — select this tile
  if(!selected){
    clearSelection();
    tile.classList.add('selected');
    selected = { side:side, key:key, el:tile };
    return;
  }

  // Same side → re-select
  if(selected.side === side){
    clearSelection();
    tile.classList.add('selected');
    selected = { side:side, key:key, el:tile };
    return;
  }

  // Different side → attempt match
  var isMatch = (selected.key === key);

  if(isMatch && !connectedKeys[key]){
    // ✓ Correct
    mlAudio.correct();
    flash('ok');

    var colorIdx = Object.keys(connectedKeys).length % LINE_COLORS.length;
    var color    = LINE_COLORS[colorIdx];

    connectedKeys[key] = color;
    pairCount++;

    // Mark both tiles connected
    var tileA = selected.el;
    var tileB = tile;
    tileA.classList.remove('selected');
    tileB.classList.remove('selected');
    tileA.classList.add('connected');
    tileB.classList.add('connected');

    // Colour the endpoint dots
    tileA.querySelector('.conn-dot').style.borderColor = color;
    tileB.querySelector('.conn-dot').style.borderColor = color;

    // Draw line after a frame so layout is settled
    requestAnimationFrame(function(){
      drawLine(tileA, tileB, color, side);
    });

    score += 10;
    elById('scoreVal').textContent = toAr(score);
    selected = null;

    if(pairCount >= QUESTIONS[qIndex].pairs.length){
      setTimeout(function(){ mlStartCountdown(); }, 300);
    }

  } else {
    // ✗ Wrong
    mlAudio.wrong();
    flash('bad');
    tile.classList.add('shake');
    selected.el.classList.add('shake');
    var _tile = tile, _sel = selected.el;
    setTimeout(function(){
      _tile.classList.remove('shake');
      _sel.classList.remove('shake');
    }, 420);
    clearSelection();
  }
}

function clearSelection(){
  var items = document.querySelectorAll('#ml-root .m-tile.selected');
  items.forEach(function(t){ t.classList.remove('selected'); });
  selected = null;
}

// ── DRAW LINE ────────────────────────────────────────────────
function drawLine(tileA, tileB, color, firstSide){
  var svg  = elById('svg');
  var svgR = svg.getBoundingClientRect();

  var rA = tileA.getBoundingClientRect();
  var rB = tileB.getBoundingClientRect();

  // Endpoint: centre-edge of each tile toward the divider
  // tileA is on one side, tileB on the other
  var sideA = tileA.dataset.side; // 'left' or 'right'
  var sideB = tileB.dataset.side;

  // In our RTL layout, col-right is on the RIGHT side visually,
  // col-left is on the LEFT side visually.
  // The connection dot for col-right tiles is on their LEFT edge (toward center).
  // The connection dot for col-left tiles is on their RIGHT edge (toward center).
  var x1, y1, x2, y2;

  // col-right tile: connect from its LEFT edge
  // col-left tile:  connect from its RIGHT edge
  if(sideA === 'right'){
    x1 = rA.left  - svgR.left;
    x2 = rB.right - svgR.left;
  } else {
    x1 = rA.right - svgR.left;
    x2 = rB.left  - svgR.left;
  }
  y1 = rA.top + rA.height/2 - svgR.top;
  y2 = rB.top + rB.height/2 - svgR.top;

  var dx = x2 - x1, dy = y2 - y1;
  var len = Math.sqrt(dx*dx + dy*dy);

  var path = document.createElementNS('http://www.w3.org/2000/svg','path');
  var d = 'M'+x1+','+y1+' L'+x2+','+y2;
  path.setAttribute('d', d);
  path.setAttribute('stroke', color);
  path.setAttribute('stroke-width', '5.5');
  path.setAttribute('stroke-linecap', 'round');
  path.setAttribute('fill', 'none');
  path.setAttribute('stroke-dasharray', len);
  path.setAttribute('stroke-dashoffset', len);
  path.style.setProperty('--len', len);
  path.style.animation = 'ml-lineDraw 0.35s ease-out forwards';

  // Endpoint circles on the line (on top of tiles)
  function mkCircle(cx, cy, col){
    var c = document.createElementNS('http://www.w3.org/2000/svg','circle');
    c.setAttribute('cx', cx);
    c.setAttribute('cy', cy);
    c.setAttribute('r',  '7');
    c.setAttribute('fill', '#fff');
    c.setAttribute('stroke', col);
    c.setAttribute('stroke-width', '3');
    return c;
  }

  var g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.appendChild(path);
  g.appendChild(mkCircle(x1, y1, color));
  g.appendChild(mkCircle(x2, y2, color));
  svg.appendChild(g);
}

var mlCountdownTimer = null;
function mlStartCountdown() {
  var secs = 5;
  var wrap = document.getElementById('ml-nextWrap');
  var fill = document.getElementById('ml-countdownFill');
  var txt  = document.getElementById('ml-countdownTxt');
  if (!wrap) return;
  wrap.style.display = 'block';
  fill.style.animation = 'none';
  void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 5s linear forwards';
  txt.textContent = toAr(secs);
  mlCountdownTimer = setInterval(function() {
    secs--;
    if (txt) txt.textContent = toAr(Math.max(0, secs));
    if (secs <= 0) {
      clearInterval(mlCountdownTimer);
      mlCountdownTimer = null;
      if (wrap) wrap.style.display = 'none';
      mlNextQuestion();
    }
  }, 1000);
}

.win-stars{display:flex!important;gap:6px!important;justify-content:center!important;margin:6px 0 10px!important;font-size:32px!important;}
.win-stars span{display:inline-block;animation:ml-starPop .45s cubic-bezier(.34,1.56,.64,1) both;opacity:0;}
.win-stars span:nth-child(1){animation-delay:.3s}.win-stars span:nth-child(2){animation-delay:.48s}.win-stars span:nth-child(3){animation-delay:.66s}
.win-score-row{display:flex!important;align-items:baseline;gap:8px;margin:4px 0 12px!important;font-family:'Baloo Bhaijaan 2','Tajawal',sans-serif;justify-content:center;}
.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.win-btns{display:flex!important;gap:10px!important;margin-top:14px!important;width:100%;}
.win-btns .btn-win,.btn-win{flex:1;min-width:0;margin-top:0!important;padding:14px 0!important;border:3px solid rgba(255,255,255,.9)!important;border-radius:20px!important;font-family:'Baloo Bhaijaan 2','Tajawal',sans-serif!important;font-size:17px!important;font-weight:800!important;color:#fff!important;text-shadow:0 1px 2px rgba(0,0,0,.2)!important;background:linear-gradient(135deg,#4ADE80 0%,#22C55E 55%,#16A34A 100%)!important;box-shadow:0 6px 0 #15803D,0 8px 20px rgba(22,163,74,.28)!important;cursor:pointer;transition:transform 150ms cubic-bezier(.34,1.56,.64,1),box-shadow 150ms ease;-webkit-tap-highlight-color:transparent;}
.btn-win:active{transform:translateY(4px)!important;box-shadow:0 1px 0 #15803D,0 3px 8px rgba(22,163,74,.2)!important;}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%)!important;box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28)!important;}
.btn-win-next:active{box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2)!important;}
@keyframes ml-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ml-spin{to{transform:rotate(360deg)}}
@keyframes ml-fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ml-winPop{0%{transform:scale(.55);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes ml-starPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
</style>

<script>
/* == lesson progress nav == */
(function(){
  var fn=decodeURIComponent((location.pathname.split('/').pop()||'').split('?')[0]);
  var ch=null,idx=0,total=0,nextFile=null,m;
  var LP_HERE='moosa-lessons.html';
  var LP_OTHER='../Interactive book for elementary school chapter 1/moosa-lessons.html';
  var LP=LP_HERE;
  if((m=fn.match(/^moosa-lesson-classify (\d+)\.html$/))){ch='ch1';idx=+m[1]-1;total=5;nextFile='moosa-lesson-classify '+(+m[1]+1)+'.html';}
  else if((m=fn.match(/^moosa-chp 2-lesson (\d+)\.html$/))){ch='ch2';idx=+m[1]-1;total=6;nextFile='moosa-chp 2-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 3-lesson (\d+)\.html$/))){ch='ch3';idx=+m[1]-1;total=6;nextFile='moosa-chp 3-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 4-lesson (\d+)\.html$/))){ch='ch4';idx=+m[1]-1;total=3;nextFile='moosa-chp 4-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  if(!ch)return;
  var isLast=idx>=total-1;
  function saveDone(){try{var k='moosa_'+ch,p=JSON.parse(localStorage.getItem(k)||'[]');if(p.indexOf(idx)===-1){p.push(idx);localStorage.setItem(k,JSON.stringify(p));}}catch(e){}}
  var ov=document.querySelector('.win-overlay');
  if(ov){
    try{new MutationObserver(function(){if(ov.classList.contains('show'))saveDone();}).observe(ov,{attributes:true,attributeFilter:['class']});}catch(e){}
    if(ov.classList.contains('show'))saveDone();
  }
  window.mlHandleWinNext=function(){
    saveDone();
    if(window.parent&&window.parent!==window){window.parent.postMessage({action:'nextLesson'},'*');return;}
    location.href=isLast?LP:nextFile;
  };
})();
</script>
