<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>
/* Single narration channel: starting any spoken clip stops the previous one (prevents audio overlap). Tap/win blips use WebAudio and are unaffected. */
(function(){
  if(window.__mlAudioBus__)return; window.__mlAudioBus__=1;
  var cur=null;
  try{
    var P=window.HTMLAudioElement&&HTMLAudioElement.prototype;
    if(P&&P.play){
      var op=P.play;
      P.play=function(){
        if(cur&&cur!==this){try{cur.pause();}catch(e){}try{cur.currentTime=0;}catch(e){}}
        cur=this;
        try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
        return op.apply(this,arguments);
      };
    }
  }catch(e){}
  try{
    var ss=window.speechSynthesis;
    if(ss&&ss.speak){
      var osp=ss.speak;
      ss.speak=function(u){if(cur){try{cur.pause();}catch(e){}}try{return osp.call(ss,u);}catch(e){}};
    }
  }catch(e){}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Moosa Learning — الفصل ١</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   MOOSA LEARNING — LESSON FILE
   Follows Design System v1.1 exactly
   RTL · Mobile-first (max-width 480px) · Wooden-toy aesthetic
   ═══════════════════════════════════════════════════════════ */

html, body {
  height: 100%; margin: 0; padding: 0;
  overflow: hidden;
  background: linear-gradient(160deg,#FFFFFF 0%,#F2F2F2 100%);
}

/* ── 1. Widget root ─────────────────────────────────────── */
.ml-widget {
  --amber:      #1F1F1F;
  --amber-dark: #141414;
  --cream:      #FFFFFF;
  --ink:        #1C1917;
  --ink-soft:   #78716C;
  --green:      #22C55E;
  --green-dark: #16A34A;
  --green-text: #14532D;
  --ok:         #22C55E;
  --bad:        #EF4444;
  --tile:       #E8E0D0;
  --font-d: 'Baloo Bhaijaan 2', 'Tajawal', sans-serif;
  --font-b: 'Tajawal', sans-serif;
  --ease-b: cubic-bezier(.34, 1.56, .64, 1);

  width: 100%; height: 100vh; height: 100svh;
  max-width: 480px; margin: 0 auto;
  display: flex; flex-direction: column;
  background: var(--cream);
  font-family: var(--font-b);
  overflow: hidden; position: relative;
}
.ml-widget *, .ml-widget *::before, .ml-widget *::after {
  box-sizing: border-box; margin: 0; padding: 0;
}

/* ── 2. Top bar (HUD) ───────────────────────────────────── */
.ml-widget .top-bar {
  background: var(--amber);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  flex-shrink: 0;
}
.ml-widget .score-label {
  font-family: var(--font-d);
  font-size: 14px; font-weight: 700;
  color: rgba(255,255,255,.75);
  letter-spacing: .5px;
}
.ml-widget .score-val {
  font-family: var(--font-d);
  font-size: 24px; font-weight: 800;
  color: #fff; line-height: 1;
}

/* ── 2a. Progress dots ──────────────────────────────────── */
.ml-widget .progress-dots {
  display: flex; gap: 6px; align-items: center; justify-content: center;
  padding: 6px 0 0; flex-shrink: 0;
}
.ml-widget .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(61,38,16,.18);
  transition: background .3s, transform .3s;
}
.ml-widget .dot.active { background: var(--amber); transform: scale(1.35); }
.ml-widget .dot.done   { background: var(--green); }

/* ── 3. Play area ───────────────────────────────────────── */
.ml-widget .play {
  flex: 1; display: flex; flex-direction: column;
  padding: 12px 12px 6px; gap: 8px;
  min-height: 0; overflow: hidden;
}

/* ── 4. Question prompt ─────────────────────────────────── */
.ml-widget .q-prompt {
  text-align: center;
  font-family: var(--font-d);
  font-size: 19px; font-weight: 800;
  color: var(--ink); flex-shrink: 0;
}

/* ── 5. Rule row ────────────────────────────────────────── */
.ml-widget .rule-row {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; flex-wrap: wrap; flex-shrink: 0;
}
.ml-widget .rule-label {
  font-family: var(--font-d);
  font-size: 12px; font-weight: 700;
  color: var(--ink-soft);
  background: rgba(0,0,0,.07);
  padding: 2px 10px; border-radius: 999px;
  white-space: nowrap;
}
.ml-widget .rule-icons  { display: flex; gap: 6px; align-items: center; }
.ml-widget .rule-icon   {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px; background: rgba(0,0,0,.06);
}
.ml-widget .rule-icon svg { width: 28px; height: 28px; }
.ml-widget .rule-icon img { width: 28px; height: 28px; object-fit: contain; display: block; }

/* ── 6. Drop boxes ──────────────────────────────────────── */
.ml-widget .boxes { display: flex; gap: 10px; flex-shrink: 0; height: 160px; }
.ml-widget .box {
  flex: 1; border-radius: 16px;
  border: 3px dashed var(--tile);
  display: flex; flex-direction: column;
  transition: border-color .15s, background .15s, transform .12s;
  overflow: hidden;
}
.ml-widget .box[data-tone="green"]   { border-color: #7DC050; }
.ml-widget .box[data-tone="orange"]  { border-color: #D09030; }
.ml-widget .box[data-tone="neutral"] { border-color: var(--tile); }
.ml-widget .box.over { transform: scale(1.03); }
.ml-widget .box[data-tone="green"].over   { border-color: var(--ok);  background: rgba(91,190,91,.12); }
.ml-widget .box[data-tone="orange"].over  { border-color: #D09030;    background: rgba(210,144,48,.12); }
.ml-widget .box[data-tone="neutral"].over { border-color: #A09070;    background: rgba(160,144,112,.12); }

.ml-widget .box-title {
  font-family: var(--font-d);
  font-size: 14px; font-weight: 800;
  text-align: center; padding: 6px 6px 3px;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  flex-shrink: 0;
}
.ml-widget .box[data-tone="green"]   .box-title { color: #2A7010; }
.ml-widget .box[data-tone="orange"]  .box-title { color: #8A4A08; }
.ml-widget .box[data-tone="neutral"] .box-title { color: var(--ink-soft); }
.ml-widget .box-title .swatch {
  width: 12px; height: 12px;
  border-radius: 3px; display: inline-block;
  border: 2px solid rgba(0,0,0,.15);
}
.ml-widget .box-title img {
  width: 26px; height: 26px; object-fit: contain; border-radius: 4px;
}
.ml-widget .box-divider { height: 1px; background: rgba(0,0,0,.08); margin: 0 8px; flex-shrink: 0; }
.ml-widget .box-items {
  flex: 1; display: flex; flex-wrap: wrap;
  gap: 4px; align-content: center;
  justify-content: center; align-items: center;
  padding: 4px 5px; position: relative; overflow: hidden;
}
.ml-widget .placeholder {
  position: absolute; inset: 6px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; opacity: .2;
  pointer-events: none; transition: opacity .25s;
}
.ml-widget .box-items.has-item .placeholder { opacity: 0; }

/* ── 7. Item tray ───────────────────────────────────────── */
.ml-widget .tray-section { flex: 1; display: flex; flex-direction: column; min-height: 0; }
.ml-widget .tray-label {
  text-align: center; font-size: 12px; font-weight: 600;
  color: var(--ink-soft); margin-bottom: 6px; flex-shrink: 0;
}
.ml-widget .tray {
  display: flex; flex-wrap: wrap; gap: 10px;
  justify-content: center; align-items: center;
  flex: 1; align-content: center;
}

/* ── 8. Draggable items ─────────────────────────────────── */
.ml-widget .item {
  width: 88px; height: 88px; border-radius: 20px;
  background: #FFFDF6;
  border: 3px solid rgba(255,255,255,.8);
  box-shadow: 0 4px 12px rgba(31,31,31,.22);
  display: flex; align-items: center; justify-content: center;
  cursor: grab; touch-action: none;
  transition: transform .1s;
  animation: ml-pop .38s var(--ease-b) both;
  overflow: hidden; flex-shrink: 0; user-select: none;
}
.ml-widget .item svg    { width: 64px; height: 64px; pointer-events: none; }
.ml-widget .item img {
  width: 72px; height: 72px; object-fit: contain;
  pointer-events: none; display: block;
}
.ml-widget .item:active { cursor: grabbing; }
.ml-widget .item.dragging { opacity: .2; }
.ml-widget .item.placed {
  cursor: default; animation: none;
  width: 52px; height: 52px; border-radius: 12px;
}
.ml-widget .item.placed svg { width: 36px; height: 36px; }
.ml-widget .item.placed img { width: 36px; height: 36px; }

@keyframes ml-pop {
  0%   { transform: scale(0); opacity: 0 }
  70%  { transform: scale(1.1) }
  100% { transform: scale(1);  opacity: 1 }
}

/* ── 9. Ghost ───────────────────────────────────────────── */
.ml-ghost {
  position: fixed; z-index: 9999;
  width: 88px; height: 88px; border-radius: 20px;
  background: #FFFDF6;
  border: 3px solid rgba(255,255,255,.8);
  pointer-events: none; overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 20px rgba(80,50,10,.3);
  transform: translate(-50%,-50%) scale(1.1) rotate(-3deg);
}
.ml-ghost svg { width: 64px; height: 64px; }
.ml-ghost img { width: 72px; height: 72px; object-fit: contain; display: block; }

/* ── 10. Next button ────────────────────────────────────── */
.ml-widget .next-wrap { padding: 0 12px 12px; flex-shrink: 0; }
.ml-widget .btn-next {
  width: 100%; padding: 13px;
  border-radius: 14px; border: none;
  font-family: var(--font-d);
  font-size: 19px; font-weight: 800;
  color: var(--green-text); background: var(--green);
  cursor: pointer;
  box-shadow: 0 5px 0 var(--green-dark);
  transition: transform .1s, opacity .2s;
  -webkit-tap-highlight-color: transparent;
}
.ml-widget .btn-next:active   { transform: translateY(4px); box-shadow: 0 1px 0 var(--green-dark); }
.ml-widget .btn-next:disabled { opacity: .35; cursor: not-allowed; }

/* ── 11. Feedback flash ─────────────────────────────────── */
.ml-widget .flash {
  position: absolute; inset: 0; z-index: 50;
  pointer-events: none; opacity: 0;
}
.ml-widget .flash.ok  { background: radial-gradient(circle, rgba(75,176,64,.25),  transparent 70%); }
.ml-widget .flash.bad { background: radial-gradient(circle, rgba(208,80,48,.25),  transparent 70%); }
.ml-widget .flash.show { animation: ml-flashAnim .55s ease-out; }
@keyframes ml-flashAnim { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }

/* ── 12. Box animations ─────────────────────────────────── */
.ml-widget .shake { animation: ml-shake .38s; }
@keyframes ml-shake {
  0%,100% { transform: translateX(0) }
  25%     { transform: translateX(-6px) }
  75%     { transform: translateX(6px) }
}
.ml-widget .pulse-ok { animation: ml-pulseOk .45s var(--ease-b); }
@keyframes ml-pulseOk { 0%,100%{transform:scale(1)} 50%{transform:scale(1.04)} }

/* ── 13. Win overlay ────────────────────────────────────── */
.ml-widget .win-overlay {
  position: absolute; inset: 0; z-index: 100;
  background: rgba(0,0,0,.72);
  display: none; align-items: center; justify-content: center; padding: 24px;
}
.ml-widget .win-overlay.show { display: flex; animation: ml-fadeIn .35s ease; }
@keyframes ml-fadeIn { from{opacity:0} to{opacity:1} }

.ml-widget .win-card {
  text-align: center; display: flex; flex-direction: column; align-items: center;
  animation: ml-winPop .5s var(--ease-b) both;
}
@keyframes ml-winPop {
  0%  { transform: scale(.55); opacity: 0 }
  70% { transform: scale(1.04) }
  100%{ transform: scale(1);   opacity: 1 }
}
.ml-widget .win-rays {
  position: relative; width: 220px; height: 220px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: -16px;
}
.ml-widget .win-rays svg.rays {
  position: absolute; inset: 0; width: 100%; height: 100%;
  animation: ml-spin 8s linear infinite;
}
@keyframes ml-spin { to{ transform: rotate(360deg) } }

.ml-widget .mascot {
  position: relative; z-index: 2;
  width: 200px; height: 200px;
  display: flex; align-items: center; justify-content: center;
  animation: ml-bob 1.8s ease-in-out infinite;
  background: transparent;
}
.ml-widget .mascot .mascot-svg {
  width: 200px; height: 200px;
  background: transparent; display: block;
}
@keyframes ml-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

.ml-widget .win-title {
  font-family: var(--font-d);
  font-size: 30px; font-weight: 800;
  color: #fff; margin-bottom: 4px;
}
.ml-widget .win-stars          { display: flex; gap: 8px; margin: 8px 0; }
.ml-widget .win-stars span     { font-size: 32px; animation: ml-starPop .45s var(--ease-b) both; }
.ml-widget .win-stars span:nth-child(1) { animation-delay: .3s }
.ml-widget .win-stars span:nth-child(2) { animation-delay: .48s }
.ml-widget .win-stars span:nth-child(3) { animation-delay: .66s }
@keyframes ml-starPop {
  0%  { transform: scale(0) rotate(-20deg); opacity: 0 }
  70% { transform: scale(1.25) }
  100%{ transform: scale(1); opacity: 1 }
}
.ml-widget .win-score-row {
  display: flex; align-items: baseline; gap: 8px;
  margin: 8px 0 18px; font-family: var(--font-d);
}
.ml-widget .win-score-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.75); }
.ml-widget .win-score-val   { font-size: 28px; font-weight: 800; color: #fff; }
.ml-widget .btn-win {
  padding: 12px 44px; border-radius: 14px; border: none;
  font-family: var(--font-d);
  font-size: 19px; font-weight: 800;
  color: var(--green-text); background: var(--green);
  cursor: pointer;
  box-shadow: 0 5px 0 var(--green-dark);
  transition: transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.ml-widget .btn-win:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--green-dark); }

/* ── 14. Confetti ───────────────────────────────────────── */
.ml-confetti { position: absolute; pointer-events: none; z-index: 9998; opacity: 0; }
#ml-confettiContainer { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 9998; }
@keyframes ml-confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1 }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0 }
}

/* ═══════════════════════════════════════
   UNIFIED DESIGN SYSTEM — win screen
   ═══════════════════════════════════════ */

/* top-bar consistent height/padding */
.top-bar{flex-shrink:0;background:linear-gradient(135deg,#fb923c 0%,#ea580c 100%) !important;padding:12px 20px !important;box-shadow:0 2px 8px rgba(0,0,0,.18);}

/* win overlay — modern frosted dark */
.ml-widget .win-overlay,.win-overlay{
  background:rgba(15,8,0,.82) !important;
  backdrop-filter:blur(8px) !important;
  -webkit-backdrop-filter:blur(8px) !important;
}
/* win card — glass card */
.ml-widget .win-card,.win-card{
  display:flex !important;flex-direction:column !important;align-items:center !important;
  background:rgba(255,255,255,.10) !important;
  border:2px solid rgba(255,255,255,.22) !important;
  border-radius:28px !important;
  padding:24px 32px 28px !important;
  box-shadow:0 8px 32px rgba(0,0,0,.3) !important;
  gap:0 !important;
}
/* hide ALL old mascot variants */
.ml-widget .mascot,.mascot,
.win-mascot,.ml-widget .win-mascot,
.mascot-img,.ml-widget .mascot-img,
.win-scene{display:none !important;}
/* unified mascot */
.win-unified-mascot{
  width:150px;height:150px;object-fit:contain;
  display:block;margin:0 auto 4px;
  animation:ml-bob 1.8s ease-in-out infinite;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));
}
/* win-rays — keep spinning above mascot */
.ml-widget .win-rays,.win-rays{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-bottom:-155px;}
.ml-widget .win-rays svg,.win-rays svg.rays,.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
/* win title */
.ml-widget .win-title,.win-title{
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;
  font-size:30px !important;font-weight:800 !important;
  color:#fff !important;
  text-shadow:0 2px 6px rgba(0,0,0,.3) !important;
  margin:8px 0 4px !important;
}
/* win stars */
.ml-widget .win-stars,.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px;}
.ml-widget .win-stars span,.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b,cubic-bezier(.34,1.56,.64,1)) both;opacity:0;}
.ml-widget .win-stars span:nth-child(1),.win-stars span:nth-child(1){animation-delay:.3s}
.ml-widget .win-stars span:nth-child(2),.win-stars span:nth-child(2){animation-delay:.48s}
.ml-widget .win-stars span:nth-child(3),.win-stars span:nth-child(3){animation-delay:.66s}
@keyframes ml-starPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
/* win score */
.ml-widget .win-score-row,.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;}
.ml-widget .win-score-label,.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.ml-widget .win-score-val,.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.ml-widget .win-score,.win-score{font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin:4px 0 10px;}
/* play-again button — all variants */
.ml-widget .btn-win,.btn-win,
.ml-widget .win-btn,.win-btn,
.btn-win-again{
  margin-top:14px !important;
  padding:14px 48px !important;
  border:3px solid rgba(255,255,255,.9) !important;
  border-radius:20px !important;
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif !important;
  font-size:20px !important;font-weight:800 !important;
  color:#fff !important;text-shadow:0 1px 2px rgba(0,0,0,.2) !important;
  background:linear-gradient(135deg,#fdba74 0%,#fb923c 55%,#ea580c 100%) !important;
  box-shadow:0 6px 0 #c2410c,0 8px 20px rgba(234,88,12,.28) !important;
  cursor:pointer;
  transition:transform 150ms cubic-bezier(.34,1.56,.64,1),box-shadow 150ms ease;
  -webkit-tap-highlight-color:transparent;
}
.ml-widget .btn-win:active,.btn-win:active,
.ml-widget .win-btn:active,.win-btn:active,
.btn-win-again:active{
  transform:translateY(4px) !important;
  box-shadow:0 1px 0 #c2410c,0 3px 8px rgba(234,88,12,.2) !important;
}

/* ── countdown bar ── */
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#fb923c,#ea580c);border-radius:14px;transform-origin:right center;animation:mlCountdownShrink 3s linear forwards;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}

/* ── win two-button row ── */
.win-btns{display:flex;gap:10px;margin-top:14px !important;width:100%;}
.win-btns .btn-win{margin-top:0 !important;padding:14px 0 !important;font-size:17px !important;flex:1;min-width:0;}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%) !important;box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28) !important;}
.btn-win-next:active{transform:translateY(4px) !important;box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2) !important;}


/* ═══════════════════════════════
   MOOSA NARRATOR GUIDE — FEMALE
   ═══════════════════════════════ */
</style>
<style>
/* Fix: eliminate top-bar load flash — reserve the final bar height (so the
   play area never jumps), never paint the loose pre-reorg lesson-number
   buttons, and hold the transient bar content hidden until it is reorganized
   (2s CSS safety-reveal so the score can never stick hidden). Kept in <head>
   so it is render-blocking and applies on the very first paint. */
.ml-widget .top-bar{ min-height:107px; }
.ml-widget .top-bar > .lsn-btn{ display:none !important; }
.ml-widget .top-bar:not(:has(.tb-top)) > *{ visibility:hidden; animation:mlTbReveal 0s linear 2s forwards; }
@keyframes mlTbReveal{ to{ visibility:visible; } }
</style>

<body>

<!-- ═══════════════════════════════════════════
     ML WIDGET
═══════════════════════════════════════════ -->
<div class="ml-widget" dir="rtl">

  <!-- §3 Top bar -->
  <div class="top-bar">
    <span class="score-label">النقاط</span>
    <span class="score-val" id="ml-scoreVal">٠</span>
  </div>

  <!-- §4 Progress dots -->
  <div class="progress-dots" id="ml-dots"></div>

  <div class="play">
    <div class="q-prompt" id="ml-qPrompt"></div>

    <div class="rule-row">
      <span class="rule-label" id="ml-refRule"></span>
      <div class="rule-icons" id="ml-refItems"></div>
    </div>

/* ── Helpers ────────────────────────────────────────────── */
function el(id)   { return document.getElementById('ml-' + id); }
function toAr(n)  { return String(n).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]); }
function svgUse(id) {
  return '<svg viewBox="0 0 64 64"><use href="#ml-' + id + '"></use></svg>';
}

/* ── Sound Engine (§12 verbatim) ────────────────────────── */
var mlAudio = (function() {
  var ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }
  return {
    correct: function() {
      try {
        var c = getCtx();
        [[523.25, 0, 0.18, 'triangle'], [659.25, 0.12, 0.28, 'sine']].forEach(function(p) {
          var o = c.createOscillator(), g = c.createGain();
          o.type = p[3]; o.frequency.value = p[0];
          g.gain.setValueAtTime(0, c.currentTime + p[1]);
          g.gain.linearRampToValueAtTime(0.22, c.currentTime + p[1] + 0.04);
          g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + p[1] + p[2]);
          o.connect(g); g.connect(c.destination);
          o.start(c.currentTime + p[1]); o.stop(c.currentTime + p[1] + p[2] + 0.05);
        });
      } catch(e) {}
    },
    wrong: function() {
      try {
        var c = getCtx();
        var o1 = c.createOscillator(), g1 = c.createGain();
        o1.type = 'sawtooth'; o1.frequency.setValueAtTime(260, c.currentTime);
        o1.frequency.exponentialRampToValueAtTime(120, c.currentTime + 0.18);
        g1.gain.setValueAtTime(0.18, c.currentTime);
        g1.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.22);
        o1.connect(g1); g1.connect(c.destination);
        o1.start(); o1.stop(c.currentTime + 0.24);
        var o2 = c.createOscillator(), g2 = c.createGain();
        o2.type = 'sine'; o2.frequency.setValueAtTime(90, c.currentTime);
        o2.frequency.exponentialRampToValueAtTime(45, c.currentTime + 0.2);
        g2.gain.setValueAtTime(0.2, c.currentTime);
        g2.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.24);
        o2.connect(g2); g2.connect(c.destination);
        o2.start(); o2.stop(c.currentTime + 0.26);
      } catch(e) {}
    }
  };
})();

/* ═══════════════════════════════════════════════════════════

   Lesson 1: Shape Sort (Image 1) — squares vs other shapes
   Lesson 2: Colour Sort (Image 2) — green things vs orange
   ═══════════════════════════════════════════════════════════ */
var QUESTIONS = [
  /* ── Q1: Sort squares (Image 1, page 12) ── */
  {
    prompt:    'صنّف حسب الشكل',
    rule:      'الخاصية: الشكل',

    boxA: { label: 'مربّعات', icon: 's-square', swatch: null, titleImg: null, tone: 'neutral' },
    boxB: { label: 'أشكال أخرى', icon: null, swatch: null, titleImg: null, tone: 'neutral' },
    items: [
      { key: 's-square',  answer: 'A' },
      { key: 's-square',  answer: 'A', id: 'sq2' },
      { key: 's-square',  answer: 'A', id: 'sq3' },
      { key: 's-heart',   answer: 'B' },
      { key: 's-circle',  answer: 'B' },
      { key: 's-diamond', answer: 'B' },
    ]
  },
  /* ── Q2: Sort by colour — green vs orange (Image 2, page 13) ── */
  {
    prompt:    'صنّف حسب اللون',
    rule:      'الخاصية: اللون',
    ruleIcons: ['c-leaf-g', 'c-leaf-o', 'c-orange', 'c-cucumber'],
    boxA: { label: 'حقيبة خضراء', icon: 'bag-green', swatch: null, titleImg: null, tone: 'green' },
    boxB: { label: 'حقيبة برتقالية', icon: 'bag-orange', swatch: null, titleImg: null, tone: 'orange' },
    items: [
      { key: 'c-leaf-g',   answer: 'A' },
      { key: 'c-cucumber', answer: 'A' },
      { key: 'c-pepper',   answer: 'A' },
      { key: 'c-leaf-o',   answer: 'B' },
      { key: 'c-orange',   answer: 'B' },
      { key: 'c-carrot',   answer: 'B' },
      { key: 'c-pumpkin',  answer: 'B' },
    ]
  }
];

/* ═══════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════ */
var qIndex   = 0;
var score    = 0;
var placed   = 0;   // items placed this question
var total    = 0;   // total items this question

/* ═══════════════════════════════════════════════════════════
   RENDER QUESTION
   ═══════════════════════════════════════════════════════════ */
function renderQuestion() {
  var q = QUESTIONS[qIndex];
  total  = q.items.length;
  placed = 0;

  /* prompt */
  el('qPrompt').textContent = q.prompt;

  /* rule label */
  el('refRule').textContent = q.rule;

  /* rule icons */
  var riEl = el('refItems');
  riEl.innerHTML = '';
  q.ruleIcons.forEach(function(ref) {
    var d = document.createElement('div');
    d.className = 'rule-icon';
    if (ref.startsWith('img:')) {
      var img = document.createElement('img');
      img.src = ITEM_IMGS ? ITEM_IMGS[ref.slice(4)] : '';
      img.style.cssText = 'width:28px;height:28px;object-fit:contain;display:block';
      d.appendChild(img);
    } else {
      d.innerHTML = '<svg viewBox="0 0 64 64"><use href="#ml-' + ref + '"></use></svg>';
    }
    riEl.appendChild(d);
  });

  /* boxes */
  ['A','B'].forEach(function(side) {
    var cfg  = side === 'A' ? q.boxA : q.boxB;
    var box  = el('box' + side);
    var titleEl = el('title' + side);
    var itemsEl = el('items' + side);

    box.dataset.tone = cfg.tone;
    itemsEl.innerHTML = '<div class="placeholder">⬇︎</div>';
    itemsEl.classList.remove('has-item');

    /* build title */
    titleEl.innerHTML = '';
    if (cfg.titleImg) {
      var timg = document.createElement('img');
      timg.src = ITEM_IMGS ? ITEM_IMGS[cfg.titleImg] : '';
      timg.style.cssText = 'width:26px;height:26px;object-fit:contain;border-radius:4px';
      titleEl.appendChild(timg);
    } else if (cfg.icon) {
      var iconSpan = document.createElement('span');
      iconSpan.innerHTML = '<svg viewBox="0 0 64 64" style="width:24px;height:24px"><use href="#ml-' + cfg.icon + '"></use></svg>';
      titleEl.appendChild(iconSpan);
    } else if (cfg.swatch) {
      var sw = document.createElement('span');
      sw.className = 'swatch';
      sw.style.background = cfg.swatch;
      titleEl.appendChild(sw);
    }
    var labelNode = document.createTextNode(cfg.label);
    titleEl.appendChild(labelNode);
  });

  /* items — shuffled */
  var tray = el('tray');
  tray.innerHTML = '';
  var shuffled = q.items.slice().sort(function() { return Math.random() - .5; });
  shuffled.forEach(function(item, i) {
    var div = document.createElement('div');
    div.className = 'item';
    div.dataset.answer = item.answer;
    div.dataset.key    = item.key;
    div.innerHTML = '<svg viewBox="0 0 64 64"><use href="#ml-' + item.key + '"></use></svg>';
    div.style.animationDelay = (0.07 + i * 0.06) + 's';
    tray.appendChild(div);
    initDrag(div);
  });

  /* button */
  if (mlCountdownTimer) { clearInterval(mlCountdownTimer); mlCountdownTimer = null; }
  if (document.getElementById('ml-nextWrap')) document.getElementById('ml-nextWrap').style.display = 'none';


  /* dots */
  renderDots();
}

/* ── Progress dots ──────────────────────────────────────── */
function renderDots(){var _c=el('dots');if(!_c)return;_c.innerHTML='';for(var i=0;i<QUESTIONS.length;i++){var d=document.createElement('span');d.className='ml-qdot'+(i===qIndex?' active':i<qIndex?' done':'');_c.appendChild(d);}}

/* ═══════════════════════════════════════════════════════════
   DRAG — pointer events (touch + mouse unified)
   ═══════════════════════════════════════════════════════════ */
var ghost       = null;
var dragging    = null;
var dragOffX    = 0;
var dragOffY    = 0;

function initDrag(item) {
  item.addEventListener('pointerdown', onPointerDown, { passive: false });
}

function onPointerDown(e) {
  if (dragging) return;
  e.preventDefault();
  var item = e.currentTarget;
  if (item.classList.contains('placed')) return;

  dragging = item;
  item.classList.add('dragging');
  item.setPointerCapture(e.pointerId);

  /* create ghost */
  ghost = document.createElement('div');
  ghost.className = 'ml-ghost';
  ghost.innerHTML = item.innerHTML;
  document.body.appendChild(ghost);
  moveGhost(e.clientX, e.clientY);

  document.addEventListener('pointermove', onPointerMove, { passive: false });
  document.addEventListener('pointerup',   onPointerUp);
}

function onPointerMove(e) {
  e.preventDefault();
  moveGhost(e.clientX, e.clientY);
  highlightBox(e.clientX, e.clientY);
}

function moveGhost(cx, cy) {
  if (!ghost) return;
  ghost.style.left = cx + 'px';
  ghost.style.top  = cy + 'px';
}

function highlightBox(cx, cy) {
  ['A','B'].forEach(function(side) {
    var box = el('box' + side);
    var r = box.getBoundingClientRect();
    var over = cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom;
    box.classList.toggle('over', over);
  });
}

function onPointerUp(e) {
  document.removeEventListener('pointermove', onPointerMove);
  document.removeEventListener('pointerup',   onPointerUp);

  if (ghost) { ghost.remove(); ghost = null; }

  ['A','B'].forEach(function(side) { el('box' + side).classList.remove('over'); });

  if (!dragging) return;

  var item    = dragging;
  dragging    = null;
  item.classList.remove('dragging');

  /* find drop target */
  var cx = e.clientX, cy = e.clientY;
  var dropped = false;
  ['A','B'].forEach(function(side) {
    var box = el('box' + side);
    var r = box.getBoundingClientRect();
    if (cx >= r.left && cx <= r.right && cy >= r.top && cy <= r.bottom) {
      dropped = true;
      var correct = item.dataset.answer === side;
      if (correct) {
        handleCorrect(item, box, el('items' + side));
      } else {
        handleWrong(item, box);
      }
    }
  });

  /* dropped off-target — just restore */
  if (!dropped) {
    item.classList.remove('dragging');
  }
}

function handleCorrect(item, box, itemsEl) {
  mlAudio.correct();
  flash('ok');
  box.classList.add('pulse-ok');
  setTimeout(function() { box.classList.remove('pulse-ok'); }, 450);

  /* move item into box */
  item.classList.add('placed');
  item.classList.remove('dragging');
  /* resize SVG child */
  var svg = item.querySelector('svg');
  if (svg) { svg.style.width = '36px'; svg.style.height = '36px'; }
  var img = item.querySelector('img');
  if (img) { img.style.width = '36px'; img.style.height = '36px'; }
  itemsEl.classList.add('has-item');
  itemsEl.appendChild(item);

  score  += 10;
  placed += 1;
  el('scoreVal').textContent = toAr(score);

  if (placed === total) {
    mlStartCountdown();
  }
}

function handleWrong(item, box) {
  mlAudio.wrong();
  flash('bad');
  box.classList.add('shake');
  setTimeout(function() { box.classList.remove('shake'); }, 380);
  item.classList.add('shake');
  setTimeout(function() { item.classList.remove('shake'); }, 380);
}

function flash(type) {
  var f = el('flash');
  f.className = 'flash ' + type;
  void f.offsetWidth; /* reflow to restart animation */
  f.classList.add('show');
  setTimeout(function() { f.classList.remove('show'); }, 600);
}

/* ═══════════════════════════════════════════════════════════
   NEXT QUESTION / WIN
   ═══════════════════════════════════════════════════════════ */
function mlNextQuestion() {
  qIndex += 1;
  if (qIndex < QUESTIONS.length) {
    renderQuestion();
  } else {
    showWin();
  }
}

function showWin() {
  el('winScoreVal').textContent = toAr(score);
  el('winOverlay').classList.add('show');
  launchConfetti();
}

var mlCountdownTimer = null;
function mlStartCountdown() {
  var secs = 3;
  var wrap = document.getElementById('ml-nextWrap');
  var fill = document.getElementById('ml-countdownFill');
  var txt  = document.getElementById('ml-countdownTxt');
  if (!wrap) return;
  wrap.style.display = 'block';
  fill.style.animation = 'none';
  void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 3s linear forwards';
  txt.textContent = toAr(secs);
  mlCountdownTimer = setInterval(function() {
    secs--;
    if (txt) txt.textContent = toAr(Math.max(0, secs));
    if (secs <= 0) {
      clearInterval(mlCountdownTimer);
      mlCountdownTimer = null;
      if (wrap) wrap.style.display = 'none';
      mlNextQuestion();
    }
  }, 1000);
}

function mlHandleWinNext() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ action: 'nextLesson' }, '*');
  } else { window.location.href = 'moosa-lesson-classify 3.html'; }
}

function mlHandleWinContinue() {
  if (mlCountdownTimer) { clearInterval(mlCountdownTimer); mlCountdownTimer = null; }
  el('winOverlay').classList.remove('show');
  document.getElementById('ml-confettiContainer').innerHTML = '';
  /* reset */
  qIndex = 0;
  score  = 0;
  el('scoreVal').textContent = toAr(0);
  renderQuestion();
}

/* ═══════════════════════════════════════════════════════════
   CONFETTI — §14
   ═══════════════════════════════════════════════════════════ */
function launchConfetti() {
  var container = document.getElementById('ml-confettiContainer');
  container.innerHTML = '';
  var colours = ['#F5C518','#8dd04d','#FF9F45','#E0654A','#5BBE5B','#C8923A','#fff','#a8e06a'];
  for (var i = 0; i < 55; i++) {
    var piece = document.createElement('div');
    piece.className = 'ml-confetti';
    var size  = 7 + Math.random() * 7;
    var isCircle = Math.random() > 0.5;
    var colour = colours[Math.floor(Math.random() * colours.length)];
    var dur    = (1.4 + Math.random() * 2) + 's';
    var delay  = (Math.random() * 1.2) + 's';
    piece.style.cssText = [
      'left:' + (Math.random() * 100) + '%',
      'top:0',
      'width:' + size + 'px',
      'height:' + size + 'px',
      'border-radius:' + (isCircle ? '50%' : '2px'),
      'background:' + colour,
      'animation:ml-confettiFall ' + dur + ' ease-in ' + delay + ' both'
    ].join(';');
    container.appendChild(piece);
  }
}

.win-card{text-align:center;display:flex!important;flex-direction:column!important;align-items:center!important;background:rgba(255,255,255,.10)!important;border:2px solid rgba(255,255,255,.22)!important;border-radius:28px!important;padding:24px 32px 28px!important;box-shadow:0 8px 32px rgba(0,0,0,.3)!important;gap:0!important;animation:ml-winPop .5s cubic-bezier(.34,1.56,.64,1) both;}
.win-card .win-mascot,.win-card .mascot,.win-card .mascot-img,.win-card .win-scene,.win-card .win-emoji,.win-card .win-sub{display:none!important;}
.win-unified-mascot{width:150px!important;height:150px!important;object-fit:contain;display:block!important;margin:0 auto 4px!important;animation:ml-bob 1.8s ease-in-out infinite;filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));}
.win-rays{position:relative!important;width:190px!important;height:190px!important;display:flex!important;align-items:center;justify-content:center;margin-bottom:-155px!important;}
.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
.win-title{font-family:'Baloo Bhaijaan 2','Tajawal',sans-serif!important;font-size:30px!important;font-weight:800!important;color:#fff!important;text-shadow:0 2px 6px rgba(0,0,0,.3)!important;margin:8px 0 4px!important;}
.win-stars{display:flex!important;gap:6px!important;justify-content:center!important;margin:6px 0 10px!important;font-size:32px!important;}
.win-stars span{display:inline-block;animation:ml-starPop .45s cubic-bezier(.34,1.56,.64,1) both;opacity:0;}
.win-stars span:nth-child(1){animation-delay:.3s}.win-stars span:nth-child(2){animation-delay:.48s}.win-stars span:nth-child(3){animation-delay:.66s}
.win-score-row{display:flex!important;align-items:baseline;gap:8px;margin:4px 0 12px!important;font-family:'Baloo Bhaijaan 2','Tajawal',sans-serif;justify-content:center;}
.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.win-btns{display:flex!important;gap:10px!important;margin-top:14px!important;width:100%;}
.win-btns .btn-win,.btn-win{flex:1;min-width:0;margin-top:0!important;padding:14px 0!important;border:3px solid rgba(255,255,255,.9)!important;border-radius:20px!important;font-family:'Baloo Bhaijaan 2','Tajawal',sans-serif!important;font-size:17px!important;font-weight:800!important;color:#fff!important;text-shadow:0 1px 2px rgba(0,0,0,.2)!important;background:linear-gradient(135deg,#fdba74 0%,#fb923c 55%,#ea580c 100%)!important;box-shadow:0 6px 0 #c2410c,0 8px 20px rgba(234,88,12,.28)!important;cursor:pointer;transition:transform 150ms cubic-bezier(.34,1.56,.64,1),box-shadow 150ms ease;-webkit-tap-highlight-color:transparent;}
.btn-win:active{transform:translateY(4px)!important;box-shadow:0 1px 0 #c2410c,0 3px 8px rgba(234,88,12,.2)!important;}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%)!important;box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28)!important;}
.btn-win-next:active{box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2)!important;}
@keyframes ml-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ml-spin{to{transform:rotate(360deg)}}
@keyframes ml-fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ml-winPop{0%{transform:scale(.55);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes ml-starPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
</style>

<script>
/* == lesson progress nav == */
(function(){
  var fn=decodeURIComponent((location.pathname.split('/').pop()||'').split('?')[0]);
  var ch=null,idx=0,total=0,nextFile=null,m;
  var LP_HERE='moosa-lessons.html';
  var LP_OTHER='../Interactive book for elementary school chapter 1/moosa-lessons.html';
  var LP=LP_HERE;
  if((m=fn.match(/^moosa-lesson-classify (\d+)\.html$/))){ch='ch1';idx=+m[1]-1;total=5;nextFile='moosa-lesson-classify '+(+m[1]+1)+'.html';}
  else if((m=fn.match(/^moosa-chp 2-lesson (\d+)\.html$/))){ch='ch2';idx=+m[1]-1;total=6;nextFile='moosa-chp 2-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 3-lesson (\d+)\.html$/))){ch='ch3';idx=+m[1]-1;total=6;nextFile='moosa-chp 3-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 4-lesson (\d+)\.html$/))){ch='ch4';idx=+m[1]-1;total=3;nextFile='moosa-chp 4-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  if(!ch)return;
  var isLast=idx>=total-1;
  function saveDone(){try{var k='moosa_'+ch,p=JSON.parse(localStorage.getItem(k)||'[]');if(p.indexOf(idx)===-1){p.push(idx);localStorage.setItem(k,JSON.stringify(p));}}catch(e){}}
  var ov=document.querySelector('.win-overlay');
  if(ov){
    try{new MutationObserver(function(){if(ov.classList.contains('show'))saveDone();}).observe(ov,{attributes:true,attributeFilter:['class']});}catch(e){}
    if(ov.classList.contains('show'))saveDone();
  }
  window.mlHandleWinNext=function(){
    saveDone();
    if(window.parent&&window.parent!==window){window.parent.postMessage({action:'nextLesson'},'*');return;}
    location.href=isLast?LP:nextFile;
  };
})();
</script>

<script>
(function(){
  function reorg(){
    var bar=document.querySelector('.ml-widget .top-bar'); if(!bar||bar._reorg)return;
    var navs=[].slice.call(bar.querySelectorAll('.lsn-btn'));
    var dots=document.getElementById('ml-dots')||document.getElementById('mlDots');
    var sl=bar.querySelector('.score-label'), sv=bar.querySelector('.score-val');
    if(!navs.length || !dots || !sv) return;
    bar._reorg=true;
    var top=document.createElement('div'); top.className='tb-top';
    navs.forEach(function(b){ top.appendChild(b); });
    var bot=document.createElement('div'); bot.className='tb-bot';
    var sc=document.createElement('div'); sc.className='tb-score';
    if(sl) sc.appendChild(sl); if(sv) sc.appendChild(sv);
    bot.appendChild(sc); bot.appendChild(dots);
    bar.innerHTML=''; bar.appendChild(top); bar.appendChild(bot);
  }
  var n=0, iv=setInterval(function(){
    n++;
    var bar=document.querySelector('.ml-widget .top-bar');
    var navs=bar?bar.querySelectorAll('.lsn-btn').length:0;
    var dots=document.getElementById('ml-dots')||document.getElementById('mlDots');
    if((navs && dots) || n>50){ clearInterval(iv); reorg(); }
  },80);
})();
</script>

<script id="tb-back-js">
(function(){
  var inCh1=/moosa-lesson-classify/.test(decodeURIComponent(location.pathname||''));
  var LP=inCh1?'moosa-lessons.html':'../Interactive book for elementary school chapter 1/moosa-lessons.html';
  function go(){ try{ if(window.parent&&window.parent!==window){ window.parent.postMessage({action:'exitToLessons'},'*'); return; } }catch(e){} location.href=LP; }
  function make(){
    var host=document.querySelector('.tb-bot')||document.querySelector('.ml-widget .top-bar')||document.querySelector('.app .top-bar')||document.querySelector('.top-bar');
    if(!host) return false;
    if(host.querySelector('.tb-back')) return true;
    var b=document.createElement('button'); b.className='tb-back'; b.type='button';
    b.setAttribute('aria-label','العودة إلى قائمة الألعاب');
    b.title='الألعاب';
    b.innerHTML='<svg viewBox="0 0 24 24" fill="#fff" aria-hidden="true"><rect x="3" y="3" width="8" height="8" rx="2.2"/><rect x="13" y="3" width="8" height="8" rx="2.2"/><rect x="3" y="13" width="8" height="8" rx="2.2"/><rect x="13" y="13" width="8" height="8" rx="2.2"/></svg>';
    b.addEventListener('click',function(e){ e.stopPropagation(); e.preventDefault(); go(); });
    host.appendChild(b);
    return true;
  }
  var n=0, iv=setInterval(function(){ n++; if(make()||n>80){ clearInterval(iv); } },80);
})();
</script>
