<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى التعليمي — اختيار الدرس</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root {
  /* Brand palette */
  --amber:        #1F1F1F;
  --amber-light:  #3A3A3A;
  --amber-dark:   #141414;
  --amber-shadow: #0A0A0A;
  --green:        #22C55E;
  --green-dark:   #16A34A;
  --green-shadow: #15803D;
  --bg-top:       #FFFFFF;
  --bg-bot:       #F2F2F2;
  --card-bg:      #FFFFFF;
  --card-border:  rgba(0,0,0,0.08);
  --ink:          #1C1917;
  --ink-soft:     #78716C;
  --tile-1:       #F0F0F0; --tile-1-icon: #3A3A3A;
  --tile-2:       #E8E8E8; --tile-2-icon: #4A4A4A;
  --tile-3:       #EDEDED; --tile-3-icon: #2E2E2E;
  --tile-4:       #E5E5E5; --tile-4-icon: #444444;
  --tile-5:       #EBEBEB; --tile-5-icon: #383838;
  --tile-6:       #E2E2E2; --tile-6-icon: #4E4E4E;
  --font-d: 'Baloo Bhaijaan 2', 'Tajawal', sans-serif;
  --font-b: 'Tajawal', sans-serif;
  --ease-b: cubic-bezier(.34,1.56,.64,1);
  --ease-s: cubic-bezier(.25,.46,.45,.94);
  --radius: 20px;
}

html,body {
  width:100%; height:100%; overflow-x:hidden;
}

body {
  background: linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bot) 100%);
  font-family: var(--font-b);
  display: flex; align-items: center; justify-content: center;
  min-height: 100dvh;
}

/* subtle dot pattern */
body::before {
  content:''; position:fixed; inset:0; pointer-events:none;
  background-image: radial-gradient(circle, rgba(0,0,0,.05) 1px, transparent 1px);
  background-size: 28px 28px;
}

.phone {
  position: relative; z-index: 1;
  width: 100%; max-width: 480px; min-height: 100dvh;
  background: #FFFFFF;
  display: flex; flex-direction: column;
  padding: 0 0 max(32px, env(safe-area-inset-bottom, 16px)); overflow: hidden;
  box-shadow: 0 0 0 1px rgba(0,0,0,.06), 0 24px 64px rgba(0,0,0,.10);
}

/* ── Header bar ── */
.header {
  background: linear-gradient(135deg, var(--amber) 0%, var(--amber-dark) 100%);
  padding: 20px 20px 16px;
  display: flex; align-items: center; gap: 12px;
  flex-shrink: 0;
}
.header-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: rgba(255,255,255,.2);
  border: 2px solid rgba(255,255,255,.4);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.header-icon svg { width:20px; height:20px; stroke:#fff; fill:none; }
.header-text { flex:1; }
.header-title {
  font-family: var(--font-d); font-size: 20px; font-weight: 800;
  color: #fff; line-height: 1;
  text-shadow: 0 1px 3px rgba(0,0,0,.2);
}
.header-sub {
  font-size: 12px; font-weight: 500;
  color: rgba(255,255,255,.75); margin-top: 3px;
}

/* chapter badge */
.chapter-badge {
  margin: 16px 16px 8px;
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--amber-light), var(--amber));
  border: 3px solid rgba(255,255,255,.9);
  border-radius: 999px; padding: 6px 16px 6px 10px;
  box-shadow: 0 4px 0 var(--amber-shadow), 0 6px 16px rgba(0,0,0,.12);
  align-self: flex-start;
}
.chapter-badge-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(255,255,255,.9);
}
.chapter-badge-text {
  font-family: var(--font-d); font-size: 13px; font-weight: 700;
  color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.2);
}

/* ── Lesson list ── */
.lessons {
  display: flex; flex-direction: column;
  gap: 10px; flex-grow: 1;
  padding: 8px 16px 16px;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}

.lesson {
  display: flex; align-items: center; gap: 14px;
  width: 100%; padding: 12px 14px;
  background: var(--card-bg);
  border: 3px solid var(--card-border);
  border-radius: var(--radius);
  cursor: pointer; position: relative;
  box-shadow:
    0 6px 0 rgba(0,0,0,.10),
    0 8px 20px rgba(0,0,0,.06),
    inset 0 2px 0 rgba(255,255,255,.9);
  transition: transform 150ms var(--ease-b), box-shadow 150ms var(--ease-s), filter 150ms;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  outline: none;
}
.lesson:hover {
  transform: translateY(-1px);
  box-shadow:
    0 8px 0 rgba(0,0,0,.12),
    0 12px 24px rgba(0,0,0,.08),
    inset 0 2px 0 rgba(255,255,255,.9);
  filter: brightness(1.02);
}
.lesson:active {
  transform: scale(.98) translateY(4px);
  box-shadow:
    0 2px 0 rgba(0,0,0,.10),
    0 4px 8px rgba(0,0,0,.06),
    inset 0 2px 0 rgba(255,255,255,.9);
  filter: brightness(.98);
}
.lesson:focus-visible {
  outline: 3px solid var(--amber);
  outline-offset: 2px;
}

/* tile per lesson — coloured */
.tile {
  flex-shrink: 0; width: 52px; height: 52px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
  border: 2px solid rgba(255,255,255,.8);
  box-shadow: inset 0 -2px 4px rgba(0,0,0,.06), 0 2px 6px rgba(0,0,0,.06);
}
.lesson:nth-child(1) .tile { background:var(--tile-1); }
.lesson:nth-child(2) .tile { background:var(--tile-2); }
.lesson:nth-child(3) .tile { background:var(--tile-3); }
.lesson:nth-child(4) .tile { background:var(--tile-4); }
.lesson:nth-child(5) .tile { background:var(--tile-5); }
.lesson:nth-child(6) .tile { background:var(--tile-6); }

.lesson-info { flex: 1; min-width: 0; }
.lesson-label {
  font-family: var(--font-d); font-size: 17px; font-weight: 800;
  color: var(--ink); letter-spacing: .2px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lesson-num {
  font-size: 12px; font-weight: 500; color: var(--ink-soft);
  margin-top: 2px;
}

/* chevron arrow */
.lesson-arrow {
  flex-shrink: 0; width: 28px; height: 28px; border-radius: 8px;
  background: rgba(0,0,0,.04);
  display: flex; align-items: center; justify-content: center;
  transition: background 150ms;
}
.lesson-arrow svg { width:14px; height:14px; stroke:var(--ink-soft); fill:none; }
.lesson:hover .lesson-arrow { background: rgba(0,0,0,.08); }
.lesson:hover .lesson-arrow svg { stroke: var(--amber-dark); }

/* ── Selected state ── */
.lesson.selected {
  background: linear-gradient(135deg, var(--amber-light) 0%, var(--amber) 100%);
  border-color: rgba(255,255,255,.95);
  box-shadow:
    0 6px 0 var(--amber-shadow),
    0 8px 24px rgba(0,0,0,.18),
    inset 0 2px 0 rgba(255,255,255,.55);
}
.lesson.selected .lesson-label { color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,.2); }
.lesson.selected .lesson-num  { color: rgba(255,255,255,.75); }
.lesson.selected .lesson-arrow { background: rgba(255,255,255,.25); }
.lesson.selected .lesson-arrow svg { stroke: #fff; }
.lesson.selected .tile {
  opacity: .85;
  border-color: rgba(255,255,255,.6);
}
.lesson.selected:hover {
  filter: brightness(1.04);
  transform: translateY(-1px);
  box-shadow:
    0 8px 0 var(--amber-shadow),
    0 12px 28px rgba(0,0,0,.22),
    inset 0 2px 0 rgba(255,255,255,.55);
}

/* ── Bottom row ── */
.bottom {
  display: flex; gap: 12px; align-items: stretch;
  padding: 0 16px;
  animation: slideUp .5s var(--ease-b) .45s both;
}

.btn-back {
  flex-shrink: 0; width: 60px;
  background: #F0F0F0;
  border: none; border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: none;
  transition: transform 150ms var(--ease-b), box-shadow 150ms var(--ease-s);
  -webkit-tap-highlight-color: transparent;
  outline: none;
}
.btn-back svg { width:22px; height:22px; stroke:var(--ink-soft); fill:none; }
.btn-back:hover { filter: brightness(.97); }
.btn-back:active {
  transform: scale(.97) translateY(3px);
  box-shadow: 0 1px 0 rgba(0,0,0,.18), 0 3px 6px rgba(0,0,0,.06), inset 0 2px 0 rgba(255,255,255,.9);
}
.btn-back:focus-visible { outline: 3px solid var(--amber); outline-offset: 2px; }

.btn-continue {
  flex-grow: 1;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: linear-gradient(135deg, #4ADE80 0%, var(--green) 50%, var(--green-dark) 100%);
  border: none; border-radius: var(--radius);
  font-family: var(--font-d); font-size: 22px; font-weight: 800;
  color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.2);
  cursor: pointer; padding: 16px;
  box-shadow: none;
  position: relative; overflow: hidden;
  transition: transform 150ms var(--ease-b), box-shadow 150ms var(--ease-s), filter 150ms;
  -webkit-tap-highlight-color: transparent;
  outline: none;
}
.btn-continue::after {
  content:''; position:absolute; top:4px; inset-inline: 20px;
  height:6px; border-radius:6px;
  background: rgba(255,255,255,.35); pointer-events:none;
}
.btn-continue:hover { filter: brightness(1.06); }
.btn-continue:active {
  transform: scale(.98) translateY(4px);
  box-shadow: 0 1px 0 var(--green-shadow), 0 3px 8px rgba(22,163,74,.2), inset 0 2px 0 rgba(255,255,255,.4);
}
.btn-continue:focus-visible { outline: 3px solid var(--green); outline-offset: 2px; }

/* ── Entrance animations ── */
.header { animation: slideDown .5s var(--ease-b) both; }
.chapter-badge { animation: popIn .45s var(--ease-b) .1s both; }
.lesson { animation: slideIn .45s var(--ease-b) both; }
.lesson:nth-child(1){ animation-delay:.08s }
.lesson:nth-child(2){ animation-delay:.14s }
.lesson:nth-child(3){ animation-delay:.20s }
.lesson:nth-child(4){ animation-delay:.26s }
.lesson:nth-child(5){ animation-delay:.32s }
.lesson:nth-child(6){ animation-delay:.38s }

@keyframes slideDown { 0%{transform:translateY(-32px);opacity:0} 100%{transform:translateY(0);opacity:1} }
@keyframes slideIn   { 0%{transform:translateX(32px);opacity:0} 100%{transform:translateX(0);opacity:1} }
@keyframes slideUp   { 0%{transform:translateY(32px);opacity:0} 100%{transform:translateY(0);opacity:1} }
@keyframes popIn     { 0%{transform:scale(.7);opacity:0} 100%{transform:scale(1);opacity:1} }

@media (prefers-reduced-motion: reduce) {
  *,*::before,*::after { animation-duration:.01ms !important; transition-duration:.01ms !important; }
}
</style>
</head>
<body>
<div class="phone">

  <!-- Header -->
  <div class="header">
    <div class="header-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    <div class="header-text">
      <div class="header-title">موسى التعليمي</div>
      <div class="header-sub">اختر الدرس</div>
    </div>
  </div>

  <!-- Chapter label -->
  <div class="chapter-badge">
    <span class="chapter-badge-dot"></span>
    <span class="chapter-badge-text">الفصل الأول</span>
  </div>

  <!-- Lesson cards -->
  <div class="lessons" id="lessons" aria-label="قائمة الدروس">

    <button class="lesson selected" data-id="1">
      <span class="tile" aria-hidden="true">⚖️</span>
      <span class="lesson-info">
        <span class="lesson-label">المقارنة والتصنيف</span>
        <span class="lesson-num">الدرس ١</span>
      </span>
      <span class="lesson-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </span>
    </button>

    <button class="lesson" data-id="2">
      <span class="tile" aria-hidden="true">🔢</span>
      <span class="lesson-info">
        <span class="lesson-label">الأعداد حتى ٥</span>
        <span class="lesson-num">الدرس ٢</span>
      </span>
      <span class="lesson-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </span>
    </button>

    <button class="lesson" data-id="3">
      <span class="tile" aria-hidden="true">🧩</span>
      <span class="lesson-info">
        <span class="lesson-label">الموقع والنمط</span>
        <span class="lesson-num">الدرس ٣</span>
      </span>
      <span class="lesson-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </span>
    </button>

    <button class="lesson" data-id="4">
      <span class="tile" aria-hidden="true">🔟</span>
      <span class="lesson-info">
        <span class="lesson-label">الأعداد حتى ١٠</span>
        <span class="lesson-num">الدرس ٤</span>
      </span>
      <span class="lesson-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </span>
    </button>

    <button class="lesson" data-id="5">
      <span class="tile" aria-hidden="true">🔣</span>
      <span class="lesson-info">
        <span class="lesson-label">الأعداد حتى ٢٠</span>
        <span class="lesson-num">الدرس ٥</span>
      </span>
      <span class="lesson-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </span>
    </button>

    <button class="lesson" data-id="6">
      <span class="tile" aria-hidden="true">➕</span>
      <span class="lesson-info">
        <span class="lesson-label">الجمع</span>
        <span class="lesson-num">الدرس ٦</span>
      </span>
      <span class="lesson-arrow" aria-hidden="true">
        <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </span>
    </button>

  </div>

  <!-- Bottom actions -->
  <div class="bottom">
    <button class="btn-back" onclick="handleBack()" aria-label="رجوع">
      <svg viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </button>
    <button class="btn-continue" onclick="handleContinue()">
      متابعة
      <svg viewBox="0 0 24 24" width="20" height="20" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
  </div>

</div>

<script>
const lessons = document.getElementById('lessons');
let selectedId = '1';

lessons.querySelectorAll('.lesson').forEach(function(el) {
  el.addEventListener('click', function() {
    lessons.querySelectorAll('.lesson').forEach(function(l) {
      l.classList.remove('selected');
    });
    el.classList.add('selected');
    selectedId = el.dataset.id;
  });
});

// unit (data-id) -> first lesson file of its chapter (standalone navigation)
window.__UNIT_FIRST__ = {
  '1':'moosa-lesson-classify 1.html',
  '2':'../Interactive book for elementary school chapter 2/moosa-chp 2-lesson 1.html',
  '3':'../Interactive book for elementary school chapter 3/moosa-chp 3-lesson 1.html',
  '4':'../Interactive book for elementary school chapter 4/moosa-chp 4-lesson 1.html',
  '6':'../Interactive book for elementary school chapter 6/goal-kick-math/index.html'
};

function handleContinue() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ action: 'openLesson', id: selectedId }, '*');
  } else {
    var url = window.__UNIT_FIRST__[selectedId];
    if (url) window.location.href = url;
  }
}
function handleBack() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ action: 'goBack' }, '*');
  } else {
    window.location.href = 'moosa-splash.html';
  }
}

// ── Standalone progress: green tick on completed units + highlight next ──
// (When embedded in index.html, the shell injects this instead.)
(function(){
  if (window.parent && window.parent !== window) return;
  var TOTAL={ch1:5,ch2:6,ch3:6,ch4:3}, U2C={'1':'ch1','2':'ch2','3':'ch3','4':'ch4'};
  function chDone(ch){try{return (JSON.parse(localStorage.getItem('moosa_'+ch)||'[]')).length>=TOTAL[ch];}catch(e){return false;}}
  var nextBtn=null;
  lessons.querySelectorAll('.lesson').forEach(function(btn){
    btn.classList.remove('selected'); btn.setAttribute('aria-selected','false');
    var ch=U2C[btn.dataset.id];
    if(ch && chDone(ch)){
      if(!btn.querySelector('.ch-done-badge')){
        var b=document.createElement('span'); b.className='ch-done-badge'; b.textContent='✓';
        b.style.cssText='position:absolute;top:8px;left:8px;width:26px;height:26px;background:#22C55E;color:#fff;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;box-shadow:0 2px 6px rgba(0,0,0,.2);z-index:9';
        btn.style.position='relative'; btn.appendChild(b);
      }
    } else if(ch && !nextBtn){ nextBtn=btn; }
  });
  if(!nextBtn) nextBtn=lessons.querySelector('.lesson[data-id="1"]');
  if(nextBtn){ nextBtn.classList.add('selected'); nextBtn.setAttribute('aria-selected','true'); selectedId=nextBtn.dataset.id; }
})();
</script>
</body>
</html>
