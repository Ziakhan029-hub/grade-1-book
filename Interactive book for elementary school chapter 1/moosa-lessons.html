<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<script>
/* Single narration channel: starting any spoken clip stops the previous one (prevents audio overlap). Tap/win blips use WebAudio and are unaffected. */
(function(){
  if(window.__mlAudioBus__)return; window.__mlAudioBus__=1;
  var cur=null;
  try{
    var P=window.HTMLAudioElement&&HTMLAudioElement.prototype;
    if(P&&P.play){
      var op=P.play;
      P.play=function(){
        if(cur&&cur!==this){try{cur.pause();}catch(e){}try{cur.currentTime=0;}catch(e){}}
        cur=this;
        try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
        return op.apply(this,arguments);
      };
    }
  }catch(e){}
  try{
    var ss=window.speechSynthesis;
    if(ss&&ss.speak){
      var osp=ss.speak;
      ss.speak=function(u){if(cur){try{cur.pause();}catch(e){}}try{return osp.call(ss,u);}catch(e){}};
    }
  }catch(e){}
})();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى التعليمي — اختر لعبة</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --ink:#1f2937; --font-d:'Baloo Bhaijaan 2','Tajawal',sans-serif; --font-b:'Tajawal',sans-serif;
  --ease-b:cubic-bezier(.34,1.56,.64,1); --ease-s:cubic-bezier(.25,.8,.3,1);
}
html,body{width:100%;height:100%;overflow-x:hidden}
body{font-family:var(--font-b);display:flex;align-items:center;justify-content:center;min-height:100dvh;
  background:linear-gradient(160deg,#e0f2fe 0%,#ede9fe 50%,#fce7f3 100%);}
.phone{position:relative;z-index:1;width:100%;max-width:560px;min-height:100dvh;height:100dvh;
  background:linear-gradient(180deg,#f8fbff 0%,#eef4ff 100%);
  display:flex;flex-direction:column;overflow:hidden;
  box-shadow:0 0 0 1px rgba(0,0,0,.05),0 24px 64px rgba(0,0,0,.12);}

/* ── Header ── */
.header{background:linear-gradient(135deg,#7c3aed 0%,#db2777 100%);
  padding:26px 16px;display:flex;align-items:center;justify-content:center;gap:12px;flex-shrink:0;
  box-shadow:0 6px 18px rgba(124,58,237,.35);position:relative;z-index:3;}
.header-text{min-width:0;text-align:center}
.header-title{font-family:var(--font-d);font-size:30px;font-weight:800;color:#fff;line-height:1;text-shadow:0 2px 4px rgba(0,0,0,.2)}
.header-sub{font-size:18px;font-weight:600;color:rgba(255,255,255,.92);margin-top:6px}

/* ── Cards ── */
.lessons{display:flex;flex-direction:column;gap:11px;flex:1;padding:14px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;align-content:center;}
.lesson{display:flex;align-items:center;gap:13px;width:100%;padding:13px 15px;border:4px solid #fff;border-radius:24px;
  background:linear-gradient(135deg,var(--c1),var(--c2));cursor:pointer;position:relative;overflow:hidden;
  box-shadow:0 7px 0 var(--c2),0 10px 22px rgba(0,0,0,.14);
  transition:transform .14s var(--ease-b),box-shadow .14s var(--ease-s),filter .14s;
  -webkit-tap-highlight-color:transparent;user-select:none;outline:none;flex-shrink:0;
  animation:cardIn .5s var(--ease-b) both;}
.lesson:nth-child(1){animation-delay:.04s} .lesson:nth-child(2){animation-delay:.10s}
.lesson:nth-child(3){animation-delay:.16s} .lesson:nth-child(4){animation-delay:.22s}
.lesson:nth-child(5){animation-delay:.28s} .lesson:nth-child(6){animation-delay:.34s}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(.94)}to{opacity:1;transform:none}}
.lesson:active{transform:scale(.97) translateY(3px);box-shadow:0 2px 0 var(--c2),0 4px 10px rgba(0,0,0,.12)}
.lesson.selected{animation:cardIn .5s var(--ease-b) both, pulseSel 1.6s ease-in-out 1s infinite;}
@keyframes pulseSel{0%,100%{box-shadow:0 7px 0 var(--c2),0 10px 22px rgba(0,0,0,.14),0 0 0 0 rgba(255,255,255,.7)}50%{box-shadow:0 7px 0 var(--c2),0 10px 22px rgba(0,0,0,.14),0 0 0 6px rgba(255,255,255,.55)}}
.lesson:focus-visible{outline:4px solid #1d4ed8;outline-offset:3px}
.lesson.shake{animation:shake .4s linear}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

.tile{flex-shrink:0;width:60px;height:60px;border-radius:18px;background:rgba(255,255,255,.95);
  display:flex;align-items:center;justify-content:center;font-size:34px;
  box-shadow:inset 0 -3px 6px rgba(0,0,0,.08),0 3px 6px rgba(0,0,0,.12);}
.lesson-label{flex:1;min-width:0;font-family:var(--font-d);font-size:20px;font-weight:800;color:#fff;
  text-shadow:0 2px 3px rgba(0,0,0,.28);line-height:1.2;}
.say-name{flex-shrink:0;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.9);
  display:flex;align-items:center;justify-content:center;font-size:21px;cursor:pointer;
  box-shadow:0 3px 0 rgba(0,0,0,.18);transition:transform .12s var(--ease-b);}
.say-name:active{transform:scale(.85)}

/* locked unit */
.lesson.locked{filter:saturate(.5) brightness(.96);cursor:default;box-shadow:0 6px 0 #94a3b8,0 8px 16px rgba(0,0,0,.12)}
.lesson.locked .lesson-label{opacity:.85}
.lock-ico{flex-shrink:0;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.85);
  display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 3px 0 rgba(0,0,0,.18);}
.soon-ribbon{position:absolute;top:8px;left:-26px;transform:rotate(-45deg);background:#ef4444;color:#fff;
  font-family:var(--font-d);font-size:11px;font-weight:800;padding:3px 28px;box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:6;}

/* completion star (shell/standalone inject .ch-done-badge) */
.ch-done-badge{animation:badgePop .45s var(--ease-b) both;}
@keyframes badgePop{0%{transform:scale(0) rotate(-30deg)}100%{transform:scale(1) rotate(0)}}

/* ── Bottom ── */
.bottom{flex-shrink:0;padding:12px 16px max(16px,env(safe-area-inset-bottom,12px));display:flex;justify-content:center;}
.btn-home{display:inline-flex;align-items:center;gap:9px;border:4px solid #fff;border-radius:20px;padding:11px 26px;
  background:linear-gradient(135deg,#38bdf8,#0284c7);color:#fff;font-family:var(--font-d);font-size:18px;font-weight:800;
  cursor:pointer;box-shadow:0 6px 0 #0369a1,0 8px 18px rgba(2,132,199,.3);text-shadow:0 1px 2px rgba(0,0,0,.2);
  transition:transform .12s var(--ease-b);-webkit-tap-highlight-color:transparent;}
.btn-home:active{transform:translateY(3px);box-shadow:0 3px 0 #0369a1}
.btn-home .ico{font-size:22px;line-height:1}

/* ── Part switcher (الجزء الأول / الجزء الثاني) ── */
.lesson[data-part="2"]{display:none}                              /* part 2 hidden by default */
.lessons.show-part-2 .lesson:not([data-part="2"]){display:none}   /* hide part 1 when viewing part 2 */
.lessons.show-part-2 .lesson[data-part="2"]{display:flex}
.lesson:nth-child(7){animation-delay:.04s} .lesson:nth-child(8){animation-delay:.10s}
.lesson:nth-child(9){animation-delay:.16s} .lesson:nth-child(10){animation-delay:.22s}
.lesson:nth-child(11){animation-delay:.28s} .lesson:nth-child(12){animation-delay:.34s}
.lesson:nth-child(13){animation-delay:.40s}
.lesson.soon{cursor:pointer}                                      /* upcoming units stay colourful + show a ribbon */
.btn-part{display:inline-flex;align-items:center;gap:9px;border:4px solid #fff;border-radius:20px;padding:11px 30px;
  background:linear-gradient(135deg,#7c3aed,#db2777);color:#fff;font-family:var(--font-d);font-size:18px;font-weight:800;
  cursor:pointer;box-shadow:0 6px 0 #6d28d9,0 8px 18px rgba(124,58,237,.32);text-shadow:0 1px 2px rgba(0,0,0,.2);
  transition:transform .12s var(--ease-b);-webkit-tap-highlight-color:transparent;}
.btn-part:active{transform:translateY(3px);box-shadow:0 3px 0 #6d28d9}
.btn-part .ico{font-size:22px;line-height:1}
</style>
</head>
<body>
<div class="phone">

  <div class="header">
    <div class="header-text">
      <div class="header-title">الصف الأول الابتدائي</div>
      <div class="header-sub" id="headerSub">الجزء الأول</div>
    </div>
  </div>

  <div class="lessons" id="lessons" aria-label="قائمة الألعاب">

    <button class="lesson selected" data-id="1" style="--c1:#fb923c;--c2:#ea580c">
      <span class="tile" aria-hidden="true">⚖️</span>
      <span class="lesson-label">المقارنة والتصنيف</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson" data-id="2" style="--c1:#38bdf8;--c2:#0284c7">
      <span class="tile" aria-hidden="true">🔢</span>
      <span class="lesson-label">الأعداد حتى ٥</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson" data-id="3" style="--c1:#a78bfa;--c2:#7c3aed">
      <span class="tile" aria-hidden="true">🧩</span>
      <span class="lesson-label">الموقع والنمط</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson" data-id="4" style="--c1:#4ade80;--c2:#16a34a">
      <span class="tile" aria-hidden="true">🔟</span>
      <span class="lesson-label">الأعداد حتى ١٠</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson" data-id="5" style="--c1:#2dd4bf;--c2:#0d9488">
      <span class="tile" aria-hidden="true">🔢</span>
      <span class="lesson-label">الأعداد حتى ٢٠</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson" data-id="6" style="--c1:#f472b6;--c2:#db2777">
      <span class="tile" aria-hidden="true">➕</span>
      <span class="lesson-label">الجمع</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <!-- ── الجزء الثاني — 7 units (coming soon). Wire each to its first lesson + remove `soon` when ready. ── -->
    <button class="lesson" data-id="7" data-part="2" style="--c1:#f87171;--c2:#dc2626">
      <span class="tile" aria-hidden="true">🍎</span>
      <span class="lesson-label">الطرح</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson" data-id="8" data-part="2" style="--c1:#fbbf24;--c2:#f59e0b">
      <span class="tile" aria-hidden="true">🧮</span>
      <span class="lesson-label">طرائق الجمع والطرح</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson" data-id="9" data-part="2" style="--c1:#22d3ee;--c2:#0891b2">
      <span class="tile" aria-hidden="true">🧱</span>
      <span class="lesson-label">القيمة المنزلية</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson" data-id="10" data-part="2" style="--c1:#4ade80;--c2:#16a34a">
      <span class="tile" aria-hidden="true">📏</span>
      <span class="lesson-label">القياس</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson soon" data-id="11" data-part="2" style="--c1:#818cf8;--c2:#4f46e5">
      <span class="soon-ribbon">قريباً</span>
      <span class="tile" aria-hidden="true">🔁</span>
      <span class="lesson-label">أنماط الأعداد</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson soon" data-id="12" data-part="2" style="--c1:#fcd34d;--c2:#d97706">
      <span class="soon-ribbon">قريباً</span>
      <span class="tile" aria-hidden="true">🪙</span>
      <span class="lesson-label">النقود</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

    <button class="lesson soon" data-id="13" data-part="2" style="--c1:#f472b6;--c2:#db2777">
      <span class="soon-ribbon">قريباً</span>
      <span class="tile" aria-hidden="true">📐</span>
      <span class="lesson-label">الأشكال الهندسية والكسور</span>
      <span class="say-name" role="button" tabindex="0" aria-label="استمع للاسم">🔊</span>
    </button>

  </div>

  <div class="bottom">
    <button class="btn-part" id="partToggle" aria-label="تبديل الجزء"><span class="ico">📗</span> <span class="lbl">الجزء الثاني</span></button>
  </div>

</div>

<script>
var lessons = document.getElementById('lessons');
var selectedId = '1';
var embedded = !!(window.parent && window.parent !== window);

/* ── narrator (FatimaNeural) + soft sfx ── */
var NAV = {
  welcome:'../audio/84b12e63.mp3', soon:'../audio/1986216a.mp3',
  names:{ '1':'../audio/36a7db03.mp3','2':'../audio/54b0b96d.mp3','3':'../audio/1c885f45.mp3',
          '4':'../audio/c98970ea.mp3','5':'../audio/f1a21c40.mp3','6':'../audio/42a34ab4.mp3',
          '7':'../audio/dcc69136.mp3','8':'../audio/115da9a6.mp3','9':'../audio/2a39f7ac.mp3','10':'../audio/a7d5d90a.mp3' }
};
var _na=null;
function say(url){ if(!url)return; try{ if(_na)_na.pause(); _na=new Audio(url); _na.play().catch(function(){}); }catch(e){} }
var AC=(function(){var c=null;function g(){if(!c)c=new(window.AudioContext||window.webkitAudioContext)();return c;}
  function t(f1,f2,type,vol,d){try{var a=g(),o=a.createOscillator(),gn=a.createGain();o.type=type;
    o.frequency.setValueAtTime(f1,a.currentTime);o.frequency.exponentialRampToValueAtTime(f2,a.currentTime+d);
    gn.gain.setValueAtTime(vol,a.currentTime);gn.gain.exponentialRampToValueAtTime(.001,a.currentTime+d+.02);
    o.connect(gn);gn.connect(a.destination);o.start();o.stop(a.currentTime+d+.05);}catch(e){}}
  return{pop:function(){t(523,880,'triangle',.18,.12);},buzz:function(){t(220,150,'sawtooth',.12,.22);}};})();

var _welcomed=false;
function welcome(){ if(_welcomed)return; try{ if(_na)_na.pause(); _na=new Audio(NAV.welcome); _na.play().then(function(){_welcomed=true;}).catch(function(){}); }catch(e){} }

/* ── wire cards ── */
lessons.querySelectorAll('.lesson').forEach(function(el){
  var sp=el.querySelector('.say-name');
  if(sp){
    sp.addEventListener('click',function(ev){ ev.stopPropagation(); say(NAV.names[el.dataset.id]||NAV.soon); });
    sp.addEventListener('keydown',function(ev){ if(ev.key==='Enter'||ev.key===' '){ev.stopPropagation();ev.preventDefault();say(NAV.names[el.dataset.id]||NAV.soon);} });
  }
  el.addEventListener('click',function(){
    if(el.classList.contains('locked')||el.classList.contains('soon')){
      AC.buzz(); say(NAV.soon);
      el.classList.remove('shake'); void el.offsetWidth; el.classList.add('shake');
      return;
    }
    AC.pop();
    lessons.querySelectorAll('.lesson').forEach(function(l){ l.classList.remove('selected'); l.setAttribute('aria-selected','false'); });
    el.classList.add('selected'); el.setAttribute('aria-selected','true'); selectedId=el.dataset.id;
    var _id=el.dataset.id;
    setTimeout(function(){
      if(embedded){ window.parent.postMessage({ action:'openLesson', id:_id }, '*'); }
      else { var u=window.__UNIT_FIRST__[_id]; if(u) window.location.href=u; }
    }, 150);
  });
});


/* welcome narration — try on load, fall back to first touch (autoplay gate) */
window.addEventListener('load',function(){ setTimeout(welcome,350); });
document.addEventListener('pointerdown',function(){ welcome(); },{once:true,passive:true});

/* unit (data-id) -> first lesson file (standalone navigation) */
window.__UNIT_FIRST__ = {
  '1':'moosa-lesson-classify 1.html',
  '2':'../Interactive book for elementary school chapter 2/moosa-chp 2-lesson 1.html',
  '3':'../Interactive book for elementary school chapter 3/moosa-chp 3-lesson 1.html',
  '4':'../Interactive book for elementary school chapter 4/moosa-chp 4-lesson 1.html',
  '5':'../Interactive book for elementary school chapter 5/moosa-chp 5-lesson 1.html',
  '6':'../Interactive book for elementary school chapter 6/goal-kick-math/index.html',
  '7':'../Interactive-book-for-elementary-school-chapter-7/Apples/index.html',
  '8':'../Interactive book for elementary school chapter 8/moosa-chp 8-lesson 1.html',
  '9':'../Interactive book for elementary school chapter 9/moosa-chp 9-lesson 1.html',
  '10':'../Interactive book for elementary school chapter 10/moosa-chp 10-lesson 1.html'
};

function handleBack(){
  if (embedded) { window.parent.postMessage({ action: 'goBack' }, '*'); }
  else { window.location.href = 'moosa-splash.html'; }
}

/* ── Part switcher: bottom button flips between الجزء الأول and الجزء الثاني ── */
(function(){
  var currentPart = 1;
  var toggle = document.getElementById('partToggle');
  var sub = document.getElementById('headerSub');
  if(!toggle) return;
  function setPart(p){
    currentPart = p;
    lessons.classList.toggle('show-part-2', p===2);
    toggle.querySelector('.lbl').textContent = (p===1 ? 'الجزء الثاني' : 'الجزء الأول');
    toggle.querySelector('.ico').textContent = (p===1 ? '📗' : '📘');
    if(sub) sub.textContent = (p===1 ? 'الجزء الأول' : 'الجزء الثاني');
    /* replay the entrance animation for the cards now in view */
    lessons.querySelectorAll('.lesson').forEach(function(c){
      var inP2 = c.getAttribute('data-part')==='2';
      if((p===2)===inP2){ c.style.animation='none'; void c.offsetWidth; c.style.animation=''; }
    });
    lessons.scrollTop = 0;
  }
  toggle.addEventListener('click',function(){ AC.pop(); setPart(currentPart===1 ? 2 : 1); });
})();

/* ── Progress: star on completed units + highlight the next one ──
   Runs in both embedded and standalone (reads shared localStorage), so it
   works even when the shell can't cross-frame inject (e.g. file://). */
(function(){
  var TOTAL={ch1:5,ch2:6,ch3:6,ch4:8,ch5:7}, U2C={'1':'ch1','2':'ch2','3':'ch3','4':'ch4','5':'ch5'};
  function chDone(ch){try{return (JSON.parse(localStorage.getItem('moosa_'+ch)||'[]')).length>=TOTAL[ch];}catch(e){return false;}}
  // a unit (chapter) is complete when its games/lessons set a done flag, or all its lessons are finished
  function unitDone(id){
    try{ if(localStorage.getItem('moosa_done_ch'+id)==='1') return true; }catch(e){}
    var ch=U2C[id]; return !!(ch && chDone(ch));
  }
  var nextBtn=null;
  lessons.querySelectorAll('.lesson').forEach(function(btn){
    btn.classList.remove('selected'); btn.setAttribute('aria-selected','false');
    var id=btn.dataset.id;
    if(unitDone(id)){
      if(!btn.querySelector('.ch-done-badge')){
        var b=document.createElement('span'); b.className='ch-done-badge'; b.textContent='✓';
        b.style.cssText='position:absolute;top:7px;left:7px;width:36px;height:36px;background:linear-gradient(180deg,#34d399,#16a34a);color:#fff;border:3px solid #fff;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:21px;font-weight:900;line-height:1;box-shadow:0 3px 8px rgba(0,0,0,.28);z-index:7';
        btn.appendChild(b);
      }
    } else if(!nextBtn && !btn.classList.contains('locked') && !btn.classList.contains('soon')){ nextBtn=btn; }
  });
  if(!nextBtn) nextBtn=lessons.querySelector('.lesson[data-id="1"]');
  if(nextBtn){ nextBtn.classList.add('selected'); nextBtn.setAttribute('aria-selected','true'); selectedId=nextBtn.dataset.id; }
})();
</script>
</body>
