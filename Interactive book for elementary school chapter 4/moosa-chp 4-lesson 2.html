<style>
body{background:linear-gradient(160deg,#FEF3C7 0%,#FDE68A 100%);margin:0}
.ml-widget{
  --amber:#F59E0B;--amber-dark:#D97706;--cream:#FFFEF9;
  --ink:#1C1917;--ink-soft:#78716C;--tile:#E8E0D0;
  --green:#22C55E;--green-dark:#16A34A;--green-text:#14532D;
  --ok:#22C55E;--bad:#EF4444;
  --font-d:'Baloo Bhaijaan 2','Tajawal',sans-serif;
  --font-b:'Tajawal',sans-serif;
  --ease-b:cubic-bezier(.34,1.56,.64,1);
  display:flex;flex-direction:column;
  height:100vh;height:100svh;
  max-width:480px;margin:0 auto;
  background:var(--cream);overflow:hidden;position:relative;
  font-family:var(--font-b);color:var(--ink);
  -webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;
}
.ml-widget *{box-sizing:border-box}

.ml-widget .top-bar{flex-shrink:0;background:var(--amber);padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:8px}
.ml-widget .score-label{font-family:var(--font-d);font-size:14px;font-weight:700;color:rgba(255,255,255,.75)}
.ml-widget .score-val{font-family:var(--font-d);font-size:24px;font-weight:800;color:#fff;line-height:1}

.ml-widget .progress-dots{flex-shrink:0;display:flex;justify-content:center;gap:7px;padding:9px 0 3px}
.ml-widget .progress-dots .dot{width:9px;height:9px;border-radius:50%;background:rgba(61,38,16,.18);transition:all .3s var(--ease-b)}
.ml-widget .progress-dots .dot.active{background:var(--amber);transform:scale(1.4)}
.ml-widget .progress-dots .dot.done{background:var(--green)}

.ml-widget .screen{flex:1;min-height:0;display:flex;flex-direction:column;position:relative}

.ml-widget .prompt{flex-shrink:0;text-align:center;padding:6px 16px 0}
.ml-widget .prompt-line{font-family:var(--font-d);font-size:17px;font-weight:800;color:var(--ink);line-height:1.4;display:inline-flex;align-items:center;gap:9px}
.ml-widget .say-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--amber);color:#fff;font-size:16px;cursor:pointer;box-shadow:0 3px 0 var(--amber-dark);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0}
.ml-widget .say-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--amber-dark)}

.ml-widget .play{flex:1;min-height:0;display:flex;flex-direction:column;justify-content:space-evenly;align-items:center;padding:4px 12px}

.ml-widget .count-big{font-family:var(--font-d);font-size:28px;font-weight:800;color:var(--amber-dark);text-align:center;min-height:36px;line-height:36px}

/* ten frame */
.ml-widget .tenframe{display:grid;grid-template-columns:repeat(5,1fr);gap:0;border:3px solid var(--ink-soft);border-radius:10px;overflow:hidden;background:#FFFDF6}
.ml-widget .tf-cell{width:clamp(42px,calc((100vw - 80px)/5),58px);height:clamp(42px,calc((100vw - 80px)/5),58px);border:1.5px solid rgba(122,80,48,.45);display:flex;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;position:relative}
.ml-widget .tf-cell.next{animation:ml-itemGlow 1.4s ease-in-out infinite;z-index:2}
.ml-widget .tf-cell .ball{width:72%;height:72%;border-radius:50%;animation:ml-pop .38s var(--ease-b);box-shadow:inset -3px -4px 0 rgba(0,0,0,.18), inset 3px 4px 0 rgba(255,255,255,.35)}
.ml-widget .tf-cell.filled{cursor:default}

/* objects */
.ml-widget .obj-area{display:flex;flex-direction:column;align-items:center;gap:6px}
.ml-widget .obj-row{display:flex;justify-content:center;gap:6px}
.ml-widget .obj{position:relative;cursor:pointer;touch-action:manipulation;animation:ml-pop .38s var(--ease-b) both;flex-shrink:0}
.ml-widget .obj svg{display:block}
.ml-widget .obj.counted{cursor:default}
.ml-widget .obj .cnt-badge{position:absolute;top:-9px;left:-7px;width:22px;height:22px;border-radius:50%;background:var(--green);border:2.5px solid #fff;color:#fff;font-family:var(--font-d);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;animation:ml-pop .38s var(--ease-b);z-index:5}

/* numeral choices */
.ml-widget .nums{display:flex;justify-content:center;gap:14px}
.ml-widget .num-card{width:72px;height:80px;border-radius:18px;background:#FFFDF6;border:3px solid rgba(196,172,126,.5);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;touch-action:manipulation;position:relative;transition:all .2s var(--ease-b);animation:ml-pop .38s var(--ease-b) both}
.ml-widget .num-card.dim{opacity:.4;pointer-events:none}
.ml-widget .num-card .nm{font-family:var(--font-d);font-size:34px;font-weight:800;color:var(--ink);line-height:1}
.ml-widget .num-card .nw{font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--ink-soft)}
.ml-widget .num-card.shake{animation:ml-shake .38s linear}
.ml-widget .num-card.ok-pick{border-color:var(--ok);background:#EFF9EA}
.ml-widget .num-card .x-mark{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-family:var(--font-d);font-size:44px;font-weight:800;color:var(--bad);pointer-events:none}
.ml-widget .num-card .x-mark.show{display:flex;animation:ml-xDraw .35s var(--ease-b)}

/* tracing */
.ml-widget .trace-wrap{display:flex;flex-direction:column;align-items:center;gap:6px}
.ml-widget .trace-label{font-family:var(--font-d);font-size:14px;font-weight:700;color:var(--ink-soft)}
.ml-widget .trace-box{background:#FFFDF6;border:3px solid rgba(196,172,126,.6);border-radius:18px;touch-action:none;position:relative}
.ml-widget .trace-box svg{display:block;border-radius:15px}
.ml-widget .trace-box.success{border-color:var(--ok);background:#F4FBF0}
.ml-widget .trace-box.shake{animation:ml-shake .38s linear}
.ml-widget .trace-tools{display:flex;gap:12px;align-items:center}
.ml-widget .clear-btn{border:none;border-radius:13px;padding:7px 18px 9px;font-family:var(--font-d);font-size:15px;font-weight:800;color:#fff;background:var(--tile);box-shadow:0 3px 0 #A89062;cursor:pointer}
.ml-widget .clear-btn:active{transform:translateY(2px);box-shadow:0 1px 0 #A89062}
.ml-widget .trace-star{font-size:26px;opacity:0}
.ml-widget .trace-star.won{opacity:1;animation:ml-starPop .45s var(--ease-b)}

.ml-widget .guide-hand{position:absolute;z-index:300;pointer-events:none;font-size:32px;animation:ml-guideTap 2s ease-in-out infinite;filter:drop-shadow(0 3px 4px rgba(60,35,5,.3))}

.ml-widget .next-wrap{flex-shrink:0;padding:6px 18px 14px}
.ml-widget .next-btn{width:100%;border:none;border-radius:18px;padding:12px 0 14px;font-family:var(--font-d);font-size:20px;font-weight:800;color:#fff;background:var(--green);box-shadow:0 5px 0 var(--green-dark);cursor:pointer;transition:all .18s var(--ease-b)}
.ml-widget .next-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--green-dark)}
.ml-widget .next-btn:disabled{background:var(--tile);box-shadow:0 5px 0 #A89062;opacity:.55;cursor:default}

.ml-widget .flash{position:absolute;inset:0;z-index:50;pointer-events:none;opacity:0}
.ml-widget .flash.ok{background:radial-gradient(circle,rgba(75,176,64,.25),transparent 70%)}
.ml-widget .flash.bad{background:radial-gradient(circle,rgba(208,80,48,.25),transparent 70%)}
.ml-widget .flash.show{animation:ml-flash .55s ease-out}

.ml-widget .win-overlay{position:absolute;inset:0;z-index:100;background:rgba(120,70,10,.72);display:none;align-items:center;justify-content:center}
.ml-widget .win-overlay.show{display:flex;animation:ml-fadeIn .35s ease-out}
.ml-widget .win-card{text-align:center;animation:ml-winPop .5s var(--ease-b)}
.ml-widget .win-rays{display:block;width:190px;height:190px;margin:0 auto -160px;animation:ml-spin 8s linear infinite}
.ml-widget .win-mascot{display:block;width:170px;height:170px;object-fit:contain;position:relative;margin:0 auto;animation:ml-bob 1.8s ease-in-out infinite}
.ml-widget .win-title{font-family:var(--font-d);font-size:28px;font-weight:800;color:#fff;margin-top:6px}
.ml-widget .win-stars{font-size:34px;letter-spacing:6px;margin-top:2px}
.ml-widget .win-stars span{display:inline-block;opacity:0;animation:ml-starPop .45s var(--ease-b) forwards}
.ml-widget .win-stars span:nth-child(1){animation-delay:.3s}
.ml-widget .win-stars span:nth-child(2){animation-delay:.48s}
.ml-widget .win-stars span:nth-child(3){animation-delay:.66s}
.ml-widget .win-score{font-family:var(--font-d);font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin-top:6px}
.ml-widget .win-btn{margin-top:14px;border:none;border-radius:18px;padding:12px 38px 14px;font-family:var(--font-d);font-size:20px;font-weight:800;color:#fff;background:var(--green);box-shadow:0 5px 0 var(--green-dark);cursor:pointer}
.ml-widget .win-btn:active{transform:translateY(3px);box-shadow:0 2px 0 var(--green-dark)}
.ml-confetti{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.ml-confetti i{position:absolute;top:-20px;display:block;animation:ml-confettiFall linear forwards}

@keyframes ml-pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes ml-flash{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
@keyframes ml-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-5px)}80%{transform:translateX(4px)}}
@keyframes ml-xDraw{0%{transform:scale(.2);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes ml-itemGlow{0%,100%{box-shadow:inset 0 0 0 0 rgba(232,160,32,0)}50%{box-shadow:inset 0 0 0 4px rgba(232,160,32,.45)}}
@keyframes ml-guideTap{0%,100%{transform:translateY(0) scale(1)}25%{transform:translateY(-10px) scale(1)}40%{transform:translateY(2px) scale(.85)}55%{transform:translateY(-6px) scale(1)}}
@keyframes ml-fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ml-winPop{0%{transform:scale(.4);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes ml-starPop{0%{transform:scale(0) rotate(-40deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes ml-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes ml-spin{to{transform:rotate(360deg)}}
@keyframes ml-confettiFall{to{transform:translateY(110vh) rotate(540deg);opacity:.9}}
@keyframes ml-pulseDot{0%,100%{r:7}50%{r:10}}

/* ═══════════════════════════════════════
   UNIFIED DESIGN SYSTEM — win screen
   ═══════════════════════════════════════ */

/* top-bar consistent height/padding */
.top-bar{flex-shrink:0;background:linear-gradient(135deg,#FCD34D 0%,#F59E0B 60%,#D97706 100%) !important;padding:12px 20px !important;box-shadow:0 2px 8px rgba(180,100,0,.18);}

/* win overlay — modern frosted dark */
.ml-widget .win-overlay,.win-overlay{
  background:rgba(15,8,0,.82) !important;
  backdrop-filter:blur(8px) !important;
  -webkit-backdrop-filter:blur(8px) !important;
}
/* win card — glass card */
.ml-widget .win-card,.win-card{
  display:flex !important;flex-direction:column !important;align-items:center !important;
  background:rgba(255,255,255,.10) !important;
  border:2px solid rgba(255,255,255,.22) !important;
  border-radius:28px !important;
  padding:24px 32px 28px !important;
  box-shadow:0 8px 32px rgba(0,0,0,.3) !important;
  gap:0 !important;
}
/* hide ALL old mascot variants */
.ml-widget .mascot,.mascot,
.win-mascot,.ml-widget .win-mascot,
.mascot-img,.ml-widget .mascot-img,
.win-scene{display:none !important;}
/* unified mascot */
.win-unified-mascot{
  width:150px;height:150px;object-fit:contain;
  display:block;margin:0 auto 4px;
  animation:ml-bob 1.8s ease-in-out infinite;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));
}
/* win-rays — keep spinning above mascot */
.ml-widget .win-rays,.win-rays{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-bottom:-155px;}
.ml-widget .win-rays svg,.win-rays svg.rays,.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
/* win title */
.ml-widget .win-title,.win-title{
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;
  font-size:30px !important;font-weight:800 !important;
  color:#fff !important;
  text-shadow:0 2px 6px rgba(0,0,0,.3) !important;
  margin:8px 0 4px !important;
}
/* win stars */
.ml-widget .win-stars,.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px;}
.ml-widget .win-stars span,.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b,cubic-bezier(.34,1.56,.64,1)) both;opacity:0;}
.ml-widget .win-stars span:nth-child(1),.win-stars span:nth-child(1){animation-delay:.3s}
.ml-widget .win-stars span:nth-child(2),.win-stars span:nth-child(2){animation-delay:.48s}
.ml-widget .win-stars span:nth-child(3),.win-stars span:nth-child(3){animation-delay:.66s}
@keyframes ml-starPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
/* win score */
.ml-widget .win-score-row,.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;}
.ml-widget .win-score-label,.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.ml-widget .win-score-val,.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.ml-widget .win-score,.win-score{font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin:4px 0 10px;}
/* play-again button — all variants */
.ml-widget .btn-win,.btn-win,
.ml-widget .win-btn,.win-btn,
.btn-win-again{
  margin-top:14px !important;
  padding:14px 48px !important;
  border:3px solid rgba(255,255,255,.9) !important;
  border-radius:20px !important;
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif !important;
  font-size:20px !important;font-weight:800 !important;
  color:#fff !important;text-shadow:0 1px 2px rgba(0,0,0,.2) !important;
  background:linear-gradient(135deg,#4ADE80 0%,#22C55E 55%,#16A34A 100%) !important;
  box-shadow:0 6px 0 #15803D,0 8px 20px rgba(22,163,74,.28) !important;
  cursor:pointer;
  transition:transform 150ms cubic-bezier(.34,1.56,.64,1),box-shadow 150ms ease;
  -webkit-tap-highlight-color:transparent;
}
.ml-widget .btn-win:active,.btn-win:active,
.ml-widget .win-btn:active,.win-btn:active,
.btn-win-again:active{
  transform:translateY(4px) !important;
  box-shadow:0 1px 0 #15803D,0 3px 8px rgba(22,163,74,.2) !important;
}

function objSVG(kind,size,i){

  if(kind==='cookie'){return `<svg width="${s}" height="${s}" viewBox="0 0 60 60">

  </svg>`;}

  </svg>`;}

    <path d="M30 20 C 18 4 4 8 8 20 C 10 27 22 24 30 20 Z" fill="#8A2018" stroke="#5E120C" stroke-width="1.8"/>
    <path d="M30 20 C 42 4 56 8 52 20 C 50 27 38 24 30 20 Z" fill="#A03028" stroke="#5E120C" stroke-width="1.8"/>
    <path d="M30 20 C 20 34 8 36 12 26 C 14 20 24 21 30 20 Z" fill="#A03028" stroke="#5E120C" stroke-width="1.8"/>
    <path d="M30 20 C 40 34 52 36 48 26 C 46 20 36 21 30 20 Z" fill="#8A2018" stroke="#5E120C" stroke-width="1.8"/>

    <rect x="13" y="32" width="22" height="4" rx="2" transform="rotate(18 24 34)" fill="#9AA0A8"/>
  </svg>`;}
  /* crayon */
  const c=CRAYON_COLORS[i%CRAYON_COLORS.length];
  return `<svg width="${s*0.42}" height="${s}" viewBox="0 0 25 60">
    <path d="M12.5 2 L19 16 L6 16 Z" fill="${c}" stroke="rgba(0,0,0,.25)" stroke-width="1.5"/>

    <rect x="6" y="24" width="13" height="9" fill="rgba(255,255,255,.35)"/>
  </svg>`;
}

const mlEl=id=>document.getElementById(id);
const toAr=n=>String(n).replace(/[0-9]/g,d=>'٠١٢٣٤٥٦٧٨٩'[+d]);

const mlSnd=(()=>{let ctx=null;
  const c=()=>ctx||(ctx=new(window.AudioContext||window.webkitAudioContext)());
  const tone=(f,t,d,type,vol)=>{const a=c(),o=a.createOscillator(),g=a.createGain();
    o.type=type;o.frequency.setValueAtTime(f,a.currentTime+t);
    g.gain.setValueAtTime(vol,a.currentTime+t);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+t+d);
    o.connect(g);g.connect(a.destination);o.start(a.currentTime+t);o.stop(a.currentTime+t+d+.05);};
  return{
    tap(i){try{tone(392+i*44,0,.13,'triangle',.2);}catch(e){}},
    correct(){try{tone(523,0,.16,'triangle',.25);tone(659,.11,.2,'triangle',.25);}catch(e){}},
    wrong(){try{const a=c(),o=a.createOscillator(),g=a.createGain();o.type='sawtooth';
      o.frequency.setValueAtTime(200,a.currentTime);o.frequency.exponentialRampToValueAtTime(140,a.currentTime+.25);
      g.gain.setValueAtTime(.18,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.3);
      o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.35);}catch(e){}},
    row(){try{[523,659,784].forEach((f,i)=>tone(f,i*.09,.18,'triangle',.22));}catch(e){}},
    win(){try{[523,659,784,1047].forEach((f,i)=>tone(f,i*.085,.22,'triangle',.22));}catch(e){}}

/* ════════ TRACER ════════ */
function makeTracer(container, num, opts){
  const SIZE=opts.size||210, TOL=30, faint=opts.faint;
  const pts=NUM_PATHS[num].map(p=>[p[0]*SIZE/100, p[1]*SIZE/100]);
  /* densify checkpoints */
  const cps=[];
  for(let i=0;i<pts.length-1;i++){
    const [x1,y1]=pts[i],[x2,y2]=pts[i+1];
    const seg=Math.hypot(x2-x1,y2-y1), steps=Math.max(1,Math.round(seg/(SIZE*0.09)));
    for(let s=0;s<steps;s++) cps.push([x1+(x2-x1)*s/steps, y1+(y2-y1)*s/steps]);
  }
  cps.push(pts[pts.length-1]);
  const total=cps.length;
  let nextCp=0, drawing=false, done=false, anyInk=false;

  const box=document.createElement('div');box.className='trace-box';
  const ns='http://www.w3.org/2000/svg';
  const svg=document.createElementNS(ns,'svg');
  svg.setAttribute('width',SIZE);svg.setAttribute('height',SIZE);
  svg.setAttribute('viewBox',`0 0 ${SIZE} ${SIZE}`);
  box.appendChild(svg);

  const poly=p=>p.map((q,i)=>(i?'L':'M')+q[0].toFixed(1)+' '+q[1].toFixed(1)).join(' ');

  /* dotted guide */
  const guide=document.createElementNS(ns,'path');
  guide.setAttribute('d',poly(pts));
  guide.setAttribute('fill','none');
  guide.setAttribute('stroke', faint?'rgba(122,80,48,.28)':'rgba(122,80,48,.55)');
  guide.setAttribute('stroke-width',faint?7:9);
  guide.setAttribute('stroke-linecap','round');guide.setAttribute('stroke-linejoin','round');
  guide.setAttribute('stroke-dasharray','1 14');
  svg.appendChild(guide);

  /* progress (green) */
  let pathLen;
  const prog=document.createElementNS(ns,'path');
  prog.setAttribute('d',poly(pts));
  prog.setAttribute('fill','none');prog.setAttribute('stroke','#22C55E');
  prog.setAttribute('stroke-width',11);prog.setAttribute('stroke-linecap','round');prog.setAttribute('stroke-linejoin','round');
  svg.appendChild(prog);
  pathLen=prog.getTotalLength?0:0;

  /* direction arrows (at ~30% and ~70%) — not for faint mode */
  if(!faint){
    [[0.3],[0.7]].forEach(([f])=>{
      const i=Math.min(cps.length-2, Math.floor(f*cps.length));
      const [x1,y1]=cps[i],[x2,y2]=cps[i+1];
      const ang=Math.atan2(y2-y1,x2-x1)*180/Math.PI;
      const ar=document.createElementNS(ns,'path');
      ar.setAttribute('d','M -7 -6 L 8 0 L -7 6 Z');
      ar.setAttribute('fill','#D97706');
      ar.setAttribute('transform',`translate(${x1} ${y1}) rotate(${ang})`);
      svg.appendChild(ar);
    });
  }
  /* start dot */
  const sd=document.createElementNS(ns,'circle');
  sd.setAttribute('cx',pts[0][0]);sd.setAttribute('cy',pts[0][1]);sd.setAttribute('r',8);
  sd.setAttribute('fill','#E0463C');sd.style.animation='ml-pulseDot 1.3s ease-in-out infinite';
  svg.appendChild(sd);

  /* ink layer */
  const ink=document.createElementNS(ns,'path');
  ink.setAttribute('fill','none');ink.setAttribute('stroke','rgba(61,38,16,.65)');
  ink.setAttribute('stroke-width',7);ink.setAttribute('stroke-linecap','round');ink.setAttribute('stroke-linejoin','round');
  svg.appendChild(ink);
  let inkD='';

  function updateProgress(){
    const L=prog.getTotalLength();
    const f=nextCp/total;
    prog.setAttribute('stroke-dasharray',L);
    prog.setAttribute('stroke-dashoffset',L*(1-f));
  }
  updateProgress();

  function toSvg(e){
    const r=svg.getBoundingClientRect();
    return [(e.clientX-r.left)*SIZE/r.width, (e.clientY-r.top)*SIZE/r.height];
  }
  function consume(p){
    /* advance through any checkpoints within tolerance (allow small skip) */
    let advanced=false;
    while(nextCp<total){
      const look=Math.min(nextCp+3,total);
      let hit=-1;
      for(let i=nextCp;i<look;i++){
        if(Math.hypot(p[0]-cps[i][0],p[1]-cps[i][1])<=TOL){hit=i;break;}
      }
      if(hit<0)break;
      nextCp=hit+1;advanced=true;
    }
    if(advanced) updateProgress();
    if(nextCp>=total && !done){done=true; setTimeout(()=>finish(true),120);}
  }
  function finish(ok){
    drawing=false;
    if(ok){
      box.classList.add('success');
      sd.remove();
      ink.setAttribute('stroke','rgba(75,176,64,.0)');
      prog.setAttribute('stroke-dashoffset',0);
      opts.onSuccess&&opts.onSuccess();
    }
  }
  function clearInk(){
    inkD='';ink.setAttribute('d','');nextCp=0;done=false;anyInk=false;updateProgress();
  }
  box.addEventListener('pointerdown',e=>{
    if(done||mlLocked)return;
    drawing=true;anyInk=true;
    box.setPointerCapture(e.pointerId);
    const p=toSvg(e);
    inkD+=`M ${p[0].toFixed(1)} ${p[1].toFixed(1)} `;
    ink.setAttribute('d',inkD);
    consume(p);
    dismissHand();
  });
  box.addEventListener('pointermove',e=>{
    if(!drawing||done)return;
    const p=toSvg(e);
    inkD+=`L ${p[0].toFixed(1)} ${p[1].toFixed(1)} `;
    ink.setAttribute('d',inkD);
    consume(p);
  });
  const up=()=>{
    if(!drawing)return;
    drawing=false;
    if(!done && anyInk && nextCp<total*0.85){
      /* incomplete trace → gentle retry */
      mlSnd.wrong();
      box.classList.remove('shake');void box.offsetWidth;box.classList.add('shake');
      setTimeout(clearInk,420);
    }else if(!done && nextCp>=total*0.85){
      nextCp=total;done=true;updateProgress();finish(true);
    }
  };
  box.addEventListener('pointerup',up);
  box.addEventListener('pointercancel',up);

  container.appendChild(box);
  return {box, clear:clearInk, getStartPoint:()=>{
    const r=svg.getBoundingClientRect();
    return {x:r.left+pts[0][0]*r.width/SIZE, y:r.top+pts[0][1]*r.height/SIZE};
  }};
}

/* ── Q1-3: ten-frame + trace twice ── */
function renderWrite(st,play){
  mlPhase='frame';
  const tf=document.createElement('div');tf.className='tenframe';tf.id='mlFrame';
  for(let i=0;i<10;i++){
    const c=document.createElement('div');c.className='tf-cell'+(i===0?' next':'');

    c.addEventListener('pointerdown',()=>onCellTap(c,st),{passive:true});

  }
  play.appendChild(tf);

  const tw=document.createElement('div');tw.className='trace-wrap';tw.id='mlTraceArea';
  play.appendChild(tw);
}
function onCellTap(cell,st){
  if(mlLocked||mlPhase!=='frame'||cell.classList.contains('filled'))return;
  const idx=+cell.dataset.idx;
  if(idx!==mlCount){
    const nx=document.querySelector('.tf-cell.next');
    if(nx){nx.classList.remove('shake');void nx.offsetWidth;nx.classList.add('shake');}
    return;
  }
  dismissHand();
  mlCount++;
  mlSnd.tap(mlCount);
  cell.classList.remove('next');cell.classList.add('filled');
  const b=document.createElement('div');b.className='ball';
  b.style.background=BALL_COLORS[idx%BALL_COLORS.length];

  mlEl('mlBig').textContent=toAr(mlCount);
  mlSpeak(AR_COUNT[mlCount-1]);
  if(mlCount>=st.n){
    mlPhase='trace';
    startTraceRound(st);
  }else{
    const nx=document.querySelector('.tf-cell[data-idx="'+mlCount+'"]');
    if(nx)nx.classList.add('next');

}
function startTraceRound(st){

/* ── guide hand ── */
function armHand(delay){
  clearTimeout(mlHandTimer);
  mlHandTimer=setTimeout(()=>{
    if(mlLocked)return;
    const st=ML_STEPS[mlStepIdx];
    const screen=mlEl('mlScreen');
    const old=screen.querySelector('.guide-hand');if(old)old.remove();
    let x=null,y=null,target=null;
    if(mlPhase==='frame'){
      target=document.querySelector('.tf-cell.next');
    }else if(mlPhase==='count'){
      target=document.querySelector('#mlObjs .obj:not(.counted)');
    }else if(mlPhase==='pick'){
      target=document.querySelector('.num-card[data-n="'+st.n+'"]');
    }else if(mlPhase==='trace'&&mlTracer){
      const sp=mlTracer.getStartPoint();
      const s=screen.getBoundingClientRect();
      x=sp.x-s.left; y=sp.y-s.top+8;
    }
    if(target){
      const r=target.getBoundingClientRect(), s=screen.getBoundingClientRect();
      x=r.left-s.left+r.width*0.5-8; y=r.top-s.top+r.height*0.55;
    }
    if(x==null)return;
    const h=document.createElement('div');h.className='guide-hand';h.textContent='👆';
    h.style.left=x+'px';h.style.top=y+'px';
    screen.appendChild(h);
  },delay);
}
function dismissHand(){
  clearTimeout(mlHandTimer);
  const h=mlEl('mlScreen').querySelector('.guide-hand');
  if(h){h.style.animation='none';h.style.opacity='0';setTimeout(()=>h.remove(),200);}
}

<script>
(function(){
  var hand=null,idleT=null,animT=null,IDLE=2000;
  function init(){
    hand=document.createElement('div');hand.id='mlGuideHand';hand.textContent='👆';
    document.body.appendChild(hand);
    schedule(2000);
    document.addEventListener('pointerdown',onAction,{passive:true});
    var qEl=document.getElementById('ml-qPrompt');
    if(qEl)new MutationObserver(function(){onAction();schedule(2000);}).observe(qEl,{childList:true,characterData:true,subtree:true});
  }
  function onAction(){clearTimeout(idleT);clearTimeout(animT);hide();schedule(IDLE);}
  function schedule(ms){clearTimeout(idleT);idleT=setTimeout(run,ms);}
  function hide(){if(!hand)return;hand.style.transition='opacity .25s';hand.style.opacity='0';hand.classList.remove('appear');}
  function run(){
    if(!hand)return;
    var items=document.querySelectorAll('#ml-tray .item:not(.placed)');
    if(!items.length)return;
    var item=items[0],box=document.getElementById('ml-box'+item.dataset.answer);
    if(!box)return;
    var iR=item.getBoundingClientRect(),bR=box.getBoundingClientRect();
    hand.style.transition='none';
    hand.style.left=(iR.left+iR.width/2-19)+'px';
    hand.style.top=(iR.top-14)+'px';
    hand.style.opacity='0';
    hand.classList.add('appear');
    animT=setTimeout(function(){
      hand.style.transition='left .75s cubic-bezier(.4,0,.2,1),top .75s cubic-bezier(.4,0,.2,1),transform .75s,opacity .3s';
      hand.style.left=(bR.left+bR.width/2-19)+'px';
      hand.style.top=(bR.top+bR.height/2-19)+'px';
      hand.style.transform='scale(.9) rotate(0deg)';
      hand.style.opacity='1';
      animT=setTimeout(function(){hide();animT=setTimeout(run,1800);},900);
    },700);
  }
  if(document.readyState==='loading'){window.addEventListener('load',init);}else{init();}
})();
</script>

  -webkit-tap-highlight-color:transparent;
}
.top-bar .lsn-btn.active{
  background:rgba(180,83,9,.22);
  color:#fff;
  border-color:rgba(120,53,5,.55);
  transform:scale(1.08);
}
.top-bar .lsn-btn.done{
  background:#16A34A;
  color:#fff;
}
.top-bar .lsn-btn:hover{transform:scale(1.12);background:rgba(255,255,255,.55);}

</style>
<script>
(function(){
  var L=['moosa-chp 4-lesson 1.html', 'moosa-chp 4-lesson 2.html', 'moosa-chp 4-lesson 3.html'];
  function build(){
    var bar=document.querySelector('.top-bar');
    if(bar){
      bar.querySelectorAll('.lsn-btn').forEach(function(b){b.remove();});
      var cur=decodeURIComponent(window.location.pathname.split('/').pop());
      var ci=L.indexOf(cur);
      L.forEach(function(lf,i){
        var b=document.createElement('button');
        b.className='lsn-btn'+(i===ci?' active':i<ci?' done':'');
        b.textContent=i+1;
        b.addEventListener('click',function(){window.location.href=lf;});
        bar.appendChild(b);
      });
    }
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',build);}
  else{build();}
})();
</script>

<style>
/* -- question progress dots -- */
.ml-widget .progress-dots,#ml-dots,#mlDots,.round-row{display:flex!important;flex-shrink:0;justify-content:center;align-items:center;gap:7px;padding:6px 0 2px;}
.ml-widget .qdot{display:inline-block;width:9px;height:9px;border-radius:50%;background:rgba(61,38,16,.18);transition:all .3s;pointer-events:none;flex-shrink:0;}
.ml-widget .qdot.active{background:var(--amber,#F59E0B);transform:scale(1.4);}
.ml-widget .qdot.done{background:var(--green,#22C55E);}
</style>
<script>
(function(){
  var c=document.getElementById('ml-dots')||document.getElementById('mlDots')||document.getElementById('roundRow');
  if(!c){
    var tb=document.querySelector('.ml-widget .top-bar');
    if(!tb)return;
    c=document.createElement('div');c.className='progress-dots';c.id='mlDots';
    tb.insertAdjacentElement('afterend',c);
  }
  function getIdx(){try{if(typeof qIndex!=='undefined')return qIndex;}catch(e){}try{if(typeof stepIndex!=='undefined')return stepIndex;}catch(e){}try{if(typeof stepIdx!=='undefined')return stepIdx;}catch(e){}try{if(typeof mlStepIdx!=='undefined')return mlStepIdx;}catch(e){}return 0;}
  function getTotal(){try{if(typeof QUESTIONS!=='undefined'&&QUESTIONS.length)return QUESTIONS.length;}catch(e){}try{if(typeof STEPS!=='undefined'&&STEPS.length)return STEPS.length;}catch(e){}try{if(typeof ML_STEPS!=='undefined'&&ML_STEPS.length)return ML_STEPS.length;}catch(e){}try{if(typeof ML_TOTAL==='number')return ML_TOTAL;}catch(e){}return 0;}
  var _busy=false;
  var obs=new MutationObserver(function(){if(!_busy)render();});
  function render(){
    if(_busy)return;
    var total=getTotal();if(!total)return;
    var idx=getIdx(),key=idx+'/'+total;
    if(c._qk===key)return;
    c._qk=key;_busy=true;obs.disconnect();
    c.innerHTML='';
    for(var i=0;i<total;i++){var d=document.createElement('span');d.className='qdot'+(i===idx?' active':i<idx?' done':'');c.appendChild(d);}
    _busy=false;obs.observe(c,{childList:true});
  }
  if(typeof renderDots!=='undefined'){
    window.renderDots=function(){
      var sv=document.getElementById('ml-scoreVal')||document.getElementById('mlScoreVal');
      if(sv){try{var sc=typeof score!=='undefined'?score:typeof mlScore!=='undefined'?mlScore:null;if(sc!==null)sv.textContent=String(sc).replace(/[0-9]/g,function(d){return'٠١٢٣٤٥٦٧٨٩'[+d];});}catch(e){}}
      render();
    };
  }
  obs.observe(c,{childList:true});
  setInterval(render,500);render();
})();
</script>
