<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>أحل المسألة — بالرسم بصورة</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:linear-gradient(160deg,#FEF3C7 0%,#FDE68A 100%);font-family:'Tajawal',sans-serif;}

.app{
  width:100%;height:100vh;height:100svh;
  max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;
  background:#FFFEF9;
  position:relative;overflow:hidden;
}

/* LESSON BADGE */
.lesson-badge{
  position:absolute;top:10px;right:10px;z-index:20;
  display:flex;align-items:center;gap:6px;
  background:linear-gradient(160deg,#FEF3C7 0%,#FDE68A 100%);color:#fff;border-radius:999px;
  padding:5px 14px 5px 8px;
  font-family:'Baloo Bhaijaan 2',sans-serif;
  font-size:12px;font-weight:800;
  box-shadow:0 3px 0 #D97706;pointer-events:none;
}
.lesson-badge .badge-num{
  background:rgba(255,255,255,.25);border-radius:50%;
  width:22px;height:22px;display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;
}

/* ROUND DOTS */
.round-row{flex-shrink:0;display:flex;align-items:center;justify-content:center;gap:5px;padding:10px 0 4px;}
.round-dot{width:8px;height:8px;border-radius:50%;background:rgba(61,38,16,.2);transition:background .3s,transform .3s;}
.round-dot.active{background:linear-gradient(160deg,#FEF3C7 0%,#FDE68A 100%);transform:scale(1.4);}
.round-dot.done{background:#22C55E;}

/* SCENE — real image */
.scene-area{
  flex-shrink:0;position:relative;
  width:100%;
  overflow:hidden;
  background:#FFFEF9;
}
.scene-img{width:100%;display:block;}
#hitLayer{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none;}
#hitLayer .duck-hit,#hitLayer .duck-ring,#hitLayer .tap-hand,#hitLayer .duck-check,#hitLayer .splash{pointer-events:auto;}
#hitLayer .duck-ring,#hitLayer .tap-hand,#hitLayer .duck-check,#hitLayer .splash{pointer-events:none;}

/* Tap targets over each duck — sized & centered per duck via JS */
.duck-hit{
  position:absolute;
  transform:translate(-50%,-50%);
  border:none;background:transparent;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;z-index:12;
  border-radius:50%;padding:0;
}
.duck-hit:active{transform:translate(-50%,-50%) scale(.92);}
.duck-hit.caught{pointer-events:none;}

/* highlight ring hugging the catchable duck — sized to duck via JS */
.duck-ring{
  position:absolute;
  transform:translate(-50%,-50%);
  border:5px solid #F59E0B;border-radius:50%;
  box-shadow:0 0 0 4px rgba(232,160,32,.22),0 0 16px rgba(232,160,32,.45);
  animation:duckPulse 1.3s ease-in-out infinite;
  pointer-events:none;z-index:11;
}
@keyframes duckPulse{
  0%,100%{box-shadow:0 0 0 4px rgba(232,160,32,.22),0 0 16px rgba(232,160,32,.45);}
  50%{box-shadow:0 0 0 9px rgba(232,160,32,.10),0 0 24px rgba(232,160,32,.55);}
}

/* TAP GUIDE HAND — points up at the duck from below-right, taps it */
.tap-hand{
  position:absolute;z-index:30;
  font-size:40px;pointer-events:none;
  transform:translate(-50%,0);transform-origin:50% 0%;
  filter:drop-shadow(0 3px 4px rgba(0,0,0,.35));
  animation:guideTap 1.5s ease-in-out infinite;
}
@keyframes guideTap{
  0%{opacity:0;transform:translate(-50%,18px) scale(1);}
  16%{opacity:1;transform:translate(-50%,8px) scale(1);}
  34%{opacity:1;transform:translate(-50%,-2px) scale(.84);}
  50%{opacity:1;transform:translate(-50%,6px) scale(1);}
  66%{opacity:1;transform:translate(-50%,12px) scale(1);}
  82%{opacity:0;transform:translate(-50%,20px) scale(1);}
  100%{opacity:0;transform:translate(-50%,18px) scale(1);}
}

/* caught checkmark on duck */
.duck-check{
  position:absolute;z-index:25;
  font-size:28px;pointer-events:none;
  transform:translate(-50%,-50%);
  animation:checkPop .45s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes checkPop{
  0%{transform:translate(-50%,-50%) scale(0) rotate(-30deg);opacity:0;}
  70%{transform:translate(-50%,-50%) scale(1.3) rotate(8deg);}
  100%{transform:translate(-50%,-50%) scale(1) rotate(0);opacity:1;}
}
.splash{position:absolute;pointer-events:none;z-index:24;font-size:26px;transform:translate(-50%,-50%);animation:splashAnim .6s ease-out both;}
@keyframes splashAnim{0%{transform:translate(-50%,-50%) scale(0);opacity:1;}60%{transform:translate(-50%,-50%) scale(1.4);opacity:1;}100%{transform:translate(-50%,-50%) scale(1);opacity:0;}}

/* DRAW LABEL ROW */
.draw-label-row{flex-shrink:0;display:flex;align-items:center;padding:0 12px;gap:8px;height:34px;}
.draw-label-text{font-family:'Baloo Bhaijaan 2',sans-serif;font-size:13px;font-weight:800;color:#1C1917;white-space:nowrap;}
.draw-divider{flex:1;height:2px;background:repeating-linear-gradient(90deg,#E8E0D0 0px,#E8E0D0 6px,transparent 6px,transparent 10px);}
.crayon-pill{background:#EF4444;color:#fff;font-family:'Baloo Bhaijaan 2',sans-serif;font-size:12px;font-weight:800;padding:4px 12px;border-radius:999px;box-shadow:0 2px 0 #A03818;white-space:nowrap;}

/* DRAW BOX */
.draw-box{
  flex:1;min-height:0;margin:0 12px 6px;
  border:3px solid #EF4444;border-radius:16px;
  position:relative;background:#FFFDF6;overflow:hidden;
  display:flex;flex-direction:column;
}
.draw-box::before{content:'';position:absolute;inset:4px;border:1.5px dashed rgba(208,80,48,.2);border-radius:12px;pointer-events:none;z-index:0;}
.circles-area{flex:1;display:flex;align-items:center;justify-content:center;padding:8px 14px;gap:12px;flex-wrap:wrap;min-height:0;position:relative;z-index:1;}
.drawn-circle{
  width:64px;height:64px;border-radius:50%;
  border:5px solid #EF4444;background:#FBF3E0;
  display:flex;align-items:center;justify-content:center;font-size:34px;line-height:1;
  box-shadow:inset 0 0 0 2px rgba(208,80,48,.18);
  animation:circlePop .4s cubic-bezier(.34,1.56,.64,1) both;flex-shrink:0;
}
@keyframes circlePop{0%{transform:scale(0);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
.draw-placeholder{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Baloo Bhaijaan 2',sans-serif;font-size:13px;color:rgba(122,80,48,.45);
  pointer-events:none;z-index:0;text-align:center;padding:12px;line-height:1.8;
}

/* COUNT REVEAL */
.count-reveal{flex-shrink:0;min-height:66px;display:flex;align-items:center;justify-content:center;gap:10px;padding:8px 16px 14px;opacity:0;transition:opacity .4s;}
.count-reveal.show{opacity:1;}
.count-reveal-label{font-family:'Baloo Bhaijaan 2',sans-serif;font-size:14px;font-weight:800;color:#1C1917;}
.count-reveal-num{font-family:'Baloo Bhaijaan 2',sans-serif;font-size:42px;font-weight:800;color:#D97706;line-height:1;animation:numBounce .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes numBounce{0%{transform:scale(0);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
.count-reveal-word{font-family:'Baloo Bhaijaan 2',sans-serif;font-size:16px;font-weight:700;color:#14532D;background:#D8EFC0;border-radius:999px;padding:3px 12px;}

/* BOTTOM BUTTONS */

/* WIN OVERLAY */
.win-overlay{position:absolute;inset:0;z-index:100;background:rgba(120,70,10,.72);display:none;align-items:center;justify-content:center;animation:fadeIn .35s ease;}
.win-overlay.show{display:flex;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.win-card{text-align:center;display:flex;flex-direction:column;align-items:center;gap:4px;animation:winPop .5s cubic-bezier(.34,1.56,.64,1) both;}
@keyframes winPop{0%{transform:scale(.55);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
.win-scene{font-size:72px;animation:winBob 1.8s ease-in-out infinite;}
@keyframes winBob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.win-title{font-family:'Baloo Bhaijaan 2',sans-serif;font-size:30px;font-weight:800;color:#fff;text-shadow:0 3px 8px rgba(0,0,0,.3);}
.win-sub{font-family:'Baloo Bhaijaan 2',sans-serif;font-size:16px;color:rgba(255,255,255,.85);margin-bottom:4px;}
.win-stars{display:flex;gap:6px;justify-content:center;margin:4px 0;}
.win-stars span{font-size:30px;animation:starPop .45s cubic-bezier(.34,1.56,.64,1) both;}
.win-stars span:nth-child(1){animation-delay:.3s}.win-stars span:nth-child(2){animation-delay:.48s}.win-stars span:nth-child(3){animation-delay:.66s}
@keyframes starPop{0%{transform:scale(0) rotate(-20deg);opacity:0}70%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
.btn-win-again{margin-top:12px;padding:13px 36px;border-radius:14px;border:none;font-family:'Baloo Bhaijaan 2',sans-serif;font-size:18px;font-weight:800;color:#14532D;background:#22C55E;cursor:pointer;box-shadow:0 5px 0 #16A34A;transition:transform .1s;-webkit-tap-highlight-color:transparent;}
.btn-win-again:active{transform:translateY(3px);box-shadow:0 1px 0 #16A34A;}
.confetti-piece{position:fixed;pointer-events:none;z-index:9999;}
@keyframes confFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(540deg);opacity:0}}

/* INTRO OVERLAY */

/* ═══════════════════════════════════════
   UNIFIED DESIGN SYSTEM — win screen
   ═══════════════════════════════════════ */

/* top-bar consistent height/padding */
.top-bar{flex-shrink:0;background:linear-gradient(135deg,#FCD34D 0%,#F59E0B 60%,#D97706 100%) !important;padding:12px 20px !important;box-shadow:0 2px 8px rgba(180,100,0,.18);}

/* win overlay — modern frosted dark */
.ml-widget .win-overlay,.win-overlay{
  background:rgba(15,8,0,.82) !important;
  backdrop-filter:blur(8px) !important;
  -webkit-backdrop-filter:blur(8px) !important;
}
/* win card — glass card */
.ml-widget .win-card,.win-card{
  display:flex !important;flex-direction:column !important;align-items:center !important;
  background:rgba(255,255,255,.10) !important;
  border:2px solid rgba(255,255,255,.22) !important;
  border-radius:28px !important;
  padding:24px 32px 28px !important;
  box-shadow:0 8px 32px rgba(0,0,0,.3) !important;
  gap:0 !important;
}
/* hide ALL old mascot variants */
.ml-widget .mascot,.mascot,
.win-mascot,.ml-widget .win-mascot,
.mascot-img,.ml-widget .mascot-img,
.win-scene{display:none !important;}
/* unified mascot */
.win-unified-mascot{
  width:150px;height:150px;object-fit:contain;
  display:block;margin:0 auto 4px;
  animation:ml-bob 1.8s ease-in-out infinite;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));
}
/* win-rays — keep spinning above mascot */
.ml-widget .win-rays,.win-rays{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-bottom:-155px;}
.ml-widget .win-rays svg,.win-rays svg.rays,.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
/* win title */
.ml-widget .win-title,.win-title{
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;
  font-size:30px !important;font-weight:800 !important;
  color:#fff !important;
  text-shadow:0 2px 6px rgba(0,0,0,.3) !important;
  margin:8px 0 4px !important;
}
/* win stars */
.ml-widget .win-stars,.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px;}
.ml-widget .win-stars span,.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b,cubic-bezier(.34,1.56,.64,1)) both;opacity:0;}
.ml-widget .win-stars span:nth-child(1),.win-stars span:nth-child(1){animation-delay:.3s}
.ml-widget .win-stars span:nth-child(2),.win-stars span:nth-child(2){animation-delay:.48s}
.ml-widget .win-stars span:nth-child(3),.win-stars span:nth-child(3){animation-delay:.66s}
@keyframes ml-starPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
/* win score */
.ml-widget .win-score-row,.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;}
.ml-widget .win-score-label,.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.ml-widget .win-score-val,.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.ml-widget .win-score,.win-score{font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin:4px 0 10px;}
/* play-again button — all variants */
.ml-widget .btn-win,.btn-win,
.ml-widget .win-btn,.win-btn,
.btn-win-again{
  margin-top:14px !important;
  padding:14px 48px !important;
  border:3px solid rgba(255,255,255,.9) !important;
  border-radius:20px !important;
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif !important;
  font-size:20px !important;font-weight:800 !important;
  color:#fff !important;text-shadow:0 1px 2px rgba(0,0,0,.2) !important;
  background:linear-gradient(135deg,#4ADE80 0%,#22C55E 55%,#16A34A 100%) !important;
  box-shadow:0 6px 0 #15803D,0 8px 20px rgba(22,163,74,.28) !important;
  cursor:pointer;
  transition:transform 150ms cubic-bezier(.34,1.56,.64,1),box-shadow 150ms ease;
  -webkit-tap-highlight-color:transparent;
}
.ml-widget .btn-win:active,.btn-win:active,
.ml-widget .win-btn:active,.win-btn:active,
.btn-win-again:active{
  transform:translateY(4px) !important;
  box-shadow:0 1px 0 #15803D,0 3px 8px rgba(22,163,74,.2) !important;
}


/* ═══════════════════════════════
   MOOSA NARRATOR GUIDE — FEMALE
   ═══════════════════════════════ */

/* ── Female Narrator indicator ── */
.f-narrator{
  position:fixed!important;bottom:18px!important;right:12px!important;
  top:auto!important;left:auto!important;
  z-index:9999;
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#FCD34D,#F59E0B);
  border:3px solid #fff;border-radius:999px;
  padding:8px 14px 8px 10px;
  box-shadow:0 4px 0 #B45309,0 6px 18px rgba(180,100,0,.28);
  direction:rtl;
  transition:opacity .3s;
}
.f-narrator-icon{font-size:20px;line-height:1;}
.f-narrator-waves{display:flex;align-items:center;gap:3px;height:18px;}
.f-narrator-waves span{
  display:inline-block;width:3px;border-radius:3px;
  background:#fff;opacity:.5;
  animation:fnWave 1.2s ease-in-out infinite;
}
.f-narrator-waves span:nth-child(1){height:6px;animation-delay:0s}
.f-narrator-waves span:nth-child(2){height:12px;animation-delay:.15s}
.f-narrator-waves span:nth-child(3){height:18px;animation-delay:.3s}
.f-narrator-waves span:nth-child(4){height:12px;animation-delay:.45s}
.f-narrator-waves span:nth-child(5){height:6px;animation-delay:.6s}
.f-narrator.speaking .f-narrator-waves span{opacity:1;background:#fff;}
@keyframes fnWave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}
/* ── Animated guide hand ── */
#mlGuideHand{position:fixed;z-index:9990;pointer-events:none;font-size:38px;opacity:0;transform-origin:bottom center;filter:drop-shadow(0 3px 6px rgba(0,0,0,.35));will-change:left,top,opacity,transform;}
#mlGuideHand.appear{animation:guideAppear .4s ease forwards;}
@keyframes guideAppear{0%{opacity:0;transform:scale(.4) rotate(-30deg)}100%{opacity:1;transform:scale(1.2) rotate(-20deg)}}
/* ── countdown bar ── */
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#22C55E,#4ADE80);border-radius:14px;transform-origin:left center;animation:mlCountdownShrink 5s linear forwards;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}
/* ── win two-button row ── */
.win-btns{display:flex;gap:10px;margin-top:14px !important;width:100%;}
.win-btns .btn-win{margin-top:0 !important;padding:14px 0 !important;font-size:17px !important;flex:1;min-width:0;}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%) !important;box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28) !important;}
.btn-win-next:active{transform:translateY(4px) !important;box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2) !important;}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="lesson-badge"><span class="badge-num">٥-٢</span>أحل المسألة</div>

  <div class="round-row" id="roundRow"></div>

  <!-- SCENE: real image + duck hit targets -->
  <div class="scene-area" id="sceneArea">
    <img class="scene-img" id="sceneImg" alt="حوض البط - أطفال يصطادون البطات" />
    <div id="hitLayer"></div>
  </div>

  <!-- أرسم divider -->
  <div class="draw-label-row">
    <span class="draw-label-text">بَرسُم صورة</span>
    <div class="draw-divider"></div>
    <span class="crayon-pill">أرسُم</span>
  </div>

  <!-- draw box -->
  <div class="draw-box" id="drawBox">
    <div class="circles-area" id="circlesArea">
      <div class="draw-placeholder" id="drawPlaceholder">اصطد البطات لترسم الدوائر هنا 🦆</div>
    </div>
  </div>

  <!-- count reveal -->
  <div class="count-reveal" id="countReveal">
    <span class="count-reveal-label">عدد البطات المصطادة</span>
    <span class="count-reveal-num" id="revealNum"></span>
    <span class="count-reveal-word" id="revealWord"></span>
  </div>

  <!-- bottom buttons -->


  <!-- win overlay -->
    <div class="next-wrap" id="ml-nextWrap" style="display:none">
    <div class="countdown-bar">
      <div class="countdown-fill" id="ml-countdownFill"></div>
      <span class="countdown-txt" id="ml-countdownTxt">٥</span>
    </div>
  </div>
<div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <span class="win-scene">🦆🎉🦆</span>
      <img class="win-unified-mascot" src="../mascot.png" alt="موسى">
      <div class="win-title">أحسنت يا بطل! 🏆</div>
      <div class="win-sub">لقد تعلّمت العدّ من ١ إلى ٥</div>
      <div class="win-stars"><span>⭐</span><span>⭐</span><span>⭐</span></div>
      <div class="win-btns">
        <button class="btn-win btn-win-next" onclick="mlHandleWinNext()">التالي ›</button>
        <button class="btn-win btn-win-repeat" onclick="restartAll()">إعادة 🔄</button>
      </div>
    </div>
  </div>

</div>

const toAr = n => String(n).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
const ARABIC_WORDS = ['','بطة واحدة','بطتان','ثلاث بطات','أربع بطات','خمس بطات'];

document.getElementById('sceneImg').src = SCENE_SRC;

/* Duck positions detected from the actual image (fraction of width/height) */
/* ordered the way we want them caught: left → right */
const DUCK_POS = [
  {x:0.3812, y:0.5230, r:0.0488},
  {x:0.4780, y:0.4411, r:0.0516},
  {x:0.5522, y:0.5878, r:0.0503},
  {x:0.6261, y:0.4511, r:0.0494},
  {x:0.6906, y:0.5604, r:0.0551},
];

/* ROUNDS: how many of the 5 ducks to catch */
const ROUNDS = [
  { ducks:1 },
  { ducks:2 },
  { ducks:3 },
  { ducks:4 },
  { ducks:5 },
];

let roundIdx=0, caughtCount=0;

/* AUDIO */
const mlAudio=(()=>{
  let ctx; const gc=()=>{if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;};
  function plop(){try{const c=gc(),t=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(660,t);o.frequency.exponentialRampToValueAtTime(880,t+.08);g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.28);}catch(e){}}
  function chime(){try{const c=gc(),t=c.currentTime;[523.25,659.25].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,t+i*.1);g.gain.linearRampToValueAtTime(.25,t+i*.1+.03);g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.32);o.start(t+i*.1);o.stop(t+i*.1+.35);});}catch(e){}}
  function fanfare(){try{const c=gc();[[523.25,0],[659.25,.15],[783.99,.3],[1046.5,.45]].forEach(([f,d])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);const t=c.currentTime+d;o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.25,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+.45);o.start(t);o.stop(t+.5);});}catch(e){}}
  return{plop,chime,fanfare};
})();

function renderDots(){
  const row=document.getElementById('roundRow');row.innerHTML='';
  ROUNDS.forEach((_,i)=>{const d=document.createElement('div');d.className='round-dot'+(i===roundIdx?' active':i<roundIdx?' done':'');row.appendChild(d);});
}

/* size scene area to image aspect within available height */
function sizeScene(){
  const img=document.getElementById('sceneImg');
  const area=document.getElementById('sceneArea');
  // image natural aspect ~1.656; set scene height by width
  // (img width:100% handles it; area auto-heights to img)
}

function renderHits(){
  const layer=document.getElementById('hitLayer');
  layer.innerHTML='';
  const n=ROUNDS[roundIdx].ducks;
  const area=document.getElementById('sceneArea');
  const SW=area.clientWidth||380;
  const SH=area.clientHeight||230;

  for(let i=0;i<n;i++){
    const pos=DUCK_POS[i];
    const isCaught = i < caughtCount;
    const isNext = i === caughtCount;
    // duck diameter in px (r is fraction of scene WIDTH)
    const dia = pos.r*2*SW;
    const px = pos.x*SW;
    const py = pos.y*SH;

    // hit target button — exactly covers the duck
    const btn=document.createElement('button');
    btn.className='duck-hit'+(isCaught?' caught':'');
    btn.style.left=px+'px';
    btn.style.top=py+'px';
    btn.style.width=dia+'px';
    btn.style.height=dia+'px';
    btn.onclick=()=>catchDuck(i);
    layer.appendChild(btn);

    // golden highlight ring hugging the NEXT catchable duck
    if(isNext){
      const ring=document.createElement('div');
      ring.className='duck-ring';
      const rdia=dia*1.04;
      ring.style.left=px+'px';
      ring.style.top=py+'px';
      ring.style.width=rdia+'px';
      ring.style.height=rdia+'px';
      layer.appendChild(ring);
    }

    // checkmark on caught ducks (top-right of the duck)
    if(isCaught){
      const chk=document.createElement('div');
      chk.className='duck-check';
      chk.textContent='✅';
      chk.style.left=(px+dia*0.34)+'px';
      chk.style.top=(py-dia*0.30)+'px';
      layer.appendChild(chk);
    }
  }

  // TAP GUIDE hand — sits just below the next duck, fingertip pointing up at it
  if(caughtCount < n){
    const pos=DUCK_POS[caughtCount];
    const px=pos.x*SW;
    const py=pos.y*SH;
    const dia=pos.r*2*SW;
    const hand=document.createElement('div');
    hand.className='tap-hand';
    hand.textContent='👆';
    hand.style.left=px+'px';
    // fingertip just touches the bottom edge of the duck circle
    hand.style.top=(py+dia*0.42)+'px';
    layer.appendChild(hand);
  }
}

function catchDuck(idx){
  if(idx!==caughtCount) return; // must catch in order (the highlighted one)
  mlAudio.plop();

  const layer=document.getElementById('hitLayer');
  const area=document.getElementById('sceneArea');
  const SW=area.clientWidth||380, SH=area.clientHeight||230;
  const pos=DUCK_POS[idx];

  // splash right on the duck
  const sp=document.createElement('div');
  sp.className='splash';sp.textContent='💦';
  sp.style.left=(pos.x*SW)+'px';sp.style.top=(pos.y*SH)+'px';
  layer.appendChild(sp);
  setTimeout(()=>sp.remove(),700);

  caughtCount++;
  setTimeout(()=>{ mlAudio.chime(); renderHits(); },180);

  // draw circle
  addCircle(idx);

  const n=ROUNDS[roundIdx].ducks;
  if(caughtCount===n){ setTimeout(()=>showReveal(n),500); }
}

function addCircle(idx){
  const area=document.getElementById('circlesArea');
  const ph=document.getElementById('drawPlaceholder');
  if(ph) ph.style.display='none';
  const c=document.createElement('div');
  c.className='drawn-circle';c.style.animationDelay=(idx*0.05)+'s';c.textContent='🦆';
  area.appendChild(c);
}

function showReveal(n){
  document.getElementById('revealNum').textContent=toAr(n);
  document.getElementById('revealWord').textContent=ARABIC_WORDS[n];
  document.getElementById('countReveal').classList.add('show');
  mlAudio.fanfare();
  // auto-advance to next round (or win) after the child sees the count
  mlStartCountdown();
}



function goNext(){
  if(roundIdx>=ROUNDS.length-1){ showWin(); return; }
  roundIdx++; caughtCount=0;
  document.getElementById('circlesArea').innerHTML='<div class="draw-placeholder" id="drawPlaceholder">اصطد البطات لترسم الدوائر هنا 🦆</div>';
  document.getElementById('countReveal').classList.remove('show');
  renderDots(); renderHits();
}

function showWin(){ document.getElementById('winOverlay').classList.add('show'); mlAudio.fanfare(); launchConfetti(); }


var mlCountdownTimer = null;
function mlStartCountdown() {
  var secs = 5;
  var wrap = document.getElementById('ml-nextWrap');
  var fill = document.getElementById('ml-countdownFill');
  var txt  = document.getElementById('ml-countdownTxt');
  if (!wrap) return;
  wrap.style.display = 'block';
  fill.style.animation = 'none';
  void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 5s linear forwards';
  txt.textContent = toAr(secs);
  mlCountdownTimer = setInterval(function() {
    secs--;
    if (txt) txt.textContent = toAr(Math.max(0, secs));
    if (secs <= 0) {
      clearInterval(mlCountdownTimer);
      mlCountdownTimer = null;
      if (wrap) wrap.style.display = 'none';
      goNext();
    }
  }, 1000);
}
function mlHandleWinNext() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ action: 'nextLesson' }, '*');
  }
}
function restartAll(){
  document.getElementById('winOverlay').classList.remove('show');
  document.getElementById('confettiCont').innerHTML='';
  roundIdx=0;caughtCount=0;
  document.getElementById('circlesArea').innerHTML='<div class="draw-placeholder" id="drawPlaceholder">اصطد البطات لترسم الدوائر هنا 🦆</div>';
  document.getElementById('countReveal').classList.remove('show');
  renderDots();renderHits();
}

/* start directly — no intro popup */
function initLesson(){
  renderDots();
  renderHits();
}

function launchConfetti(){
  const cont=document.getElementById('confettiCont');cont.innerHTML='';
  const cols=['#F5C518','#8dd04d','#FF9F45','#E0654A','#5BBE5B','#C8923A','#fff','#a8e06a'];
  for(let i=0;i<60;i++){const d=document.createElement('div');d.className='confetti-piece';const sz=6+Math.random()*8;d.style.cssText=`left:${Math.random()*100}vw;top:0;width:${sz}px;height:${sz}px;border-radius:${Math.random()>.5?'50%':'2px'};background:${cols[Math.floor(Math.random()*cols.length)]};animation:confFall ${1.4+Math.random()*2}s ease-in ${Math.random()*1.2}s both;`;cont.appendChild(d);}
}

window.addEventListener('resize',()=>{ renderHits(); });

/* START DIRECTLY */
renderDots();
const _img=document.getElementById('sceneImg');
if(_img.complete){ renderHits(); }
_img.addEventListener('load',()=>{ renderHits(); });
</script>

<script>
(function(){
  if(!('speechSynthesis' in window)) return;
  var lastTxt='',debT=null,narEl=null,spoken=false,retryT=null;
  function getVoice(){
    var vs=speechSynthesis.getVoices().filter(function(v){return v.lang.startsWith('ar');});
    return vs.find(function(v){return /female|أنثى|hoda|salma|laila|amira|zeina|dina|zara|rana|mona|yasmin|nour/i.test(v.name);})||
           vs.find(function(v){return !/male|ذكر|naayf|majed|omar|maged|tarik|nizar/i.test(v.name);})||
           vs[0]||null;
  }
  function speak(txt){
    if(!txt) return;
    if(txt===lastTxt) return;
    lastTxt=txt;
    var _src=(window.__NARR_AUDIO__||{})[txt];
    if(_src){spoken=true;clearInterval(retryT);var _a=new Audio(_src);_a.onplay=function(){if(narEl)narEl.classList.add('speaking');};_a.onended=function(){if(narEl)narEl.classList.remove('speaking');};_a.onerror=function(){spoken=false;lastTxt='';_wsSpeak(txt);};_a.play().catch(function(){spoken=false;lastTxt='';_wsSpeak(txt);});return;}
    _wsSpeak(txt);
  }
  function _wsSpeak(txt){
    if(!speechSynthesis.getVoices().length){lastTxt='';return;}
    var u=new SpeechSynthesisUtterance(txt);
    u.lang='ar-SA';
    var v=getVoice();if(v)u.voice=v;u.pitch=1.3;
    u.onstart=function(){spoken=true;clearInterval(retryT);if(narEl)narEl.classList.add('speaking');};
    u.onend=function(){if(narEl)narEl.classList.remove('speaking');};
    speechSynthesis.cancel();speechSynthesis.speak(u);
  }
  var SELS=['#ml-qPrompt','#ml-prompt','.q-prompt','.q-banner-text','.prompt-line','.tray-lbl','.count-reveal-label'];
  function readQ(){
    if(document.querySelector('.win-overlay.show'))return;
    for(var i=0;i<SELS.length;i++){var el=document.querySelector(SELS[i]);if(el){var t=el.textContent.replace(/\s+/g,' ').trim();if(t.length>2){speak(t);return;}}}
  }
  speechSynthesis.onvoiceschanged=function(){setTimeout(readQ,200);};
  window.addEventListener('load',function(){
    narEl=document.getElementById('fNarrator');
    if(narEl) narEl.style.display='none';
    (function(){var s=document.createElement('button');s.id='mlSpeakerBtn';s.textContent='🔊';s.setAttribute('aria-label','استمع مجدداً');s.style.cssText='position:fixed;bottom:20px;right:16px;z-index:9999;background:linear-gradient(135deg,#FCD34D,#F59E0B);border:none;border-radius:50%;width:48px;height:48px;font-size:24px;cursor:pointer;box-shadow:0 4px 0 #B45309,0 6px 16px rgba(180,100,0,.28);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:transform .12s;';s.addEventListener('click',function(){lastTxt='';spoken=false;readQ();});s.addEventListener('mouseenter',function(){s.style.transform='scale(1.08)';});s.addEventListener('mouseleave',function(){s.style.transform='';});document.body.appendChild(s);})();
    if(speechSynthesis.getVoices().length) readQ();
    setTimeout(readQ,300);setTimeout(readQ,800);setTimeout(readQ,2000);
    retryT=setInterval(function(){if(spoken){clearInterval(retryT);return;}lastTxt='';readQ();},500);
    setTimeout(function(){clearInterval(retryT);},8000);
  });
  function unlock(){setTimeout(function(){lastTxt='';readQ();},150);}
  document.addEventListener('touchstart',unlock,{once:true,passive:true});
  document.addEventListener('click',unlock,{once:true});
  var root=document.querySelector('.ml-widget')||document.body;
  try{new MutationObserver(function(){clearTimeout(debT);debT=setTimeout(function(){lastTxt='';spoken=false;readQ();},400);}).observe(root,{childList:true,subtree:true,characterData:true});}catch(e){}
})();
</script>
<script>
(function(){
  var hand=null,idleT=null,animT=null,IDLE=2000;
  function init(){
    hand=document.createElement('div');hand.id='mlGuideHand';hand.textContent='👆';
    document.body.appendChild(hand);
    schedule(2000);
    document.addEventListener('pointerdown',onAction,{passive:true});
    var qEl=document.getElementById('ml-qPrompt');
    if(qEl)new MutationObserver(function(){onAction();schedule(2000);}).observe(qEl,{childList:true,characterData:true,subtree:true});
  }
  function onAction(){clearTimeout(idleT);clearTimeout(animT);hide();schedule(IDLE);}
  function schedule(ms){clearTimeout(idleT);idleT=setTimeout(run,ms);}
  function hide(){if(!hand)return;hand.style.transition='opacity .25s';hand.style.opacity='0';hand.classList.remove('appear');}
  function run(){
    if(!hand)return;
    var items=document.querySelectorAll('#ml-tray .item:not(.placed)');
    if(!items.length)return;
    var item=items[0],box=document.getElementById('ml-box'+item.dataset.answer);
    if(!box)return;
    var iR=item.getBoundingClientRect(),bR=box.getBoundingClientRect();
    hand.style.transition='none';
    hand.style.left=(iR.left+iR.width/2-19)+'px';
    hand.style.top=(iR.top-14)+'px';
    hand.style.opacity='0';
    hand.classList.add('appear');
    animT=setTimeout(function(){
      hand.style.transition='left .75s cubic-bezier(.4,0,.2,1),top .75s cubic-bezier(.4,0,.2,1),transform .75s,opacity .3s';
      hand.style.left=(bR.left+bR.width/2-19)+'px';
      hand.style.top=(bR.top+bR.height/2-19)+'px';
      hand.style.transform='scale(.9) rotate(0deg)';
      hand.style.opacity='1';
      animT=setTimeout(function(){hide();animT=setTimeout(run,1800);},900);
    },700);
  }
  if(document.readyState==='loading'){window.addEventListener('load',init);}else{init();}
})();
</script>
