<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>عُدَّ الأشياء — موسى للتعلّم</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html, body {
  height: 100%; margin: 0; padding: 0;
  overflow: hidden;
  background: linear-gradient(160deg,#FEF3C7 0%,#FDE68A 100%);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* ════════════════════════════════════════
   MOOSA DESIGN SYSTEM v1.1 — WIDGET CSS
   ════════════════════════════════════════ */
.ml-widget {
  --amber:      #F59E0B;
  --amber-dark: #D97706;
  --cream:      #FFFEF9;
  --ink:        #1C1917;
  --ink-soft:   #78716C;
  --green:      #22C55E;
  --green-dark: #16A34A;
  --green-text: #14532D;
  --ok:         #22C55E;
  --bad:        #EF4444;
  --tile:       #E8E0D0;
  --font-d: 'Baloo Bhaijaan 2', 'Tajawal', sans-serif;
  --font-b: 'Tajawal', sans-serif;
  --ease-b: cubic-bezier(.34, 1.56, .64, 1);

  width: 100%; height: 100vh; height: 100svh;
  max-width: 480px; margin: 0 auto;
  display: flex; flex-direction: column;
  background: var(--cream);
  font-family: var(--font-b);
  overflow: hidden; position: relative;
}
.ml-widget *, .ml-widget *::before, .ml-widget *::after {
  box-sizing: border-box; margin: 0; padding: 0;
}

/* ── Top bar ──────────────────────────────────────────── */
.ml-widget .top-bar {
  background: var(--amber);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  flex-shrink: 0;
}
.ml-widget .score-label {
  font-family: var(--font-d); font-size: 14px; font-weight: 700;
  color: rgba(255,255,255,.75); letter-spacing: .5px;
}
.ml-widget .score-val {
  font-family: var(--font-d); font-size: 24px; font-weight: 800;
  color: #fff; line-height: 1;
}

/* ── Progress dots ──────────────────────────────────────── */
.ml-widget .progress-dots {
  display: flex; gap: 6px; align-items: center; justify-content: center;
  padding: 6px 0 2px; flex-shrink: 0;
}
.ml-widget .dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: rgba(61,38,16,.18);
  transition: background .3s, transform .3s;
}
.ml-widget .dot.active { background: var(--amber); transform: scale(1.35); }
.ml-widget .dot.done   { background: var(--green); }

/* ── Play area ──────────────────────────────────────────── */
.ml-widget .play {
  flex: 1; display: flex; flex-direction: column;
  padding: 0; gap: 0;
  min-height: 0; overflow: hidden;
}

/* ══════════════════════════════════════
   SCREEN A — Scene Viewer
   ══════════════════════════════════════ */
.screen-scene {
  flex: 1; display: flex; flex-direction: column;
  gap: 4px; min-height: 0;
}

.scene-title {
  font-family: var(--font-d);
  font-size: 13px; font-weight: 800;
  color: var(--ink);
  text-align: center;
  flex-shrink: 0;
  padding: 2px 12px;
}

.scene-frame {
  flex: 1;
  border-radius: 0;
  overflow: hidden;
  border: none;
  background: transparent;
  display: flex; align-items: center; justify-content: center;
  min-height: 0;
  position: relative;
}
.scene-frame img {
  width: 100%; height: 100%;
  object-fit: contain;
  display: block;
}

/* Hint chips overlaid on scene */
.scene-hints {
  display: flex; gap: 5px; justify-content: center;
  flex-wrap: wrap; flex-shrink: 0;
  padding: 1px 12px;
}
.hint-chip {
  display: flex; align-items: center; gap: 4px;
  background: rgba(255,255,255,.9);
  border: 2px solid rgba(196,172,126,.6);
  border-radius: 999px; padding: 2px 8px 2px 4px;
  font-family: var(--font-d); font-size: 11px; font-weight: 700;
  color: var(--ink-soft);
}
.hint-chip img {
  width: 18px; height: 18px; object-fit: contain; display: block;
}

.btn-explore {
  flex-shrink: 0;
  width: calc(100% - 24px); padding: 11px;
  margin: 2px 12px 0;
  border-radius: 14px; border: none;
  font-family: var(--font-d); font-size: 18px; font-weight: 800;
  color: var(--green-text); background: var(--green);
  cursor: pointer;
  box-shadow: 0 5px 0 var(--green-dark);
  transition: transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.btn-explore:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--green-dark); }

/* ══════════════════════════════════════
   SCREEN B — Count Question
   ══════════════════════════════════════ */
.screen-count {
  flex: 1; display: flex; flex-direction: column;
  gap: 6px; min-height: 0;
  padding: 0 12px;
}

/* ── Question banner — full-width amber pill ── */
.q-banner {
  flex-shrink: 0;
  background: var(--amber);
  border-radius: 999px;
  padding: 11px 20px;
  text-align: center;
  margin: 0 2px;
}
.q-banner .q-banner-text {
  font-family: var(--font-d); font-size: 19px; font-weight: 800;
  color: #fff; line-height: 1.2;
}

/* ── Mid row: left-col (buttons) + right-col (scene image) ── */
.q-content-row {
  flex: 1; min-height: 0;
  display: flex; flex-direction: row;
  gap: 8px;
}

/* ── Left column: label + 5 buttons stacked ── */
.q-right-col {
  flex-shrink: 0;
  width: 96px;
  display: flex; flex-direction: column;
  align-items: stretch;
  gap: 5px;
  justify-content: center;
}

/* ── "اختر العدد الصحيح" label ── */
.choices-label {
  text-align: center; font-size: 11px; font-weight: 600;
  color: var(--ink-soft); flex-shrink: 0;
  line-height: 1.3; margin: 0 0 2px;
}

/* ── Choice buttons — vertical stack ── */
.choices-grid {
  display: flex; gap: 6px;
  flex-direction: column; flex-shrink: 0;
  padding: 0; align-items: stretch;
}
.choice-btn {
  width: 96px; height: 56px;
  border-radius: 16px;
  border: 3px solid rgba(200,185,145,.45);
  background: #FFFDF6;
  display: flex; flex-direction: row;
  align-items: center; justify-content: center; gap: 8px;
  cursor: pointer; touch-action: manipulation;
  font-family: var(--font-d);
  transition: transform .1s, border-color .15s, background .15s;
  animation: ml-pop .38s var(--ease-b) both;
  -webkit-tap-highlight-color: transparent;
  box-shadow: none;
  position: relative; overflow: hidden;
  flex-shrink: 0;
}
.choice-btn:nth-child(1) { animation-delay: .06s }
.choice-btn:nth-child(2) { animation-delay: .12s }
.choice-btn:nth-child(3) { animation-delay: .18s }
.choice-btn:nth-child(4) { animation-delay: .24s }
.choice-btn:nth-child(5) { animation-delay: .30s }
.choice-btn .num {
  font-size: 24px; font-weight: 800; line-height: 1;
  color: var(--ink);
}
.choice-btn .dots-row {
  display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-start;
  max-width: 30px;
}
.choice-btn .dot-small {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--amber-dark);
}
.choice-btn:active { transform: scale(.94); }
.choice-btn.correct {
  background: #E8F8E0; border-color: var(--ok);
  box-shadow: none;
  animation: ml-pulseOk .45s var(--ease-b);
}
.choice-btn.correct .num { color: var(--green-text); }
.choice-btn.correct .dot-small { background: var(--green); }
.choice-btn.wrong {
  background: #FDE8E4; border-color: var(--bad);
  animation: ml-shake .38s linear;
}
.choice-btn.wrong .num { color: var(--bad); }
.choice-btn.disabled-choice { opacity: .4; pointer-events: none; }

/* ── Scene image — right column, fills all height ── */
.mini-scene-wrap {
  flex: 1; min-width: 0; min-height: 0;
  border-radius: 14px; overflow: hidden;
  border: none; position: relative;
  background: transparent;
}
.mini-scene-wrap img {
  width: 100%; height: 100%; object-fit: cover;
  object-position: center top;
  display: block; position: absolute; inset: 0;
}
.mini-scene-wrap .scene-lbl { display: none; }

/* ── Item image — below the row, centered, large ── */
.item-showcase {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  height: 130px;
}
.item-showcase img {
  height: 120px; width: auto;
  max-width: 140px;
  object-fit: contain; display: block;
  filter: none;
  animation: ml-pop .4s var(--ease-b) both;
}

/* ── Feedback message ── */
.feedback-msg {
  text-align: center; flex-shrink: 0; min-height: 18px;
  font-family: var(--font-d); font-size: 14px; font-weight: 800;
}
.feedback-msg.ok  { color: var(--green-text); }
.feedback-msg.bad { color: var(--bad); }

/* ── Flash overlay ──────────────────────────────────────── */
.ml-widget .flash {
  position: absolute; inset: 0; z-index: 50;
  pointer-events: none; opacity: 0;
}
.ml-widget .flash.ok  { background: radial-gradient(circle, rgba(75,176,64,.25),  transparent 70%); }
.ml-widget .flash.bad { background: radial-gradient(circle, rgba(208,80,48,.25),  transparent 70%); }
.ml-widget .flash.show { animation: ml-flashAnim .55s ease-out; }

/* ── Animations ─────────────────────────────────────────── */
@keyframes ml-pop {
  0%   { transform: scale(0); opacity: 0 }
  70%  { transform: scale(1.1) }
  100% { transform: scale(1);  opacity: 1 }
}
@keyframes ml-flashAnim { 0%{opacity:0} 30%{opacity:1} 100%{opacity:0} }
@keyframes ml-pulseOk { 0%,100%{transform:scale(1)} 50%{transform:scale(1.06)} }
@keyframes ml-shake {
  0%,100% { transform: translateX(0) }
  25%     { transform: translateX(-7px) }
  75%     { transform: translateX(7px) }
}
@keyframes ml-fadeIn { from{opacity:0} to{opacity:1} }
@keyframes ml-winPop {
  0%  { transform: scale(.55); opacity: 0 }
  70% { transform: scale(1.04) }
  100%{ transform: scale(1);   opacity: 1 }
}
@keyframes ml-starPop {
  0%  { transform: scale(0) rotate(-20deg); opacity: 0 }
  70% { transform: scale(1.25) }
  100%{ transform: scale(1); opacity: 1 }
}
@keyframes ml-bob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
@keyframes ml-spin { to{ transform: rotate(360deg) } }
@keyframes ml-confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg);   opacity: 1 }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0 }
}

/* ── Win overlay ────────────────────────────────────────── */
.ml-widget .win-overlay {
  position: absolute; inset: 0; z-index: 100;
  background: rgba(120,70,10,.72);
  display: none; align-items: center; justify-content: center; padding: 24px;
}
.ml-widget .win-overlay.show { display: flex; animation: ml-fadeIn .35s ease; }
.ml-widget .win-card {
  text-align: center; display: flex; flex-direction: column; align-items: center;
  animation: ml-winPop .5s var(--ease-b) both;
}
.ml-widget .win-rays {
  position: relative; width: 220px; height: 220px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: -16px;
}
.ml-widget .win-rays svg.rays {
  position: absolute; inset: 0; width: 100%; height: 100%;
  animation: ml-spin 8s linear infinite;
}
.ml-widget .mascot {
  position: relative; z-index: 2;
  width: 200px; height: 200px;
  display: flex; align-items: center; justify-content: center;
  animation: ml-bob 1.8s ease-in-out infinite;
}
.ml-widget .mascot .mascot-svg {
  width: 200px; height: 200px;
  background: transparent; display: block;
}
.ml-widget .win-title {
  font-family: var(--font-d); font-size: 30px; font-weight: 800;
  color: #fff; margin-bottom: 4px;
}
.ml-widget .win-stars { display: flex; gap: 8px; margin: 8px 0; }
.ml-widget .win-stars span { font-size: 32px; animation: ml-starPop .45s var(--ease-b) both; }
.ml-widget .win-stars span:nth-child(1) { animation-delay: .3s }
.ml-widget .win-stars span:nth-child(2) { animation-delay: .48s }
.ml-widget .win-stars span:nth-child(3) { animation-delay: .66s }
.ml-widget .win-score-row {
  display: flex; align-items: baseline; gap: 8px;
  margin: 8px 0 18px; font-family: var(--font-d);
}
.ml-widget .win-score-label { font-size: 13px; font-weight: 600; color: rgba(255,255,255,.75); }
.ml-widget .win-score-val   { font-size: 28px; font-weight: 800; color: #fff; }
.ml-widget .btn-win {
  padding: 12px 44px; border-radius: 14px; border: none;
  font-family: var(--font-d); font-size: 19px; font-weight: 800;
  color: var(--green-text); background: var(--green);
  cursor: pointer; box-shadow: 0 5px 0 var(--green-dark);
  transition: transform .1s; -webkit-tap-highlight-color: transparent;
}
.ml-widget .btn-win:active { transform: translateY(3px); box-shadow: 0 1px 0 var(--green-dark); }

/* Confetti */
.ml-confetti { position: absolute; pointer-events: none; z-index: 9998; opacity: 0; }
#ml-confettiContainer { position: absolute; inset: 0; overflow: hidden; pointer-events: none; z-index: 9998; }

/* ═══════════════════════════════════════
   UNIFIED DESIGN SYSTEM — win screen
   ═══════════════════════════════════════ */

/* top-bar consistent height/padding */
.top-bar{flex-shrink:0;background:linear-gradient(135deg,#FCD34D 0%,#F59E0B 60%,#D97706 100%) !important;padding:12px 20px !important;box-shadow:0 2px 8px rgba(180,100,0,.18);}

/* win overlay — modern frosted dark */
.ml-widget .win-overlay,.win-overlay{
  background:rgba(15,8,0,.82) !important;
  backdrop-filter:blur(8px) !important;
  -webkit-backdrop-filter:blur(8px) !important;
}
/* win card — glass card */
.ml-widget .win-card,.win-card{
  display:flex !important;flex-direction:column !important;align-items:center !important;
  background:rgba(255,255,255,.10) !important;
  border:2px solid rgba(255,255,255,.22) !important;
  border-radius:28px !important;
  padding:24px 32px 28px !important;
  box-shadow:0 8px 32px rgba(0,0,0,.3) !important;
  gap:0 !important;
}
/* hide ALL old mascot variants */
.ml-widget .mascot,.mascot,
.win-mascot,.ml-widget .win-mascot,
.mascot-img,.ml-widget .mascot-img,
.win-scene{display:none !important;}
/* unified mascot */
.win-unified-mascot{
  width:150px;height:150px;object-fit:contain;
  display:block;margin:0 auto 4px;
  animation:ml-bob 1.8s ease-in-out infinite;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));
}
/* win-rays — keep spinning above mascot */
.ml-widget .win-rays,.win-rays{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-bottom:-155px;}
.ml-widget .win-rays svg,.win-rays svg.rays,.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
/* win title */
.ml-widget .win-title,.win-title{
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;
  font-size:30px !important;font-weight:800 !important;
  color:#fff !important;
  text-shadow:0 2px 6px rgba(0,0,0,.3) !important;
  margin:8px 0 4px !important;
}
/* win stars */
.ml-widget .win-stars,.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px;}
.ml-widget .win-stars span,.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b,cubic-bezier(.34,1.56,.64,1)) both;opacity:0;}
.ml-widget .win-stars span:nth-child(1),.win-stars span:nth-child(1){animation-delay:.3s}
.ml-widget .win-stars span:nth-child(2),.win-stars span:nth-child(2){animation-delay:.48s}
.ml-widget .win-stars span:nth-child(3),.win-stars span:nth-child(3){animation-delay:.66s}
@keyframes ml-starPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
/* win score */
.ml-widget .win-score-row,.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;}
.ml-widget .win-score-label,.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.ml-widget .win-score-val,.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.ml-widget .win-score,.win-score{font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin:4px 0 10px;}
/* play-again button — all variants */
.ml-widget .btn-win,.btn-win,
.ml-widget .win-btn,.win-btn,
.btn-win-again{
  margin-top:14px !important;
  padding:14px 48px !important;
  border:3px solid rgba(255,255,255,.9) !important;
  border-radius:20px !important;
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif !important;
  font-size:20px !important;font-weight:800 !important;
  color:#fff !important;text-shadow:0 1px 2px rgba(0,0,0,.2) !important;
  background:linear-gradient(135deg,#4ADE80 0%,#22C55E 55%,#16A34A 100%) !important;
  box-shadow:0 6px 0 #15803D,0 8px 20px rgba(22,163,74,.28) !important;
  cursor:pointer;
  transition:transform 150ms cubic-bezier(.34,1.56,.64,1),box-shadow 150ms ease;
  -webkit-tap-highlight-color:transparent;
}
.ml-widget .btn-win:active,.btn-win:active,
.ml-widget .win-btn:active,.win-btn:active,
.btn-win-again:active{
  transform:translateY(4px) !important;
  box-shadow:0 1px 0 #15803D,0 3px 8px rgba(22,163,74,.2) !important;
}


/* ═══════════════════════════════
   MOOSA NARRATOR GUIDE — FEMALE
   ═══════════════════════════════ */
</style>
</head>

<div class="ml-widget" dir="rtl" id="ml-root">
  <!-- Top bar -->
  <div class="top-bar">
    <span class="score-label">النقاط</span>
    <span class="score-val" id="ml-scoreVal">٠</span>
  </div>

  <!-- Progress dots -->
  <div class="progress-dots" id="ml-dots"></div>

  <!-- Play area: screens injected here -->
  <div class="play" id="ml-play"></div>

  <!-- Flash overlay -->
  <div class="flash" id="ml-flash"></div>

  <!-- Win overlay -->
  <div class="next-wrap" id="ml-nextWrap" style="display:none">
    <div class="countdown-bar">
      <div class="countdown-fill" id="ml-countdownFill"></div>
      <span class="countdown-txt" id="ml-countdownTxt">٥</span>
    </div>
  </div>
  <div class="win-overlay" id="ml-winOverlay">
    <div class="win-card">
      <div class="win-rays">
        <svg class="rays" viewBox="0 0 220 220" fill="none">
          <g transform="translate(110,110)">
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(30)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(60)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(90)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(120)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(150)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(180)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(210)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(240)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(270)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(300)"/>
            <polygon points="0,-105 8,-55 -8,-55" fill="rgba(255,220,80,.5)" transform="rotate(330)"/>
          </g>
        </svg>
        <style>
/* ── Female Narrator indicator ── */
.f-narrator{
  position:absolute!important;bottom:18px!important;right:12px!important;
  top:auto!important;left:auto!important;
  z-index:9999;
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#FCD34D,#F59E0B);
  border:3px solid #fff;border-radius:999px;
  padding:8px 14px 8px 10px;
  box-shadow:0 4px 0 #B45309,0 6px 18px rgba(180,100,0,.28);
  direction:rtl;
  transition:opacity .3s;
}
.f-narrator-icon{font-size:20px;line-height:1;}
.f-narrator-waves{display:flex;align-items:center;gap:3px;height:18px;}
.f-narrator-waves span{
  display:inline-block;width:3px;border-radius:3px;
  background:#fff;opacity:.5;
  animation:fnWave 1.2s ease-in-out infinite;
}
.f-narrator-waves span:nth-child(1){height:6px;animation-delay:0s}
.f-narrator-waves span:nth-child(2){height:12px;animation-delay:.15s}
.f-narrator-waves span:nth-child(3){height:18px;animation-delay:.3s}
.f-narrator-waves span:nth-child(4){height:12px;animation-delay:.45s}
.f-narrator-waves span:nth-child(5){height:6px;animation-delay:.6s}
.f-narrator.speaking .f-narrator-waves span{opacity:1;background:#fff;}
@keyframes fnWave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}
/* ── Animated guide hand ── */
#mlGuideHand{position:absolute;z-index:9990;pointer-events:none;font-size:38px;opacity:0;transform-origin:bottom center;filter:drop-shadow(0 3px 6px rgba(0,0,0,.35));will-change:left,top,opacity,transform;}
#mlGuideHand.appear{animation:guideAppear .4s ease forwards;}
@keyframes guideAppear{0%{opacity:0;transform:scale(.4) rotate(-30deg)}100%{opacity:1;transform:scale(1.2) rotate(-20deg)}}
/* ── Countdown bar ── */
.next-wrap{padding:0 0 10px;flex-shrink:0;}
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#22C55E,#4ADE80);border-radius:14px;transform-origin:right center;animation:mlCountdownShrink 5s linear forwards;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}
/* ── Scene magnification zoom ── */
.mini-scene-wrap img.scene-zoom{transform-origin:var(--fx,50%) var(--fy,50%);animation:sceneZoom .75s cubic-bezier(.4,0,.2,1) forwards;will-change:transform;}
@keyframes sceneZoom{0%{transform:scale(1)}80%{transform:scale(2.3)}100%{transform:scale(2.2)}}

/* ════════════════════════════
   UTILITIES
   ════════════════════════════ */
function toAr(n) {
  return String(n).replace(/[0-9]/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}
function el(id) { return document.getElementById('ml-' + id); }

function mkImg(key, size) {
  const img = document.createElement('img');
  img.src = IMGS[key];
  img.alt = key;
  img.style.cssText = 'width:' + size + 'px;height:' + size + 'px;object-fit:contain;display:block';
  return img;
}

function flash(type) {
  const f = el('flash');
  f.className = 'flash ' + type;
  void f.offsetWidth;
  f.classList.add('show');
  setTimeout(() => f.classList.remove('show'), 600);
}

/* ════════════════════════════
   AUDIO ENGINE
   ════════════════════════════ */
const mlAudio = (function() {
  let ctx = null;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }
  function correct() {
    try {
      const c = getCtx(), now = c.currentTime;
      [[523.25,0],[659.25,.12],[783.99,.26]].forEach(([freq,delay]) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'triangle'; o.frequency.value = freq;
        g.gain.setValueAtTime(.2, now+delay);
        g.gain.exponentialRampToValueAtTime(.001, now+delay+.38);
        o.connect(g); g.connect(c.destination);
        o.start(now+delay); o.stop(now+delay+.4);
      });
    } catch(e) {}
  }
  function wrong() {
    try {
      const c = getCtx(), now = c.currentTime;
      const o = c.createOscillator(), g = c.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(260, now);
      o.frequency.exponentialRampToValueAtTime(120, now+.22);
      g.gain.setValueAtTime(.18, now);
      g.gain.exponentialRampToValueAtTime(.001, now+.24);
      o.connect(g); g.connect(c.destination);
      o.start(now); o.stop(now+.26);
    } catch(e) {}
  }
  function chime() {
    try {
      const c = getCtx(), now = c.currentTime;
      [[880,0],[1046.5,.1],[1318.5,.2],[1568,.32]].forEach(([freq,delay]) => {
        const o = c.createOscillator(), g = c.createGain();
        o.type = 'sine'; o.frequency.value = freq;
        g.gain.setValueAtTime(.15, now+delay);
        g.gain.exponentialRampToValueAtTime(.001, now+delay+.45);
        o.connect(g); g.connect(c.destination);
        o.start(now+delay); o.stop(now+delay+.5);
      });
    } catch(e) {}
  }
  return { correct, wrong, chime };
})();

/* ════════════════════════════
   HANDLE CHOICE TAP
   ════════════════════════════ */
function handleChoice(chosen, correct, btn, grid) {
  if (answered) return;
  answered = true;

  const allBtns = grid.querySelectorAll('.choice-btn');

  if (chosen === correct) {
    mlAudio.correct();
    flash('ok');
    btn.classList.add('correct');
    score += 10;
    el('scoreVal').textContent = toAr(score);

    const fbMsg = document.getElementById('ml-feedbackMsg');
    if (fbMsg) { fbMsg.textContent = '✓ صحيح! ' + toAr(correct); fbMsg.className = 'feedback-msg ok'; }

    // Dim others
    allBtns.forEach(b => { if (b !== btn) b.classList.add('disabled-choice'); });

    mlStartCountdown();
  } else {
    mlAudio.wrong();
    flash('bad');
    btn.classList.add('wrong');

    const fbMsg = document.getElementById('ml-feedbackMsg');
    if (fbMsg) { fbMsg.textContent = '✗ حاول مجدداً!'; fbMsg.className = 'feedback-msg bad'; }

    // Re-enable after animation
    setTimeout(function() {
      btn.classList.remove('wrong');
      answered = false;
      if (fbMsg) { fbMsg.textContent = ' '; fbMsg.className = 'feedback-msg'; }
    }, 700);
  }
}

/* ════════════════════════════

   ════════════════════════════ */
function advance() {
  stepIndex++;
  if (stepIndex >= STEPS.length) {
    showWin();
    return;
  }
  renderQuestion(STEPS[stepIndex]);
}

function showWin() {
  el('winScoreVal').textContent = toAr(score);
  el('winOverlay').classList.add('show');
  launchConfetti();
  mlAudio.chime();
}

function mlHandleWinContinue() {
  if (mlCountdownTimer) { clearInterval(mlCountdownTimer); mlCountdownTimer = null; }
  el('winOverlay').classList.remove('show');
  document.getElementById('ml-confettiContainer').innerHTML = '';
  stepIndex = 0; score = 0;
  renderQuestion(STEPS[0]);
}

var mlCountdownTimer = null;
function mlStartCountdown() {
  var secs = 5;
  var wrap = document.getElementById('ml-nextWrap');
  var fill = document.getElementById('ml-countdownFill');
  var txt  = document.getElementById('ml-countdownTxt');
  if (!wrap) return;
  wrap.style.display = 'block';
  fill.style.animation = 'none';
  void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 5s linear forwards';
  txt.textContent = toAr(secs);
  mlCountdownTimer = setInterval(function() {
    secs--;
    if (txt) txt.textContent = toAr(Math.max(0, secs));
    if (secs <= 0) {
      clearInterval(mlCountdownTimer);
      mlCountdownTimer = null;
      if (wrap) wrap.style.display = 'none';
      advance();
    }
  }, 1000);
}
function mlHandleWinNext() {
  if (window.parent && window.parent !== window) {
    window.parent.postMessage({ action: 'nextLesson' }, '*');
  } else { window.location.href = 'moosa-chp 2-lesson 2.html'; }
}

function launchConfetti() {
  const container = document.getElementById('ml-confettiContainer');
  container.innerHTML = '';

      'height:' + size + 'px',

    ].join(';');
    container.appendChild(piece);
  }
}

  try{new MutationObserver(function(){clearTimeout(debT);debT=setTimeout(function(){var pEl=document.querySelector(SELS.join(','));var nt=pEl?pEl.textContent.replace(/\s+/g,' ').trim():'';if(nt&&nt!==_lp){_lp=nt;speak(nt);}},400);}).observe(root,{childList:true,subtree:true,characterData:true});}catch(e){}

<script>
(function(){
  var hand=null,idleT=null,animT=null,IDLE=2000;
  function init(){
    hand=document.createElement('div');hand.id='mlGuideHand';hand.textContent='👇';
    var _hw=document.querySelector('.ml-widget');(_hw||document.body).appendChild(hand);
    schedule(2000);
    document.addEventListener('pointerdown',onAction,{passive:true});
    var qEl=document.getElementById('ml-qPrompt');
    if(qEl)new MutationObserver(function(){onAction();schedule(2000);}).observe(qEl,{childList:true,characterData:true,subtree:true});
  }
  function onAction(){clearTimeout(idleT);clearTimeout(animT);hide();schedule(IDLE);}
  function schedule(ms){clearTimeout(idleT);idleT=setTimeout(run,ms);}
  function hide(){if(!hand)return;hand.style.transition='opacity .25s';hand.style.opacity='0';hand.classList.remove('appear');}
  function run(){
    if(!hand)return;
    if(typeof STEPS==='undefined'||typeof stepIndex==='undefined')return;
    var step=STEPS[stepIndex];if(!step||!step.q)return;
    var ans=step.q.answer;
    var item=document.querySelector('.choice-btn[data-num="'+ans+'"]');
    if(!item)return;
    var _hw=document.querySelector('.ml-widget');var wR=_hw?_hw.getBoundingClientRect():{left:0,top:0};
    var iR=item.getBoundingClientRect();
    hand.style.transition='none';
    hand.style.left=(iR.left-wR.left+iR.width/2-19)+'px';
    hand.style.top=(iR.top-wR.top+iR.height/2-38)+'px';
    hand.style.opacity='0';
    hand.classList.add('appear');
    animT=setTimeout(function(){
      hand.style.transition='left .75s cubic-bezier(.4,0,.2,1),top .75s cubic-bezier(.4,0,.2,1),transform .75s,opacity .3s';
      hand.style.left=(iR.left-wR.left+iR.width/2-19)+'px';
      hand.style.top=(iR.top-wR.top+iR.height/2-19)+'px';
      hand.style.transform='scale(.9) rotate(0deg)';
      hand.style.opacity='1';
      animT=setTimeout(function(){hide();animT=setTimeout(run,1800);},900);
    },700);
  }
  if(document.readyState==='loading'){window.addEventListener('load',init);}else{init();}
})();
</script>

<script>
(function(){
  var c=document.getElementById('ml-dots')||document.getElementById('mlDots')||document.getElementById('roundRow');
  if(!c){
    var tb=document.querySelector('.ml-widget .top-bar');
    if(!tb)return;
    c=document.createElement('div');c.className='progress-dots';c.id='mlDots';
    tb.insertAdjacentElement('afterend',c);
  }
  function getIdx(){try{if(typeof qIndex!=='undefined')return qIndex;}catch(e){}try{if(typeof stepIndex!=='undefined')return stepIndex;}catch(e){}try{if(typeof stepIdx!=='undefined')return stepIdx;}catch(e){}try{if(typeof mlStepIdx!=='undefined')return mlStepIdx;}catch(e){}return 0;}
  function getTotal(){try{if(typeof QUESTIONS!=='undefined'&&QUESTIONS.length)return QUESTIONS.length;}catch(e){}try{if(typeof STEPS!=='undefined'&&STEPS.length)return STEPS.length;}catch(e){}try{if(typeof ML_STEPS!=='undefined'&&ML_STEPS.length)return ML_STEPS.length;}catch(e){}try{if(typeof ML_TOTAL==='number')return ML_TOTAL;}catch(e){}return 0;}
  var _busy=false;
  var obs=new MutationObserver(function(){if(!_busy)render();});
  function render(){
    if(_busy)return;
    var total=getTotal();if(!total)return;
    var idx=getIdx(),key=idx+'/'+total;
    if(c._qk===key)return;
    c._qk=key;_busy=true;obs.disconnect();
    c.innerHTML='';
    for(var i=0;i<total;i++){var d=document.createElement('span');d.className='qdot'+(i===idx?' active':i<idx?' done':'');c.appendChild(d);}
    _busy=false;obs.observe(c,{childList:true});
  }
  if(typeof renderDots!=='undefined'){
    window.renderDots=function(){
      var sv=document.getElementById('ml-scoreVal')||document.getElementById('mlScoreVal');
      if(sv){try{var sc=typeof score!=='undefined'?score:typeof mlScore!=='undefined'?mlScore:null;if(sc!==null)sv.textContent=String(sc).replace(/[0-9]/g,function(d){return'٠١٢٣٤٥٦٧٨٩'[+d];});}catch(e){}}
      render();
    };
  }
  obs.observe(c,{childList:true});
  setInterval(render,500);render();
})();
</script>
