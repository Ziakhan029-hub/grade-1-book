<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى يتعلم — قراءة العدد صفر وكتابته</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;margin:0;padding:0;overflow:hidden;background:linear-gradient(160deg,#FFFFFF 0%,#F2F2F2 100%);}
.ml-widget{
  --amber:#1F1F1F;--amber-dark:#141414;--cream:#FFFFFF;
  --ink:#1C1917;--ink-soft:#78716C;
  --green:#22C55E;--green-dark:#16A34A;--green-text:#14532D;
  --ok:#22C55E;--bad:#EF4444;--tile:#E8E0D0;
  --font-d:'Baloo Bhaijaan 2','Tajawal',sans-serif;
  --font-b:'Tajawal',sans-serif;
  --ease-b:cubic-bezier(.34,1.56,.64,1);
  width:100%;height:100vh;height:100svh;
  max-width:480px;margin:0 auto;
  display:flex;flex-direction:column;
  background:var(--cream);font-family:var(--font-b);
  overflow:hidden;position:relative;
}
.ml-widget *,.ml-widget *::before,.ml-widget *::after{box-sizing:border-box;margin:0;padding:0;}
.top-bar{background:var(--amber);padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:8px;flex-shrink:0;}
.score-label{font-family:var(--font-d);font-size:14px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:.5px;}
.score-val{font-family:var(--font-d);font-size:24px;font-weight:800;color:#fff;line-height:1;}
.progress-dots{display:flex;gap:6px;align-items:center;justify-content:center;padding:6px 0 0;flex-shrink:0;}
.ml-dot{width:8px;height:8px;border-radius:50%;background:rgba(61,38,16,.18);transition:background .3s,transform .3s;}
.ml-dot.active{background:var(--amber);transform:scale(1.35);}
.ml-dot.done{background:var(--green);}
.play{flex:1;display:flex;flex-direction:column;padding:8px 14px 4px;gap:6px;min-height:0;overflow:hidden;}
.q-prompt{text-align:center;font-family:var(--font-d);font-size:17px;font-weight:800;color:var(--ink);flex-shrink:0;line-height:1.3;}
.item-row{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:4px;}
.item-row-imgwrap{width:100%;height:175px;display:flex;align-items:center;justify-content:center;}
.item-row-imgwrap img{max-width:100%;max-height:175px;object-fit:contain;display:block;}
.count-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(232,160,32,.16);border:2px solid rgba(232,160,32,.4);border-radius:999px;padding:3px 14px;}
.count-badge .lbl{font-family:var(--font-b);font-size:12px;font-weight:600;color:var(--ink-soft);}
.count-badge .val{font-family:var(--font-d);font-size:18px;font-weight:800;color:var(--amber-dark);}
.trace-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;min-height:0;gap:4px;}
.trace-card{background:#FFFDF6;border-radius:24px;border:3px solid rgba(196,172,126,.5);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 0 rgba(196,172,126,.4);flex-shrink:0;}
.dot-path{position:absolute;inset:0;pointer-events:none;}
.trace-canvas{display:block;position:relative;z-index:2;touch-action:none;cursor:crosshair;}
.trace-progress-wrap{width:100%;flex-shrink:0;}
.trace-progress-bg{height:8px;background:rgba(61,38,16,.12);border-radius:99px;overflow:hidden;}
.trace-progress-fill{height:100%;background:linear-gradient(90deg,var(--ok),#8DD04D);border-radius:99px;transition:width .15s ease;width:0%;}
.trace-pct{font-family:var(--font-d);font-size:11px;font-weight:700;color:var(--ink-soft);text-align:center;margin-top:2px;}
.color-row{display:flex;gap:7px;align-items:center;justify-content:center;flex-shrink:0;}
.color-pip{width:28px;height:28px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s,border-color .15s;touch-action:manipulation;box-shadow:0 2px 4px rgba(0,0,0,.2);}
.color-pip:active{transform:scale(.9);}
.color-pip.selected{border-color:rgba(61,38,16,.6);transform:scale(1.18);}
.tool-row{display:flex;gap:8px;justify-content:center;align-items:center;flex-shrink:0;}
.tool-btn{display:flex;align-items:center;gap:5px;background:#FFFDF6;border:2px solid rgba(196,172,126,.55);border-radius:12px;padding:6px 13px;font-family:var(--font-d);font-size:13px;font-weight:700;color:var(--ink-soft);cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;transition:transform .1s;}
.tool-btn:active{transform:scale(.96);}
.tool-btn.erase{border-color:rgba(208,80,48,.35);color:var(--bad);}
.tool-btn.hint-on{background:#FFF8E0;border-color:rgba(232,160,32,.55);color:var(--amber-dark);}
.tool-btn svg{width:16px;height:16px;flex-shrink:0;}
.next-wrap{padding:0 0 10px;flex-shrink:0;}
.btn-next{width:100%;padding:12px;border-radius:14px;border:none;font-family:var(--font-d);font-size:18px;font-weight:800;color:var(--green-text);background:var(--green);cursor:pointer;box-shadow:0 5px 0 var(--green-dark);transition:transform .1s,opacity .2s;-webkit-tap-highlight-color:transparent;}
.btn-next:active{transform:translateY(4px);box-shadow:0 1px 0 var(--green-dark);}
.btn-next:disabled{opacity:.35;cursor:not-allowed;}
.flash{position:absolute;inset:0;z-index:50;pointer-events:none;opacity:0;}
.flash.ok{background:radial-gradient(circle,rgba(75,176,64,.3),transparent 70%);}
.flash.show{animation:ml-flashAnim .55s ease-out;}
.win-overlay{position:absolute;inset:0;z-index:100;background:rgba(0,0,0,.72);display:none;align-items:center;justify-content:center;padding:24px;}
.win-overlay.show{display:flex;animation:ml-fadeIn .35s ease;}
.win-card{text-align:center;display:flex;flex-direction:column;align-items:center;animation:ml-winPop .5s var(--ease-b) both;}
.win-rays{position:relative;width:200px;height:200px;display:flex;align-items:center;justify-content:center;margin-bottom:-12px;}
.win-rays svg.rays{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
.win-mascot{position:relative;z-index:2;width:170px;height:170px;display:flex;align-items:center;justify-content:center;animation:ml-bob 1.8s ease-in-out infinite;}
.win-mascot .mascot-svg{width:170px;height:170px;background:transparent;display:block;}
.win-title{font-family:var(--font-d);font-size:28px;font-weight:800;color:#fff;margin-bottom:4px;}
.win-stars{display:flex;gap:8px;margin:8px 0;}
.win-stars span{font-size:30px;animation:ml-starPop .45s var(--ease-b) both;}
.win-stars span:nth-child(1){animation-delay:.3s}.win-stars span:nth-child(2){animation-delay:.48s}.win-stars span:nth-child(3){animation-delay:.66s}
.win-score-row{display:flex;align-items:baseline;gap:8px;margin:8px 0 16px;font-family:var(--font-d);}
.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.win-score-val{font-size:26px;font-weight:800;color:#fff;}
.btn-win{padding:12px 36px;border-radius:14px;border:none;font-family:var(--font-d);font-size:18px;font-weight:800;color:var(--green-text);background:var(--green);cursor:pointer;box-shadow:0 5px 0 var(--green-dark);transition:transform .1s;-webkit-tap-highlight-color:transparent;}
.btn-win:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green-dark);}
.ml-confetti{position:absolute;pointer-events:none;z-index:9998;opacity:0;}
#ml-confettiContainer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:9998;}
@keyframes ml-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes ml-spin{to{transform:rotate(360deg)}}
@keyframes ml-fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ml-winPop{0%{transform:scale(.55);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
@keyframes ml-starPop{0%{transform:scale(0)rotate(-20deg);opacity:0}70%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
@keyframes ml-flashAnim{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
@keyframes ml-confettiFall{0%{transform:translateY(-20px)rotate(0deg);opacity:1}100%{transform:translateY(900px)rotate(720deg);opacity:0}}
@keyframes ml-startPulse{0%,100%{r:9}50%{r:13}}
@keyframes ml-rowPop{0%{transform:scale(.6);opacity:0}70%{transform:scale(1.08)}100%{transform:scale(1);opacity:1}}

/* ═══════════════════════════════════════
   UNIFIED DESIGN SYSTEM — win screen
   ═══════════════════════════════════════ */

/* top-bar consistent height/padding */
.top-bar{flex-shrink:0;background:linear-gradient(135deg,#3A3A3A 0%,#1F1F1F 60%,#141414 100%) !important;padding:12px 20px !important;box-shadow:0 2px 8px rgba(0,0,0,.18);}

/* win overlay — modern frosted dark */
.ml-widget .win-overlay,.win-overlay{
  background:rgba(15,8,0,.82) !important;
  backdrop-filter:blur(8px) !important;
  -webkit-backdrop-filter:blur(8px) !important;
}
/* win card — glass card */
.ml-widget .win-card,.win-card{
  display:flex !important;flex-direction:column !important;align-items:center !important;
  background:rgba(255,255,255,.10) !important;
  border:2px solid rgba(255,255,255,.22) !important;
  border-radius:28px !important;
  padding:24px 32px 28px !important;
  box-shadow:0 8px 32px rgba(0,0,0,.3) !important;
  gap:0 !important;
}
/* hide ALL old mascot variants */
.ml-widget .mascot,.mascot,
.win-mascot,.ml-widget .win-mascot,
.mascot-img,.ml-widget .mascot-img,
.win-scene{display:none !important;}
/* unified mascot */
.win-unified-mascot{
  width:150px;height:150px;object-fit:contain;
  display:block;margin:0 auto 4px;
  animation:ml-bob 1.8s ease-in-out infinite;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,.35));
}
/* win-rays — keep spinning above mascot */
.ml-widget .win-rays,.win-rays{position:relative;width:190px;height:190px;display:flex;align-items:center;justify-content:center;margin-bottom:-155px;}
.ml-widget .win-rays svg,.win-rays svg.rays,.win-rays svg{position:absolute;inset:0;width:100%;height:100%;animation:ml-spin 8s linear infinite;}
/* win title */
.ml-widget .win-title,.win-title{
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;
  font-size:30px !important;font-weight:800 !important;
  color:#fff !important;
  text-shadow:0 2px 6px rgba(0,0,0,.3) !important;
  margin:8px 0 4px !important;
}
/* win stars */
.ml-widget .win-stars,.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px;}
.ml-widget .win-stars span,.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b,cubic-bezier(.34,1.56,.64,1)) both;opacity:0;}
.ml-widget .win-stars span:nth-child(1),.win-stars span:nth-child(1){animation-delay:.3s}
.ml-widget .win-stars span:nth-child(2),.win-stars span:nth-child(2){animation-delay:.48s}
.ml-widget .win-stars span:nth-child(3),.win-stars span:nth-child(3){animation-delay:.66s}
@keyframes ml-starPop{0%{transform:scale(0);opacity:0}100%{transform:scale(1);opacity:1}}
/* win score */
.ml-widget .win-score-row,.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;}
.ml-widget .win-score-label,.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.ml-widget .win-score-val,.win-score-val{font-size:28px;font-weight:800;color:#fff;}
.ml-widget .win-score,.win-score{font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:18px;font-weight:700;color:rgba(255,255,255,.9);margin:4px 0 10px;}
/* play-again button — all variants */
.ml-widget .btn-win,.btn-win,
.ml-widget .win-btn,.win-btn,
.btn-win-again{
  margin-top:14px !important;
  padding:14px 48px !important;
  border:3px solid rgba(255,255,255,.9) !important;
  border-radius:20px !important;
  font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif !important;
  font-size:20px !important;font-weight:800 !important;
  color:#fff !important;text-shadow:0 1px 2px rgba(0,0,0,.2) !important;
  background:linear-gradient(135deg,#4ADE80 0%,#22C55E 55%,#16A34A 100%) !important;
  box-shadow:0 6px 0 #15803D,0 8px 20px rgba(22,163,74,.28) !important;
  cursor:pointer;
  transition:transform 150ms cubic-bezier(.34,1.56,.64,1),box-shadow 150ms ease;
  -webkit-tap-highlight-color:transparent;
}
.ml-widget .btn-win:active,.btn-win:active,
.ml-widget .win-btn:active,.win-btn:active,
.btn-win-again:active{
  transform:translateY(4px) !important;
  box-shadow:0 1px 0 #15803D,0 3px 8px rgba(22,163,74,.2) !important;
}


/* ═══════════════════════════════
   MOOSA NARRATOR GUIDE — FEMALE
   ═══════════════════════════════ */
</style>
<style>
/* ── Female Narrator indicator ── */
.f-narrator{
  position:absolute!important;bottom:18px!important;right:12px!important;
  top:auto!important;left:auto!important;
  z-index:9999;
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#3A3A3A,#1F1F1F);
  border:3px solid #fff;border-radius:999px;
  padding:8px 14px 8px 10px;
  box-shadow:0 4px 0 #0A0A0A,0 6px 18px rgba(0,0,0,.28);
  direction:rtl;
  transition:opacity .3s;
}
.f-narrator-icon{font-size:20px;line-height:1;}
.f-narrator-waves{display:flex;align-items:center;gap:3px;height:18px;}
.f-narrator-waves span{
  display:inline-block;width:3px;border-radius:3px;
  background:#fff;opacity:.5;
  animation:fnWave 1.2s ease-in-out infinite;
}
.f-narrator-waves span:nth-child(1){height:6px;animation-delay:0s}
.f-narrator-waves span:nth-child(2){height:12px;animation-delay:.15s}
.f-narrator-waves span:nth-child(3){height:18px;animation-delay:.3s}
.f-narrator-waves span:nth-child(4){height:12px;animation-delay:.45s}
.f-narrator-waves span:nth-child(5){height:6px;animation-delay:.6s}
.f-narrator.speaking .f-narrator-waves span{opacity:1;background:#fff;}
@keyframes fnWave{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.4)}}
/* ── Animated guide hand ── */
#mlGuideHand{position:absolute;z-index:9990;pointer-events:none;font-size:38px;opacity:0;transform-origin:bottom center;filter:drop-shadow(0 3px 6px rgba(0,0,0,.35));will-change:left,top,opacity,transform;}
#mlGuideHand.appear{animation:guideAppear .4s ease forwards;}
@keyframes guideAppear{0%{opacity:0;transform:scale(.4) rotate(-30deg)}100%{opacity:1;transform:scale(1.2) rotate(-20deg)}}
/* ── countdown bar ── */
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#22C55E,#4ADE80);border-radius:14px;transform-origin:right center;animation:mlCountdownShrink 5s linear forwards;}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d),'Baloo Bhaijaan 2',sans-serif;font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}
/* ── win two-button row ── */
.win-btns{display:flex;gap:10px;margin-top:14px !important;width:100%;}
.win-btns .btn-win{margin-top:0 !important;padding:14px 0 !important;font-size:17px !important;flex:1;min-width:0;}
.btn-win-next{background:linear-gradient(135deg,#60A5FA 0%,#3B82F6 55%,#2563EB 100%) !important;box-shadow:0 6px 0 #1D4ED8,0 8px 20px rgba(37,99,235,.28) !important;}
.btn-win-next:active{transform:translateY(4px) !important;box-shadow:0 1px 0 #1D4ED8,0 3px 8px rgba(37,99,235,.2) !important;}
</style>
</head>
<body>
<div class="ml-widget" dir="rtl">
  <div class="top-bar">
    <span class="score-label">النقاط</span>
    <span class="score-val" id="ml-scoreVal">٠</span>
  </div>
  <div class="progress-dots" id="ml-dots"></div>
  <div class="play">
    <div class="q-prompt" id="ml-prompt">عُدّ الكرات ثم اكتب الرقم</div>
    <div class="item-row" id="ml-itemRow">
      <div class="item-row-imgwrap"><img id="ml-rowImg" alt="آلة الكرات"/></div>
      <div class="count-badge"><span class="lbl">العدد</span><span class="val" id="ml-countVal">٠</span></div>
    </div>
    <div class="trace-area" id="ml-traceArea">
      <div class="trace-card" id="ml-traceCard">
        <svg class="dot-path" id="ml-dotSvg" viewBox="0 0 300 300" preserveAspectRatio="xMidYMid meet"></svg>
        <canvas class="trace-canvas" id="ml-canvas" width="300" height="300"></canvas>
      </div>
      <div class="trace-progress-wrap">
        <div class="trace-progress-bg"><div class="trace-progress-fill" id="ml-progressFill"></div></div>
        <div class="trace-pct" id="ml-progressPct">٠٪</div>
      </div>
    </div>
    <div class="color-row" id="ml-colorRow"></div>
    <div class="tool-row">
      <button class="tool-btn erase" id="ml-eraseBtn" onclick="clearCanvas()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M20 20H7L3 16l9-9 8 8-2 2"/><path d="m6.26 6.26 11.48 11.48"/></svg>
        امسح
      </button>
      <button class="tool-btn" id="ml-hintBtn" onclick="toggleHint()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M9 18h6"/><path d="M10 22h4"/><path d="M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.3h6c0-1 .4-1.8 1-2.3A7 7 0 0 0 12 2Z"/></svg>
        تلميح
      </button>
    </div>
  </div>
  <!-- §10 Auto-advance countdown -->
  <div class="next-wrap" id="ml-nextWrap" style="display:none">
    <div class="countdown-bar">
      <div class="countdown-fill" id="ml-countdownFill"></div>
      <span class="countdown-txt" id="ml-countdownTxt">٥</span>
    </div>
  </div>
  <div class="win-overlay" id="ml-winOverlay">
    <div class="win-card">
      <div class="win-rays"><svg class="rays" viewBox="0 0 200 200" fill="none"><g transform="translate(100,100)"><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(30)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(60)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(90)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(120)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(150)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(180)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(210)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(240)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(270)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(300)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(330)"/></g></svg></div>
      <img class="win-unified-mascot" src="../mascot.png" alt="موسى">
      <div class="win-title">أحسنت! 🎉</div>
      <div class="win-stars"><span>⭐</span><span>⭐</span><span>⭐</span></div>
      <div class="win-score-row"><span class="win-score-label">النقاط</span><span class="win-score-val" id="ml-winScoreVal">٠</span></div>
      <div class="win-btns">
        <button class="btn-win btn-win-next" onclick="mlHandleWinNext()">التالي ›</button>
        <button class="btn-win btn-win-repeat" onclick="mlWinContinue()">إعادة 🔄</button>
      </div>
    </div>
  </div>
  <div class="flash" id="ml-flash"></div>
  <div id="ml-confettiContainer"></div>
</div>

      bar.querySelectorAll('.lsn-btn').forEach(function(b){b.remove();});
      var cur=decodeURIComponent(window.location.pathname.split('/').pop());
      var ci=L.indexOf(cur);
      L.forEach(function(lf,i){
        var b=document.createElement('button');
        b.className='lsn-btn'+(i===ci?' active':i<ci?' done':'');
        b.textContent='٠١٢٣٤٥٦٧٨٩'[i+1];
        b.addEventListener('click',function(){window.location.href=lf;});
        bar.appendChild(b);
      });
    }
  }
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',build);}
  else{build();}
})();
</script>

<style>
/* -- question progress dots -- */
.ml-widget .progress-dots,#ml-dots,#mlDots,.round-row{display:flex!important;flex-shrink:0;justify-content:center;align-items:center;gap:7px;padding:6px 0 2px;}
.ml-widget .qdot{display:inline-block;width:9px;height:9px;border-radius:50%;background:rgba(61,38,16,.18);transition:all .3s;pointer-events:none;flex-shrink:0;}
.ml-widget .qdot.active{background:var(--amber,#1F1F1F);transform:scale(1.4);}
.ml-widget .qdot.done{background:var(--green,#22C55E);}
</style>
<script>
(function(){
  var c=document.getElementById('ml-dots')||document.getElementById('mlDots')||document.getElementById('roundRow');
  if(!c){
    var tb=document.querySelector('.ml-widget .top-bar');
    if(!tb)return;
    c=document.createElement('div');c.className='progress-dots';c.id='mlDots';
    tb.insertAdjacentElement('afterend',c);
  }
  function getIdx(){try{if(typeof qIndex!=='undefined')return qIndex;}catch(e){}try{if(typeof stepIndex!=='undefined')return stepIndex;}catch(e){}try{if(typeof stepIdx!=='undefined')return stepIdx;}catch(e){}try{if(typeof mlStepIdx!=='undefined')return mlStepIdx;}catch(e){}return 0;}
  function getTotal(){try{if(typeof QUESTIONS!=='undefined'&&QUESTIONS.length)return QUESTIONS.length;}catch(e){}try{if(typeof STEPS!=='undefined'&&STEPS.length)return STEPS.length;}catch(e){}try{if(typeof ML_STEPS!=='undefined'&&ML_STEPS.length)return ML_STEPS.length;}catch(e){}try{if(typeof ML_TOTAL==='number')return ML_TOTAL;}catch(e){}return 0;}
  var _busy=false;
  var obs=new MutationObserver(function(){if(!_busy)render();});
  function render(){
    if(_busy)return;
    var total=getTotal();if(!total)return;
    var idx=getIdx(),key=idx+'/'+total;
    if(c._qk===key)return;
    c._qk=key;_busy=true;obs.disconnect();
    c.innerHTML='';
    for(var i=0;i<total;i++){var d=document.createElement('span');d.className='qdot'+(i===idx?' active':i<idx?' done':'');c.appendChild(d);}
    _busy=false;obs.observe(c,{childList:true});
  }
  if(typeof renderDots!=='undefined'){
    window.renderDots=function(){
      var sv=document.getElementById('ml-scoreVal')||document.getElementById('mlScoreVal');
      if(sv){try{var sc=typeof score!=='undefined'?score:typeof mlScore!=='undefined'?mlScore:null;if(sc!==null)sv.textContent=String(sc).replace(/[0-9]/g,function(d){return'٠١٢٣٤٥٦٧٨٩'[+d];});}catch(e){}}
      render();
    };
  }
  obs.observe(c,{childList:true});
  setInterval(render,500);render();
})();
</script>

<script>
/* == lesson progress nav == */
(function(){
  var fn=decodeURIComponent((location.pathname.split('/').pop()||'').split('?')[0]);
  var ch=null,idx=0,total=0,nextFile=null,m;
  var LP_HERE='moosa-lessons.html';
  var LP_OTHER='../Interactive book for elementary school chapter 1/moosa-lessons.html';
  var LP=LP_HERE;
  if((m=fn.match(/^moosa-lesson-classify (\d+)\.html$/))){ch='ch1';idx=+m[1]-1;total=5;nextFile='moosa-lesson-classify '+(+m[1]+1)+'.html';}
  else if((m=fn.match(/^moosa-chp 2-lesson (\d+)\.html$/))){ch='ch2';idx=+m[1]-1;total=6;nextFile='moosa-chp 2-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 3-lesson (\d+)\.html$/))){ch='ch3';idx=+m[1]-1;total=6;nextFile='moosa-chp 3-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 4-lesson (\d+)\.html$/))){ch='ch4';idx=+m[1]-1;total=3;nextFile='moosa-chp 4-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  if(!ch)return;
  var isLast=idx>=total-1;
  function saveDone(){try{var k='moosa_'+ch,p=JSON.parse(localStorage.getItem(k)||'[]');if(p.indexOf(idx)===-1){p.push(idx);localStorage.setItem(k,JSON.stringify(p));}}catch(e){}}
  var ov=document.querySelector('.win-overlay');
  if(ov){
    try{new MutationObserver(function(){if(ov.classList.contains('show'))saveDone();}).observe(ov,{attributes:true,attributeFilter:['class']});}catch(e){}
    if(ov.classList.contains('show'))saveDone();
  }
  window.mlHandleWinNext=function(){
    saveDone();
    if(window.parent&&window.parent!==window){window.parent.postMessage({action:'nextLesson'},'*');return;}
    location.href=isLast?LP:nextFile;
  };
})();
</script>
