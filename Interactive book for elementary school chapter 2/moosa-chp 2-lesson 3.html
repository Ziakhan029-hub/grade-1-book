<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>موسى يتعلم — الأعداد ٤ و ٥</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;margin:0;padding:0;overflow:hidden;background:linear-gradient(160deg,#FFFFFF 0%,#F2F2F2 100%);}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

.ml-widget{
  --amber:#1F1F1F; --amber-dark:#141414; --cream:#FFFFFF;
  --ink:#1C1917; --ink-soft:#78716C;
  --green:#22C55E; --green-dark:#16A34A; --green-text:#14532D;
  --ok:#22C55E; --bad:#EF4444; --tile:#E8E0D0;
  --blue:#3B82F6; --blue-dark:#1D4ED8;
  --purple:#9333EA; --orange:#F97316;
  --font-d:'Baloo Bhaijaan 2','Tajawal',sans-serif;
  --font-b:'Tajawal',sans-serif;
  --ease-b:cubic-bezier(.34,1.56,.64,1);
  width:100%; height:100vh; height:100svh;
  max-width:480px; margin:0 auto;
  display:flex; flex-direction:column;
  background:var(--cream); font-family:var(--font-b);
  overflow:hidden; position:relative;
}
.ml-widget *,.ml-widget *::before,.ml-widget *::after{box-sizing:border-box;margin:0;padding:0;}

/* ── Top bar ── */
.top-bar{
  background:linear-gradient(135deg,#3A3A3A 0%,#1F1F1F 60%,#141414 100%);
  padding:12px 20px; display:flex; align-items:center; justify-content:center; gap:8px;
  flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,.18);
}
.score-label{font-family:var(--font-d);font-size:14px;font-weight:700;color:rgba(255,255,255,.75);letter-spacing:.5px;}
.score-val  {font-family:var(--font-d);font-size:24px;font-weight:800;color:#fff;line-height:1;}

/* ── Progress dots ── */
.progress-dots{display:flex;gap:6px;align-items:center;justify-content:center;padding:8px 0 4px;flex-shrink:0;}
.dot{width:9px;height:9px;border-radius:50%;background:rgba(61,38,16,.18);transition:background .3s,transform .3s;}
.dot.active{background:var(--amber);transform:scale(1.35);}
.dot.done  {background:var(--green);}

/* ── Play area ── */
.play{flex:1;display:flex;flex-direction:column;padding:0 12px 6px;gap:8px;min-height:0;overflow:hidden;}
.q-prompt{text-align:center;font-family:var(--font-d);font-size:20px;font-weight:800;color:var(--ink);flex-shrink:0;padding:10px 0 4px;}

/* ── Screen containers ── */
.screen{display:none;flex:1;flex-direction:column;gap:8px;min-height:0;}
.screen.active{display:flex;}

/* ── DRAG ── */
.boxes{display:flex;gap:10px;flex-shrink:0;height:160px;}
.box{
  flex:1;border-radius:18px;border:3px dashed var(--tile);
  display:flex;flex-direction:column;
  transition:border-color .15s,background .15s,transform .12s;overflow:hidden;
}
.box[data-tone="purple"]{border-color:#B084E0;}
.box[data-tone="orange"] {border-color:#D09030;}
.box[data-tone="blue"]   {border-color:#60A5FA;}
.box[data-tone="green"]  {border-color:#6ECC60;}
.box.over{transform:scale(1.03);}
.box[data-tone="purple"].over{border-color:var(--purple);background:rgba(147,51,234,.10);}
.box[data-tone="orange"].over {border-color:var(--orange);background:rgba(249,115,22,.10);}
.box[data-tone="blue"].over   {border-color:var(--blue);  background:rgba(59,130,246,.10);}
.box[data-tone="green"].over  {border-color:var(--green); background:rgba(34,197,94,.10);}
.box-title{
  font-family:var(--font-d);font-size:14px;font-weight:800;text-align:center;
  padding:8px 6px 4px;display:flex;align-items:center;justify-content:center;gap:4px;flex-shrink:0;
}
.box[data-tone="purple"] .box-title{color:#6B21A8;}
.box[data-tone="orange"]  .box-title{color:#9A3412;}
.box[data-tone="blue"]    .box-title{color:#1D4ED8;}
.box[data-tone="green"]   .box-title{color:#14532D;}
.box-divider{height:1px;background:rgba(0,0,0,.08);margin:0 8px;flex-shrink:0;}
.box-items{
  flex:1;display:flex;flex-wrap:wrap;gap:4px;
  align-content:center;justify-content:center;align-items:center;
  padding:4px;position:relative;overflow:hidden;
}
.placeholder{position:absolute;inset:4px;display:flex;align-items:center;justify-content:center;font-size:22px;opacity:.2;pointer-events:none;transition:opacity .25s;}
.box-items.has-item .placeholder{opacity:0;}

.tray-section{flex:1;display:flex;flex-direction:column;min-height:0;}
.tray-label{text-align:center;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:4px;flex-shrink:0;}
.tray{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;align-items:center;flex:1;align-content:center;}

.item{
  width:88px;height:88px;border-radius:18px;
  background:#FFFDF6;border:3px solid rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
  cursor:grab;touch-action:none;
  font-family:var(--font-d);font-size:36px;font-weight:800;color:var(--ink);
  box-shadow:0 4px 0 rgba(0,0,0,.18);
  transition:transform .1s;animation:ml-pop .38s var(--ease-b) both;
  flex-shrink:0;user-select:none;
}
.item:active{cursor:grabbing;}
.item.dragging{opacity:.25;}
.item.placed{cursor:default;animation:none;width:56px;height:56px;border-radius:12px;font-size:22px;box-shadow:none;}
.ml-ghost{
  position:fixed;z-index:9999;width:88px;height:88px;border-radius:18px;
  background:#FFFDF6;border:3px solid rgba(0,0,0,.5);
  pointer-events:none;display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 20px rgba(80,50,10,.3);
  transform:translate(-50%,-50%) scale(1.12) rotate(-4deg);
  font-family:var(--font-d);font-size:36px;font-weight:800;color:var(--ink);
}

/* ── COUNT ── */
.count-area{flex:1;display:flex;flex-direction:column;align-items:center;gap:10px;min-height:0;justify-content:center;}
.count-display-row{display:flex;align-items:center;gap:14px;flex-shrink:0;}
.count-num{font-family:var(--font-d);font-size:56px;font-weight:800;color:var(--amber-dark);line-height:1;}
.count-num.bump{animation:ml-bump .22s var(--ease-b);}
@keyframes ml-bump{0%,100%{transform:scale(1)}50%{transform:scale(1.32)}}
.count-word{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--ink-soft);}
.count-grid{display:grid;gap:10px;justify-content:center;align-content:center;padding:4px 12px;flex-shrink:0;}
.count-item{
  width:110px;height:110px;border-radius:22px;
  background:#FFFDF6;border:3px solid rgba(0,0,0,.25);
  display:flex;align-items:center;justify-content:center;font-size:66px;
  cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  animation:ml-pop .38s var(--ease-b) both;
  box-shadow:0 4px 0 rgba(0,0,0,.15);
  transition:transform .1s;user-select:none;position:relative;
}
.count-item:active{transform:scale(.9);}
.count-item.tapped{background:rgba(34,197,94,.15);border-color:var(--green);transform:scale(.95);box-shadow:none;cursor:default;}
.count-badge{
  position:absolute;top:-10px;right:-10px;
  width:30px;height:30px;border-radius:50%;
  background:var(--amber);color:#fff;
  font-family:var(--font-d);font-size:15px;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.22);
  animation:badgePop .28s var(--ease-b) both;
  pointer-events:none;
}
@keyframes badgePop{0%{transform:scale(0) rotate(-20deg)}100%{transform:scale(1) rotate(0deg)}}

/* ── MATCH ── */
.match-area{flex:1;display:flex;flex-direction:column;gap:14px;min-height:0;justify-content:center;}
.match-scene{
  display:flex;flex-wrap:wrap;gap:10px;
  justify-content:center;align-items:center;
  background:rgba(0,0,0,.08);border-radius:20px;
  padding:16px 12px;border:2px solid rgba(0,0,0,.2);
}
.match-icon{font-size:64px;animation:ml-pop .38s var(--ease-b) both;line-height:1;}
.match-options{display:flex;gap:12px;justify-content:center;flex-shrink:0;}
.match-opt{
  width:80px;height:80px;border-radius:18px;
  background:#FFFDF6;border:3px solid rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-d);font-size:32px;font-weight:800;color:var(--ink);
  cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  animation:ml-pop .38s var(--ease-b) both;
  box-shadow:0 4px 0 rgba(0,0,0,.18);
  transition:transform .1s;user-select:none;
}
.match-opt:active  {transform:scale(.9);}
.match-opt.correct {background:rgba(34,197,94,.2);border-color:var(--green);color:var(--green-text);}
.match-opt.wrong   {animation:ml-shake .38s;background:rgba(239,68,68,.12);border-color:var(--bad);}

/* ── Countdown ── */
.next-wrap{padding:0 12px 10px;flex-shrink:0;}
.countdown-bar{position:relative;display:flex;align-items:center;justify-content:center;height:44px;border-radius:14px;overflow:hidden;background:rgba(0,0,0,.06);}
.countdown-fill{position:absolute;inset:0;background:linear-gradient(135deg,#22C55E,#4ADE80);border-radius:14px;transform-origin:right center;}
.countdown-txt{position:relative;z-index:1;font-family:var(--font-d);font-size:22px;font-weight:800;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.3);}
@keyframes mlCountdownShrink{0%{transform:scaleX(1)}100%{transform:scaleX(0)}}

/* ── Flash ── */
.flash{position:absolute;inset:0;z-index:50;pointer-events:none;opacity:0;}
.flash.ok {background:radial-gradient(circle,rgba(75,176,64,.25),transparent 70%);}
.flash.bad{background:radial-gradient(circle,rgba(208,80,48,.25),transparent 70%);}
.flash.show{animation:ml-flashAnim .55s ease-out;}
@keyframes ml-flashAnim{0%{opacity:0}30%{opacity:1}100%{opacity:0}}
@keyframes ml-shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.shake{animation:ml-shake .38s;}
.pulse-ok{animation:ml-pulseOk .45s var(--ease-b);}
@keyframes ml-pulseOk{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes ml-pop{0%{transform:scale(0);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* ── Win overlay ── */
.win-overlay{
  position:absolute;inset:0;z-index:100;
  background:rgba(15,8,0,.82);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;padding:24px;
}
.win-overlay.show{display:flex;animation:ml-fadeIn .35s ease;}
@keyframes ml-fadeIn{from{opacity:0}to{opacity:1}}
.win-card{
  display:flex;flex-direction:column;align-items:center;
  background:rgba(255,255,255,.10);border:2px solid rgba(255,255,255,.22);
  border-radius:28px;padding:28px 32px 32px;
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  animation:ml-winPop .5s var(--ease-b) both;
}
@keyframes ml-winPop{0%{transform:scale(.55);opacity:0}70%{transform:scale(1.04)}100%{transform:scale(1);opacity:1}}
.win-emoji{font-size:76px;animation:ml-bob 1.8s ease-in-out infinite;line-height:1;margin-bottom:4px;}
@keyframes ml-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.win-title{font-family:var(--font-d);font-size:30px;font-weight:800;color:#fff;margin:8px 0 4px;}
.win-stars{display:flex;gap:8px;margin:8px 0;}
.win-stars span{font-size:32px;animation:ml-starPop .45s var(--ease-b) both;}
.win-stars span:nth-child(1){animation-delay:.3s}
.win-stars span:nth-child(2){animation-delay:.48s}
.win-stars span:nth-child(3){animation-delay:.66s}
@keyframes ml-starPop{0%{transform:scale(0)rotate(-20deg);opacity:0}70%{transform:scale(1.25)}100%{transform:scale(1);opacity:1}}
.win-score-row{display:flex;align-items:baseline;gap:8px;margin:8px 0 20px;font-family:var(--font-d);}
.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75);}
.win-score-val  {font-size:28px;font-weight:800;color:#fff;}
.win-btns{display:flex;gap:10px;width:100%;}
.btn-win{flex:1;padding:14px 0;border-radius:14px;border:none;font-family:var(--font-d);font-size:18px;font-weight:800;cursor:pointer;-webkit-tap-highlight-color:transparent;transition:transform .1s;}
.btn-win:active{transform:translateY(3px);}
.btn-win-next  {background:linear-gradient(135deg,#60A5FA,#3B82F6 55%,#2563EB);color:#fff;box-shadow:0 6px 0 #1D4ED8;}
.btn-win-next:active  {box-shadow:0 1px 0 #1D4ED8;}
.btn-win-repeat{background:var(--green);color:var(--green-text);box-shadow:0 6px 0 var(--green-dark);}
.btn-win-repeat:active{box-shadow:0 1px 0 var(--green-dark);}

/* ── Confetti ── */
.ml-confetti{position:absolute;pointer-events:none;z-index:9998;opacity:0;}
#ml-confettiContainer{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:9998;}
@keyframes ml-confettiFall{0%{transform:translateY(-20px)rotate(0deg);opacity:1}100%{transform:translateY(900px)rotate(720deg);opacity:0}}

/* ── Animated guide hand ── */
#mlGuideHand {
  position: absolute; z-index: 9990; pointer-events: none;
  font-size: 38px; opacity: 0; transform-origin: bottom center;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,.35));
  will-change: left, top, opacity, transform;
}
#mlGuideHand.appear { animation: guideAppear .4s ease forwards; }
@keyframes guideAppear {
  0%   { opacity:0; transform: scale(.4) rotate(-30deg); }
  100% { opacity:1; transform: scale(1.2) rotate(-20deg); }
}
@keyframes guideTap {
  0%,100% { transform: scale(1.2) rotate(-20deg); }
  40%     { transform: scale(.85) rotate(-10deg); }
}

/* ── Narrator button ── */
.narrator-btn{
  position:absolute;bottom:16px;left:16px;z-index:60;
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,#1F1F1F,#141414);
  border:none;border-radius:999px;padding:8px 14px 8px 10px;
  cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.35);
  -webkit-tap-highlight-color:transparent;transition:transform .15s;
}
.narrator-btn:active{transform:scale(.95);}
.narrator-waves{display:flex;gap:3px;align-items:center;height:20px;}
.narrator-waves span{display:block;width:3px;border-radius:2px;background:#fff;animation:nWave 1s ease-in-out infinite;}
.narrator-waves span:nth-child(1){height:8px; animation-delay:0s}
.narrator-waves span:nth-child(2){height:16px;animation-delay:.15s}
.narrator-waves span:nth-child(3){height:10px;animation-delay:.3s}
.narrator-waves span:nth-child(4){height:14px;animation-delay:.1s}
@keyframes nWave{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(1)}}
.narrator-face{width:28px;height:28px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;}
</style>
</head>
<body>
<div class="ml-widget" dir="rtl">

  <!-- Top bar -->
  <div class="top-bar">
    <span class="score-label">النقاط</span>
    <span class="score-val" id="ml-scoreVal">٠</span>
  </div>

  <!-- Progress dots -->
  <div class="progress-dots" id="ml-dots"></div>

  <!-- Play area -->
  <div class="play">

    <div class="q-prompt" id="ml-qPrompt"></div>

    <!-- Drag screen -->
    <div class="screen" id="ml-screenDrag">
      <div class="boxes" id="ml-boxes"></div>
      <div class="tray-section">
        <div class="tray-label">اسحب كل بطاقة إلى المكان الصحيح</div>
        <div class="tray" id="ml-tray"></div>
      </div>
    </div>

    <!-- Count screen -->
    <div class="screen" id="ml-screenCount">
      <div class="count-area">
        <div class="count-display-row">
          <span class="count-num"  id="ml-countDisplay">٠</span>
          <span class="count-word" id="ml-countWord"></span>
        </div>
        <div class="count-grid" id="ml-countGrid"></div>
      </div>
    </div>

    <!-- Match screen -->
    <div class="screen" id="ml-screenMatch">
      <div class="match-area">
        <div class="match-scene"   id="ml-matchScene"></div>
        <div class="match-options" id="ml-matchOptions"></div>
      </div>
    </div>

  </div>

  <!-- Countdown -->
  <div class="next-wrap" id="ml-nextWrap" style="display:none">
    <div class="countdown-bar">
      <div class="countdown-fill" id="ml-countdownFill"></div>
      <span class="countdown-txt" id="ml-countdownTxt">٥</span>
    </div>
  </div>

  <!-- Win overlay -->
  <div class="win-overlay" id="ml-winOverlay">
    <div class="win-card">
      <div class="win-rays"><svg class="rays" viewBox="0 0 200 200" fill="none"><g transform="translate(100,100)"><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(30)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(60)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(90)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(120)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(150)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(180)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(210)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(240)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(270)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(300)"/><polygon points="0,-90 7,-48 -7,-48" fill="rgba(255,220,80,.5)" transform="rotate(330)"/></g></svg></div>
      <img class="win-unified-mascot" src="../mascot.png" alt="موسى">
      <div class="win-title">أحسنت! 🎉</div>
      <div class="win-stars"><span>⭐</span><span>⭐</span><span>⭐</span></div>
      <div class="win-score-row"><span class="win-score-label">النقاط</span><span class="win-score-val" id="ml-winScoreVal">٠</span></div>
      <div class="win-btns">
        <button class="btn-win btn-win-next" onclick="mlHandleWinNext()">التالي ›</button>
        <button class="btn-win btn-win-repeat" onclick="mlHandleWinContinue()">إعادة 🔄</button>
      </div>
    </div>
  </div>

  <!-- Flash -->
  <div class="flash" id="ml-flash"></div>
  <div id="ml-confettiContainer"></div>

  <!-- Speaker button -->
  <button id="mlSpeakerBtn" onclick="mlSpeak()" aria-label="استمع مجدداً" style="position:absolute;bottom:20px;right:16px;z-index:9999;background:linear-gradient(135deg,#3A3A3A,#1F1F1F);border:none;border-radius:50%;width:48px;height:48px;font-size:24px;cursor:pointer;box-shadow:0 4px 0 #0A0A0A,0 6px 16px rgba(0,0,0,.28);display:flex;align-items:center;justify-content:center;-webkit-tap-highlight-color:transparent;transition:transform .12s;">🔊</button>

</div>

":"../audio/c2484382.mp3","الآلة فارغة! اكتب الرقم صفر ٠":"../audio/af541735.mp3","عُدّ الكرات ثم اكتب الرقم ١":"../audio/0bb4540d.mp3","عُدّ الكرات ثم اكتب الرقم ٢":"../audio/7626557c.mp3","عُدّ الكرات ثم اكتب الرقم ٣":"../audio/0764a620.mp3","عُدّ الكرات ثم اكتب الرقم ٤":"../audio/654330c7.mp3","عُدّ الكرات ثم اكتب الرقم ٥":"../audio/48fbbfbd.mp3","اكتب صفر ٠ من الذاكرة":"../audio/18181245.mp3","واحد":"../audio/b72cd1b4.mp3","اثنان":"../audio/656d784b.mp3","ثلاثة":"../audio/b82a9429.mp3","أربعة":"../audio/555e79ec.mp3","خمسة":"../audio/c3624b9e.mp3","ستة":"../audio/f2c2013b.mp3","سبعة":"../audio/082a36d9.mp3","ثمانية":"../audio/355990d0.mp3","تسعة":"../audio/e5f1340b.mp3"};</script>
<script>
// ── Helpers ───────────────────────────────────────────────
const ARABIC_NUMS  = '٠١٢٣٤٥٦٧٨٩';
const ARABIC_WORDS = ['','واحد','اثنان','ثلاثة','أربعة','خمسة'];
function toAr(n) { return String(n).replace(/[0-9]/g, d => ARABIC_NUMS[+d]); }
function el(id)  { return document.getElementById('ml-' + id); }

// ── Audio ─────────────────────────────────────────────────
const mlAudio = (function() {
  let ctx = null;
  function init() { if (!ctx) try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} }
  function tone(f, s, d, type, v) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type = type || 'triangle'; o.frequency.value = f;
    g.gain.setValueAtTime(v || 0.2, s);
    g.gain.exponentialRampToValueAtTime(0.001, s + d);
    o.start(s); o.stop(s + d + 0.01);
  }
  return {
    correct() { init(); if (!ctx) return; const t = ctx.currentTime; [[523,0],[659,.11]].forEach(([f,d]) => tone(f,t+d,.35)); },
    wrong() {
      init(); if (!ctx) return;
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination); o.type = 'sawtooth';
      o.frequency.setValueAtTime(260, ctx.currentTime);
      o.frequency.exponentialRampToValueAtTime(120, ctx.currentTime + .24);
      g.gain.setValueAtTime(.12, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(.001, ctx.currentTime + .24);
      o.start(ctx.currentTime); o.stop(ctx.currentTime + .25);
    },
    chime(f)  { init(); if (!ctx) return; tone(f || 880, ctx.currentTime, .3, 'sine', .14); },
    fanfare() { init(); if (!ctx) return; const t = ctx.currentTime; [[523,0],[659,.15],[784,.3],[1047,.45]].forEach(([f,d]) => tone(f,t+d,.4,'triangle',.25)); }
  };
})();

// ── Narrator ──────────────────────────────────────────────
var _mlSpeakRetry = null, _mlSpeakSpoken = false;
function mlSpeak() {
  const q = QUESTIONS[qIndex];
  let txt = q.prompt;
  if (q.type === 'drag') txt += '. ' + q.rule;
  _mlSpeakSpoken = false;
  clearInterval(_mlSpeakRetry);
  var _src = (window.__NARR_AUDIO__ || {})[txt];
  if (_src) {
    _mlSpeakSpoken = true;
    var _a = new Audio(_src);
    _a.onerror = function(){ _mlSpeakSpoken = false; _mlWsSpeak(txt); };
    _a.play().catch(function(){ _mlSpeakSpoken = false; _mlWsSpeak(txt); });
    return;
  }
  _mlWsSpeak(txt);
}
function _mlWsSpeak(txt) {
  if (!window.speechSynthesis) return;
  function _doSpeak() {
    const voices = window.speechSynthesis.getVoices().filter(v => v.lang.startsWith('ar'));
    if (!voices.length) return false;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(txt);
    u.lang = 'ar-SA'; u.rate = 0.9; u.pitch = 1.3;
    const fem = voices.find(v => /female|woman|فاطمة|Fatima|Layla|hoda|salma|laila|amira|zeina|dina|zara|rana|mona|yasmin|nour/i.test(v.name)) ||
                voices.find(v => !/male|ذكر|naayf|majed|omar|maged|tarik|nizar/i.test(v.name)) ||
                voices[0];
    if (fem) u.voice = fem;
    u.onstart = function(){ _mlSpeakSpoken = true; clearInterval(_mlSpeakRetry); };
    window.speechSynthesis.speak(u);
    return true;
  }
  if (!_doSpeak()) {
    _mlSpeakRetry = setInterval(function(){
      if (_mlSpeakSpoken) { clearInterval(_mlSpeakRetry); return; }
      _doSpeak();
    }, 1200);
    setTimeout(function(){ clearInterval(_mlSpeakRetry); }, 4800);
  }
  speechSynthesis.onvoiceschanged = function(){ if(!_mlSpeakSpoken) _doSpeak(); };
}

// ── Count-tap number audio ─────────────────────────────────
var _countVoiceCache = null;
function _getCountVoice() {
  if (_countVoiceCache) return _countVoiceCache;
  if (!window.speechSynthesis) return null;
  var vs = window.speechSynthesis.getVoices().filter(function(v){ return v.lang.startsWith('ar'); });
  if (!vs.length) return null;
  _countVoiceCache = vs.find(function(v){ return /female|woman|فاطمة|Fatima|Layla|hoda|salma|laila|amira|zeina|dina|zara|rana|mona|yasmin|nour/i.test(v.name); }) ||
    vs.find(function(v){ return !/male|ذكر|naayf|majed|omar|maged|tarik|nizar/i.test(v.name); }) ||
    vs[0];
  return _countVoiceCache;
}
var COUNT_WORDS_AR = ['','واحد','اثنان','ثلاثة','أربعة','خمسة','ستة','سبعة','ثمانية','تسعة'];
function speakNum(n) {
  var txt = COUNT_WORDS_AR[n]; if (!txt) return;
  var _src = (window.__NARR_AUDIO__ || {})[txt];
  if (_src) { var _a = new Audio(_src); _a.play().catch(function(){}); return; }
  if (!window.speechSynthesis) return;
  var v = _getCountVoice(); if (!v) return;
  window.speechSynthesis.cancel();
  var u = new SpeechSynthesisUtterance(txt);
  u.lang = 'ar-SA'; u.rate = 0.85; u.pitch = 1.3; u.voice = v;
  window.speechSynthesis.speak(u);
}
if (window.speechSynthesis) { speechSynthesis.onvoiceschanged = function(){ _countVoiceCache = null; _getCountVoice(); }; }

// ── Countdown ─────────────────────────────────────────────
var mlCountdownTimer = null;
function mlStartCountdown() {
  var secs = 5;
  var wrap = document.getElementById('ml-nextWrap');
  var fill = document.getElementById('ml-countdownFill');
  var txt  = document.getElementById('ml-countdownTxt');
  if (!wrap) return;
  wrap.style.display = 'block';
  fill.style.animation = 'none';
  void fill.offsetHeight;
  fill.style.animation = 'mlCountdownShrink 5s linear forwards';
  txt.textContent = toAr(secs);
  mlCountdownTimer = setInterval(function() {
    secs--;
    if (txt) txt.textContent = toAr(Math.max(0, secs));
    if (secs <= 0) {
      clearInterval(mlCountdownTimer); mlCountdownTimer = null;
      if (wrap) wrap.style.display = 'none';
      mlNextQuestion();
    }
  }, 1000);
}
function mlClearCountdown() {
  if (mlCountdownTimer) { clearInterval(mlCountdownTimer); mlCountdownTimer = null; }

const QUESTIONS = [

var qIndex = 0, score = 0;

// ── Render question ───────────────────────────────────────
function renderQuestion() {
  mlClearCountdown();

  ['screenDrag','screenCount','screenMatch'].forEach(function(id) {

  setTimeout(mlSpeak, 400);

// ── Drag ─────────────────────────────────────────────────
function renderDrag(q) {
  el('screenDrag').classList.add('active');
  var boxesEl = el('boxes');
  boxesEl.innerHTML = '';
  ['A','B'].forEach(function(side) {
    var cfg = side === 'A' ? q.boxA : q.boxB;

    box.innerHTML = '<div class="box-title">' + cfg.label + '</div>'

      + '<div class="box-items" id="ml-items' + side + '"><div class="placeholder">⬇︎</div></div>';

  });

  var tray = el('tray');

// ── Count ─────────────────────────────────────────────────
function renderCount(q) {
  el('screenCount').classList.add('active');
  countVal = 0; countMax = q.items.length;
  el('countDisplay').textContent = '٠';
  el('countWord').textContent    = '';

  var grid = el('countGrid');
  var cols = q.items.length <= 3 ? q.items.length : Math.ceil(Math.sqrt(q.items.length));
  grid.style.gridTemplateColumns = 'repeat(' + cols + ', 110px)';
  grid.innerHTML = '';

  q.items.forEach(function(emoji, i) {
    var div = document.createElement('div');
    div.className = 'count-item';
    div.textContent = emoji;
    div.style.animationDelay = (0.06 + i * 0.09) + 's';
    div.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      if (div.classList.contains('tapped')) return;
      div.classList.add('tapped');
      countVal++;
      var badge = document.createElement('span');
      badge.className = 'count-badge';
      badge.textContent = toAr(countVal);
      div.appendChild(badge);
      speakNum(countVal);
      mlAudio.chime(400 + countVal * 60);
      flash('ok');
      var d = el('countDisplay');
      d.textContent = toAr(countVal);
      d.classList.remove('bump'); void d.offsetWidth; d.classList.add('bump');
      el('countWord').textContent = ARABIC_WORDS[countVal] || '';
      if (countVal === countMax) {
        mlAudio.correct();
        score += 10;
        el('scoreVal').textContent = toAr(score);
        mlStartCountdown();
      }
    });
    grid.appendChild(div);

}

// ── Match ─────────────────────────────────────────────────
function renderMatch(q) {
  el('screenMatch').classList.add('active');

  var scene = el('matchScene');

  });

  var opts = el('matchOptions');
  opts.innerHTML = '';
  q.options.slice().sort(function() { return Math.random() - .5; }).forEach(function(num, i) {
    var div = document.createElement('div');
    div.className = 'match-opt';
    div.textContent = toAr(num);
    div.style.animationDelay = (0.06 + i * 0.08) + 's';
    div.addEventListener('pointerdown', function(e) {
      e.preventDefault();

        answered = true;
        mlAudio.correct(); flash('ok');
        div.classList.add('correct');
        score += 10;
        el('scoreVal').textContent = toAr(score);
        opts.querySelectorAll('.match-opt').forEach(function(o) { if (o !== div) o.style.opacity = '.35'; });
        mlStartCountdown();
      } else {
        mlAudio.wrong(); flash('bad');
        div.classList.add('wrong');
        setTimeout(function() { div.classList.remove('wrong'); }, 600);
      }
    });
    opts.appendChild(div);
  });
}

// ── Drag logic ────────────────────────────────────────────
var ghost = null, dragItem = null, overBox = null;

function setupDrag(item) { item.addEventListener('pointerdown', onPointerDown, { passive: false }); }

function onPointerDown(e) {
  if (e.currentTarget.classList.contains('placed')) return;
  e.preventDefault();
  dragItem = e.currentTarget;
  dragItem.classList.add('dragging');
  dragItem.setPointerCapture(e.pointerId);
  ghost = document.createElement('div');
  ghost.className = 'ml-ghost';
  ghost.textContent = dragItem.textContent;
  document.body.appendChild(ghost);
  moveGhost(e.clientX, e.clientY);
  document.addEventListener('pointermove', onPointerMove, { passive: false });
  document.addEventListener('pointerup', onPointerUp, { once: true });
}

function onPointerMove(e) {
  e.preventDefault();
  if (!ghost) return;
  moveGhost(e.clientX, e.clientY);
  var boxes = document.querySelectorAll('.ml-widget .box');
  var hit = null;
  boxes.forEach(function(box) {
    var r = box.getBoundingClientRect();
    if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) hit = box;
  });
  if (overBox && overBox !== hit) overBox.classList.remove('over');
  if (hit) hit.classList.add('over');
  overBox = hit;
}

function onPointerUp(e) {
  document.removeEventListener('pointermove', onPointerMove);
  if (ghost) { ghost.remove(); ghost = null; }
  if (!dragItem) return;
  dragItem.classList.remove('dragging');

  if (overBox) {
    overBox.classList.remove('over');
    if (overBox.dataset.box === dragItem.dataset.answer) {
      mlAudio.correct(); flash('ok');
      overBox.classList.add('pulse-ok');
      setTimeout(function() { overBox.classList.remove('pulse-ok'); }, 450);
      var itemsEl = document.getElementById('ml-items' + overBox.dataset.box);
      dragItem.classList.add('placed');
      itemsEl.appendChild(dragItem);
      itemsEl.classList.add('has-item');
      score += 10;
      el('scoreVal').textContent = toAr(score);
      placed++;
      if (placed === total) mlStartCountdown();
    } else {
      mlAudio.wrong(); flash('bad');
      overBox.classList.add('shake');
      setTimeout(function() { overBox.classList.remove('shake'); }, 380);
    }
  }
  overBox = null; dragItem = null;
}

function moveGhost(x, y) { if (ghost) { ghost.style.left = x + 'px'; ghost.style.top = y + 'px'; } }

// ── Next / Win ────────────────────────────────────────────
function mlNextQuestion() {

<!-- ── Animated guide hand ── -->
<script>
(function(){
  var hand = null, idleT = null, animT = null;
  var IDLE_MS = 2200;

  function init() {
    hand = document.createElement('div');
    hand.id = 'mlGuideHand';
    hand.textContent = '👇';
    var _hw = document.querySelector('.ml-widget'); (_hw || document.body).appendChild(hand);
    scheduleGuide(2500);
    document.addEventListener('pointerdown', onAction, { passive: true });
    var qEl = document.getElementById('ml-qPrompt');
    if (qEl) new MutationObserver(function() { onAction(); scheduleGuide(2500); })
               .observe(qEl, { childList: true, characterData: true, subtree: true });
  }

  function onAction() {
    clearTimeout(idleT); clearTimeout(animT);
    hideHand();
    scheduleGuide(IDLE_MS);
  }

  function scheduleGuide(ms) {
    clearTimeout(idleT);
    idleT = setTimeout(runGuide, ms);
  }

  function hideHand() {
    if (!hand) return;
    hand.style.transition = 'opacity .25s';
    hand.style.opacity = '0';
    hand.classList.remove('appear');
  }

  function runGuide() {
    if (!hand) return;
    var _wEl = document.querySelector('.ml-widget');
    var wR = _wEl ? _wEl.getBoundingClientRect() : {left:0, top:0};

    // ── DRAG screen ──────────────────────────────────────
    var dragScreen = document.getElementById('ml-screenDrag');
    if (dragScreen && dragScreen.classList.contains('active')) {
      var items = document.querySelectorAll('#ml-tray .item:not(.placed)');
      if (!items.length) return;
      var item = items[0];
      var box  = document.querySelector('.ml-widget .box[data-box="' + item.dataset.answer + '"]');
      if (!box) return;
      var iR = item.getBoundingClientRect();
      var bR = box.getBoundingClientRect();

      hand.style.transition = 'none';
      hand.style.left = (iR.left - wR.left + iR.width/2 - 19) + 'px';
      hand.style.top  = (iR.top  - wR.top - 14) + 'px';
      hand.style.opacity = '0';
      hand.classList.add('appear');

      animT = setTimeout(function() {
        hand.style.transition = 'left .75s cubic-bezier(.4,0,.2,1), top .75s cubic-bezier(.4,0,.2,1), transform .75s, opacity .3s';
        hand.style.left = (bR.left - wR.left + bR.width/2 - 19) + 'px';
        hand.style.top  = (bR.top  - wR.top + bR.height/2 - 19) + 'px';
        hand.style.transform = 'scale(.9) rotate(0deg)';
        hand.style.opacity = '1';
        animT = setTimeout(function() { hideHand(); animT = setTimeout(runGuide, 1800); }, 900);
      }, 700);
      return;
    }

    // ── COUNT screen ─────────────────────────────────────
    var countScreen = document.getElementById('ml-screenCount');
    if (countScreen && countScreen.classList.contains('active')) {
      var untapped = document.querySelectorAll('#ml-countGrid .count-item:not(.tapped)');
      if (!untapped.length) return;
      var tile = untapped[0];
      var tR = tile.getBoundingClientRect();

      hand.style.transition = 'none';
      hand.style.left = (tR.left - wR.left + tR.width/2 - 19) + 'px';
      hand.style.top  = (tR.top  - wR.top - 14) + 'px';
      hand.style.opacity = '0';
      hand.classList.add('appear');

      animT = setTimeout(function() {
        hand.style.transition = 'transform .25s, opacity .2s';
        hand.style.opacity = '1';
        hand.style.animation = 'guideTap .5s ease 2';
        animT = setTimeout(function() {
          hand.style.animation = '';
          hideHand();
          animT = setTimeout(runGuide, 1800);
        }, 1200);
      }, 600);
      return;
    }

    // ── MATCH screen ─────────────────────────────────────
    var matchScreen = document.getElementById('ml-screenMatch');
    if (matchScreen && matchScreen.classList.contains('active')) {
      var opts = document.querySelectorAll('#ml-matchOptions .match-opt:not([style*="opacity"])');
      if (!opts.length) return;
      var correctTxt = toAr(QUESTIONS[qIndex].answer);
      var opt = null;
      for (var _i = 0; _i < opts.length; _i++) {
        if (opts[_i].textContent === correctTxt) { opt = opts[_i]; break; }
      }
      if (!opt) opt = opts[0];
      var oR  = opt.getBoundingClientRect();

      hand.style.transition = 'none';
      hand.style.left = (oR.left - wR.left + oR.width/2 - 19) + 'px';
      hand.style.top  = (oR.top  - wR.top - 14) + 'px';
      hand.style.opacity = '0';
      hand.classList.add('appear');

      animT = setTimeout(function() {
        hand.style.transition = 'transform .25s, opacity .2s';
        hand.style.opacity = '1';
        hand.style.animation = 'guideTap .5s ease 2';
        animT = setTimeout(function() {
          hand.style.animation = '';
          hideHand();
          animT = setTimeout(runGuide, 1800);
        }, 1200);
      }, 600);
      return;
    }
  }

  if (document.readyState === 'loading') window.addEventListener('load', init);
  else init();
})();
</script>

<script>
(function(){
  var c=document.getElementById('ml-dots')||document.getElementById('mlDots')||document.getElementById('roundRow');
  if(!c){
    var tb=document.querySelector('.ml-widget .top-bar');
    if(!tb)return;
    c=document.createElement('div');c.className='progress-dots';c.id='mlDots';
    tb.insertAdjacentElement('afterend',c);
  }
  function getIdx(){try{if(typeof qIndex!=='undefined')return qIndex;}catch(e){}try{if(typeof stepIndex!=='undefined')return stepIndex;}catch(e){}try{if(typeof stepIdx!=='undefined')return stepIdx;}catch(e){}try{if(typeof mlStepIdx!=='undefined')return mlStepIdx;}catch(e){}return 0;}
  function getTotal(){try{if(typeof QUESTIONS!=='undefined'&&QUESTIONS.length)return QUESTIONS.length;}catch(e){}try{if(typeof STEPS!=='undefined'&&STEPS.length)return STEPS.length;}catch(e){}try{if(typeof ML_STEPS!=='undefined'&&ML_STEPS.length)return ML_STEPS.length;}catch(e){}try{if(typeof ML_TOTAL==='number')return ML_TOTAL;}catch(e){}return 0;}
  var _busy=false;
  var obs=new MutationObserver(function(){if(!_busy)render();});
  function render(){
    if(_busy)return;
    var total=getTotal();if(!total)return;
    var idx=getIdx(),key=idx+'/'+total;
    if(c._qk===key)return;
    c._qk=key;_busy=true;obs.disconnect();
    c.innerHTML='';
    for(var i=0;i<total;i++){var d=document.createElement('span');d.className='qdot'+(i===idx?' active':i<idx?' done':'');c.appendChild(d);}
    _busy=false;obs.observe(c,{childList:true});
  }
  if(typeof renderDots!=='undefined'){
    window.renderDots=function(){
      var sv=document.getElementById('ml-scoreVal')||document.getElementById('mlScoreVal');
      if(sv){try{var sc=typeof score!=='undefined'?score:typeof mlScore!=='undefined'?mlScore:null;if(sc!==null)sv.textContent=String(sc).replace(/[0-9]/g,function(d){return'٠١٢٣٤٥٦٧٨٩'[+d];});}catch(e){}}
      render();
    };
  }
  obs.observe(c,{childList:true});
  setInterval(render,500);render();
})();
</script>

<script>
/* == lesson progress nav == */
(function(){
  var fn=decodeURIComponent((location.pathname.split('/').pop()||'').split('?')[0]);
  var ch=null,idx=0,total=0,nextFile=null,m;
  var LP_HERE='moosa-lessons.html';
  var LP_OTHER='../Interactive book for elementary school chapter 1/moosa-lessons.html';
  var LP=LP_HERE;
  if((m=fn.match(/^moosa-lesson-classify (\d+)\.html$/))){ch='ch1';idx=+m[1]-1;total=5;nextFile='moosa-lesson-classify '+(+m[1]+1)+'.html';}
  else if((m=fn.match(/^moosa-chp 2-lesson (\d+)\.html$/))){ch='ch2';idx=+m[1]-1;total=6;nextFile='moosa-chp 2-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 3-lesson (\d+)\.html$/))){ch='ch3';idx=+m[1]-1;total=6;nextFile='moosa-chp 3-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  else if((m=fn.match(/^moosa-chp 4-lesson (\d+)\.html$/))){ch='ch4';idx=+m[1]-1;total=3;nextFile='moosa-chp 4-lesson '+(+m[1]+1)+'.html';LP=LP_OTHER;}
  if(!ch)return;
  var isLast=idx>=total-1;
  function saveDone(){try{var k='moosa_'+ch,p=JSON.parse(localStorage.getItem(k)||'[]');if(p.indexOf(idx)===-1){p.push(idx);localStorage.setItem(k,JSON.stringify(p));}}catch(e){}}
  var ov=document.querySelector('.win-overlay');
  if(ov){
    try{new MutationObserver(function(){if(ov.classList.contains('show'))saveDone();}).observe(ov,{attributes:true,attributeFilter:['class']});}catch(e){}
    if(ov.classList.contains('show'))saveDone();
  }
  window.mlHandleWinNext=function(){
    saveDone();
    if(window.parent&&window.parent!==window){window.parent.postMessage({action:'nextLesson'},'*');return;}
    location.href=isLast?LP:nextFile;
  };
})();
</script>
