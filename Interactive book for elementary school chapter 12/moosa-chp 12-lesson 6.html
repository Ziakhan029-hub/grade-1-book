<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,#FFFFFF 0%,#F2F2F2 100%);font-family:'Tajawal',sans-serif}
.ml-widget{
  --ink:#1C1917;--ink-soft:#78716C;--cream:#FFFFFF;--tile:#E8E0D0;
  --green:#22C55E;--green-dark:#16A34A;--ok:#22C55E;--bad:#EF4444;

.q-line{font-family:var(--font-d);font-size:clamp(20px,5.5vw,26px);font-weight:800;color:var(--ink);text-align:center}

/* next + countdown */
.next-wrap{flex-shrink:0;padding:6px 18px 14px}

.win-overlay.show{display:flex;animation:ml-fadeIn .35s ease-out}

.win-title{font-family:var(--font-d);font-size:30px;font-weight:800;color:#fff;text-shadow:0 2px 6px rgba(0,0,0,.3);margin:8px 0 4px}
.win-stars{display:flex;gap:6px;justify-content:center;margin:6px 0 10px;font-size:32px}
.win-stars span{display:inline-block;animation:ml-starPop .45s var(--ease-b) both;opacity:0}
.win-stars span:nth-child(1){animation-delay:.3s}.win-stars span:nth-child(2){animation-delay:.48s}.win-stars span:nth-child(3){animation-delay:.66s}
.win-score-row{display:flex;align-items:baseline;gap:8px;margin:4px 0 12px;font-family:var(--font-d)}
.win-score-label{font-size:13px;font-weight:600;color:rgba(255,255,255,.75)}
.win-score-val{font-size:28px;font-weight:800;color:#fff}
.win-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.btn-win{padding:13px 30px;border:3px solid rgba(255,255,255,.9);border-radius:20px;font-family:var(--font-d);font-size:19px;font-weight:800;
  color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.2);background:linear-gradient(135deg,var(--acc-light) 0%,var(--acc) 55%,var(--acc-dark) 100%);
  box-shadow:0 6px 0 #831843,0 8px 20px rgba(217,119,6,.28);cursor:pointer;transition:transform .15s var(--ease-b),box-shadow .15s ease;-webkit-tap-highlight-color:transparent}
.btn-win:active{transform:translateY(4px);box-shadow:0 1px 0 #831843}
.ml-confetti{position:fixed;inset:0;pointer-events:none;z-index:9999;overflow:hidden}
.ml-confetti i{position:absolute;top:-20px;display:block;animation:ml-confettiFall linear forwards}
.guide-hand{position:absolute;z-index:60;pointer-events:none;font-size:32px;animation:ml-guideTap 2s ease-in-out infinite;filter:drop-shadow(0 3px 4px rgba(60,35,5,.3))}

@keyframes ml-pop{0%{transform:scale(.3);opacity:0}100%{transform:scale(1);opacity:1}}
@keyframes ml-flash{0%{opacity:0}25%{opacity:1}100%{opacity:0}}
@keyframes ml-shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(6px)}60%{transform:translateX(-5px)}80%{transform:translateX(4px)}}
@keyframes ml-itemGlow{0%,100%{box-shadow:inset 0 0 0 0 rgba(245,158,11,0),inset -4px -5px 0 rgba(0,0,0,.18),inset 4px 4px 0 rgba(255,255,255,.30)}50%{box-shadow:inset 0 0 0 4px rgba(245,158,11,.6),inset -4px -5px 0 rgba(0,0,0,.18)}}
@keyframes ml-guideTap{0%,100%{transform:translateY(0) scale(1)}25%{transform:translateY(-10px) scale(1)}40%{transform:translateY(2px) scale(.85)}55%{transform:translateY(-6px) scale(1)}}
@keyframes ml-fadeIn{from{opacity:0}to{opacity:1}}

@keyframes ml-starPop{0%{transform:scale(0) rotate(-40deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes ml-bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes ml-spin{to{transform:rotate(360deg)}}

@keyframes mlHintPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
.shake{animation:ml-shake .38s linear}
</style>

<script>
/* ════════ Chapter 8 · Lesson 1 — الجمع بالعدّ التصاعدي ════════
   Start at the larger addend, then count up by the smaller (tap each cube). */
const AR_WORD={0:'صفر',1:'واحد',2:'اثنان',3:'ثلاثة',4:'أربعة',5:'خمسة',6:'ستة',7:'سبعة',8:'ثمانية',9:'تسعة',10:'عشرة',11:'أحد عشر',12:'اثنا عشر'};
const toAr=n=>String(n).replace(/[0-9]/g,d=>'٠١٢٣٤٥٦٧٨٩'[+d]);
const mlEl=id=>document.getElementById(id);

const ML_STEPS=[
 {shape:'circle', n:3},{shape:'square', n:4},{shape:'rect', n:2},{shape:'circle', n:4},{shape:'square', n:3}
];
const PROMPT='أيّها أجزاؤه متطابقة؟';
let mlScore=0, mlStepIdx=0, mlSolved=false, mlHandTimer=null;

/* ── sfx (WebAudio) ── */
const mlSnd=(()=>{let ctx=null;const c=()=>ctx||(ctx=new(window.AudioContext||window.webkitAudioContext)());
  const tone=(f,t,d,type,vol)=>{const a=c(),o=a.createOscillator(),g=a.createGain();o.type=type;
    o.frequency.setValueAtTime(f,a.currentTime+t);g.gain.setValueAtTime(vol,a.currentTime+t);
    g.gain.exponentialRampToValueAtTime(.001,a.currentTime+t+d);o.connect(g);g.connect(a.destination);
    o.start(a.currentTime+t);o.stop(a.currentTime+t+d+.05);};
  return{tap(i){try{tone(440+(i||0)*48,0,.13,'triangle',.2);}catch(e){}},
    correct(){try{tone(523,0,.16,'triangle',.25);tone(659,.11,.2,'triangle',.25);}catch(e){}},
    wrong(){try{const a=c(),o=a.createOscillator(),g=a.createGain();o.type='sine';o.frequency.setValueAtTime(392,a.currentTime);
      o.frequency.exponentialRampToValueAtTime(294,a.currentTime+.25);g.gain.setValueAtTime(.12,a.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.3);o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+.35);}catch(e){}},
    win(){try{[523,659,784,1047].forEach((f,i)=>tone(f,i*.085,.22,'triangle',.22));}catch(e){}}};
})();
const flash=k=>{const f=mlEl(k==='ok'?'mlFlashOk':'mlFlashBad');f.classList.remove('show');void f.offsetWidth;f.classList.add('show');};

/* ── narration (FatimaNeural mp3 → TTS fallback) ── */
let mlVoice=null;
function mlPickVoice(){try{const vs=speechSynthesis.getVoices();mlVoice=vs.find(v=>/^ar/i.test(v.lang))||null;}catch(e){}}
if('speechSynthesis' in window){mlPickVoice();speechSynthesis.onvoiceschanged=mlPickVoice;}
function mlSpeak(t){ if(!t)return; var s=(window.__NARR_AUDIO__||{})[t];
  if(s){try{var a=new Audio(s);a.play().catch(function(){});}catch(e){}return;} _ws(t); }
function _ws(t){try{speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(t);u.lang='ar-SA';if(mlVoice)u.voice=mlVoice;u.rate=.85;u.pitch=1.05;speechSynthesis.speak(u);}catch(e){}}
const sayNum=n=>mlSpeak(AR_WORD[n]);

/* ── progress dots (5 lessons) ── */
const LESSONS=['moosa-chp 12-lesson 1.html','moosa-chp 12-lesson 2.html','moosa-chp 12-lesson 3.html','moosa-chp 12-lesson 4.html','moosa-chp 12-lesson 5.html','moosa-chp 12-lesson 6.html','moosa-chp 12-lesson 7.html'];
function renderDots(){var c=mlEl('mlDots');c.innerHTML='';var cur=decodeURIComponent(location.pathname.split('/').pop());var ci=LESSONS.indexOf(cur);
  LESSONS.forEach(function(lf,i){var b=document.createElement('button');b.className='dot'+(i===ci?' active':i<ci?' done':'');b.textContent=toAr(i+1);
    b.addEventListener('click',function(){ if(i===ci)return; if(window.parent&&window.parent!==window)window.parent.postMessage({action:'navigateLesson',file:lf},'*'); else location.href=lf; });c.appendChild(b);});}

/* ── guide hand ── */
function scheduleHand(getTarget,delay){clearTimeout(mlHandTimer);mlHandTimer=setTimeout(function(){
  if(mlSolved)return;var t=getTarget();if(!t)return;var sc=mlEl('mlScreen').getBoundingClientRect(),r=t.getBoundingClientRect();
  var h=document.createElement('div');h.className='guide-hand';h.textContent='👆';h.style.left=(r.left-sc.left+r.width*0.5-8)+'px';h.style.top=(r.top-sc.top+r.height*0.5)+'px';
  mlEl('mlScreen').appendChild(h);},delay||2600);}
function dismissHand(){clearTimeout(mlHandTimer);var h=mlEl('mlScreen').querySelector('.guide-hand');if(h){h.style.animation='none';h.style.opacity='0';setTimeout(function(){h.remove();},200);}}

/* ── render one step ── */
var __gid=0;
function solidSVG(kind,S){S=S||96;var g=(++__gid);
 if(kind==='cube')return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 100 100"><polygon points="22,34 50,20 78,34 50,48" fill="#f9a8d4"/><polygon points="22,34 50,48 50,84 22,70" fill="#db2777"/><polygon points="78,34 50,48 50,84 78,70" fill="#be185d"/><g fill="none" stroke="#831843" stroke-width="2.2" stroke-linejoin="round"><polygon points="22,34 50,20 78,34 50,48"/><polygon points="22,34 50,48 50,84 22,70"/><polygon points="78,34 50,48 50,84 78,70"/></g></svg>';
 if(kind==='sphere')return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 100 100"><defs><radialGradient id="g'+g+'" cx="38%" cy="34%" r="72%"><stop offset="0%" stop-color="#fce7f3"/><stop offset="55%" stop-color="#ec4899"/><stop offset="100%" stop-color="#9d174d"/></radialGradient></defs><circle cx="50" cy="52" r="37" fill="url(#g'+g+')" stroke="#831843" stroke-width="2.2"/></svg>';
 if(kind==='cylinder')return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 100 100"><rect x="28" y="24" width="44" height="52" fill="#ec4899"/><ellipse cx="50" cy="76" rx="22" ry="8" fill="#be185d"/><ellipse cx="50" cy="24" rx="22" ry="8" fill="#f9a8d4"/><g fill="none" stroke="#831843" stroke-width="2.2"><line x1="28" y1="24" x2="28" y2="76"/><line x1="72" y1="24" x2="72" y2="76"/><ellipse cx="50" cy="24" rx="22" ry="8"/><path d="M28 76 A22 8 0 0 0 72 76"/></g></svg>';
 return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 100 100"><polygon points="50,18 72,74 28,74" fill="#ec4899"/><ellipse cx="50" cy="74" rx="22" ry="8" fill="#be185d"/><g fill="none" stroke="#831843" stroke-width="2.2"><line x1="50" y1="18" x2="28" y2="74"/><line x1="50" y1="18" x2="72" y2="74"/><path d="M28 74 A22 8 0 0 0 72 74"/></g></svg>';}
function shapeSVG(kind,S,fill){S=S||88;fill=fill||'#f472b6';var st='#9d174d';
 if(kind==='circle')return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="'+fill+'" stroke="'+st+'" stroke-width="3"/></svg>';
 if(kind==='square')return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 100 100"><rect x="14" y="14" width="72" height="72" rx="4" fill="'+fill+'" stroke="'+st+'" stroke-width="3"/></svg>';
 if(kind==='triangle')return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 100 100"><polygon points="50,12 88,84 12,84" fill="'+fill+'" stroke="'+st+'" stroke-width="3" stroke-linejoin="round"/></svg>';
 if(kind==='rectangle')return '<svg width="'+S+'" height="'+(S*0.62)+'" viewBox="0 0 100 62"><rect x="6" y="8" width="88" height="46" rx="4" fill="'+fill+'" stroke="'+st+'" stroke-width="3"/></svg>';
 return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 100 100"><polygon points="50,10 86,30 86,70 50,90 14,70 14,30" fill="'+fill+'" stroke="'+st+'" stroke-width="3" stroke-linejoin="round"/></svg>';}
function divSVG(shape,n,equal,S){S=S||96;var f='#f9a8d4',st='#9d174d',lines='';
 if(shape==='circle'){var angs=[];if(equal){for(var i=0;i<n;i++)angs.push(i*360/n);}else{if(n===2)angs=[0,150];else if(n===3)angs=[0,80,200];else angs=[0,70,150,255];}
  for(var i=0;i<angs.length;i++){var a=(angs[i]-90)*Math.PI/180;lines+='<line x1="50" y1="50" x2="'+(50+40*Math.cos(a)).toFixed(1)+'" y2="'+(50+40*Math.sin(a)).toFixed(1)+'" stroke="'+st+'" stroke-width="2.6"/>';}
  return '<svg width="'+S+'" height="'+S+'" viewBox="0 0 100 100"><circle cx="50" cy="50" r="40" fill="'+f+'" stroke="'+st+'" stroke-width="3"/>'+lines+'</svg>';}
 var isR=shape==='rect';var x0=isR?5:14,y0=isR?18:14,W=isR?90:72,h=isR?58:72,vb=isR?'0 0 100 90':'0 0 100 100',hh=isR?S*0.86:S;
 var xs=[];if(equal){for(var i=1;i<n;i++)xs.push(x0+W*i/n);}else{if(n===2)xs=[x0+W*0.36];else if(n===3)xs=[x0+W*0.28,x0+W*0.68];else xs=[x0+W*0.3,x0+W*0.5,x0+W*0.78];}
 for(var i=0;i<xs.length;i++)lines+='<line x1="'+xs[i].toFixed(1)+'" y1="'+y0+'" x2="'+xs[i].toFixed(1)+'" y2="'+(y0+h)+'" stroke="'+st+'" stroke-width="2.6"/>';
 return '<svg width="'+S+'" height="'+hh+'" viewBox="'+vb+'"><rect x="'+x0+'" y="'+y0+'" width="'+W+'" height="'+h+'" rx="3" fill="'+f+'" stroke="'+st+'" stroke-width="3"/>'+lines+'</svg>';}
function rightCard(){return mlEl('mlScreen').querySelector('.pickc[data-correct="1"]');}
function shuf(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function onPick(card){ if(mlSolved)return; dismissHand();

function renderStep(){mlSolved=false;const st=ML_STEPS[mlStepIdx];const sc=mlEl('mlScreen');

 mlEl('mlSay').addEventListener('click',()=>mlSpeak(PROMPT));

 mlEl('mlCdBar').classList.add('hide');setTimeout(()=>mlSpeak(PROMPT),350);scheduleHand(()=>rightCard(),3800);}

/* ── flow ── */
var mlCdTimer=null;
function mlStartCountdown(){
  var bar=mlEl('mlCdBar'),fill=mlEl('mlCdFill'),txt=mlEl('mlCdTxt');if(!bar)return;
  bar.classList.remove('hide');
  fill.style.animation='none';void fill.offsetWidth;fill.style.animation='mlCdShrink 4s linear forwards';
  txt.textContent='التالي ›';
  bar.style.cursor='pointer';bar.setAttribute('role','button');bar.setAttribute('aria-label','التالي');
  var done=false;
  function go(){if(done)return;done=true;clearTimeout(mlCdTimer);mlCdTimer=null;if(bar.__go){bar.removeEventListener('click',bar.__go);bar.__go=null;}bar.classList.add('hide');mlNextStep();}
  if(bar.__go)bar.removeEventListener('click',bar.__go);
  bar.__go=go;bar.addEventListener('click',go);
  clearTimeout(mlCdTimer);mlCdTimer=setTimeout(go,4000);
}
function mlNextStep(){ if(mlStepIdx<ML_STEPS.length-1){mlStepIdx++;renderStep();}else showWin(); }
function showWin(){ try{speechSynthesis.cancel();}catch(e){}
  mlEl('mlWinScore').textContent=toAr(mlScore);mlEl('mlWin').classList.add('show');mlSnd.win();spawnConfetti();setTimeout(()=>mlSpeak('أحسنت'),250); }
function spawnConfetti(){const c=mlEl('mlConfetti');c.innerHTML='';const cols=['#F5C518','#8dd04d','#FF9F45','#E0654A','#5BBE5B','#C8923A','#fff','#a8e06a'];
  for(let i=0;i<55;i++){const p=document.createElement('i');const s=7+Math.random()*7;p.style.width=s+'px';p.style.height=s+'px';p.style.left=Math.random()*100+'%';
    p.style.background=cols[i%cols.length];p.style.borderRadius=Math.random()<.5?'50%':'3px';p.style.animationDuration=(1.4+Math.random()*2)+'s';p.style.animationDelay=(Math.random()*1.2)+'s';c.appendChild(p);}}
function mlRestart(){mlScore=0;mlStepIdx=0;mlEl('mlScoreVal').textContent=toAr(0);mlEl('mlWin').classList.remove('show');mlEl('mlConfetti').innerHTML='';renderStep();}
function mlHandleWinNext(){if(window.parent&&window.parent!==window){window.parent.postMessage({action:'nextLesson'},'*');}else{var i=LESSONS.indexOf(decodeURIComponent(location.pathname.split('/').pop()));if(i>=0&&i<LESSONS.length-1)location.href=LESSONS[i+1];else location.href='../Interactive book for elementary school chapter 1/moosa-lessons.html';}}

/* ── first-gesture autoplay gate + "tap to hear" hint ── */
window.addEventListener('load',function(){var heard=false,hint=null;
  function rm(){if(hint&&hint.parentNode){hint.parentNode.removeChild(hint);hint=null;}}
  document.addEventListener('play',function(){heard=true;rm();},true);
  document.addEventListener('pointerdown',function(){if(!heard){heard=true;mlSpeak(PROMPT);}rm();},{once:true,passive:true});
  setTimeout(function(){if(heard||hint)return;hint=document.createElement('div');hint.textContent='اسمع 🔊';
    hint.style.cssText='position:absolute;bottom:74px;right:14px;z-index:80;background:#1F1F1F;color:#fff;font-family:"Baloo Bhaijaan 2","Tajawal",sans-serif;font-weight:800;font-size:14px;padding:7px 13px;border-radius:999px;box-shadow:0 4px 12px rgba(0,0,0,.3);animation:mlHintPulse 1s ease-in-out infinite;pointer-events:none;';
    (document.querySelector('.ml-widget')||document.body).appendChild(hint);},2200);
  setTimeout(rm,9000);});

/* ── resume: keep the current question + score across a page refresh ── */
(function(){
  var K="moosa_pos_"+decodeURIComponent(location.pathname.split("/").pop());
  try{var st=JSON.parse(localStorage.getItem(K)||"null");
    if(st&&typeof st.idx==="number"&&st.idx>=0&&st.idx<ML_STEPS.length){mlStepIdx=st.idx;mlScore=+st.score||0;var sv=mlEl("mlScoreVal");if(sv)sv.textContent=toAr(mlScore);}
  }catch(e){}
  var _r=renderStep;renderStep=function(){var x=_r.apply(this,arguments);try{localStorage.setItem(K,JSON.stringify({idx:mlStepIdx,score:mlScore}));}catch(e){}return x;};
  var _w=showWin;showWin=function(){try{localStorage.removeItem(K);}catch(e){}return _w.apply(this,arguments);};
  var _m=mlRestart;mlRestart=function(){try{localStorage.removeItem(K);}catch(e){}return _m.apply(this,arguments);};
})();
renderStep();
