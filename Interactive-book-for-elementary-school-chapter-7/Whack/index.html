<!DOCTYPE html>

<head>
<script>
/* Single narration channel: starting any spoken clip stops the previous one (prevents audio overlap). Tap/win blips use WebAudio and are unaffected. */
(function(){
  if(window.__mlAudioBus__)return; window.__mlAudioBus__=1;
  var cur=null;
  try{
    var P=window.HTMLAudioElement&&HTMLAudioElement.prototype;
    if(P&&P.play){
      var op=P.play;
      P.play=function(){
        if(cur&&cur!==this){try{cur.pause();}catch(e){}try{cur.currentTime=0;}catch(e){}}
        cur=this;
        try{if(window.speechSynthesis)speechSynthesis.cancel();}catch(e){}
        return op.apply(this,arguments);
      };
    }
  }catch(e){}
  try{
    var ss=window.speechSynthesis;
    if(ss&&ss.speak){
      var osp=ss.speak;
      ss.speak=function(u){if(cur){try{cur.pause();}catch(e){}}try{return osp.call(ss,u);}catch(e){}};
    }
  }catch(e){}
})();
</script>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>اطرح الكرات — كم كرة بقيت في الصندوق؟</title>
<meta name="description" content="أخرِج بعض الكرات من الصندوق ثم عُدّ الباقي… لعبة طرح تفاعلية ممتعة للأطفال." />
<script src="confetti.browser.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body { font-family: "Baloo 2", "Comic Sans MS", "Trebuchet MS", system-ui, sans-serif; overflow: hidden; user-select: none;
    background: linear-gradient(180deg, #3aa0e8 0%, #7ec84f 100%);
    display: flex; align-items: center; justify-content: center; }
  #app {
    position: relative; aspect-ratio: 1080 / 1920; height: 100svh; max-width: 100vw; overflow: hidden;
    background: url("background.jpeg") center / cover no-repeat; background-color: #7ec84f;
    container-type: size;
  }

  /* ---------- HUD (exact ch6 goal-kick topbar) ---------- */
  .hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 40; direction: ltr;
    display: flex; align-items: flex-start; justify-content: space-between;
    padding: 14px;
  }
  .chip {
    border: 3px solid #fff; border-radius: 999px;
    padding: 6px 18px; font-size: clamp(18px, 4cqw, 26px); font-weight: 900; color: #fff;
    text-shadow: 0 2px 0 rgba(0,0,0,0.25);
    box-shadow: 0 6px 16px rgba(0,0,0,0.2);
  }
  .chip.score { background: linear-gradient(180deg, #ffcc00, #ff9500); }
  .hud-group { display: flex; align-items: center; gap: 8px; }
  .chip.lvldots { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 5; display: flex; align-items: center; gap: 6px; padding: 6px 11px; background: linear-gradient(180deg, #22c55e, #15803d); }
  .chip.lvldots .de { font-size: clamp(15px, 3.4cqw, 21px); line-height: 1; }
  .chip .dot { width: 12px; height: 12px; border-radius: 50%; box-sizing: border-box; background: rgba(255,255,255,0.30); border: 2px solid rgba(255,255,255,0.75); transition: transform .2s, background .2s, box-shadow .2s; }
  .chip .dot.on { background: #fde047; border-color: #fff; box-shadow: 0 0 7px rgba(253,224,71,.9); transform: scale(1.18); }
  .hud-btn {

  }
  .hud-btn:active { transform: scale(.9); }

  .hud-btn.next { background: linear-gradient(180deg, #a855f7, #7e22ce); }

  /* ---------- Question + equation ---------- */
  .question { position: absolute; top: 7.6%; left: 50%; transform: translateX(-50%); z-index: 8;
    text-align: center; direction: rtl; max-width: 92%; padding: 2cqw 5.5cqw; border: 1cqw solid #fff; border-radius: 6cqw;
    background: linear-gradient(180deg, #0284c7, #075985); font-weight: 900; font-size: 4.3cqw; line-height: 1.15; color: #fff;
    text-shadow: 0 0.5cqw 0 rgba(0,0,0,0.3); box-shadow: 0 2cqw 5cqw rgba(0,0,0,0.3); white-space: nowrap; }

  .equation { position: absolute; top: 16.5%; left: 50%; transform: translateX(-50%); z-index: 8;
    display: flex; align-items: center; justify-content: center; gap: 2.6cqw; direction: ltr;
    border: 0.9cqw solid #fff; border-radius: 5cqw; padding: 1.4cqw 5cqw;
    background: linear-gradient(180deg, #f97316, #c2410c);
    font-weight: 900; font-size: 8cqw; color: #fff; text-shadow: 0 0.6cqw 0 rgba(0,0,0,0.3);
    transition: opacity .3s, transform .35s cubic-bezier(.34,1.56,.64,1); }
  .equation .op { color: #ffe08a; }
  .equation #eqAns { color: #fff59d; min-width: 1.1em; display: inline-block; text-align: center; transition: color .3s; }
  .equation #eqAns.done { color: #bbf7d0; }
  /* play-phase "how many to pop" badge */
  .equation.todo { gap: 2cqw; }
  .equation .hand { font-size: 7cqw; }
  #eqTodo { min-width: 1em; text-align: center; animation: todoPulse 1s ease-in-out infinite; }
  @keyframes todoPulse { 0%,100% { transform: scale(1);} 50% { transform: scale(1.18);} }

  /* ---------- Board (holes + balls) ---------- */
  .board { position: absolute; left: 50%; top: 63%; transform: translate(-50%,-50%); z-index: 6;
    width: 90cqw; aspect-ratio: 5 / 2.7; border-radius: 7cqw; padding: 5cqw;
    background: linear-gradient(180deg, #6fb6ff 0%, #4a93e8 100%); border: 1cqw solid #0d1b2a;
    box-shadow: 0 5cqw 9cqw rgba(0,0,0,0.35), inset 0 1.4cqw 0 rgba(255,255,255,0.25), inset 0 -2cqw 0 rgba(0,0,0,0.18); }
  .board.shake { animation: boardShake .45s ease-in-out; }
  @keyframes boardShake { 0%,100%{transform:translate(-50%,-50%);} 20%{transform:translate(calc(-50% - 2.4cqw),-50%);}
    40%{transform:translate(calc(-50% + 2.4cqw),-50%);} 60%{transform:translate(calc(-50% - 1.6cqw),-50%);} 80%{transform:translate(calc(-50% + 1.6cqw),-50%);} }
  .grid { width: 100%; height: 100%; display: grid; grid-template-rows: 1fr 1fr; grid-template-columns: repeat(5, 1fr); gap: 2.6cqw; }
  .hole { position: relative; border: 0; background: transparent; cursor: pointer; padding: 0;
    display: flex; align-items: center; justify-content: center; }
  .hole .socket { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 84%; aspect-ratio: 1; border-radius: 50%;
    background: radial-gradient(ellipse at 50% 32%, #243244 0%, #0a121e 72%);
    box-shadow: inset 0 1.6cqw 2.6cqw rgba(0,0,0,0.85), 0 0.5cqw 0 rgba(255,255,255,0.16); }
  .ball { position: relative; width: 70%; aspect-ratio: 1; border-radius: 50%; z-index: 2;
    box-shadow: 0 1.4cqw 2.2cqw rgba(0,0,0,0.45), inset -1cqw -1.4cqw 2.4cqw rgba(0,0,0,0.22), inset 1cqw 1.4cqw 2.6cqw rgba(255,255,255,0.55);
    animation: ballIn .42s cubic-bezier(.34,1.56,.64,1) backwards; }
  @keyframes ballIn { 0% { transform: translateY(-40%) scale(.3); opacity: 0; } 60% { transform: translateY(6%) scale(1.08); opacity: 1; } 100% { transform: translateY(0) scale(1); opacity: 1; } }
  .ball.pop { animation: ballPop .26s ease-in forwards !important; }
  @keyframes ballPop { 0% { transform: scale(1); opacity: 1; } 35% { transform: scale(1.18); opacity: 1; } 100% { transform: scale(.1) translateY(-22%); opacity: 0; } }
  .hole.poppable .ball { cursor: pointer; }
  .hole.poppable .ball::after { content: ""; position: absolute; inset: -10%; border-radius: 50%;
    border: 1cqw dashed rgba(255,255,255,0.9); animation: ringSpin 5s linear infinite; }
  @keyframes ringSpin { to { transform: rotate(360deg); } }
  .ball.pulse { animation: ballPulse .5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes ballPulse { 0% { transform: scale(1);} 45% { transform: scale(1.2);} 100% { transform: scale(1);} }

  /* ---------- Choices ---------- */
  .choices { position: absolute; left: 50%; bottom: 5cqw; transform: translateX(-50%); z-index: 30;

    cursor: pointer; font-size: 8cqw; text-shadow: 0 0.6cqw 0 rgba(0,0,0,0.35); box-shadow: 0 2cqw 0 rgba(0,0,0,0.2);

  .choice.right { background: linear-gradient(180deg, #4ade80, #15803d); transform: scale(1.08); }
  .choice.wrong { background: linear-gradient(180deg, #f87171, #b91c1c); }
  .choice.shake { animation: shake .5s; }
  @keyframes shake { 0%,100% { transform: translateX(0);} 20%,60% { transform: translateX(-2.4cqw);} 40%,80% { transform: translateX(2.4cqw);} }
  .choice.gone { opacity: 0; pointer-events: none; }

  @keyframes bob { 0%,100% { transform: translateY(0);} 50% { transform: translateY(-2.4cqw);} }
  @keyframes spin { to { transform: rotate(360deg);} }
  @keyframes fadeIn { from { opacity: 0;} to { opacity: 1;} }

  /* ---------- Win overlay ---------- */
  .gk-win { position: absolute; inset: 0; z-index: 100; display: none; align-items: center; justify-content: center; padding: 6cqw;
    background: rgba(6,40,24,0.82); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
  .gk-win.show { display: flex; animation: fadeIn .35s ease; }
  .gk-win-card { text-align: center; display: flex; flex-direction: column; align-items: center;
    background: rgba(255,255,255,0.10); border: 0.5cqw solid rgba(255,255,255,0.22); border-radius: 7cqw;
    padding: 5cqw 7cqw 6cqw; box-shadow: 0 2cqw 8cqw rgba(0,0,0,0.3); animation: gkWinPop .5s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes gkWinPop { 0% { transform: scale(.5); opacity: 0; } 70% { transform: scale(1.06); } 100% { transform: scale(1); opacity: 1; } }
  .gk-rays { position: relative; width: 42cqw; height: 42cqw; display: flex; align-items: center; justify-content: center; margin-bottom: -34cqw; }
  .gk-rays svg { position: absolute; inset: 0; width: 100%; height: 100%; animation: spin 8s linear infinite; }
  .gk-mascot { width: 32cqw; height: 32cqw; object-fit: contain; position: relative; z-index: 2;
    animation: bob 1.8s ease-in-out infinite; filter: drop-shadow(0 1.4cqw 3cqw rgba(0,0,0,.35)); }
  .gk-win-title { font-size: 8.5cqw; font-weight: 900; color: #fff; text-shadow: 0 0.5cqw 1.5cqw rgba(0,0,0,.3); margin-top: 1.4cqw; }
  .gk-win-sub { font-size: 4.8cqw; font-weight: 800; color: #ffe08a; margin-top: 0.5cqw; direction: rtl; }
  .gk-stars { font-size: 9cqw; letter-spacing: 1.4cqw; margin: 2cqw 0 0.5cqw; }
  .gk-stars span { display: inline-block; opacity: 0; animation: gkStarPop .45s cubic-bezier(.34,1.56,.64,1) forwards; }
  .gk-stars span:nth-child(1) { animation-delay: .3s; } .gk-stars span:nth-child(2) { animation-delay: .48s; } .gk-stars span:nth-child(3) { animation-delay: .66s; }
  @keyframes gkStarPop { 0% { transform: scale(0) rotate(-30deg); opacity: 0; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
  .gk-score { font-size: 5cqw; font-weight: 800; color: #fff; margin: 1.4cqw 0 3.4cqw; direction: rtl; }
  .gk-win-btns { display: flex; gap: 3cqw; flex-wrap: wrap; justify-content: center; }
  .gk-btn { border: 0.7cqw solid #fff; border-radius: 4cqw; padding: 3cqw 6cqw; font-family: inherit;
    font-size: 4.8cqw; font-weight: 900; color: #fff; cursor: pointer; box-shadow: 0 1.4cqw 0 rgba(0,0,0,.25); direction: rtl; }
  .gk-btn-replay { background: linear-gradient(180deg,#4ade80,#16a34a); }
  .gk-btn-menu { background: linear-gradient(180deg,#1cb0f6,#0a84c2); }
  .gk-btn:active { transform: translateY(0.7cqw); box-shadow: 0 0.6cqw 0 rgba(0,0,0,.25); }
</style>

</div>

<script>
// ---------- WebAudio blips ----------
var AC=(function(){var ctx=null;function gc(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();if(ctx.state==='suspended')ctx.resume();return ctx;}
  function t(f,s,d,ty,v){var c=gc(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=ty||'sine';o.frequency.setValueAtTime(f,s);g.gain.setValueAtTime(v||0.2,s);g.gain.exponentialRampToValueAtTime(0.001,s+d);o.start(s);o.stop(s+d+.01);}
  return{
    tap:function(){try{var c=gc(),n=c.currentTime;t(700,n,.08,'triangle',.14);}catch(e){}},
    pop:function(){try{var c=gc(),n=c.currentTime;t(620+Math.random()*160,n,.09,'triangle',.18);t(1100,n+.02,.06,'sine',.10);}catch(e){}},
    ready:function(){try{var c=gc(),n=c.currentTime;t(880,n,.18,'sine',.14);}catch(e){}},
    correct:function(){try{var c=gc(),n=c.currentTime;[[523,0],[659,.1],[784,.2],[1047,.32]].forEach(function(p){t(p[0],n+p[1],.18,'triangle',.2);});}catch(e){}},
    wrong:function(){try{var c=gc(),n=c.currentTime;t(392,n,.16,'sine',.14);t(294,n+.12,.2,'sine',.14);}catch(e){}},
    win:function(){try{var c=gc(),n=c.currentTime;[523,659,784,1047,1319].forEach(function(f,i){t(f,n+i*.1,.22,'triangle',.2);});}catch(e){}}
  };
})();

// ---------- Narrator (FatimaNeural) ----------
var NARR = {
  q:'../../audio/9baf4f29.mp3',            // "كم كرة بقيت في الصندوق؟"
  play:'../../audio/1f182f58.mp3',         // "انقُر الكرات لإخراجها من الصندوق"
  done:'../../audio/3cc9305a.mp3',         // win (shared)
  ok:{ 1:'../../audio/02e8fa1d.mp3', 2:'../../audio/5983779a.mp3', 3:'../../audio/8f692057.mp3',
       4:'../../audio/0ad42161.mp3', 5:'../../audio/946cca9c.mp3', 6:'../../audio/16f0a490.mp3',
       7:'../../audio/ecf66b4c.mp3', 8:'../../audio/e1e74153.mp3' }   // "N! أحسنت"
};
var _na=null;
function narrate(u){ if(!u)return; try{ if(_na)_na.pause(); _na=new Audio(u); _na.play().catch(function(){}); }catch(e){} }
function sayCurrent(){ narrate(phase==='answering' ? NARR.q : NARR.play); }

function fireConfetti(){ try{ confetti({particleCount:170,spread:115,origin:{y:0.45},colors:['#ef4444','#f97316','#facc15','#22c55e','#0ea5e9','#a855f7'],scalar:1.3}); }catch(e){} }

// ---------- Helpers ----------
var AR=['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];function toAr(n){return String(n).replace(/[0-9]/g,function(d){return AR[+d];});}
function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function g(id){return document.getElementById(id);}
function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }

var HOLES=10;  // 2 x 5
var BALLC=['#ef4444','#f97316','#facc15','#22c55e','#0ea5e9','#a855f7','#ec4899','#14b8a6','#f43f5e','#84cc16'];

// difficulty: 5 rounds, easiest -> hardest (N balls in the box)
var ROUNDS=[[3,4],[4,5],[5,7],[6,8],[7,9]];
var TOTAL=ROUNDS.length;

var roundIdx=0, solved=0, score=0, N=5, K=2, R=3, popped=0, phase='idle', seq=0;
var grid=g('grid'), choicesEl=g('choices'), eq=g('equation');

function renderDots(){ var c=g('dots'); for(var j=0;j<5;j++){ c.children[j+1] && c.children[j+1].classList.toggle('on', j<solved); } }

function makeChoices(answer){
  var set={}; set[answer]=1; var list=[answer];
  while(list.length<4){ var v=Math.max(0,Math.min(HOLES,answer+ (Math.random()<0.5?-1:1)*rand(1,3))); if(!set[v]){set[v]=1;list.push(v);} }
  return shuffle(list);
}

function newRound(){
  var s=++seq; phase='playing'; popped=0;
  choicesEl.innerHTML=''; grid.innerHTML='';
  g('board').classList.remove('shake');

  var rg=ROUNDS[roundIdx]; N=rand(rg[0],rg[1]); if(N>HOLES)N=HOLES; K=rand(1,Math.min(5,N-1)); R=N-K;

  // choose which holes contain a ball
  var idx=[]; for(var i=0;i<HOLES;i++) idx.push(i); shuffle(idx);
  var filled={}; for(var f=0; f<N; f++) filled[idx[f]]=1;

  for(var h=0; h<HOLES; h++){
    var hole=document.createElement('button'); hole.className='hole'; hole.setAttribute('aria-label', filled[h]?'كرة':'فارغ');
    hole.innerHTML='<span class="socket"></span>';
    if(filled[h]){
      var col=BALLC[h%BALLC.length];
      var b=document.createElement('span'); b.className='ball';
      b.style.background='radial-gradient(circle at 32% 28%, #ffffff 0%, '+col+' 58%, '+col+' 100%)';
      b.style.animationDelay=(0.04*h)+'s';
      hole.appendChild(b);
      hole.classList.add('has-ball','poppable');
      (function(holeEl){ holeEl.addEventListener('click',function(){ popBall(holeEl, s); }); })(hole);
    }
    grid.appendChild(hole);
  }

  // question + "pop K" badge
  g('question').textContent='انقُر الكرات لإخراجها!';
  eq.className='equation todo';
  eq.innerHTML='<span class="hand">👆</span><span id="eqTodo">'+toAr(K)+'</span>';
  narrate(NARR.play);
}

function popBall(holeEl, s){
  if(s!==seq || phase!=='playing') return;
  if(!holeEl.classList.contains('poppable')) return;
  if(popped>=K) return;
  var b=holeEl.querySelector('.ball'); if(!b) return;
  holeEl.classList.remove('poppable');
  b.classList.add('pop');
  AC.pop();
  popped++;
  var left=K-popped;
  var td=g('eqTodo'); if(td) td.textContent=toAr(left);
  if(popped>=K){
    // disable any remaining balls from being popped
    grid.querySelectorAll('.hole.poppable').forEach(function(x){ x.classList.remove('poppable'); });
    setTimeout(function(){ if(s!==seq)return; toAnswer(s); }, 420);
  }
}

function toAnswer(s){
  if(s!==seq) return;
  phase='answering';
  AC.ready();
  g('question').textContent='كم كرة بقيت في الصندوق؟';
  eq.className='equation';
  eq.innerHTML='<span>'+toAr(N)+'</span><span class="op">−</span><span>'+toAr(K)+'</span><span class="op">=</span><span id="eqAns">؟</span>';
  buildChoices(R);
  narrate(NARR.q);
}

function buildChoices(answer){
  var opts=makeChoices(answer);
  choicesEl.innerHTML='';
  opts.forEach(function(v){
    var b=document.createElement('button'); b.className='choice'; b.textContent=toAr(v); b.dataset.val=v;
    b.addEventListener('click',function(){ pick(v,b); });
    choicesEl.appendChild(b);
  });
}

function pick(v,btn){
  if(phase!=='answering') return;
  if(v===R){
    phase='done'; AC.tap();
    narrate(NARR.ok[R]||null);
    var ga=g('eqAns'); if(ga){ ga.textContent=toAr(R); ga.classList.add('done'); }
    btn.classList.add('right');
    // celebrate the balls still in the box
    grid.querySelectorAll('.hole.has-ball .ball:not(.pop)').forEach(function(a){ a.classList.add('pulse'); });
    choicesEl.querySelectorAll('.choice').forEach(function(b){ b.disabled=true; if(b!==btn) b.classList.add('gone'); });
    AC.correct(); fireConfetti();
    solved++; score+=10; g('score').textContent=toAr(score); renderDots();
    setTimeout(function(){ if(roundIdx>=TOTAL-1){ showWin(); } else { roundIdx++; newRound(); } }, 2200);
  } else {
    AC.wrong();
    btn.classList.add('wrong');
    g('board').classList.remove('shake'); void g('board').offsetWidth; g('board').classList.add('shake');
    setTimeout(function(){ btn.classList.remove('wrong'); }, 600);
  }
}

function showWin(){
  phase='win';
  g('winScore').textContent=toAr(score);
  g('gkWin').classList.add('show');
  AC.win(); fireConfetti(); narrate(NARR.done);
}
function restart(){ g('gkWin').classList.remove('show'); roundIdx=0; solved=0; score=0; g('score').textContent=toAr(0); renderDots(); newRound(); }
function skipRound(){ AC.tap(); if(roundIdx>=TOTAL-1){ showWin(); } else { roundIdx++; newRound(); } }
function goMenu(){ window.location.href='../../Interactive book for elementary school chapter 1/moosa-lessons.html'; }

g('backBtn').addEventListener('click',goMenu);
g('gkMenu').addEventListener('click',goMenu);
g('gkReplay').addEventListener('click',restart);
g('sayBtn').addEventListener('click',sayCurrent);

renderDots();
newRound();

// autoplay gate — narrate on first touch
var _fg=false;
g('app').addEventListener('pointerdown',function(){ if(!_fg){_fg=true; sayCurrent();} },{passive:true});
</script>
